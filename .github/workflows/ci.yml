# clinosim CI — hard-gate on tests, informational on lint / typecheck.
#
# Hard gates (must be green to merge):
#   - unit tests on Python 3.11 and 3.12
#   - integration tests on Python 3.12 (single 3.11 skip = ~18min job, cost-vs-value)
#
# Informational (visible but does not block merge — pre-existing lint / mypy
# debt is tracked as follow-up cleanup, this keeps the debt VISIBLE without
# freezing the repo):
#   - ruff check + ruff format --check
#   - mypy strict
#
# One known integration test is deselected: `test_jp_clinical_impression_
# structural_fields_present`. It fails on the by-design snapshot pattern
# `ci-in-progress` in the by-design registry, was already failing on
# session 45 master (verified by checkout), and the fix is a test change
# (accept "in-progress" for snapshot-truncated encounters) tracked as
# follow-up rather than being smuggled into the CI PR.
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel in-flight runs for the same branch when a newer push arrives —
# no point keeping a 20-minute integration job running on obsolete code.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit tests (Py ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install (with dev extras)
        run: pip install -e ".[dev]"
      - name: Run unit tests
        run: pytest tests/unit -q --tb=short

  integration:
    name: Integration tests (Py 3.12)
    runs-on: ubuntu-latest
    needs: unit
    # ~17-18 min locally, ~42 min extrapolated on GitHub-hosted ubuntu-latest
    # runners (2-vCPU / 7GB — verified by the first CI run cancelled at 72%
    # after 30 min). Timeout headroom = 60 min so a legitimate slow-down
    # doesn't cancel a passing run.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install (with dev extras)
        run: pip install -e ".[dev]"
      - name: Run integration tests (excluding by-design pre-existing failure)
        run: >
          pytest tests/integration -q --tb=short
          --deselect
          tests/integration/test_document_jp_localization.py::test_jp_clinical_impression_structural_fields_present

  lint:
    name: Lint (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install "ruff>=0.3"
      - name: ruff check
        run: ruff check clinosim/ tests/
      - name: ruff format --check
        run: ruff format --check clinosim/ tests/

  typecheck:
    name: Type check (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install (with dev extras)
        run: pip install -e ".[dev]"
      - name: mypy
        run: mypy clinosim/

  packaging:
    name: Build sdist + wheel (Py 3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install build tools
        run: pip install build twine
      - name: Build sdist + wheel
        run: python -m build
      - name: Verify PyPI-compatible metadata
        run: twine check dist/*
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          retention-days: 7
