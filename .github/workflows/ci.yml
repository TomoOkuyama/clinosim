# clinosim CI — hard-gate on tests, informational on lint / typecheck.
#
# Hard gates (must be green to merge):
#   - unit tests on Python 3.11 and 3.12
#   - integration tests on Python 3.12 (single 3.11 skip = ~18min job, cost-vs-value)
#
# Informational (visible but does not block merge — pre-existing lint / mypy
# debt is tracked as follow-up cleanup, this keeps the debt VISIBLE without
# freezing the repo):
#   - ruff check + ruff format --check
#   - mypy strict
#
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel in-flight runs for the same branch when a newer push arrives —
# no point keeping a 20-minute integration job running on obsolete code.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit tests (Py ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install (with dev extras)
        run: pip install -e ".[dev]"
      - name: Run unit tests
        run: pytest tests/unit -q --tb=short

  integration:
    name: Integration tests (Py 3.12, shard ${{ matrix.shard }}/3)
    runs-on: ubuntu-latest
    needs: unit
    # Historical:
    #   * Single-worker serial:  ~42-50 min on GitHub-hosted ubuntu-latest
    #   * PR #373 (session 65):  xdist -n 2 (2 vCPUs)                  ≈ 25 min
    #   * PR E   (session 65):   xdist -n 2  ×  pytest-split N=3       ≈ 8-10 min
    #
    # The `pytest-split` matrix splits tests[integration] into 3 groups
    # using `.test_durations` (committed at repo root) so each shard runs
    # ~1/3 of the wall-clock work. Within each shard, `pytest-xdist -n 2
    # --dist=worksteal` fills both vCPUs. Combined parallelism = 3 × 2 = 6
    # concurrent workers — theoretical ~8-10 min wall clock, verified per
    # PR by the slowest shard.
    #
    # `.test_durations` seeded from a single-shot local run and refreshed
    # by rerunning `pytest tests/integration --store-durations -n 2
    # --dist=worksteal` when the test suite composition drifts noticeably
    # (add/remove ~20% or more integration tests).
    #
    # Tests that mutate shared filesystem or global state are marked with
    # `@pytest.mark.serial` and executed in a separate single-worker job
    # (`integration_serial`) so they cannot collide with parallel siblings.
    #
    # Timeout headroom kept at 60 min so a legitimate slow-down doesn't
    # cancel a passing run.
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install (with dev extras)
        run: pip install -e ".[dev]"
      - name: Run integration tests (shard ${{ matrix.shard }}/3, xdist -n 2)
        run: >
          pytest tests/integration -q --tb=short
          -n 2 --dist=worksteal
          -m "not serial"
          --splits 3 --group ${{ matrix.shard }}

  integration_serial:
    name: Integration tests (serial pass)
    runs-on: ubuntu-latest
    needs: unit
    # Runs @pytest.mark.serial-marked tests single-worker. Today the set
    # is empty (local xdist verify 2026-07-22 surfaced 0 collisions across
    # all 305 tests), so this job exits 0 in <30s via the `exit 5`
    # (no tests collected) short-circuit. Job stays in the workflow so a
    # future serial-marked test runs automatically without a workflow edit.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install (with dev extras)
        run: pip install -e ".[dev]"
      - name: Run serial-marked integration tests
        run: pytest tests/integration -q --tb=short -m serial || [ $? -eq 5 ]

  lint:
    name: Lint (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install "ruff>=0.3"
      - name: ruff check
        run: ruff check clinosim/ tests/
      - name: ruff format --check
        run: ruff format --check clinosim/ tests/

  typecheck:
    name: Type check (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install (with dev extras)
        run: pip install -e ".[dev]"
      - name: mypy
        run: mypy clinosim/

  reproducibility:
    name: Reproducibility (Py 3.12)
    runs-on: ubuntu-latest
    # Hard gate: enforces the SemVer determinism promise recorded in
    # CHANGELOG.md. Runs `scripts/reproduce.sh` which itself does two
    # `clinosim generate` runs per locale and byte-diffs the output.
    # ~5-6 min including install (script itself is ~2 min on CI runners).
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install (runtime deps only; dev extras not needed for the script)
        run: pip install -e "."
      - name: Run scripts/reproduce.sh
        run: bash scripts/reproduce.sh

  packaging:
    name: Build sdist + wheel (Py 3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install build tools
        run: pip install build twine
      - name: Build sdist + wheel
        run: python -m build
      - name: Verify PyPI-compatible metadata
        run: twine check dist/*
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          retention-days: 7
