# clinosim CI — hard-gate on tests, informational on lint / typecheck.
#
# Hard gates (must be green to merge):
#   - unit tests on Python 3.11 and 3.12
#   - integration tests on Python 3.12 (single 3.11 skip = ~18min job, cost-vs-value)
#
# Informational (visible but does not block merge — pre-existing lint / mypy
# debt is tracked as follow-up cleanup, this keeps the debt VISIBLE without
# freezing the repo):
#   - ruff check + ruff format --check
#   - mypy strict
#
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel in-flight runs for the same branch when a newer push arrives —
# no point keeping a 20-minute integration job running on obsolete code.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit tests (Py ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install (with dev extras)
        run: pip install -e ".[dev]"
      - name: Run unit tests
        run: pytest tests/unit -q --tb=short

  integration:
    name: Integration tests (Py 3.12)
    runs-on: ubuntu-latest
    needs: unit
    # Historical: ~17-18 min locally, ~42-50 min on GitHub-hosted
    # ubuntu-latest (2-vCPU / 7GB — verified by the first CI run cancelled
    # at 72% after 30 min).
    #
    # Session 65: `-n 2 --dist=worksteal` parallelises across the runner's
    # 2 vCPUs; expected ~25-30 min wall clock, ~40% faster. Tests that
    # mutate shared filesystem or global state are marked with
    # `@pytest.mark.serial` and executed in a second single-worker pass so
    # they cannot collide with parallel siblings. Timeout headroom kept at
    # 60 min so a legitimate slow-down doesn't cancel a passing run.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install (with dev extras)
        run: pip install -e ".[dev]"
      - name: Run integration tests (parallel — excludes serial)
        run: pytest tests/integration -q --tb=short -n 2 --dist=worksteal -m "not serial"
      - name: Run integration tests (serial pass, no-op when zero serial tests)
        # `|| [ $? -eq 5 ]` treats "no tests collected" (pytest exit 5) as
        # success — the current state has 0 serial-marked tests (local
        # xdist verify 2026-07-22 showed 0 test collisions, so no serial
        # marker was needed). Step stays in the workflow so a future
        # serial-marked test runs automatically without workflow edits.
        run: pytest tests/integration -q --tb=short -m serial || [ $? -eq 5 ]

  lint:
    name: Lint (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install "ruff>=0.3"
      - name: ruff check
        run: ruff check clinosim/ tests/
      - name: ruff format --check
        run: ruff format --check clinosim/ tests/

  typecheck:
    name: Type check (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install (with dev extras)
        run: pip install -e ".[dev]"
      - name: mypy
        run: mypy clinosim/

  reproducibility:
    name: Reproducibility (Py 3.12)
    runs-on: ubuntu-latest
    # Hard gate: enforces the SemVer determinism promise recorded in
    # CHANGELOG.md. Runs `scripts/reproduce.sh` which itself does two
    # `clinosim generate` runs per locale and byte-diffs the output.
    # ~5-6 min including install (script itself is ~2 min on CI runners).
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install (runtime deps only; dev extras not needed for the script)
        run: pip install -e "."
      - name: Run scripts/reproduce.sh
        run: bash scripts/reproduce.sh

  packaging:
    name: Build sdist + wheel (Py 3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install build tools
        run: pip install build twine
      - name: Build sdist + wheel
        run: python -m build
      - name: Verify PyPI-compatible metadata
        run: twine check dist/*
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          retention-days: 7
