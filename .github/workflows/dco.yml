# DCO (Developer Certificate of Origin) check.
#
# Every commit on every PR must carry a `Signed-off-by:` trailer that matches
# the author. See CONTRIBUTING.md#dco for the how-to; `git commit -s` is the
# usual way to add the trailer.
#
# This job is a HARD GATE — merges are blocked until every PR commit has the
# trailer. Contributors can retro-sign with `git rebase --signoff origin/master
# && git push --force-with-lease`.
#
# Why we don't use the Probot-based DCO app: this workflow is self-contained
# and does not depend on a GitHub App installation. Trade-off: no per-commit
# UI status checks, only a single job pass/fail.
name: DCO

on:
  pull_request:
    types: [opened, synchronize, reopened]

# One check per PR head — cancel prior runs on force-push.
concurrency:
  group: dco-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  dco:
    name: Signed-off-by check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head with full history
        uses: actions/checkout@v4
        with:
          # `git rev-list base..head` needs both refs; `fetch-depth: 0` gets
          # them regardless of how many commits are in the PR.
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Verify Signed-off-by trailer on every PR commit
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          MISSING=0
          # Merge commits generated by GitHub itself carry a Signed-off-by
          # too, but we skip them defensively — they aren't authored by a
          # contributor and shouldn't block the merge.
          for SHA in $(git rev-list "$BASE_SHA".."$HEAD_SHA" --no-merges); do
            AUTHOR=$(git log -1 --format='%an <%ae>' "$SHA")
            MESSAGE=$(git log -1 --format=%B "$SHA")
            if ! printf '%s' "$MESSAGE" | grep -qEi '^signed-off-by: .+ <.+@.+>$'; then
              echo "::error::commit $SHA (by $AUTHOR) is missing the 'Signed-off-by:' trailer"
              MISSING=$((MISSING + 1))
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            echo ""
            echo "See CONTRIBUTING.md#dco for how to sign your commits."
            echo "Quick fix: git rebase --signoff origin/master && git push --force-with-lease"
            exit 1
          fi
          echo "All PR commits carry the Signed-off-by trailer."
