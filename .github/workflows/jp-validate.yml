# JP FHIR profile validation (session 47 PR3 sub-PR-C)
#
# Manual-only workflow that generates a JP cohort and (optionally) runs
# the HL7 official FHIR Validator against JP Core / JP-CLINS / JP-eCheckup
# profiles. Not run on every PR (Java + jar download is heavy); triggered
# by workflow_dispatch or by adding the "jp-validate" label to a PR.
name: JP FHIR validate

on:
  workflow_dispatch:
    inputs:
      population:
        description: "Population size (default 100)"
        required: false
        default: "100"
      seed:
        description: "Random seed (default 42)"
        required: false
        default: "42"
      run_validator:
        description: "Run the HL7 validator against samples (requires Java + jar)"
        type: boolean
        required: false
        default: false
  pull_request:
    types: [labeled]

jobs:
  jp-validate:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.label.name == 'jp-validate')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install clinosim
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Set up Java (optional validator)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_validator == 'true' }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Download HL7 FHIR validator (optional)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_validator == 'true' }}
        run: |
          # 公式 release から最新の validator_cli.jar を取得(SHA256 検証は
          # 将来 sub-PR で pinning 可能に)。
          mkdir -p .cache
          curl -sSL -o .cache/validator_cli.jar \
            https://github.com/hapifhir/org.hl7.fhir.core/releases/latest/download/validator_cli.jar
          echo "VALIDATOR_JAR=$PWD/.cache/validator_cli.jar" >> "$GITHUB_ENV"

      - name: Run JP validation bridge
        env:
          CLINOSIM_JP_VAL_POPULATION: ${{ github.event.inputs.population || '100' }}
          CLINOSIM_JP_VAL_SEED: ${{ github.event.inputs.seed || '42' }}
          CLINOSIM_JP_VAL_HEALTH: "1"
        run: |
          chmod +x scripts/validate_jp.sh
          scripts/validate_jp.sh
