# Clinical short-name / abbreviation for diagnosis codes (FHIR
# Condition.code.text — "what clinicians type", search-friendly). Distinct
# from the official long name in icd-10-cm.yaml / icd-10.yaml, which stays
# in coding[].display (e.g. text="COPD" vs
# display="Other chronic obstructive pulmonary disease"). Keyed by the
# 3-character ICD-10 base code, shared across ICD-10-CM (US) and ICD-10 WHO
# (JP) since base categories are identical between the two systems (AD-30).
# This is clinosim's own abbreviation convention, not an external code
# system — no authoritative source beyond internal clinical-writing
# consistency (matches the project's existing _CONDITION_SHORT_NAME values
# verbatim; migrated from Python, not newly authored).
metadata:
  name: Clinical Short Name (Condition.code.text abbreviation)
  uri: "urn:clinosim:condition-short-name"
codes:
  # Respiratory
  J44: {en: "COPD", ja: "COPD（慢性閉塞性肺疾患）"}
  J45: {en: "Asthma", ja: "喘息"}
  J15: {en: "Bacterial pneumonia", ja: "細菌性肺炎"}
  J12: {en: "Viral pneumonia", ja: "ウイルス性肺炎"}
  J18: {en: "Pneumonia", ja: "肺炎"}
  J69: {en: "Aspiration pneumonia", ja: "誤嚥性肺炎"}
  J10: {en: "Influenza", ja: "インフルエンザ"}
  # Cardiovascular
