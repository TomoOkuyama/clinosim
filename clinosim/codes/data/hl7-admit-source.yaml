# HL7 FHIR admit-source. Authoritative source: HL7 Terminology (THO),
# CodeSystem admit-source (http://terminology.hl7.org/CodeSystem/admit-source).
# Cycle-1 C1-02 fix (session 41): clinosim currently emits only "outp" and "emd";
# adding more codes here should be paired with the emitter in simulator/*.py so
# the coverage remains a closed subset (matches other codes/data/*.yaml files).
metadata:
  name: HL7 FHIR Admit Source
  uri: http://terminology.hl7.org/CodeSystem/admit-source
  source: "HL7 Terminology (THO)"
codes:
  outp: {en: "From outpatient department", ja: "外来より入院"}
  emd:  {en: "From accident/emergency department", ja: "救急外来より入院"}
  # Issue #332 (session 62): default fallback code for IMP encounters missing
  # an explicit admit_source in CIF. 従来 "hosp" は authoritative HL7
  # admit-source CS(r4 7.2.0)に未収録で v9 validation で unknown-code
  # error 発火 → semantic-honest な "other" へ訂正
  # (`hosp-trans` は他院からの転院で specific meaning、不明時 emit は誤情報)。
  other: {en: "Other, unspecified", ja: "その他、特定できず"}
