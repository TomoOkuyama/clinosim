metadata:
  name: K-codes
  uri: urn:oid:1.2.392.200119.4.401
  version: '2024'
  description: |
    Japanese procedure codes (診療報酬点数表: K手術, D検査, G処置, J処置).
    Includes surgical procedures (K-codes), diagnostic/bedside procedures
    (D/G/J codes). Each entry has both en (international) and ja (official
    Japanese) displays.
codes:
  # --- K: Surgery (手術) ---
  K002:
    en: Wound debridement
    ja: 創傷デブリードマン
  K013:
    en: Debridement and skin grafting
    ja: デブリードマン・植皮術
  K081:
    en: Orthopedic fracture fixation
    ja: 整形外科的骨折固定術
  K089:
    en: Complex hand surgery (replantation)
    ja: 複雑手指手術・再接着術
  K164-2:
    en: Chronic subdural hematoma, burr hole irrigation
    ja: 慢性硬膜下血腫穿孔洗浄術
  K0461:
    en: Open treatment of femoral fracture, proximal end, neck (ORIF)
    ja: 大腿骨観血的整復固定術
  K0462:
    en: ORIF with volar locking plate (forearm fracture)
    ja: 掌側ロッキングプレートによる観血的整復固定術
  K0811:
    en: Hemiarthroplasty, femoral head
    ja: 大腿骨頭人工骨頭置換術
  K599:
    en: Electrical cardioversion
    ja: 電気的カルジオバージョン
  K636:
    en: Exploratory laparotomy
    ja: 試験開腹術
  K672-2:
    en: Laparoscopic cholecystectomy
    ja: 腹腔鏡下胆嚢摘出術
  K718-2:
    en: Laparoscopic appendectomy
    ja: 腹腔鏡下虫垂切除術
  K920:
    en: Blood transfusion
    ja: 輸血

  # --- D: Diagnostic procedures (検査) ---
  D002:
    en: Urinary catheter insertion
    ja: 尿道カテーテル挿入
  D004:
    en: Lumbar puncture
    ja: 腰椎穿刺
  D010:
    en: Thoracentesis
    ja: 胸腔穿刺
  D011:
    en: Paracentesis
    ja: 腹腔穿刺
  D012:
    en: Chest tube insertion
    ja: 胸腔ドレーン挿入
  D215:
    en: Transthoracic echocardiography
    ja: 経胸壁心エコー
  D302:
    en: Bronchoscopy
    ja: 気管支鏡検査

  # --- G: General procedures (処置) ---
  G005-2:
    en: Central venous catheter insertion
    ja: 中心静脈カテーテル挿入
  G005-3:
    en: Arterial line insertion
    ja: 動脈ライン挿入

  # --- J: Invasive bedside procedures (処置) ---
  J034:
    en: Nasogastric tube insertion
    ja: 経鼻胃管挿入
  J038:
    en: Acute hemodialysis
    ja: 急性血液透析
  J044:
    en: Endotracheal intubation
    ja: 気管挿管
