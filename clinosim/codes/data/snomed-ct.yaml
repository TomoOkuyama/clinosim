  # === Resuscitation / code status (AD-55 Base) ===
  # Verified active against SNOMED CT International via HL7 FHIR terminology
  # server (tx.fhir.org $lookup), 2026-06-22. Displays match each concept's FSN
  # (semantic tag dropped).
  '304251008':
    en: Resuscitation status        # FSN: Resuscitation status (observable entity)
    ja: 蘇生ステータス
  '304252001':
    en: For resuscitation           # FSN: For resuscitation (finding)
    ja: 蘇生処置を行う
  '304253006':
