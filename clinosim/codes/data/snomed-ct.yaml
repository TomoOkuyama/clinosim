    ja: 多量飲酒者
  # === ICU devices (AD-55 Module: device, PR-A) ===
  # All three verified via tx.fhir.org $expand text-search against
  # SNOMED CT International edition, 2026-06-24. The spec's tentative
  # 467021000 (indwelling urinary catheter) was not present in the
  # International edition — replaced with the verified 23973005.
  # The spec's "Mechanical ventilator" display was returned as the
  # SNOMED preferred term "Ventilator" — using authoritative display.
  '52124006':
    en: Central venous catheter
    ja: 中心静脈カテーテル
  '23973005':
    en: Indwelling urinary catheter
    ja: 膀胱留置カテーテル
  '706172005':
    en: Ventilator
    ja: 人工呼吸器
  # === HAI conditions (AD-55 Module: hai, PR-B) ===
  # All verified via tx.fhir.org $lookup / $expand against SNOMED CT
  # International edition. Spec's CLABSI tentative 433142000 and
  # CAUTI tentative 425500004 were not present in International;
  # CLABSI replaced with 736442006 (Catheter related bloodstream
  # infection, verified via $expand); CAUTI replaced with 68566005
  # (Urinary tract infectious disease, generic — CAUTI-specificity
  # is conveyed via ICD-10-CM T83.511A + Condition.code.text).
  '736442006':
    en: Catheter related bloodstream infection
    ja: 中心静脈カテーテル関連血流感染症
  '68566005':
    en: Urinary tract infectious disease
    ja: カテーテル関連尿路感染症
  '429271009':
