metadata:
  name: SNOMED CT
  uri: http://snomed.info/sct
  version: '2024-03'
  description: |
    SNOMED Clinical Terms — subset used by clinosim for FHIR Procedure
    category, performer functions, outcomes, complications, and body sites.
    Authoritative source: SNOMED International (https://www.snomed.org/).
