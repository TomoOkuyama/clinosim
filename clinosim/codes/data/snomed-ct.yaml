  # === Alcohol use ===
  # Verified active against SNOMED CT International via tx.fhir.org $lookup,
  # 2026-06-22. NOTE: the former "social" code 160573003 was found INACTIVE and
  # is the observable "Alcohol intake (observable entity)" — not a drinking
  # pattern. Replaced with the active finding 28127009 Social drinker.
  '105542008':
    en: Current non-drinker of alcohol   # FSN: Current non-drinker of alcohol (finding)
    ja: 非飲酒者
  '28127009':
