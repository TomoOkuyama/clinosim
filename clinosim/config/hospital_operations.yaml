# Hospital operational parameters (default: 50-bed community hospital)
# Defines resource capacity, staffing, and daily patterns.
# These determine how long patients wait for tests, imaging, and procedures.
#
# To simulate a larger hospital, use --hospital-config with a custom YAML
# or copy this file and adjust resource_capacity/staffing.

# Recommended catchment population for this hospital size
# This is the default if -p is not specified on CLI
recommended_population: 12000

# Resource capacity (number of units)
resource_capacity:
  lab_analyzers: 2
  ct_scanners: 1
  mri_scanners: 0    # small hospital — MRI referred to regional center
  xray_rooms: 2
  ultrasound_rooms: 1
  operating_rooms: 2
  ed_beds: 8
  inpatient_beds: 50

# Staffing levels by shift (fraction of full capacity, 0.0-1.0)
staffing:
  day:      # 08:00-16:00
    hours: [8, 16]
    lab_staff: 1.0
    radiology_staff: 0.8
    nursing_staff: 1.0
    pharmacy_staff: 0.8
    or_staff: 0.8
  evening:  # 16:00-00:00
    hours: [16, 0]
    lab_staff: 0.5
    radiology_staff: 0.3
    nursing_staff: 0.7
    pharmacy_staff: 0.3
    or_staff: 0.1    # emergency only
  night:    # 00:00-08:00
    hours: [0, 8]
    lab_staff: 0.2
    radiology_staff: 0.1
    nursing_staff: 0.5
    pharmacy_staff: 0.0
    or_staff: 0.0
  weekend_modifier: 0.6

# Daily utilization patterns (additive to baseline)
daily_patterns:
  morning_lab_rush:
    hours: [6, 8]
    lab_queue_delta: 0.35
  post_morning_rounds:
    hours: [9, 11]
    ct_queue_delta: 0.1
    lab_queue_delta: 0.1
  monday_backlog:
    weekday: 0
    ct_queue_delta: 0.2
    lab_queue_delta: 0.1

# Base processing time (minutes, with no queue and full staff)
base_processing_time:
  lab_stat: 25
  lab_routine: 55
  xray: 15
  ct: 25
  ultrasound: 30
  or_minor: 30
  or_major: 90

# Reporting time (radiologist reads and reports)
reporting_time:
  stat: 20
  routine: 150
