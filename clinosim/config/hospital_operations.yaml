# Hospital operational parameters (default: 50-bed community hospital)
# Defines resource capacity, staffing, and daily patterns.
# These determine how long patients wait for tests, imaging, and procedures.
#
# To simulate a larger hospital, use --hospital-config with a custom YAML
# or copy this file and adjust resource_capacity/staffing.

# Recommended catchment population for this hospital size
# This is the default if -p is not specified on CLI
recommended_population:
  US: 40000   # 50 beds ÷ 130 beds/100K ≈ 38K, rounded to 40K for ~80% occupancy
  JP: 10000   # Based on admission throughput: 50 beds × 365d × 0.80 / 14d avg LOS
              # ≈ 1,043 admissions/yr. JP inpatient rate ~100/1000 pop/yr → 10K catchment.
              # (Earlier 5K value based on bed density alone gave ~17% occupancy)
  default: 40000

# Imaging infrastructure (WADO base URL for Endpoint emission)
imaging:
  wado_base_url: "https://wado.clinosim.example/dicomweb"

# Available departments at this hospital (50-bed community hospital).
# Granular sub-specialties roll up via department_rollup below.
available_departments:
  - internal_medicine    # 内科 (general medicine, absorbs pulm/neuro/nephro/endo)
  - cardiology           # 循環器内科
  - gastroenterology     # 消化器内科
  - general_surgery      # 外科 (absorbs neurosurg/trauma)
  - orthopedics          # 整形外科
  - emergency_medicine   # 救急
  - primary_care         # プライマリケア (outpatient)
  # CY6-01 / CY6-30 (Chain-6): allied-health service lines added to match the
  # roster (session 44 C5-25) — Organization + Location + PractitionerRole.org
  # references now all resolve. Physical space for these services is co-located
  # with inpatient wards (rehab gym in ortho ward; nutrition consultants
  # visit bedside), so no new ward entry is required.
  - rehabilitation       # リハビリテーション科 (PT/OT/ST)
  - nutrition            # 栄養管理科 (RD)
  - medical_social_work  # 医療社会事業科 (MSW)

# Map granular specialties to the available departments at this hospital
department_rollup:
  pulmonology: internal_medicine
  neurology: internal_medicine
  nephrology: internal_medicine
  endocrinology: internal_medicine
  hematology: internal_medicine
  infectious_disease: internal_medicine
  neurosurgery: general_surgery
  trauma_surgery: general_surgery
  cardiovascular_surgery: general_surgery
  vascular_surgery: general_surgery

# Ward layout — which ward(s) each department uses + bed count per ward
wards:
  internal_medicine: ["4E", "4W"]
  cardiology: ["5E"]
  gastroenterology: ["5W"]
  general_surgery: ["3E"]
  orthopedics: ["3W"]
  emergency_medicine: ["ER"]
  primary_care: ["OPD"]

# Bed capacity per ward (inpatient wards only; 50 beds total)
ward_capacity:
  "4E": 10
  "4W": 10
  "5E": 8
  "5W": 8
  "3E": 8
  "3W": 6

# Resource capacity (number of units)
resource_capacity:
  lab_analyzers: 2
  ct_scanners: 1
  mri_scanners: 0    # small hospital — MRI referred to regional center
  xray_rooms: 2
  ultrasound_rooms: 1
  operating_rooms: 2
  ed_beds: 8
  inpatient_beds: 50

# Staffing levels by shift (fraction of full capacity, 0.0-1.0)
staffing:
  day:      # 08:00-16:00
    hours: [8, 16]
    lab_staff: 1.0
    radiology_staff: 0.8
    nursing_staff: 1.0
    pharmacy_staff: 0.8
    or_staff: 0.8
  evening:  # 16:00-00:00
    hours: [16, 0]
    lab_staff: 0.5
    radiology_staff: 0.3
    nursing_staff: 0.7
    pharmacy_staff: 0.3
    or_staff: 0.1    # emergency only
  night:    # 00:00-08:00
    hours: [0, 8]
    lab_staff: 0.2
    radiology_staff: 0.1
    nursing_staff: 0.5
    pharmacy_staff: 0.0
    or_staff: 0.0
  weekend_modifier: 0.6

# Daily utilization patterns (additive to baseline)
daily_patterns:
  morning_lab_rush:
    hours: [6, 8]
    lab_queue_delta: 0.35
  post_morning_rounds:
    hours: [9, 11]
    ct_queue_delta: 0.1
    lab_queue_delta: 0.1
  monday_backlog:
    weekday: 0
    ct_queue_delta: 0.2
    lab_queue_delta: 0.1

# Base processing time (minutes, with no queue and full staff)
base_processing_time:
  lab_stat: 25
  lab_routine: 55
  xray: 15
  ct: 25
  ultrasound: 30
  or_minor: 30
  or_major: 90

# Reporting time (radiologist reads and reports)
reporting_time:
  stat: 20
  routine: 150
