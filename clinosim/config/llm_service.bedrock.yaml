# clinosim LLM Service Configuration — Amazon Bedrock
#
# Setup: Configure AWS credentials via one of these methods:
#   1. AWS CLI: aws configure
#   2. Environment variables: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION
#   3. IAM role (when running on EC2/ECS)
#   4. AWS profile: set profile_name below
#
# Required IAM permissions:
#   - bedrock:InvokeModel
#
# Supported Claude models on Bedrock:
#   - anthropic.claude-3-5-sonnet-20241022-v2:0 (latest, recommended)
#   - anthropic.claude-3-5-sonnet-20240620-v1:0
#   - anthropic.claude-3-opus-20240229-v1:0
#   - anthropic.claude-3-sonnet-20240229-v1:0
#   - anthropic.claude-3-haiku-20240307-v1:0

# NARRATIVE: Document generation (5 required types per LOINC specification)
# Affects text content only (Admission H&P, Operative Note, Discharge Summary, etc.)
# Target documents (per LOINC codes):
#   - 34117-2: Admission H&P (all admissions)
#   - 18842-5: Discharge Summary (all discharges)
#   - 11504-8: Operative Note (surgeries)
#   - 28570-0: Procedure Note (invasive bedside procedures)
#   - 69730-0: Death Note (death discharges)
narrative:
  mode: "llm"               # "llm" | "template" | "none"
  provider: "bedrock"
  bedrock:
    region: "us-east-1"
    # profile_name: "default"
  model_map:
    small: "anthropic.claude-3-haiku-20240307-v1:0"
    medium: "anthropic.claude-3-5-sonnet-20241022-v2:0"
    large: "anthropic.claude-3-opus-20240229-v1:0"
  timeout_seconds: 180       # narrative can be slow, especially for complex documents
  retry_attempts: 3
  retry_backoff_seconds: 2
  max_tokens_per_run: 10000000
  fallback_on_budget_exceeded: "template"

# Shared cache
cache:
  enabled: true
  max_entries: 5000
  persist_to_disk: true
