# clinosim LLM Service Configuration — AWS Bedrock
#
# Intended for EC2 deployment where Bedrock is reachable via IAM instance role.
#
# Requirements:
#   - EC2 instance role with `bedrock:InvokeModel` and `bedrock:Converse`
#     permissions, OR exported AWS credentials, OR `profile` key set below.
#   - `pip install boto3` (or `pip install 'clinosim[bedrock]'`)
#   - Model access approved in the Bedrock console for the target region.
#
# Usage:
#   clinosim narrate \
#       --cif-dir ./output/cif \
#       --llm-config clinosim/config/llm_service.bedrock.yaml \
#       --version-id bedrock_sonnet_en_v1

# JUDGMENT stays template-based in Milestone 1 (Stage 1 runs locally and
# must be deterministic). Bedrock is used only for NARRATIVE documents.
judgment:
  mode: "template"
  provider: ""

narrative:
  mode: "llm"
  provider: "bedrock"
  bedrock:
    region: "us-east-1"
    profile: null  # null → default credential chain (EC2 IAM role, env vars, ~/.aws/credentials)
    model_id: "anthropic.claude-3-5-sonnet-20241022-v2:0"
    # Cross-region inference profiles (prefix "us." routes to available region):
    #   model_id: "us.anthropic.claude-sonnet-4-6"       # Claude Sonnet 4.6
    #   model_id: "us.anthropic.claude-3-5-sonnet-20241022-v2:0"
    # Or explicit ARN:
    #   inference_profile_arn: "arn:aws:bedrock:us-east-1:123456789012:inference-profile/..."
  model_map:
    small: "anthropic.claude-3-5-haiku-20241022-v1:0"
    medium: "anthropic.claude-3-5-sonnet-20241022-v2:0"
    large: "anthropic.claude-3-opus-20240229-v1:0"
    # Claude 4.x models (when available in your region):
    #   medium: "us.anthropic.claude-sonnet-4-6"
    #   large:  "us.anthropic.claude-opus-4-6"
  timeout_seconds: 60
  retry_attempts: 3
  retry_backoff_seconds: 2

# Prompt template overrides (optional)
prompts:
  registry_path: null  # null → clinosim/modules/llm_service/prompts

# SHA256 disk cache (strongly recommended for Bedrock due to cost)
cache:
  enabled: true
  directory: "./.llm_cache/bedrock"
  max_entries: 100000
