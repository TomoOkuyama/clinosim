# clinosim LLM Service Configuration
#
# Default: local Ollama (no API key needed)
# Setup: brew install ollama && ollama pull llama3.1:8b
#
# To use cloud APIs, see llm_service.bedrock.yaml or llm_service.cloud.yaml

# NARRATIVE: Document generation (5 required types per LOINC specification)
#   - 34117-2: Admission H&P (all admissions)
#   - 18842-5: Discharge Summary (all discharges)
#   - 11504-8: Operative Note (surgeries)
#   - 28570-0: Procedure Note (invasive bedside procedures)
#   - 69730-0: Death Note (death discharges)
narrative:
  mode: "llm"               # "llm" | "template" | "none"
  provider: "local"
  local:
    endpoint: "http://localhost:11434"
    model: "llama3.1:8b"     # upgrade to llama3.1:70b or qwen2.5:72b for better quality
  model_map:
    small: "llama3.1:8b"
    medium: "llama3.1:8b"
    large: "llama3.1:8b"
  timeout_seconds: 180       # narrative can be slow on local models
  retry_attempts: 2
  retry_backoff_seconds: 2
  max_tokens_per_run: 10000000
  fallback_on_budget_exceeded: "template"

# Shared cache
cache:
  enabled: true
  max_entries: 5000
  persist_to_disk: true
