# AUTHORITATIVE SOURCE: ICD-10 (WHO, 2013年版準拠 — 厚生労働省 統計分類).
# Note: Japan uses standard WHO ICD-10 codes WITHOUT clinical modification; 3-character
# category codes (I50, J44, ...) are valid classifications. This map is therefore IDENTITY
# for every internal chronic/history base code — wiring it up in the FHIR adapter leaves JP
# output unchanged (the US counterpart instead translates to billable ICD-10-CM leaves).

