# Drug code mapping — YJ code (Japan)
# Internal name → 薬価基準収載医薬品コード (YJ code)
# Source: 薬価基準収載品目リスト（厚生労働省）
# Format: 7-digit code = 4-digit 薬効分類番号 (authoritative MHLW therapeutic
# classification, well-established taxonomy) + 3-digit representative product
# index. Class portion (first 4 digits) is authoritative; product portion
# (last 3 digits) is a representative in-class stand-in. Cycle-3 memo notes
# this convention: "representative product codes; generics may differ".
#
# Full 12-char YJ codes (per-SKU) are deferred to a dedicated MHLW 令和6年
# 薬価基準 CSV parse chain (session 42 policy). The 7-digit codes emitted
# here identify the therapeutic class without claiming a specific product.

