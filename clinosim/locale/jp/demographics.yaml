# Japan demographic data for population generation
# Source: Statistics Bureau of Japan (2020 Census), MHLW National Health Survey

average_household_size: 2.3

# Age distribution (proportional, sums to 1.0)
# Source: Statistics Bureau of Japan (2020)
age_distribution:
  "0-14": 0.12
  "15-24": 0.09
  "25-34": 0.10
  "35-44": 0.12
  "45-54": 0.14
  "55-64": 0.13
  "65-74": 0.15
  "75-84": 0.10
  "85-99": 0.05

# Blood type distribution
# Source: Japanese Red Cross (Japan-specific)
blood_type:
  A: 0.40
  O: 0.30
  B: 0.20
  AB: 0.10

# Chronic disease prevalence by age range
# Format: ICD-10 code -> {age_range: prevalence}
# Source: MHLW National Health and Nutrition Survey
chronic_prevalence:
  I10:      # Hypertension — ~43% of adults 40+
    "40-99": 0.35
  E11.9:    # Type 2 DM — ~10% of adults 40+
    "40-99": 0.10
  E78:      # Dyslipidemia — ~20% of adults 40+
    "40-99": 0.20
  J44:      # COPD — ~5% of adults 40+
    "40-99": 0.05
  N18:      # CKD — ~8% of adults 60+
    "60-99": 0.08
  I50:      # Heart failure — ~3% of adults 65+
    "65-99": 0.03
  I48:      # Atrial fibrillation — ~1.5% age 50+, ~9% age 75+
    "50-74": 0.015
    "75-99": 0.09
  I25:      # Ischemic heart disease — ~3% age 50+, ~10% age 70+ (lower than US)
    "50-69": 0.03
    "70-99": 0.10
  M81:      # Osteoporosis — sex-neutral ~15% age 60+ (higher in Japan)
    "60-99": 0.15
  F00:      # Dementia/Alzheimer — ~3% age 65+, ~16% age 85+ (high longevity)
    "65-84": 0.03
    "85-99": 0.16
  G20:      # Parkinson's disease — ~0.5% age 60+, ~2% age 80+
    "60-79": 0.005
    "80-99": 0.02
  E03:      # Hypothyroidism — ~4% age 50+ (slightly lower than US)
    "50-99": 0.04
  K21:      # GERD — ~12% age 40+ (lower than US, rising trend)
    "40-99": 0.12
  J45:      # Asthma — ~7% all ages (slightly lower than US)
    "0-99": 0.07
  N40:      # BPH (benign prostatic hyperplasia) — male only ~8% age 50+
    sex: M
    "50-99": 0.08
  M17:      # Osteoarthritis — ~15% age 50+, ~30% age 70+ (similar to US)
    "50-69": 0.15
    "70-99": 0.30

# Disease incidence rates per 100,000/year by age group
# Source: MHLW Patient Survey, Japanese Orthopedic Association
disease_incidence:
  bacterial_pneumonia:
    age_rates: {0: 700, 5: 130, 15: 50, 25: 60, 35: 80, 45: 120, 55: 200, 65: 500, 75: 1200, 85: 2500}
    sex_ratio_female: 0.75
    event_type: acute_disease_onset
    severity_beta: [2, 3]
  heart_failure_exacerbation:
    age_rates: {0: 5000, 45: 15000, 65: 20000, 75: 25000, 85: 30000}
    sex_ratio_female: 1.0
    event_type: chronic_exacerbation
    prerequisite_condition: I50
    severity_beta: [3, 3]
    severity_minimum: 0.3
    hospitalization_threshold_modifier: 0.8
  hip_fracture:
    age_rates: {0: 3, 45: 8, 55: 25, 65: 80, 75: 300, 85: 700}
    sex_ratio_female: 2.5
    event_type: trauma
    severity_beta: [7, 3]
    always_hospitalize: true
  urinary_tract_infection:
    age_rates: {0: 25, 15: 40, 25: 70, 35: 90, 45: 110, 55: 180, 65: 380, 75: 750, 85: 1400}
    sex_ratio_female: 3.0
    event_type: acute_disease_onset
    severity_beta: [3, 4]
    hospitalization_threshold_modifier_by_age:
      65: 0.5
      0: 0.7
  copd_exacerbation:
    age_rates: {0: 3000, 45: 10000, 55: 15000, 65: 20000, 75: 25000, 85: 30000}
    sex_ratio_female: 0.8
    event_type: chronic_exacerbation
    prerequisite_condition: J44
    severity_beta: [3, 3]
    severity_minimum: 0.2
    hospitalization_threshold_modifier: 0.7
  sepsis:
    age_rates: {0: 4, 15: 6, 25: 8, 35: 12, 45: 25, 55: 70, 65: 180, 75: 450, 85: 900}
