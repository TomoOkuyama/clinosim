# Unknown conditions (~3-5% of admissions start as unknown)
unknown_conditions:
  min_age: 40
  base_rate: 0.00008
  age_factor: 0.005
  patterns:
    - fever_unknown
    - weight_loss_unexplained
    - malaise_fatigue
    - elevated_inflammatory_markers

# Mixed conditions (dual pathology in elderly multi-morbid patients)
mixed_conditions:
  min_age: 70
  min_chronic_conditions: 2
  probability: 0.18

# ED visits: conditions auto-loaded from encounter/reference_data/*.yaml
ed_visit_not_admitted:
  rate_per_admitted: 2.5  # JP: lower ED utilization than US

# Occupation distribution for working-age population (15-64).
# Age < 15 → student; age >= 65 → retired (handled in code).
# Source: 厚労省 労働力調査 / 総務省統計局
occupation_distribution:
  working_age:
    office: 0.30             # 事務・専門職
    service: 0.18            # サービス・小売
    manufacturing: 0.13      # 製造業
    construction: 0.07       # 建設業
    healthcare: 0.06         # 医療・福祉
    transportation: 0.05     # 運輸業
    education: 0.04          # 教育
    agriculture: 0.03        # 農林水産業
    homemaker: 0.05          # 主婦/主夫
    unemployed: 0.03         # 無職
    other: 0.06              # その他

# Occupation-based injury risk multipliers (applied in population engine).
# Used for work-related disease/encounter generation.
occupation_risk_multipliers:
  crush_injury_hand:
    manufacturing: 6.0
    construction: 3.0
    agriculture: 2.0
  industrial_burn_severe:
    manufacturing: 5.0
    construction: 2.0
  fall_from_height:
