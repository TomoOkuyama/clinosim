# Unknown conditions (~3-5% of admissions start as unknown)
unknown_conditions:
  min_age: 40
  base_rate: 0.00008
  age_factor: 0.005
  patterns:
    - fever_unknown
    - weight_loss_unexplained
    - malaise_fatigue
    - elevated_inflammatory_markers

# Mixed conditions (dual pathology in elderly multi-morbid patients)
mixed_conditions:
  min_age: 70
  min_chronic_conditions: 2
