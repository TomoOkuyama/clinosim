    sex_ratio_female: 0.75
    event_type: acute_disease_onset
  heart_failure_exacerbation:
    age_rates: {0: 5000, 45: 15000, 65: 20000, 75: 25000, 85: 30000}
    sex_ratio_female: 1.0
    event_type: chronic_exacerbation
    prerequisite_condition: I50
    hospitalization_threshold_modifier: 0.8
  hip_fracture:
    age_rates: {0: 3, 45: 8, 55: 25, 65: 80, 75: 300, 85: 700}
