# Home medications by chronic condition (ICD-10 code)
# These are continued during hospitalization unless contraindicated.
# Source: Standard clinical guidelines (JCS, AHA/ACC, KDIGO, GOLD, ADA)
#
# Fields:
#   drug: Generic drug name
#   route: PO | IV | SC
#   frequency: daily | bid | tid | qid
#   hold_condition: (optional) condition to hold the drug
#   monitoring_labs: (optional) additional labs to monitor
#   monitoring_frequency: (optional) frequency of monitoring labs

I10:  # Hypertension
  medications:
    - {drug: "Amlodipine 5mg", route: "PO", frequency: "daily"}
    - {drug: "Candesartan 8mg", route: "PO", frequency: "daily", probability: 0.5}
  hold_conditions:
    - {drug: "Amlodipine 5mg", condition: "SBP < 90", field: "systolic_bp", threshold: 90, direction: "below"}
    - {drug: "Candesartan 8mg", condition: "SBP < 90", field: "systolic_bp", threshold: 90, direction: "below"}

E11.9:  # Type 2 Diabetes
  medications:
    - {drug: "Metformin 500mg", route: "PO", frequency: "bid"}
    - {drug: "Sliding scale insulin", route: "SC", frequency: "qid", probability: 0.4}
  monitoring:
    - {test: "Glucose", frequency: "qid", times: [6, 11, 17, 21], intent: "Blood glucose monitoring (DM)"}
  hold_conditions:
    - {drug: "Metformin 500mg", condition: "eGFR < 30 or acute illness", field: "renal_function", threshold: 0.3, direction: "below"}

E78:  # Dyslipidemia
  medications:
    - {drug: "Atorvastatin 10mg", route: "PO", frequency: "daily"}
  monitoring:
    - {test: "AST", frequency: "every_3_days", intent: "Statin hepatotoxicity monitoring"}
    - {test: "ALT", frequency: "every_3_days", intent: "Statin hepatotoxicity monitoring"}

J44:  # COPD
  medications:
    - {drug: "Tiotropium 18mcg inhaler", route: "INH", frequency: "daily"}
    - {drug: "Salbutamol 100mcg inhaler PRN", route: "INH", frequency: "prn"}
  monitoring:
    - {test: "SpO2", frequency: "tid", intent: "COPD SpO2 monitoring (target 88-92%)"}
  vital_adjustments:
    spo2_target_low: 88
    spo2_target_high: 92

N18:  # CKD
  medications:
    - {drug: "Sodium bicarbonate 500mg", route: "PO", frequency: "tid", probability: 0.3}
  monitoring:
    - {test: "Creatinine", frequency: "daily", intent: "Renal function monitoring (CKD)"}
    - {test: "K", frequency: "daily", intent: "Potassium monitoring (CKD)"}
    - {test: "Na", frequency: "daily", intent: "Sodium monitoring (CKD)"}
    - {test: "BUN", frequency: "every_3_days", intent: "BUN monitoring (CKD)"}
  dose_adjustments:
    - {pattern: "renal_clearance", note: "Adjust renally cleared drugs"}

I50:  # Heart failure
  medications:
    - {drug: "Furosemide 20mg", route: "PO", frequency: "daily"}
    - {drug: "Carvedilol 2.5mg", route: "PO", frequency: "bid", probability: 0.6}
    - {drug: "Enalapril 5mg", route: "PO", frequency: "daily", probability: 0.5}
  monitoring:
    - {test: "BNP", frequency: "every_3_days", intent: "Heart failure monitoring"}
    - {test: "K", frequency: "daily", intent: "Electrolyte monitoring (diuretic)"}
    - {test: "Creatinine", frequency: "daily", intent: "Renal function monitoring (diuretic)"}
  hold_conditions:
    - {drug: "Furosemide 20mg", condition: "SBP < 90", field: "systolic_bp", threshold: 90, direction: "below"}
    - {drug: "Carvedilol 2.5mg", condition: "HR < 50", field: "heart_rate", threshold: 50, direction: "below"}
    - {drug: "Enalapril 5mg", condition: "SBP < 90 or K > 5.5", field: "systolic_bp", threshold: 90, direction: "below"}

I48:  # Atrial fibrillation
  medications:
    - {drug: "Warfarin 3mg", route: "PO", frequency: "daily", probability: 0.5}
    - {drug: "Apixaban 5mg", route: "PO", frequency: "bid", probability: 0.5}
  monitoring:
    - {test: "PT-INR", frequency: "daily", intent: "Anticoagulation monitoring"}
  hold_conditions:
    - {drug: "Warfarin 3mg", condition: "Pre-surgical", note: "Hold 5 days before surgery, bridge with heparin"}

I25:  # Ischemic heart disease / Coronary artery disease
  medications:
    - {drug: "Aspirin 100mg", route: "PO", frequency: "daily"}
    - {drug: "Clopidogrel 75mg", route: "PO", frequency: "daily", probability: 0.4}
  hold_conditions:
    - {drug: "Aspirin 100mg", condition: "Pre-surgical", note: "Hold pre-surgery"}
    - {drug: "Clopidogrel 75mg", condition: "Pre-surgical", note: "Hold pre-surgery"}

M81:  # Osteoporosis
  medications:
    - {drug: "Alendronate 35mg", route: "PO", frequency: "weekly", probability: 0.6, note: "Empty stomach, 30min before meals"}
    - {drug: "Vitamin D 1000IU", route: "PO", frequency: "daily"}
  monitoring:
    - {test: "Ca", frequency: "every_3_days", intent: "Calcium monitoring (osteoporosis)"}

F00:  # Dementia / Alzheimer's
  medications:
    - {drug: "Donepezil 5mg", route: "PO", frequency: "daily", probability: 0.5}
  notes:
    - "Increased delirium risk during hospitalization"

G20:  # Parkinson's disease
  medications:
    - {drug: "Levodopa/Carbidopa 100/25mg", route: "PO", frequency: "tid"}
  hold_conditions:
    - {drug: "Levodopa/Carbidopa 100/25mg", condition: "CRITICAL — must continue on schedule, never abruptly stop"}

E03:  # Hypothyroidism
  medications:
    - {drug: "Levothyroxine 50mcg", route: "PO", frequency: "daily"}
  monitoring:
    - {test: "TSH", frequency: "every_3_days", intent: "Thyroid monitoring (if hospitalized >7 days)"}

K21:  # GERD
  medications:
    - {drug: "Lansoprazole 15mg", route: "PO", frequency: "daily"}

J45:  # Asthma
  medications:
    - {drug: "Fluticasone/Salmeterol inhaler", route: "INH", frequency: "bid"}
    - {drug: "Salbutamol inhaler PRN", route: "INH", frequency: "prn"}
  monitoring:
    - {test: "SpO2", frequency: "tid", intent: "SpO2 monitoring if respiratory complaint"}

N40:  # BPH
  medications:
    - {drug: "Tamsulosin 0.2mg", route: "PO", frequency: "daily"}
  hold_conditions:
    - {drug: "Tamsulosin 0.2mg", condition: "Pre-surgical", note: "Hold pre-surgery (risk of floppy iris syndrome)"}

M17:  # Osteoarthritis
  medications:
    - {drug: "Acetaminophen 500mg", route: "PO", frequency: "tid", probability: 0.7}
    - {drug: "Celecoxib 200mg", route: "PO", frequency: "daily", probability: 0.3}
  monitoring:
    - {test: "Creatinine", frequency: "every_3_days", intent: "Renal function monitoring (if on NSAID)"}
  hold_conditions:
    - {drug: "Celecoxib 200mg", condition: "Renal impairment", note: "Hold if renal impairment"}
