# Both tables are applied longest-key-first via a stable sort, so equal-length
# keys are substituted in this file's order — preserve order on edit.
#   - `categories`: case-insensitive word-boundary substitutions, applied first.
#   - `terms`: case-insensitive, except UPPERCASE keys match case-sensitively.

