# US demographic data for population generation
# Source: US Census Bureau (2020), CDC NHANES, AHA statistics

average_household_size: 2.5

# Age distribution (proportional, sums to 1.0)
# Source: US Census Bureau 2020
age_distribution:
  "0-14": 0.18
  "15-24": 0.13
  "25-34": 0.14
  "35-44": 0.13
  "45-54": 0.13
  "55-64": 0.13
  "65-74": 0.09
  "75-84": 0.05
  "85-99": 0.02

# Blood type distribution
# Source: American Red Cross
blood_type:
  O: 0.44
  A: 0.42
  B: 0.10
  AB: 0.04

# Chronic disease prevalence by age range
# Format: ICD-10 code -> {age_range: prevalence}
# Source: CDC, AHA, NHANES
chronic_prevalence:
  I10:      # Hypertension — CDC ~47% of adults
    "40-99": 0.33
  E11.9:    # Type 2 DM — CDC ~11% of adults
    "40-99": 0.12
  E78:      # Dyslipidemia — CDC high cholesterol
    "40-99": 0.28
  J44:      # COPD — CDC ~6% of adults
    "40-99": 0.06
  N18:      # CKD — CDC ~14% of adults, higher in elderly
    "60-99": 0.10
  I50:      # Heart failure
    "65-99": 0.04
  I48:      # Atrial fibrillation — ~2% age 50+, ~10% age 75+
    "50-74": 0.02
    "75-99": 0.10
  I25:      # Ischemic heart disease — ~5% age 50+, ~15% age 70+
    "50-69": 0.05
    "70-99": 0.15
  M81:      # Osteoporosis — sex-neutral ~12% age 60+
    "60-99": 0.12
  F00:      # Dementia/Alzheimer — ~3% age 65+, ~15% age 85+
    "65-84": 0.03
    "85-99": 0.15
  G20:      # Parkinson's disease — ~0.5% age 60+, ~2% age 80+
    "60-79": 0.005
    "80-99": 0.02
  E03:      # Hypothyroidism — ~5% age 50+
    "50-99": 0.05
  K21:      # GERD — ~15% age 40+
    "40-99": 0.15
  J45:      # Asthma — ~8% all ages
    "0-99": 0.08
  N40:      # BPH (benign prostatic hyperplasia) — sex-neutral ~8% age 50+
    "50-99": 0.08
  M17:      # Osteoarthritis — ~15% age 50+, ~30% age 70+
    "50-69": 0.15
    "70-99": 0.30

# Disease incidence rates per 100,000/year by age group
# Source: CDC, AHA, AAOS statistics
disease_incidence:
  bacterial_pneumonia:
    age_rates: {0: 500, 5: 100, 15: 30, 25: 40, 35: 60, 45: 100, 55: 180, 65: 450, 75: 1000, 85: 2000}
    sex_ratio_female: 0.70
    event_type: acute_disease_onset
    severity_beta: [2, 3]  # beta distribution parameters for severity
  heart_failure_exacerbation:
    age_rates: {0: 5000, 45: 18000, 65: 22000, 75: 28000, 85: 35000}
    sex_ratio_female: 1.0
    event_type: chronic_exacerbation
    prerequisite_condition: I50  # requires prior HF diagnosis
    severity_beta: [3, 3]
    severity_minimum: 0.3
    hospitalization_threshold_modifier: 0.8  # lower threshold → easier to hospitalize
  hip_fracture:
    age_rates: {0: 2, 45: 5, 55: 20, 65: 70, 75: 250, 85: 600}
    sex_ratio_female: 2.5
    event_type: trauma
    severity_beta: [7, 3]  # skewed high (0.7+)
    always_hospitalize: true
  urinary_tract_infection:
    age_rates: {0: 30, 15: 50, 25: 80, 35: 100, 45: 120, 55: 200, 65: 400, 75: 800, 85: 1500}
    sex_ratio_female: 3.0
    event_type: acute_disease_onset
    severity_beta: [3, 4]
    hospitalization_threshold_modifier_by_age:
      65: 0.5
      0: 0.7
  copd_exacerbation:
    # Exacerbation rate among COPD patients. Source: GOLD report, CDC
    age_rates: {0: 3000, 45: 12000, 55: 18000, 65: 22000, 75: 28000, 85: 32000}
    sex_ratio_female: 0.9
    event_type: chronic_exacerbation
    prerequisite_condition: J44  # requires prior COPD diagnosis
    severity_beta: [3, 3]
    severity_minimum: 0.2
    hospitalization_threshold_modifier: 0.7
  sepsis:
    age_rates: {0: 5, 15: 8, 25: 10, 35: 15, 45: 30, 55: 80, 65: 200, 75: 500, 85: 1000}
    sex_ratio_female: 0.85
    event_type: acute_disease_onset
    severity_beta: [4, 3]
    severity_minimum: 0.3
    always_hospitalize: true
  cerebral_infarction:
    # US: ~800/100k age 65+. Source: AHA Heart Disease & Stroke Statistics
    age_rates: {0: 1, 25: 3, 35: 8, 45: 25, 55: 80, 65: 250, 75: 600, 85: 1200}
    sex_ratio_female: 0.8
    event_type: acute_disease_onset
    severity_beta: [3, 3]
    severity_minimum: 0.3
    always_hospitalize: true
  acute_mi:
    # US: ~400/100k age 65+. Source: AHA, NRMI registry
    age_rates: {0: 0, 25: 1, 35: 5, 45: 20, 55: 60, 65: 150, 75: 350, 85: 600}
    sex_ratio_female: 0.55  # MI much more common in men
    event_type: acute_disease_onset
    severity_beta: [3, 3]
    severity_minimum: 0.3
    always_hospitalize: true
  gi_bleeding:
    # US: ~300/100k age 65+. Source: NHDS, ACG guidelines
    age_rates: {0: 2, 25: 5, 35: 10, 45: 25, 55: 60, 65: 150, 75: 350, 85: 600}
    sex_ratio_female: 0.7
    event_type: acute_disease_onset
    severity_beta: [2, 3]
  diabetic_ketoacidosis:
    # US: ~30/100k among diabetics. Source: CDC Diabetes Statistics
    age_rates: {0: 2000, 15: 3000, 25: 4000, 35: 5000, 45: 6000, 55: 5000, 65: 4000, 75: 3000, 85: 2000}
    sex_ratio_female: 1.1
    event_type: acute_disease_onset
    prerequisite_condition: E11.9  # requires diabetes
    severity_beta: [3, 3]
    severity_minimum: 0.3
    always_hospitalize: true
  ileus:
    age_rates: {0: 5, 25: 8, 35: 15, 45: 30, 55: 60, 65: 120, 75: 250, 85: 400}
    sex_ratio_female: 0.9
    event_type: acute_disease_onset
    severity_beta: [2, 3]
    always_hospitalize: true
  acute_pancreatitis:
    age_rates: {0: 2, 25: 10, 35: 20, 45: 35, 55: 50, 65: 80, 75: 120, 85: 150}
    sex_ratio_female: 0.7
    event_type: acute_disease_onset
    severity_beta: [2, 4]
    always_hospitalize: true
  acute_appendicitis:
    age_rates: {0: 20, 5: 40, 15: 80, 25: 60, 35: 40, 45: 25, 55: 15, 65: 10, 75: 8, 85: 5}
    sex_ratio_female: 0.8
    event_type: acute_disease_onset
    severity_beta: [3, 3]
    severity_minimum: 0.3
    always_hospitalize: true
  pulmonary_embolism:
    age_rates: {0: 1, 25: 3, 35: 8, 45: 15, 55: 40, 65: 100, 75: 200, 85: 350}
    sex_ratio_female: 1.1
    event_type: acute_disease_onset
    severity_beta: [3, 3]
    always_hospitalize: true
  acute_cholecystitis:
    age_rates: {0: 1, 25: 5, 35: 15, 45: 30, 55: 50, 65: 80, 75: 120, 85: 150}
    sex_ratio_female: 1.5
    event_type: acute_disease_onset
    severity_beta: [3, 3]
    severity_minimum: 0.3
    always_hospitalize: true
  atrial_fibrillation_rvr:
    age_rates: {0: 0, 25: 1, 35: 3, 45: 10, 55: 30, 65: 80, 75: 200, 85: 400}
    sex_ratio_female: 0.75
    event_type: acute_disease_onset
    severity_beta: [2, 4]
  cellulitis:
    age_rates: {0: 5, 15: 10, 25: 20, 35: 30, 45: 40, 55: 60, 65: 100, 75: 180, 85: 300}
    sex_ratio_female: 0.8
    event_type: acute_disease_onset
    severity_beta: [2, 4]
  acute_kidney_injury:
    age_rates: {0: 2, 25: 3, 35: 5, 45: 15, 55: 40, 65: 100, 75: 250, 85: 500}
    sex_ratio_female: 0.8
    event_type: acute_disease_onset
    severity_beta: [3, 3]
    always_hospitalize: true
  liver_cirrhosis_decompensated:
    age_rates: {0: 0, 25: 1, 35: 5, 45: 15, 55: 40, 65: 60, 75: 80, 85: 60}
    sex_ratio_female: 0.5
    event_type: acute_disease_onset
    severity_beta: [3, 3]
    always_hospitalize: true
  aspiration_pneumonia:
    age_rates: {0: 5, 25: 2, 35: 3, 45: 8, 55: 20, 65: 80, 75: 250, 85: 600}
    sex_ratio_female: 0.7
    event_type: acute_disease_onset
    severity_beta: [3, 3]

