# Risk multipliers: chronic condition -> disease risk increase
disease_risk_multipliers:
  bacterial_pneumonia: {J44: 3.0, E11.9: 1.5, I50: 2.0, N18: 1.8}
  heart_failure_exacerbation: {I10: 1.5, E11.9: 1.3, N18: 2.0, I48: 1.5}
  hip_fracture: {M81: 3.0, F00: 2.5, G20: 2.0, E11.9: 1.3}
  urinary_tract_infection: {E11.9: 2.0, N18: 2.5, N40: 2.0, F00: 1.5}
  copd_exacerbation: {I50: 1.5, E11.9: 1.2, I10: 1.1}
  sepsis: {E11.9: 2.0, N18: 2.5, I50: 1.8, J44: 1.5, I48: 1.3}
  cerebral_infarction: {I10: 2.5, I48: 3.0, E11.9: 1.8, I25: 2.0, E78: 1.3}
  acute_mi: {I10: 2.0, E11.9: 2.5, E78: 2.0, I25: 3.0, I48: 1.3}
  gi_bleeding: {I48: 1.5, I25: 1.3, M17: 1.5, K21: 2.0}  # NSAIDs/anticoagulants
  diabetic_ketoacidosis: {N18: 1.5, I50: 1.3}
  ileus: {M17: 1.5}
  acute_pancreatitis: {E78: 1.3, K21: 1.2}
  acute_appendicitis: {}
  pulmonary_embolism: {I50: 1.5, I48: 1.3, M17: 1.5}
  acute_cholecystitis: {E78: 1.3, E11.9: 1.2}
  atrial_fibrillation_rvr: {I10: 2.0, I50: 2.5, I25: 1.5, E03: 1.3}
  cellulitis: {E11.9: 2.5, N18: 1.5}
  acute_kidney_injury: {N18: 3.0, I50: 2.0, E11.9: 1.8, I10: 1.3}
  liver_cirrhosis_decompensated: {}
  aspiration_pneumonia: {F00: 3.0, G20: 2.5, I63: 2.0}

# Unknown conditions (~3-5% of admissions start as unknown)
unknown_conditions:
  min_age: 40
  base_rate: 0.00008
  age_factor: 0.005
  patterns:
    - fever_unknown
    - weight_loss_unexplained
    - malaise_fatigue
    - elevated_inflammatory_markers

# Mixed conditions (dual pathology in elderly multi-morbid patients)
mixed_conditions:
  min_age: 70
  min_chronic_conditions: 2
  probability: 0.18  # ~18% of eligible admissions

# ED visits that don't result in admission (~3-5x more than admissions)
ed_visit_not_admitted:
  rate_per_admitted: 3.5  # for every admission, 3.5 ED visits go home
  conditions:
    - {name: "viral_gastroenteritis", probability: 0.20, chief_complaint: "Nausea, vomiting, diarrhea"}
    - {name: "chest_pain_noncardiac", probability: 0.15, chief_complaint: "Chest pain, ruled out ACS"}
    - {name: "minor_laceration", probability: 0.12, chief_complaint: "Laceration requiring sutures"}
    - {name: "ankle_sprain", probability: 0.10, chief_complaint: "Ankle injury after fall"}
    - {name: "viral_uri", probability: 0.10, chief_complaint: "Fever, sore throat, cough"}
    - {name: "migraine", probability: 0.08, chief_complaint: "Severe headache, nausea"}
    - {name: "allergic_reaction_mild", probability: 0.07, chief_complaint: "Urticaria, mild angioedema"}
    - {name: "low_back_pain", probability: 0.08, chief_complaint: "Acute low back pain"}
    - {name: "uti_uncomplicated", probability: 0.05, chief_complaint: "Dysuria, frequency"}
    - {name: "anxiety_panic_attack", probability: 0.05, chief_complaint: "Palpitations, dyspnea, anxiety"}
