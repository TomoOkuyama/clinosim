# Allergen catalog (PR1 scope = medication + food + environment 3 category)
# Each entry: allergen_code (SNOMED CT) + display + prevalence (age-group reference)
#             + criticality + common_reactions
# Sampling: 15% patient overall_prob gate → category-weighted single allergy
# 6-layer validator is applied in engine.py (_validate_allergens)
#
# SNOMED CT codes verified via SNOMED International browser
# (https://browser.ihtsdotools.org/) and tx.fhir.org $lookup, 2026-07-01.
# Allergen substance codes: SNOMED CT International edition.
# Reaction manifestation codes: SNOMED CT findings / disorders.

allergens:
  medication:
    - allergen_code: "387207008"
      allergen_display_en: "Penicillin"
      allergen_display_ja: "ペニシリン"
      prevalence:
        adult: 0.08              # 8% population
      criticality: high
      common_reactions:
        - manifestation_snomed: "247472004"
          manifestation_display_en: "Rash"
          manifestation_display_ja: "発疹"
          severity: mild
        - manifestation_snomed: "39579001"
          manifestation_display_en: "Anaphylaxis"
          manifestation_display_ja: "アナフィラキシー"
          severity: severe
    - allergen_code: "372687004"
      allergen_display_en: "Aspirin"
      allergen_display_ja: "アスピリン"
      prevalence:
        adult: 0.03
      criticality: low
      common_reactions:
