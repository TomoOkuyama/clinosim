# Resuscitation-status observable + 4-tier values. All SNOMED codes verified
# active against SNOMED CT International via HL7 FHIR terminology server
# (tx.fhir.org $lookup), 2026-06-22.
observable_snomed: "304251008"   # Resuscitation status (observable entity)
age_bands: ["0-49", "50-69", "70-84", "85-120"]
tiers:
  - {key: "full_code", snomed: "304252001", en: "For resuscitation", ja: "蘇生処置を行う"}
  - {key: "dnr",       snomed: "304253006", en: "Not for resuscitation", ja: "蘇生処置を行わない（DNAR）"}
  # SNOMED CT International has no single active concept for "DNR + DNI"; 304253006
  # (Not for resuscitation) is reused intentionally, with the DNI distinction carried
  # only in the clinosim tier label/text (verified: no distinct active DNI finding).
  - {key: "dnr_dni",   snomed: "304253006", en: "Not for resuscitation, not for intubation", ja: "蘇生・挿管を行わない"}
  - {key: "comfort",   snomed: "103735009", en: "Comfort care (palliative)", ja: "緩和ケア（コンフォート）"}  # TODO: verify
