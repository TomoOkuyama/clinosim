# Acute Cholecystitis — Complete Reference Data
# Sources cited per section. All rates are approximate and should be validated
# against the most current published data before production use.

disease_id: acute_cholecystitis
chief_complaint: "Right upper quadrant pain, fever, Murphy's sign positive"
department: internal_medicine
encounter_type: surgical
requires_surgery: true
minimum_severity: moderate
readmission_eligible: false
diagnostic_difficulty: 0.2   # US + clinical criteria (Tokyo Guidelines) make diagnosis straightforward

icd_codes:
  primary: "K81.0"  # Acute cholecystitis
  variants:
    - {code: "K80.00", name: "Calculus of gallbladder with acute cholecystitis without obstruction", probability: 0.55}
    - {code: "K80.01", name: "Calculus of gallbladder with acute cholecystitis with obstruction", probability: 0.15}
    - {code: "K81.0", name: "Acute cholecystitis (acalculous)", probability: 0.10}
    - {code: "K80.42", name: "Calculus of bile duct with acute cholecystitis without obstruction", probability: 0.10}
    - {code: "K80.62", name: "Calculus of gallbladder and bile duct with acute cholecystitis", probability: 0.10}

# ============================================================
# INCIDENCE (per 100,000 per year, by age band and sex)
# Source: JP — MHLW Patient Survey, Japanese Biliary Tract Society
#         US — NIS data, Stinton & Shaffer Gut Liver 2012
# ============================================================
incidence:
  japan:
    "0-4":   {M: 0, F: 0}
    "5-14":  {M: 1, F: 1}
    "15-24": {M: 3, F: 5}
    "25-34": {M: 8, F: 15}
    "35-44": {M: 15, F: 30}
    "45-54": {M: 25, F: 45}
    "55-64": {M: 40, F: 60}
    "65-74": {M: 60, F: 80}
    "75-84": {M: 75, F: 90}
    "85+":   {M: 70, F: 85}
  us:
    "0-4":   {M: 0, F: 0}
    "5-14":  {M: 1, F: 2}
    "15-24": {M: 5, F: 10}
    "25-34": {M: 12, F: 25}
    "35-44": {M: 20, F: 40}
    "45-54": {M: 35, F: 55}
    "55-64": {M: 50, F: 70}
    "65-74": {M: 70, F: 90}
    "75-84": {M: 85, F: 100}
    "85+":   {M: 80, F: 95}

  risk_multipliers:
    - {condition: "gallstones", multiplier: 8.0}
    - {condition: "female", multiplier: 1.5}
    - {condition: "obesity", multiplier: 2.0}
    - {condition: "diabetes", multiplier: 1.5}
    - {condition: "rapid_weight_loss", multiplier: 3.0}
    - {condition: "pregnancy", multiplier: 1.5}
    - {condition: "oral_contraceptives", multiplier: 1.3}
    - {condition: "TPN_use", multiplier: 3.0}
    - {condition: "critical_illness", multiplier: 4.0}     # acalculous cholecystitis
    - {condition: "Native_American_ancestry", multiplier: 2.0}

  seasonal_curve:
    1: 1.0
    2: 1.0
    3: 1.0
    4: 1.0
    5: 1.0
    6: 1.0
    7: 1.0
    8: 1.0
    9: 1.0
    10: 1.0
    11: 1.0
    12: 1.1   # slight holiday dietary increase

  vaccine_protection: {}

# ============================================================
# SEVERITY DISTRIBUTION
# Source: Tokyo Guidelines 2018 (TG18) grading
# ============================================================
severity:
  distribution:
    mild: 0.00        # minimum_severity = moderate; Grade I would be moderate in this context
    moderate: 0.65    # Grade I-II: no organ dysfunction, WBC elevation, palpable mass, duration >72h
    severe: 0.35      # Grade III: organ dysfunction (cardiovascular, neurological, respiratory, renal, hepatic, hematological)
  modifiers:
    - {condition: "age_over_75", severe_multiplier: 1.8}
    - {condition: "diabetes", severe_multiplier: 1.3}
    - {condition: "immunosuppressed", severe_multiplier: 2.0}
    - {condition: "acalculous", severe_multiplier: 2.5, note: "acalculous cholecystitis has worse prognosis"}
    - {condition: "symptom_duration_over_72h", moderate_multiplier: 1.3, severe_multiplier: 1.5}

# ============================================================
# INITIAL PHYSIOLOGICAL STATE IMPACT
# ============================================================
initial_state_impact:
  mild: {}  # Not used (minimum_severity = moderate)
  moderate:
    inflammation_level: 0.30
    volume_status: -0.10
  severe:
    inflammation_level: 0.55
    volume_status: -0.20
    perfusion_status: -0.10
    renal_function: -0.10

# ============================================================
# ORDER PROTOCOLS
# ============================================================
order_protocols:
  admission_orders:
    labs:
      - {test: "WBC", urgency: "stat"}
      - {test: "CRP", urgency: "stat"}
      - {test: "AST", urgency: "stat"}
      - {test: "ALT", urgency: "stat"}
      - {test: "ALP", urgency: "stat"}
      - {test: "GGT", urgency: "stat"}
      - {test: "Total_bilirubin", urgency: "stat"}
      - {test: "Direct_bilirubin", urgency: "stat"}
      - {test: "Amylase", urgency: "stat", probability: 0.70}
      - {test: "Lipase", urgency: "stat", probability: 0.70}
      - {test: "Creatinine", urgency: "stat"}
      - {test: "BUN", urgency: "stat"}
      - {test: "Na", urgency: "stat"}
      - {test: "K", urgency: "stat"}
      - {test: "Glucose", urgency: "stat"}
      - {test: "Hb", urgency: "stat"}
      - {test: "Plt", urgency: "stat"}
      - {test: "PT_INR", urgency: "stat"}
      - {test: "Type_and_screen", urgency: "stat"}
      - {test: "Blood_culture_x2", urgency: "stat", probability: 0.50}
    imaging:
      - {test: "Abdominal_ultrasound", urgency: "stat",
         note: "First-line imaging — gallstones, GB wall thickening, pericholecystic fluid, Murphy sign"}
      - {test: "CT_abdomen_pelvis_with_contrast", urgency: "within_6h", probability: 0.40,
         note: "If US equivocal or to assess for complications"}
      - {test: "MRCP", urgency: "within_24h", probability: 0.25,
         note: "If CBD stone suspected (elevated bilirubin/ALP)"}
    supportive:
      - {type: "NPO", detail: "Nothing by mouth for surgery"}
      - {type: "IV_fluid", detail: "Lactated Ringer 125 mL/h"}
      - {type: "pain_management", detail: "Acetaminophen 1000mg IV + NSAIDs or opioid PRN"}
      - {type: "antibiotic", detail: "Cefmetazole or Ceftriaxone + Metronidazole (see drugs section)"}

  daily_monitoring:
    labs:
      - {test: "WBC", frequency: "daily"}
      - {test: "CRP", frequency: "daily"}
      - {test: "Total_bilirubin", frequency: "daily"}
      - {test: "ALP", frequency: "daily", condition: "if elevated at admission"}
      - {test: "Creatinine", frequency: "daily"}
    vitals:
      stable: "q4h"
      unstable: "q2h"
    imaging: []

  trigger_orders:
    cbd_stone_suspected:
      condition: "Total bilirubin > 4 or dilated CBD on US (>8mm)"
      actions:
        - {type: "imaging", test: "MRCP"}
        - {type: "procedure", test: "ERCP_with_stone_extraction"}
        - {type: "consult", target: "gastroenterology"}
    failed_conservative_or_grade_iii:
      condition: "Organ dysfunction, worsening despite antibiotics 48-72h"
      actions:
        - {type: "procedure", test: "percutaneous_cholecystostomy_drainage"}
        - {type: "consult", target: "interventional_radiology"}
    gangrenous_cholecystitis:
      condition: "Fever persists, WBC rising, CT suggests wall necrosis"
      actions:
        - {type: "imaging", test: "CT_abdomen_with_contrast"}
        - {type: "evaluate", action: "emergent_cholecystectomy"}

  discharge_criteria:
    japan:
      - "Tolerating oral diet for 24-48 hours"
      - "Afebrile (< 37.0C) for 48 hours"
      - "Pain controlled with oral analgesics"
      - "Wound clean and dry"
      - "WBC normalizing and CRP declining"
      - "Biliary drainage removed (if placed)"
    us:
      - "Tolerating oral diet"
      - "Afebrile"
      - "Pain controlled with oral analgesics"
      - "Ambulating"
      - "Same-day discharge for uncomplicated laparoscopic cases (selected patients)"

# ============================================================
# LIKELIHOOD RATIO TABLE
# Source: Shea et al. Acad Emerg Med 1994, TG18 diagnostic criteria
# ============================================================
likelihood_ratios:
  us_gallstones:
    acute_cholecystitis: {positive_LR: 4.0, negative_LR: 0.2}
    biliary_colic: {positive_LR: 5.0, negative_LR: 0.3}
    choledocholithiasis: {positive_LR: 3.0, negative_LR: 0.5}

  us_gb_wall_thickening:
    acute_cholecystitis: {positive_LR: 6.0, negative_LR: 0.4}
    ascites: {positive_LR: 1.5, negative_LR: 0.9}

  us_pericholecystic_fluid:
    acute_cholecystitis: {positive_LR: 8.0, negative_LR: 0.5}

  sonographic_murphy_sign:
    acute_cholecystitis: {positive_LR: 5.0, negative_LR: 0.3}
    biliary_colic: {positive_LR: 1.5, negative_LR: 0.8}

  wbc_above_10000:
    acute_cholecystitis: {positive_LR: 2.0, negative_LR: 0.5}
    biliary_colic: {positive_LR: 0.8, negative_LR: 1.1}

  crp_above_30:
    acute_cholecystitis: {positive_LR: 3.0, negative_LR: 0.4}

  elevated_bilirubin:
    choledocholithiasis: {positive_LR: 5.0, negative_LR: 0.4}
    acute_cholecystitis: {positive_LR: 2.0, negative_LR: 0.7}
    note: "elevated bilirubin suggests CBD stone"

  elevated_alp_ggt:
    choledocholithiasis: {positive_LR: 4.0, negative_LR: 0.4}
    acute_cholecystitis: {positive_LR: 1.5, negative_LR: 0.8}

  hida_scan_non_filling:
    acute_cholecystitis: {positive_LR: 12.0, negative_LR: 0.05}
    note: "Gold standard but rarely needed if US is diagnostic"

