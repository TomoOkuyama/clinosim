# ============================================================
# TREATMENT REFERENCE — Drug selection data
# Source: TG18, WSES 2020, SAGES guidelines
# ============================================================
drugs:
  first_line:
    japan:
      - drug: "Cefmetazole"
        code_yj: "6132405"
        dose: "1g IV q8h"
        route: IV
        note: "Good biliary coverage; widely used in Japan"
        renal_adjustment:
          eGFR_below_30: "0.5g IV q12h"
        pregnancy_safe: true
      - drug: "Acetaminophen"
        code_yj: "1141700"
        dose: "1000mg IV q6h"
        route: IV
        pregnancy_safe: true
      - drug: "Diclofenac"
        code_yj: "1147700"
        dose: "50mg suppository PRN"
        route: PR
        note: "NSAIDs reduce gallbladder prostaglandin-mediated inflammation"
        pregnancy_safe: false

    us:
      - drug: "Ceftriaxone"
        code_rxnorm: "309090"
        dose: "2g IV daily"
        route: IV
        pregnancy_safe: true
      - drug: "Metronidazole"
        code_rxnorm: "6922"
        dose: "500mg IV q8h"
        route: IV
        note: "Added for anaerobic coverage"
        pregnancy_safe: false
      - drug: "Ketorolac"
        code_rxnorm: "6739"
        dose: "30mg IV q6h"
        route: IV
        note: "Max 5 days"
        pregnancy_safe: false

  alternative_penicillin_allergy:
    japan:
      - drug: "Levofloxacin"
        code_yj: "6241017"
        dose: "500mg IV daily"
        renal_adjustment:
          eGFR_below_50: "250mg IV daily"
        pregnancy_safe: false
      - drug: "Metronidazole"
        code_yj: "6419002"
        dose: "500mg IV q8h"
        pregnancy_safe: false
    us:
      - drug: "Levofloxacin"
        code_rxnorm: "82122"
        dose: "750mg IV daily"
        pregnancy_safe: false
      - drug: "Metronidazole"
        code_rxnorm: "6922"
        dose: "500mg IV q8h"
        pregnancy_safe: false

  escalation:  # gangrenous or emphysematous cholecystitis, sepsis
    japan:
      - drug: "Piperacillin/Tazobactam"
        code_yj: "6131701"
        dose: "4.5g IV q8h"
        indication: "gangrenous_cholecystitis_or_sepsis"
        renal_adjustment:
          eGFR_below_30: "2.25g IV q8h"
    us:
      - drug: "Piperacillin/Tazobactam"
        code_rxnorm: "240984"
        dose: "3.375g IV q6h"
        indication: "gangrenous_cholecystitis_or_sepsis"

  discharge_oral:
    japan:
      - drug: "Cefditoren pivoxil"
        code_yj: "6132814"
        dose: "200mg PO TID"
        duration_days: 5
        note: "Only if complicated; uncomplicated needs no postop antibiotics"
      - drug: "Loxoprofen"
        code_yj: "1149019"
        dose: "60mg PO TID PRN"
        duration_days: 5
    us:
      - drug: "Amoxicillin/Clavulanate"
        code_rxnorm: "562251"
        dose: "875/125mg PO BID"
        duration_days: 5
        note: "Only if complicated"
      - drug: "Ibuprofen"
        code_rxnorm: "5640"
        dose: "400mg PO q6h PRN"
        duration_days: 5

# ============================================================
# DRUG INTERACTIONS
# ============================================================
drug_interactions:
  - drug_a: "Metronidazole"
    drug_b: "Warfarin"
    severity: "major"
    effect: "Increased INR, bleeding risk"
    action: "Monitor INR closely"

  - drug_a: "Metronidazole"
    drug_b: "Alcohol"
    severity: "major"
    effect: "Disulfiram-like reaction"
    action: "Strict alcohol avoidance"

  - drug_a: "Levofloxacin"
    drug_b: "Warfarin"
    severity: "major"
    effect: "Increased INR, bleeding risk"
    action: "Monitor INR closely"

  - drug_a: "Ketorolac"
    drug_b: "Anticoagulants"
    severity: "major"
    effect: "Increased bleeding risk"
    action: "Avoid combination"

