# ============================================================
# CLINICAL COURSE ARCHETYPES
# ============================================================
course_archetypes:
  smooth_recovery:
    probability: 0.50
    description: "Uncomplicated laparoscopic cholecystectomy — rapid recovery"
    trajectory:
      inflammation_level: {0: 0.05, 1: -0.08, 2: -0.10, 3: -0.08, 5: -0.05, 7: -0.03, 10: -0.02, 14: -0.01}
      volume_status: {0: 0.03, 1: 0.03, 2: 0.02, 3: 0.01, 5: 0.00, 7: 0.00, 10: 0.00, 14: 0.00}
    order_modifications: {}
    treatment_modifications: {}

  dip_then_recovery:
    probability: 0.18
    description: "Postoperative nausea/mild ileus, then recovery by POD 2-3"
    trajectory:
      inflammation_level: {0: 0.05, 1: -0.03, 2: 0.02, 3: -0.03, 5: -0.06, 7: -0.05, 10: -0.03, 14: -0.02}
      volume_status: {0: 0.02, 1: 0.00, 2: -0.02, 3: 0.02, 5: 0.01, 7: 0.01, 10: 0.00, 14: 0.00}
    order_modifications:
      day_2:
        add_labs: ["WBC", "CRP"]
    treatment_modifications:
      day_2:
        action: "antiemetics_and_continued_NPO"

  plateau_then_recovery:
    probability: 0.10
    description: "Delayed surgery (Day 3-5) due to workup for CBD stone, then recovery"
    trajectory:
      inflammation_level: {0: 0.03, 1: 0.02, 2: 0.00, 3: 0.00, 5: -0.05, 7: -0.08, 10: -0.06, 14: -0.03}
      volume_status: {0: 0.02, 1: 0.01, 2: 0.00, 3: 0.00, 5: 0.02, 7: 0.01, 10: 0.00, 14: 0.00}
    order_modifications:
      day_2:
        add_imaging: ["MRCP"]
      day_3:
        add_procedure: ["ERCP"]
    treatment_modifications: {}

  treatment_resistant:
    probability: 0.10
    description: "Gangrenous or complicated cholecystitis — difficult surgery, prolonged antibiotics"
    trajectory:
      inflammation_level: {0: 0.10, 1: 0.05, 2: 0.02, 3: -0.02, 5: -0.05, 7: -0.08, 10: -0.06, 14: -0.04}
      volume_status: {0: -0.03, 1: 0.00, 2: 0.01, 3: 0.02, 5: 0.01, 7: 0.01, 10: 0.00, 14: 0.00}
      renal_function: {0: -0.03, 1: -0.01, 2: 0.00, 3: 0.01, 5: 0.01, 7: 0.01, 10: 0.00, 14: 0.00}
    order_modifications:
      day_2:
        add_labs: ["Blood_culture", "WBC", "CRP"]
        add_imaging: ["CT_abdomen_with_contrast"]
    treatment_modifications:
      day_2:
        stop: ["Cefmetazole"]
        start:
          japan: [{drug: "Piperacillin/Tazobactam", dose: "4.5g IV q8h"}]
          us: [{drug: "Piperacillin/Tazobactam", dose: "3.375g IV q6h"}]
    triggers:
      - day: 2
        condition: "gangrenous_changes_on_ct"
        actions: ["escalate_antibiotic", "emergent_cholecystectomy"]

  gradual_deterioration:
    probability: 0.07
    description: "Cholangitis or sepsis developing — ICU transfer needed"
    trajectory:
      inflammation_level: {0: 0.12, 1: 0.08, 2: 0.05, 3: 0.02, 5: -0.02, 7: -0.05, 10: -0.05, 14: -0.03}
      perfusion_status: {0: -0.05, 1: -0.05, 2: -0.03, 3: -0.02, 5: 0.02, 7: 0.02, 10: 0.01, 14: 0.01}
      renal_function: {0: -0.05, 1: -0.03, 2: -0.02, 3: 0.00, 5: 0.01, 7: 0.01, 10: 0.01, 14: 0.00}
    order_modifications:
      day_1:
        add_labs: ["Blood_culture_x2", "Lactate", "ABG"]
    treatment_modifications:
      day_1:
        start:
          japan: [{drug: "Meropenem", dose: "1g IV q8h"}]
          us: [{drug: "Meropenem", dose: "1g IV q8h"}]
      day_2:
        action: "emergent_ercp_or_percutaneous_drainage"
    triggers:
      - day: 1
        condition: "Charcot_triad_or_Reynolds_pentad"
        actions: ["emergent_ercp", "icu_transfer"]

  sudden_deterioration:
    probability: 0.05
    description: "Gallbladder perforation or bile peritonitis"
    trajectory:
      inflammation_level: {0: 0.05, 1: 0.30, 2: 0.08, 3: -0.05, 5: -0.08, 7: -0.06, 10: -0.04, 14: -0.02}
      perfusion_status: {0: 0.00, 1: -0.20, 2: -0.05, 3: 0.05, 5: 0.05, 7: 0.03, 10: 0.02, 14: 0.01}
      renal_function: {0: 0.00, 1: -0.10, 2: -0.03, 3: 0.02, 5: 0.02, 7: 0.01, 10: 0.01, 14: 0.00}
    order_modifications:
      day_1:
        add_labs: ["ABG", "Lactate", "Blood_culture_x2", "Type_and_crossmatch"]
        add_imaging: ["CT_abdomen_pelvis_with_contrast"]
    treatment_modifications:
      day_1:
        start:
          japan:
            - {drug: "Meropenem", dose: "1g IV q8h"}
          us:
            - {drug: "Meropenem", dose: "1g IV q8h"}
        action: "emergent_cholecystectomy_or_drainage"
        action_2: "icu_transfer"
    triggers:
      - day: 1
        condition: "peritoneal_signs_or_hemodynamic_instability"
        actions: ["emergent_surgery", "icu_transfer"]

# Archetype selection modifiers
archetype_modifiers:
  - condition: "age >= 75"
    effect: {gradual_deterioration: 0.05, smooth_recovery: -0.05}
  - condition: "symptom_duration_over_72h"
    effect: {treatment_resistant: 0.08, smooth_recovery: -0.08}
  - condition: "acalculous_cholecystitis"
    effect: {gradual_deterioration: 0.08, sudden_deterioration: 0.05, smooth_recovery: -0.13}

# ============================================================
# COMPLICATIONS
# ============================================================
complications:
  - name: "bile_duct_injury"
    description: "Iatrogenic common bile duct injury during cholecystectomy"
    probability_per_day: 0.003
    onset_day_range: [0, 1]   # intraoperative
    risk_factors:
      - {condition: "severe_inflammation", multiplier: 3.0}
      - {condition: "unclear_anatomy", multiplier: 5.0}
      - {condition: "conversion_to_open", multiplier: 2.0}
    state_impact:
      inflammation_level: 0.15
    detection:
      test: "intraoperative_cholangiogram_or_ct"
      finding: "bile_leak_or_stricture"
    actions: ["ercp_with_stenting", "hepaticojejunostomy_if_major"]

  - name: "bile_leak"
    description: "Postoperative bile leak from cystic duct stump or accessory duct"
    probability_per_day: 0.005
    onset_day_range: [1, 5]
    risk_factors:
      - {condition: "gangrenous_cholecystitis", multiplier: 3.0}
      - {condition: "severe_inflammation", multiplier: 2.0}
    state_impact:
      inflammation_level: 0.10
    detection:
      test: "ct_abdomen_or_hida"
      finding: "bile_collection_or_free_fluid"
    actions: ["percutaneous_drainage", "ercp_with_stenting"]

  - name: "cholangitis"
    description: "Ascending cholangitis from retained CBD stone"
    probability_per_day: 0.005
    onset_day_range: [1, 7]
    risk_factors:
      - {condition: "choledocholithiasis", multiplier: 5.0}
      - {condition: "elevated_bilirubin", multiplier: 3.0}
    state_impact:
      inflammation_level: 0.25
      perfusion_status: -0.10
    detection:
      test: "clinical_and_labs"
      finding: "Charcot_triad_fever_jaundice_rlq_pain"
    actions: ["emergent_ercp", "broad_spectrum_antibiotics"]
    cascade: ["sepsis"]

  - name: "wound_infection"
    description: "Surgical site infection"
    probability_per_day: 0.006
    onset_day_range: [3, 10]
    risk_factors:
      - {condition: "gangrenous_cholecystitis", multiplier: 3.0}
      - {condition: "obesity", multiplier: 1.5}
      - {condition: "diabetes", multiplier: 1.5}
    state_impact:
      inflammation_level: 0.05
    detection:
      test: "wound_inspection"
      finding: "erythema_drainage_warmth"
    actions: ["wound_opening_and_drainage", "wound_culture", "antibiotics_if_cellulitis"]

  - name: "postoperative_pancreatitis"
    description: "Pancreatitis following ERCP or CBD exploration"
    probability_per_day: 0.004
    onset_day_range: [0, 3]
    risk_factors:
      - {condition: "ercp_performed", multiplier: 5.0}
      - {condition: "cbd_exploration", multiplier: 3.0}
    state_impact:
      inflammation_level: 0.20
      volume_status: -0.10
    detection:
      test: "lipase"
      finding: "above_3x_uln"
    actions: ["NPO", "aggressive_iv_fluids", "pain_management"]

  - name: "dvt"
    description: "Deep vein thrombosis"
    probability_per_day: 0.005
    onset_day_range: [2, 10]
    risk_factors:
      - {condition: "immobility_days > 2", multiplier: 2.0}
      - {condition: "no_dvt_prophylaxis", multiplier: 3.0}
      - {condition: "obesity", multiplier: 1.5}
    state_impact:
      coagulation_status: 0.05
    detection:
      test: "d_dimer_then_ultrasound"
      finding: "dvt_confirmed"
    actions: ["start_anticoagulation"]
    cascade: ["pulmonary_embolism"]

  - name: "retained_cbd_stone"
    description: "CBD stone missed during initial workup"
    probability_per_day: 0.003
    onset_day_range: [1, 14]
    risk_factors:
      - {condition: "elevated_bilirubin_at_admission", multiplier: 3.0}
      - {condition: "no_preoperative_mrcp", multiplier: 2.0}
    state_impact:
      inflammation_level: 0.08
    detection:
      test: "liver_function_tests"
      finding: "rising_bilirubin_and_alp"
    actions: ["mrcp", "ercp_with_stone_extraction"]
