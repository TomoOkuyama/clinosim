# ============================================================
# TARGET LENGTH OF STAY
# ============================================================
target_los:
  japan:
    mild: {mean: 14, sd: 4, min: 7, max: 21}
    moderate: {mean: 18, sd: 5, min: 10, max: 28}
    severe: {mean: 25, sd: 7, min: 14, max: 42}
  us:
    mild: {mean: 5, sd: 2, min: 3, max: 8}
    moderate: {mean: 7, sd: 3, min: 4, max: 12}
    severe: {mean: 12, sd: 4, min: 7, max: 21}

# ============================================================
# OUTCOME BENCHMARKS
# ============================================================
outcome_benchmarks:
  japan:
    median_los: 17
    los_iqr: [12, 24]
    in_hospital_mortality: 0.10
    icu_transfer_rate: 0.15
    thirty_day_readmission: 0.20
    dialysis_required_rate: 0.15
    renal_recovery_rate: 0.60
    progression_to_ckd_rate: 0.25
    mean_age_admitted: 72
    male_ratio: 0.58

  us:
    median_los: 7
    los_iqr: [4, 10]
    in_hospital_mortality: 0.08
    icu_transfer_rate: 0.18
    thirty_day_readmission: 0.22
    dialysis_required_rate: 0.12
    renal_recovery_rate: 0.65
    progression_to_ckd_rate: 0.20
    mean_age_admitted: 68
    male_ratio: 0.55

# ============================================================
# CLINICAL COURSE ARCHETYPES
# ============================================================
course_archetypes:
  smooth_recovery:
    probability: 0.40
    description: "Prerenal AKI responding to fluid resuscitation within 24-48h"
    trajectory:
      renal_function: {0: -0.05, 1: 0.05, 2: 0.08, 3: 0.08, 5: 0.06, 7: 0.05, 10: 0.04, 14: 0.03}
      volume_status: {0: 0.03, 1: 0.02, 2: 0.00, 3: -0.02, 5: -0.02, 7: -0.01, 10: 0.00, 14: 0.00}
      inflammation_level: {0: 0.02, 1: -0.02, 2: -0.03, 3: -0.03, 5: -0.02, 7: -0.01, 10: -0.01, 14: 0.00}
      ph_status: {0: 0.00, 1: 0.01, 2: 0.02, 3: 0.02, 5: 0.01, 7: 0.01, 10: 0.00, 14: 0.00}
    order_modifications: {}
    treatment_modifications: {}

  dip_then_recovery:
    probability: 0.20
    description: "Creatinine peaks Day 3-5 (ATN phase), then gradual recovery"
    trajectory:
      renal_function: {0: -0.10, 1: -0.05, 2: -0.03, 3: 0.00, 5: 0.05, 7: 0.06, 10: 0.05, 14: 0.04, 21: 0.03}
      volume_status: {0: 0.05, 1: 0.03, 2: 0.02, 3: 0.00, 5: -0.02, 7: -0.02, 10: -0.01, 14: 0.00, 21: 0.00}
      ph_status: {0: -0.02, 1: -0.01, 2: 0.00, 3: 0.01, 5: 0.02, 7: 0.01, 10: 0.01, 14: 0.00, 21: 0.00}
    order_modifications:
      day_3:
        add_labs: ["Urinalysis_microscopy", "Urine_Na", "FENa"]
    treatment_modifications:
      day_3:
        adjust: "reduce_IV_fluid_if_euvolemic"

  plateau_then_recovery:
    probability: 0.15
    description: "Creatinine plateaus for 7-10 days (prolonged ATN), then slow recovery"
    trajectory:
      renal_function: {0: -0.05, 1: -0.02, 2: 0.00, 3: 0.00, 5: 0.00, 7: 0.00, 10: 0.03, 14: 0.04, 21: 0.03}
      volume_status: {0: 0.03, 1: 0.02, 2: 0.01, 3: 0.00, 5: 0.00, 7: -0.01, 10: -0.02, 14: -0.01, 21: 0.00}
    order_modifications:
      day_7:
        add_labs: ["complement_C3_C4", "ANCA", "anti_GBM", "protein_electrophoresis"]
        add_consult: ["nephrology"]
    treatment_modifications:
      day_7:
        evaluate: "consider_renal_biopsy"

  treatment_resistant:
    probability: 0.12
    description: "Progressive AKI requiring dialysis initiation"
    trajectory:
      renal_function: {0: -0.08, 1: -0.05, 2: -0.03, 3: -0.02, 5: 0.00, 7: 0.02, 10: 0.04, 14: 0.04, 21: 0.03}
      volume_status: {0: 0.05, 1: 0.03, 2: 0.03, 3: 0.00, 5: -0.02, 7: -0.02, 10: -0.01, 14: 0.00, 21: 0.00}
      ph_status: {0: -0.03, 1: -0.02, 2: -0.01, 3: 0.02, 5: 0.02, 7: 0.01, 10: 0.01, 14: 0.00, 21: 0.00}
    order_modifications:
      day_2:
        add_labs: ["ABG", "K_stat"]
        add_consult: ["nephrology"]
      day_3:
        add_procedure: ["dialysis_catheter_placement"]
    treatment_modifications:
      day_3:
        start:
          japan: [{drug: "Hemodialysis", dose: "3-4h, 3x/week"}]
          us: [{drug: "Hemodialysis", dose: "3-4h or CRRT if ICU"}]
    triggers:
      - day: 3
        condition: "K > 6.0 or pH < 7.1 or pulmonary_edema"
        actions: ["emergent_dialysis"]

  gradual_deterioration:
    probability: 0.08
    description: "Multi-organ dysfunction with progressive AKI"
    trajectory:
      renal_function: {0: -0.10, 1: -0.08, 2: -0.05, 3: -0.03, 5: -0.02, 7: 0.00, 10: 0.02, 14: 0.03, 21: 0.02}
      perfusion_status: {0: -0.05, 1: -0.05, 2: -0.03, 3: -0.02, 5: 0.00, 7: 0.01, 10: 0.02, 14: 0.01, 21: 0.01}
      inflammation_level: {0: 0.08, 1: 0.05, 2: 0.03, 3: 0.02, 5: 0.00, 7: -0.02, 10: -0.03, 14: -0.02, 21: -0.01}
      volume_status: {0: 0.05, 1: 0.05, 2: 0.03, 3: 0.00, 5: -0.02, 7: -0.02, 10: -0.01, 14: 0.00, 21: 0.00}
    order_modifications:
      day_2:
        add_labs: ["Lactate", "ABG", "LDH", "Haptoglobin"]
      day_5:
        add_labs: ["ABG", "Lactate"]
    treatment_modifications:
      day_2:
        start:
          japan: [{drug: "CRRT", dose: "continuous 24h"}]
          us: [{drug: "CRRT", dose: "continuous 24h"}]
        action: "icu_transfer"
    triggers:
      - day: 3
        condition: "perfusion_status < 0.4 and renal_function < 0.3"
        actions: ["icu_transfer", "CRRT"]

  sudden_deterioration:
    probability: 0.05
    description: "Cardiac arrest from hyperkalemia or severe pulmonary edema"
    trajectory:
      renal_function: {0: -0.05, 1: -0.02, 2: -0.20, 3: -0.05, 5: 0.05, 7: 0.05, 10: 0.04, 14: 0.03, 21: 0.02}
      perfusion_status: {0: 0.00, 1: 0.00, 2: -0.25, 3: 0.05, 5: 0.05, 7: 0.03, 10: 0.02, 14: 0.01, 21: 0.01}
      ph_status: {0: 0.00, 1: 0.00, 2: -0.15, 3: 0.05, 5: 0.03, 7: 0.02, 10: 0.01, 14: 0.00, 21: 0.00}
    order_modifications:
      day_2:
        add_labs: ["K_stat", "ABG", "ECG_12lead", "Lactate"]
    treatment_modifications:
      day_2:
        start:
          japan:
            - {drug: "Calcium_gluconate", dose: "10mL 8.5% IV stat"}
            - {drug: "Emergent_dialysis", dose: "stat"}
          us:
            - {drug: "Calcium_gluconate", dose: "1g IV stat"}
            - {drug: "Emergent_dialysis", dose: "stat"}
        action: "icu_transfer"
    triggers:
      - day: 2
        condition: "K > 6.5 or pH < 7.0"
        actions: ["icu_transfer", "emergent_dialysis", "calcium_gluconate"]

archetype_modifiers:
  - condition: "CKD"
    effect: {treatment_resistant: 0.10, smooth_recovery: -0.10}
  - condition: "age >= 80"
    effect: {plateau_then_recovery: 0.08, smooth_recovery: -0.08}
  - condition: "sepsis"
    effect: {gradual_deterioration: 0.08, sudden_deterioration: 0.03, smooth_recovery: -0.11}
  - condition: "prerenal_etiology"
    effect: {smooth_recovery: 0.15, treatment_resistant: -0.10, gradual_deterioration: -0.05}

# ============================================================
# COMPLICATIONS
# ============================================================
complications:
  - name: "hyperkalemia"
    description: "Life-threatening potassium elevation"
    probability_per_day: 0.025
    onset_day_range: [0, 7]
    risk_factors:
      - {condition: "severity_severe", multiplier: 3.0}
      - {condition: "CKD", multiplier: 2.0}
      - {condition: "ACE_inhibitor_use", multiplier: 2.0}
      - {condition: "rhabdomyolysis", multiplier: 3.0}
    state_impact:
      ph_status: -0.03
    detection:
      test: "K_level_and_ECG"
      finding: "K_above_6_or_peaked_T_waves"
    actions: ["calcium_gluconate", "insulin_dextrose", "consider_dialysis"]

  - name: "metabolic_acidosis"
    description: "Non-anion gap or anion gap metabolic acidosis"
    probability_per_day: 0.020
    onset_day_range: [0, 7]
    risk_factors:
      - {condition: "severity_severe", multiplier: 2.5}
      - {condition: "sepsis", multiplier: 2.0}
    state_impact:
      ph_status: -0.10
      perfusion_status: -0.05
    detection:
      test: "ABG"
      finding: "pH_below_7.25"
    actions: ["sodium_bicarbonate_if_severe", "consider_dialysis"]

  - name: "pulmonary_edema"
    description: "Fluid overload causing respiratory failure"
    probability_per_day: 0.015
    onset_day_range: [0, 7]
    risk_factors:
      - {condition: "heart_failure", multiplier: 3.0}
      - {condition: "oliguric", multiplier: 2.5}
      - {condition: "excessive_IV_fluid", multiplier: 2.0}
    state_impact:
      volume_status: 0.15
      perfusion_status: -0.10
    detection:
      test: "chest_xray_and_SpO2"
      finding: "bilateral_infiltrates_and_hypoxemia"
    actions: ["high_dose_furosemide", "O2_NIPPV", "consider_emergent_dialysis"]

  - name: "uremic_encephalopathy"
    description: "Altered mental status from severe azotemia"
    probability_per_day: 0.008
    onset_day_range: [3, 14]
    risk_factors:
      - {condition: "BUN_above_100", multiplier: 5.0}
      - {condition: "age_over_75", multiplier: 1.5}
    state_impact: {}
    detection:
      test: "neurological_exam"
      finding: "confusion_asterixis_myoclonus"
    actions: ["emergent_dialysis", "CT_head_to_exclude_stroke"]

  - name: "bleeding_uremic_platelet_dysfunction"
    description: "GI or mucosal bleeding from uremic platelet dysfunction"
    probability_per_day: 0.006
    onset_day_range: [2, 14]
    risk_factors:
      - {condition: "BUN_above_80", multiplier: 2.0}
      - {condition: "anticoagulation", multiplier: 3.0}
    state_impact:
      volume_status: -0.10
      perfusion_status: -0.05
    detection:
      test: "clinical_exam_and_Hb"
      finding: "Hb_drop_or_visible_bleeding"
    actions: ["hold_anticoagulation", "desmopressin", "transfuse_if_needed"]

  - name: "delirium"
    description: "Acute confusion from uremia, electrolytes, or polypharmacy"
    probability_per_day: 0.012
    onset_day_range: [1, 10]
    risk_factors:
      - {condition: "age_over_75", multiplier: 2.5}
      - {condition: "dementia", multiplier: 3.0}
      - {condition: "BUN_above_80", multiplier: 2.0}
    state_impact: {}
    detection:
      test: "CAM_screening"
      finding: "positive"
    actions: ["reorientation", "correct_electrolytes", "avoid_sedatives"]

  - name: "dvt"
    description: "Deep vein thrombosis from immobility"
    probability_per_day: 0.008
    onset_day_range: [3, 14]
    risk_factors:
      - {condition: "immobility_days > 3", multiplier: 2.0}
      - {condition: "nephrotic_range_proteinuria", multiplier: 3.0}
    state_impact:
      coagulation_status: 0.05
    detection:
      test: "d_dimer_then_ultrasound"
      finding: "dvt_confirmed"
    actions: ["anticoagulation_with_renal_dosing"]
    cascade: ["pulmonary_embolism"]

  - name: "pulmonary_embolism"
    description: "PE from DVT embolization"
    probability_given_parent: 0.10
    parent_complication: "dvt"
    onset_days_after_parent: [0, 7]
    state_impact:
      perfusion_status: -0.20
      ph_status: -0.05
    actions: ["ct_angiography", "anticoagulation_renal_adjusted", "consider_icu"]
