# ============================================================
# TREATMENT REFERENCE — Drug selection data
# Source: JPS Guidelines 2021, ACG Guidelines 2013, AGA 2018
# ============================================================
drugs:
  first_line:
    japan:
      - drug: "Lactated Ringer"
        code_yj: "3319501"
        dose: "250-500 mL/h IV for first 12-24h"
        route: IV
        note: "Aggressive early fluid resuscitation (JP guidelines: goal-directed)"
        pregnancy_safe: true
      - drug: "Fentanyl"
        code_yj: "8219700"
        dose: "25-50 mcg IV q1h PRN"
        route: IV
        note: "Preferred over morphine (no sphincter of Oddi spasm)"
        pregnancy_safe: false
      - drug: "Acetaminophen"
        code_yj: "1141700"
        dose: "1000mg IV q6h"
        route: IV
        pregnancy_safe: true

    us:
      - drug: "Lactated Ringer"
        code_rxnorm: "313002"
        dose: "250-500 mL/h IV for first 12-24h"
        route: IV
        pregnancy_safe: true
      - drug: "Hydromorphone"
        code_rxnorm: "3423"
        dose: "0.5-1mg IV q3h PRN"
        route: IV
        pregnancy_safe: false
      - drug: "Acetaminophen"
        code_rxnorm: "161"
        dose: "1000mg IV q6h"
        route: IV
        pregnancy_safe: true

  alternative_penicillin_allergy: {}  # Not applicable for primary treatment

  escalation:  # for infected necrosis or severe disease
    japan:
      - drug: "Meropenem"
        code_yj: "6139401"
        dose: "1g IV q8h"
        indication: "infected_necrosis_or_pancreatic_abscess"
        renal_adjustment:
          eGFR_below_30: "0.5g IV q12h"
      - drug: "Nafamostat"
        code_yj: "3999407"
        dose: "20mg/h continuous IV"
        indication: "severe pancreatitis (JP-specific protease inhibitor)"
        note: "Used in Japan, not standard in US/EU"
    us:
      - drug: "Meropenem"
        code_rxnorm: "29561"
        dose: "1g IV q8h"
        indication: "infected_necrosis"
        renal_adjustment:
          eGFR_below_30: "0.5g IV q12h"
      - drug: "Imipenem/Cilastatin"
        code_rxnorm: "5880"
        dose: "500mg IV q6h"
        indication: "alternative for infected necrosis"

  discharge_oral:
    japan:
      - drug: "Acetaminophen"
        code_yj: "1141007"
        dose: "500mg PO q6h PRN"
        duration_days: 7
      - drug: "Camostat mesilate"
        code_yj: "3999003"
        dose: "200mg PO TID"
        duration_days: 14
        note: "Protease inhibitor (JP-specific, for recurrence prevention)"
    us:
      - drug: "Acetaminophen"
        code_rxnorm: "161"
        dose: "500mg PO q6h PRN"
        duration_days: 7

# ============================================================
# DRUG INTERACTIONS
# ============================================================
drug_interactions:
  - drug_a: "Meropenem"
    drug_b: "Valproic acid"
    severity: "contraindicated"
    effect: "Dramatically reduces valproate levels"
    action: "Do not use together"

  - drug_a: "Hydromorphone"
    drug_b: "Benzodiazepines"
    severity: "major"
    effect: "Respiratory depression risk"
    action: "Monitor closely, reduce doses"

  - drug_a: "Fentanyl"
    drug_b: "MAO_inhibitors"
    severity: "contraindicated"
    effect: "Serotonin syndrome risk"
    action: "Avoid combination"

