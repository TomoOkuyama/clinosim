# ============================================================
# CLINICAL COURSE ARCHETYPES
# ============================================================
course_archetypes:
  smooth_recovery:
    probability: 0.50
    description: "Mild edematous pancreatitis — pain improves Day 2-3, diet advanced Day 3-4"
    trajectory:
      inflammation_level: {0: 0.05, 1: 0.02, 2: -0.05, 3: -0.07, 5: -0.06, 7: -0.05, 10: -0.03, 14: -0.02}
      volume_status: {0: 0.05, 1: 0.05, 2: 0.03, 3: 0.02, 5: 0.01, 7: 0.00, 10: 0.00, 14: 0.00}
      renal_function: {0: 0.00, 1: 0.01, 2: 0.01, 3: 0.01, 5: 0.00, 7: 0.00, 10: 0.00, 14: 0.00}
    order_modifications: {}
    treatment_modifications: {}

    daily_trajectory:
      day_0:
        subjective: "症状あり"
        objective: "バイタル安定、検査所見あり"
        assessment: "初期診断確定、治療開始"
        plan: "治療継続、経過観察"
      day_1:
        subjective: "症状緩和傾向"
        objective: "バイタル安定、検査所見改善"
        assessment: "治療反応良好"
        plan: "治療継続"

  dip_then_recovery:
    probability: 0.18
    description: "Pain worsens Day 1-3 with CRP peak Day 3, then steady improvement"
    trajectory:
      inflammation_level: {0: 0.10, 1: 0.08, 2: 0.03, 3: -0.02, 5: -0.08, 7: -0.08, 10: -0.06, 14: -0.04}
      volume_status: {0: -0.05, 1: -0.03, 2: 0.02, 3: 0.03, 5: 0.02, 7: 0.01, 10: 0.00, 14: 0.00}
      renal_function: {0: -0.03, 1: -0.02, 2: 0.00, 3: 0.01, 5: 0.01, 7: 0.01, 10: 0.00, 14: 0.00}
      perfusion_status: {0: -0.03, 1: -0.02, 2: 0.00, 3: 0.01, 5: 0.01, 7: 0.00, 10: 0.00, 14: 0.00}
    order_modifications:
      day_3:
        add_labs: ["Lactate", "Ca"]
        add_imaging: ["CT_abdomen_with_contrast"]
    treatment_modifications:
      day_1:
        add_fluid: {detail: "Increase LR to 500 mL/h"}

  plateau_then_recovery:
    probability: 0.10
    description: "CRP and pain persist for 5-7 days, then gradual resolution"
    trajectory:
      inflammation_level: {0: 0.05, 1: 0.03, 2: 0.02, 3: 0.00, 5: 0.00, 7: -0.05, 10: -0.08, 14: -0.06}
      volume_status: {0: 0.02, 1: 0.02, 2: 0.01, 3: 0.00, 5: 0.00, 7: 0.01, 10: 0.01, 14: 0.00}
    order_modifications:
      day_5:
        add_imaging: ["CT_abdomen_with_contrast"]
    treatment_modifications: {}

  treatment_resistant:
    probability: 0.10
    description: "Necrotizing pancreatitis — requires prolonged treatment, possible intervention"
    trajectory:
      inflammation_level: {0: 0.12, 1: 0.08, 2: 0.05, 3: 0.03, 5: 0.00, 7: -0.03, 10: -0.05, 14: -0.05}
      volume_status: {0: -0.08, 1: -0.05, 2: -0.02, 3: 0.00, 5: 0.02, 7: 0.02, 10: 0.01, 14: 0.00}
      renal_function: {0: -0.05, 1: -0.03, 2: -0.02, 3: 0.00, 5: 0.01, 7: 0.01, 10: 0.01, 14: 0.01}
      perfusion_status: {0: -0.05, 1: -0.03, 2: -0.01, 3: 0.00, 5: 0.01, 7: 0.01, 10: 0.01, 14: 0.00}
    order_modifications:
      day_5:
        add_labs: ["Blood_culture", "Procalcitonin"]
        add_imaging: ["CT_abdomen_with_contrast"]
      day_10:
        add_imaging: ["CT_abdomen_with_contrast"]
        add_consult: ["interventional_radiology"]
    treatment_modifications:
      day_7:
        start:
          japan: [{drug: "Meropenem", dose: "1g IV q8h"}]
          us: [{drug: "Meropenem", dose: "1g IV q8h"}]
    triggers:
      - day: 7
        condition: "persistent_fever_and_elevated_WBC"
        actions: ["ct_guided_fna", "start_antibiotics"]

  gradual_deterioration:
    probability: 0.07
    description: "Multi-organ failure developing over days — ICU transfer required"
    trajectory:
      inflammation_level: {0: 0.12, 1: 0.10, 2: 0.08, 3: 0.05, 5: 0.03, 7: 0.02, 10: -0.02, 14: -0.03}
      perfusion_status: {0: -0.08, 1: -0.06, 2: -0.05, 3: -0.03, 5: -0.02, 7: 0.00, 10: 0.01, 14: 0.01}
      renal_function: {0: -0.06, 1: -0.05, 2: -0.04, 3: -0.03, 5: -0.01, 7: 0.00, 10: 0.01, 14: 0.01}
      ph_status: {0: -0.03, 1: -0.03, 2: -0.02, 3: -0.01, 5: 0.00, 7: 0.01, 10: 0.01, 14: 0.00}
    order_modifications:
      day_2:
        add_labs: ["ABG", "Lactate", "Blood_culture"]
      day_5:
        add_labs: ["ABG", "Lactate"]
        add_imaging: ["CT_abdomen_with_contrast"]
    treatment_modifications:
      day_3:
        start:
          japan:
            - {drug: "Nafamostat", dose: "20mg/h continuous IV"}
          us: []
      day_5:
        start:
          japan: [{drug: "Norepinephrine", dose: "0.05ug/kg/min IV drip"}]
          us: [{drug: "Norepinephrine", dose: "0.05ug/kg/min IV drip"}]
        action: "icu_transfer"
    triggers:
      - day: 5
        condition: "persistent_organ_failure"
        actions: ["icu_transfer"]

  sudden_deterioration:
    probability: 0.05
    description: "Sudden hemorrhagic or fulminant necrotizing pancreatitis — Day 1-2"
    trajectory:
      inflammation_level: {0: 0.08, 1: 0.30, 2: 0.10, 3: 0.05, 5: -0.05, 7: -0.08, 10: -0.06, 14: -0.03}
      perfusion_status: {0: -0.05, 1: -0.25, 2: -0.05, 3: 0.03, 5: 0.05, 7: 0.03, 10: 0.02, 14: 0.01}
      renal_function: {0: -0.03, 1: -0.15, 2: -0.05, 3: 0.02, 5: 0.02, 7: 0.02, 10: 0.01, 14: 0.01}
      ph_status: {0: -0.02, 1: -0.10, 2: -0.03, 3: 0.02, 5: 0.02, 7: 0.01, 10: 0.01, 14: 0.00}
    order_modifications:
      day_1:
        add_labs: ["ABG", "Lactate", "Blood_culture_x2", "Hb", "Type_and_screen"]
        add_imaging: ["CT_abdomen_with_contrast"]
    treatment_modifications:
      day_1:
        start:
          japan:
            - {drug: "Meropenem", dose: "1g IV q8h"}
            - {drug: "Nafamostat", dose: "20mg/h continuous IV"}
            - {drug: "Norepinephrine", dose: "0.1ug/kg/min IV drip"}
          us:
            - {drug: "Meropenem", dose: "1g IV q8h"}
            - {drug: "Norepinephrine", dose: "0.1ug/kg/min IV drip"}
        action: "icu_transfer"
    triggers:
      - day: 1
        condition: "perfusion_status < 0.3"
        actions: ["icu_transfer", "start_vasopressor"]

# Archetype selection modifiers
archetype_modifiers:
  - condition: "alcohol_dependence"
    effect: {treatment_resistant: 0.05, smooth_recovery: -0.05}
  - condition: "age >= 75"
    effect: {gradual_deterioration: 0.05, smooth_recovery: -0.05}
  - condition: "obesity_bmi_over_30"
    effect: {treatment_resistant: 0.05, gradual_deterioration: 0.03, smooth_recovery: -0.08}

# ============================================================
# COMPLICATIONS
# ============================================================
complications:
  - name: "pancreatic_pseudocyst"
    description: "Encapsulated fluid collection after 4+ weeks"
    probability_per_day: 0.003
    onset_day_range: [14, 42]
    risk_factors:
      - {condition: "necrotizing_pancreatitis", multiplier: 4.0}
      - {condition: "alcohol_etiology", multiplier: 1.5}
    state_impact:
      inflammation_level: 0.05
    detection:
      test: "ct_abdomen"
      finding: "encapsulated_fluid_collection"
    actions: ["observe_if_asymptomatic", "consider_drainage_if_symptomatic"]

  - name: "infected_necrosis"
    description: "Bacterial infection of pancreatic necrosis"
    probability_per_day: 0.005
    onset_day_range: [7, 21]
    risk_factors:
      - {condition: "necrotizing_pancreatitis", multiplier: 5.0}
      - {condition: "severity_severe", multiplier: 3.0}
    state_impact:
      inflammation_level: 0.25
      perfusion_status: -0.10
    detection:
      test: "ct_guided_fna"
      finding: "positive_gram_stain_or_culture"
    actions: ["antibiotics_carbapenem", "consider_necrosectomy", "percutaneous_drainage"]
    cascade: ["sepsis"]

  - name: "acute_kidney_injury"
    description: "AKI from hypovolemia and systemic inflammation"
    probability_per_day: 0.012
    onset_day_range: [1, 7]
    risk_factors:
      - {condition: "severity_severe", multiplier: 3.0}
      - {condition: "volume_status < -0.3", multiplier: 2.5}
      - {condition: "age_over_75", multiplier: 1.5}
    state_impact:
      renal_function: -0.15
      ph_status: -0.05
    detection:
      test: "creatinine"
      finding: "rise_above_0.3_from_baseline"
    actions: ["aggressive_iv_fluids", "hold_nephrotoxic_drugs", "monitor_urine_output"]

  - name: "ARDS"
    description: "Acute respiratory distress syndrome from systemic inflammation"
    probability_per_day: 0.005
    onset_day_range: [1, 7]
    risk_factors:
      - {condition: "severity_severe", multiplier: 5.0}
      - {condition: "necrotizing_pancreatitis", multiplier: 3.0}
    state_impact:
      perfusion_status: -0.15
      ph_status: -0.10
    detection:
      test: "ABG_and_chest_xray"
      finding: "PaO2_FiO2_below_300_bilateral_infiltrates"
    actions: ["icu_transfer", "mechanical_ventilation", "lung_protective_ventilation"]

  - name: "splenic_vein_thrombosis"
    description: "Thrombosis of splenic vein from adjacent inflammation"
    probability_per_day: 0.002
    onset_day_range: [5, 21]
    risk_factors:
      - {condition: "necrotizing_pancreatitis", multiplier: 3.0}
    state_impact:
      coagulation_status: 0.05
    detection:
      test: "ct_abdomen_with_contrast"
      finding: "splenic_vein_filling_defect"
    actions: ["anticoagulation_consideration", "monitor_for_portal_hypertension"]

  - name: "pancreatic_duct_disruption"
    description: "Disruption of main pancreatic duct with leakage"
    probability_per_day: 0.002
    onset_day_range: [3, 14]
    risk_factors:
      - {condition: "necrotizing_pancreatitis", multiplier: 4.0}
    state_impact:
      inflammation_level: 0.10
    detection:
      test: "MRCP_or_ERCP"
      finding: "contrast_extravasation"
    actions: ["ERCP_with_stenting", "consider_surgery"]

  - name: "delirium"
    description: "Alcohol withdrawal delirium or ICU-related confusion"
    probability_per_day: 0.01
    onset_day_range: [1, 5]
    risk_factors:
      - {condition: "alcohol_dependence", multiplier: 5.0}
      - {condition: "age_over_75", multiplier: 2.0}
      - {condition: "icu_stay", multiplier: 2.0}
    state_impact: {}
    detection:
      test: "CAM_screening"
      finding: "positive"
    actions: ["benzodiazepines_if_alcohol_withdrawal", "reorientation", "thiamine"]

