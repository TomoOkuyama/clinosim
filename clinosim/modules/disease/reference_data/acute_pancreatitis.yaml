      median: 500
      iqr: [200, 1200]
      range: [100, 5000]
    CRP:
      unit: "mg/L"
      median: 60
      iqr: [20, 150]
      range: [5, 400]
    WBC:
      unit: "/uL"
      median: 13000
      iqr: [9000, 17000]
      range: [4000, 30000]
    Creatinine:
      unit: "mg/dL"
      median: 0.9
      iqr: [0.7, 1.3]
