# Acute Pancreatitis — Complete Reference Data
# Sources cited per section. All rates are approximate and should be validated
# against the most current published data before production use.

disease_id: acute_pancreatitis
chief_complaint:
  en: "Severe epigastric pain radiating to back, nausea, vomiting"
  ja: "心窩部激痛（背部放散）・嘔気・嘔吐"
department: gastroenterology
encounter_type: medical
requires_surgery: false
readmission_eligible: true
minimum_severity: null

# NPO status — hold all oral medications; Metformin contraindicated in acute illness
medication_holds:
  - drugs: ["Metformin"]
    reason: "Acute illness with lactic acidosis risk + NPO status"
diagnostic_difficulty: 0.2   # Lipase > 3x ULN is highly specific; diagnosis usually straightforward

icd_codes:
  primary: "K85.9"  # Acute pancreatitis, unspecified
  variants:
    - {code: "K85.1", name: "Biliary acute pancreatitis", probability: 0.40}
    - {code: "K85.2", name: "Alcohol-induced acute pancreatitis", probability: 0.25}
    - {code: "K85.3", name: "Drug-induced acute pancreatitis", probability: 0.03}
    - {code: "K85.8", name: "Other acute pancreatitis", probability: 0.07}
    - {code: "K85.9", name: "Acute pancreatitis, unspecified", probability: 0.25}

# ============================================================
# INCIDENCE (per 100,000 per year, by age band and sex)
# Source: JP — MHLW Patient Survey, JPS nationwide survey
#         US — NIS data, Peery et al. Gastroenterology 2019
# ============================================================
incidence:
  japan:
    "0-4":   {M: 1, F: 1}
    "5-14":  {M: 2, F: 1}
    "15-24": {M: 5, F: 3}
    "25-34": {M: 15, F: 8}
    "35-44": {M: 35, F: 15}
    "45-54": {M: 55, F: 25}
    "55-64": {M: 70, F: 40}
    "65-74": {M: 80, F: 55}
    "75-84": {M: 75, F: 60}
    "85+":   {M: 60, F: 50}
  us:
    "0-4":   {M: 1, F: 1}
    "5-14":  {M: 2, F: 2}
    "15-24": {M: 8, F: 5}
    "25-34": {M: 25, F: 15}
    "35-44": {M: 50, F: 25}
    "45-54": {M: 65, F: 35}
    "55-64": {M: 75, F: 50}
    "65-74": {M: 85, F: 60}
    "75-84": {M: 80, F: 65}
    "85+":   {M: 65, F: 55}

  risk_multipliers:
    - {condition: "gallstones", multiplier: 5.0}
    - {condition: "alcohol_dependence", multiplier: 4.0}
    - {condition: "hypertriglyceridemia", multiplier: 3.0}
    - {condition: "smoking_current", multiplier: 1.5}
    - {condition: "obesity", multiplier: 1.8}
    - {condition: "diabetes", multiplier: 1.3}
    - {condition: "prior_pancreatitis", multiplier: 3.0}
    - {condition: "ERCP_recent", multiplier: 10.0}

  seasonal_curve:
    1: 1.0
    2: 1.0
    3: 1.0
    4: 1.0
    5: 1.0
    6: 1.0
    7: 1.0
    8: 1.0
    9: 1.0
    10: 1.0
    11: 1.1   # slightly higher with holiday alcohol intake
    12: 1.2

  vaccine_protection: {}

# ============================================================
# SEVERITY DISTRIBUTION
# Source: Revised Atlanta Classification, JPN severity score
# ============================================================
severity:
  distribution:
    mild: 0.55        # interstitial edematous, no organ failure
    moderate: 0.30    # transient organ failure (<48h) or local complications
    severe: 0.15      # persistent organ failure (>48h)
  modifiers:
    - {condition: "age_over_75", mild_multiplier: 0.7, severe_multiplier: 1.8}
    - {condition: "obesity", moderate_multiplier: 1.3, severe_multiplier: 1.5}
    - {condition: "alcohol_dependence", severe_multiplier: 1.5}
    - {condition: "CKD", severe_multiplier: 1.5}
    - {condition: "APACHE_II_above_8", severe_multiplier: 2.0, mild_multiplier: 0.3}

# ============================================================
# INITIAL PHYSIOLOGICAL STATE IMPACT
# ============================================================
initial_state_impact:
  mild:
    inflammation_level: 0.20
    volume_status: -0.15
    anion_gap_status: 0.1     # AG axis: mild SIRS contribution
  moderate:
    inflammation_level: 0.45
    volume_status: -0.30
    perfusion_status: -0.10
    renal_function: -0.10
    anion_gap_status: 0.3     # AG axis: moderate SIRS / lactic acidosis
  severe:
    inflammation_level: 0.70
    volume_status: -0.40
    perfusion_status: -0.25
    renal_function: -0.20
    ph_status: -0.10
    anion_gap_status: 0.5     # AG axis: severe necrotising pancreatitis (AG 15-20)

# ============================================================
# ORDER PROTOCOLS
# ============================================================
order_protocols:
  admission_orders:
    labs:
      - {test: "Lipase", urgency: "stat"}
      - {test: "Amylase", urgency: "stat"}
      - {test: "CRP", urgency: "stat"}
      - {test: "WBC", urgency: "stat"}
      - {test: "Creatinine", urgency: "stat"}
      - {test: "BUN", urgency: "stat"}
      - {test: "Na", urgency: "stat"}
      - {test: "K", urgency: "stat"}
      - {test: "Ca", urgency: "stat"}
      - {test: "Glucose", urgency: "stat"}
      - {test: "AST", urgency: "stat"}
      - {test: "ALT", urgency: "stat"}
      - {test: "ALP", urgency: "stat"}
      - {test: "GGT", urgency: "stat"}
      - {test: "Total_bilirubin", urgency: "stat"}
      - {test: "Hb", urgency: "stat"}
      - {test: "Hct", urgency: "stat"}
      - {test: "Plt", urgency: "stat"}
      - {test: "Triglycerides", urgency: "stat", probability: 0.60}
      - {test: "Lactate", urgency: "stat", probability: 0.50}
      - {test: "LDH", urgency: "stat", probability: 0.40}
    imaging:
      - {test: "Abdominal_ultrasound", urgency: "stat", note: "Evaluate for gallstones"}
      - {test: "CT_abdomen_pelvis_with_contrast", urgency: "within_24h", probability: 0.60,
         note: "If diagnosis unclear or severe; best at 72h for necrosis assessment"}
    supportive:
      - {type: "NPO", detail: "Nothing by mouth initially"}
      - {type: "IV_fluid", detail: "Lactated Ringer 250-500 mL/h for first 12-24h (aggressive hydration)"}
      - {type: "pain_management", detail: "Hydromorphone 0.5-1mg IV q3h PRN or PCA"}
      - {type: "DVT_prophylaxis", detail: "Enoxaparin 2000IU SC daily"}

  daily_monitoring:
    labs:
      - {test: "CRP", frequency: "daily"}
      - {test: "WBC", frequency: "daily"}
      - {test: "Creatinine", frequency: "daily"}
      - {test: "Ca", frequency: "daily"}
      - {test: "Lipase", frequency: "q48h"}
      - {test: "Hct", frequency: "q12h_first_48h_then_daily"}
    vitals:
      stable: "q4h"
      unstable: "q1h"
    imaging:
      - {test: "CT_abdomen_with_contrast", frequency: "day_3_to_5_if_severe",
         condition: "assess for necrosis if no improvement"}

  trigger_orders:
    suspected_infected_necrosis:
      condition: "persistent fever and elevated WBC after Day 7-10"
      actions:
        - {type: "imaging", test: "CT_abdomen_with_contrast"}
        - {type: "procedure", test: "CT_guided_FNA_of_necrosis"}
        - {type: "medication_change", action: "start_antibiotics_carbapenem"}
        - {type: "consult", target: "interventional_radiology_or_surgery"}
    acute_fluid_collection:
      condition: "increasing abdominal pain, WBC rising after initial improvement"
      actions:
        - {type: "imaging", test: "CT_abdomen_with_contrast"}
        - {type: "evaluate", action: "consider_drainage"}
    respiratory_deterioration:
      condition: "SpO2 < 92% or increasing respiratory rate"
      actions:
        - {type: "lab", test: "ABG"}
        - {type: "imaging", test: "Chest_Xray"}
        - {type: "evaluate", action: "consider_ICU_for_ARDS"}

  discharge_criteria:
    japan:
      - "Pain controlled with oral analgesics"
      - "Tolerating oral diet for 48 hours"
      - "CRP declining and < 50% of peak"
      - "Afebrile (< 37.0C) for 48 hours"
      - "Lipase trending toward normal"
      - "Etiology addressed (e.g., cholecystectomy scheduled if gallstone)"
    us:
      - "Pain controlled with oral analgesics"
      - "Tolerating low-fat oral diet"
      - "Afebrile for 24 hours"
      - "No IV fluids needed"
      - "Etiology addressed or follow-up arranged"

# ============================================================
# LIKELIHOOD RATIO TABLE
# Source: Clinical diagnostic studies, ACG guidelines
# ============================================================
likelihood_ratios:
  lipase_above_3x_uln:
    acute_pancreatitis: {positive_LR: 25.0, negative_LR: 0.05}
    biliary_colic: {positive_LR: 0.8, negative_LR: 1.1}
    peptic_ulcer: {positive_LR: 0.3, negative_LR: 1.0}

  amylase_above_3x_uln:
    acute_pancreatitis: {positive_LR: 10.0, negative_LR: 0.15}
    bowel_obstruction: {positive_LR: 1.5, negative_LR: 0.9}
    peptic_ulcer: {positive_LR: 0.5, negative_LR: 1.0}

  ct_pancreatic_inflammation:
    acute_pancreatitis: {positive_LR: 15.0, negative_LR: 0.15}
    pancreatic_cancer: {positive_LR: 1.5, negative_LR: 0.9}

  gallstones_on_ultrasound:
    biliary_pancreatitis: {positive_LR: 8.0, negative_LR: 0.3}
    alcoholic_pancreatitis: {positive_LR: 0.5, negative_LR: 1.2}

  alt_above_150:
    biliary_pancreatitis: {positive_LR: 6.0, negative_LR: 0.4}
    alcoholic_pancreatitis: {positive_LR: 0.3, negative_LR: 1.5}

  crp_above_150:
    acute_pancreatitis: {positive_LR: 2.5, negative_LR: 0.5}
    note: "CRP > 150 at 48h predicts severe pancreatitis"

