  discharge:
    CRP:
      unit: "mg/L"
      median: 15
      iqr: [5, 35]
    WBC:
      unit: "/uL"
      median: 7500
      iqr: [5500, 9500]
    Lipase:
      unit: "U/L"
      median: 100
      iqr: [60, 180]

