# Aspiration Pneumonia — Complete Reference Data
# Sources cited per section. All rates are approximate and should be validated
# against the most current published data before production use.
# NOTE: Distinct from bacterial (community-acquired) pneumonia — different
# microbiology (anaerobes), patient population (elderly/stroke/dementia),
# and treatment approach (anaerobic coverage, swallowing evaluation).

disease_id: aspiration_pneumonia
chief_complaint:
  en: "Cough, fever, dyspnea after witnessed aspiration event"
  ja: "誤嚥後の咳嗽・発熱・呼吸困難"
department: pulmonology
encounter_type: medical
requires_surgery: false
readmission_eligible: true

icd_codes:
  primary: "J69.0"  # Pneumonitis due to food and vomit
  variants:
    - {code: "J69.0", name: "Pneumonitis due to food and vomit", probability: 0.75}
    - {code: "J69.1", name: "Pneumonitis due to oils and essences", probability: 0.05}
    - {code: "J15.9", name: "Unspecified bacterial pneumonia (aspiration-related)", probability: 0.15}
    - {code: "J18.0", name: "Bronchopneumonia, unspecified organism", probability: 0.05}

# ============================================================
# INCIDENCE (per 100,000 per year, by age band and sex)
# Source: JP — 患者調査 2020, 日本呼吸器学会 (aspiration pneumonia is
#              leading cause of pneumonia death in elderly in Japan)
#         US — Marik PE Chest 2001, Lanspa MJ et al.
# ============================================================
incidence:
  japan:
    "0-4":   {M: 10, F: 8}
    "5-14":  {M: 5, F: 4}
    "15-24": {M: 5, F: 3}
    "25-34": {M: 8, F: 5}
    "35-44": {M: 12, F: 8}
    "45-54": {M: 25, F: 15}
    "55-64": {M: 60, F: 35}
    "65-74": {M: 200, F: 120}
    "75-84": {M: 800, F: 550}
    "85+":   {M: 2500, F: 2000}
  us:
    "0-4":   {M: 12, F: 10}
    "5-14":  {M: 5, F: 4}
    "15-24": {M: 8, F: 5}
    "25-34": {M: 12, F: 8}
    "35-44": {M: 20, F: 12}
    "45-54": {M: 40, F: 25}
    "55-64": {M: 80, F: 50}
    "65-74": {M: 250, F: 160}
    "75-84": {M: 700, F: 500}
    "85+":   {M: 2000, F: 1600}

  risk_multipliers:
    - {condition: "dementia", multiplier: 5.0}
    - {condition: "stroke_history", multiplier: 4.0}
    - {condition: "parkinson_disease", multiplier: 3.5}
    - {condition: "dysphagia", multiplier: 6.0}
    - {condition: "GERD", multiplier: 2.0}
    - {condition: "alcohol_dependence", multiplier: 3.0}
    - {condition: "seizure_disorder", multiplier: 2.5}
    - {condition: "sedative_use", multiplier: 2.0}
    - {condition: "general_anesthesia_recent", multiplier: 3.0}
    - {condition: "tube_feeding", multiplier: 3.0}
    - {condition: "poor_dentition", multiplier: 2.0}
    - {condition: "immunosuppressed", multiplier: 2.0}

  seasonal_curve:
    1: 1.5
    2: 1.3
    3: 1.1
    4: 1.0
    5: 0.8
    6: 0.8
    7: 0.8
    8: 0.8
    9: 0.9
    10: 1.0
    11: 1.2
    12: 1.4

  vaccine_protection:
    pneumococcal:
      effectiveness: 0.20   # less effective because aspiration pneumonia is often polymicrobial/anaerobic
      duration_days: 1825
    influenza:
      effectiveness: 0.10
      duration_days: 365

# ============================================================
# SEVERITY DISTRIBUTION
# Source: Marik PE, Japanese Respiratory Society Guidelines 2017
# ============================================================
severity:
  distribution:
    mild: 0.20        # small aspiration, resolves with antibiotics
    moderate: 0.55    # significant pneumonitis, requires hospitalization
    severe: 0.25      # respiratory failure, may need ICU
  modifiers:
    - {condition: "age_over_80", mild_multiplier: 0.4, severe_multiplier: 2.0}
    - {condition: "COPD", moderate_multiplier: 1.3, severe_multiplier: 1.5}
    - {condition: "heart_failure", severe_multiplier: 1.5}
    - {condition: "immunosuppressed", severe_multiplier: 2.0, mild_multiplier: 0.3}
    - {condition: "poor_functional_status", severe_multiplier: 1.8}
    - {condition: "dementia_advanced", severe_multiplier: 2.0}

# ============================================================
# INITIAL PHYSIOLOGICAL STATE IMPACT
# ============================================================
initial_state_impact:
  mild:
    inflammation_level: 0.25
    volume_status: -0.05
    sodium_status: -0.10
    anion_gap_status: 0.0     # AG axis: mild pneumonia — no AG shift
  moderate:
    inflammation_level: 0.50
    volume_status: -0.15
    perfusion_status: -0.10
    renal_function: -0.05
    sodium_status: -0.25
    anion_gap_status: 0.2     # AG axis: moderate sepsis-like contribution
  severe:
    inflammation_level: 0.75
    volume_status: -0.25
    perfusion_status: -0.25
    renal_function: -0.15
    anion_gap_status: 0.5     # AG axis: severe pneumonia with lactate (AG 15-20)
    ph_status: -0.10
    sodium_status: -0.40

# ============================================================
# ORDER PROTOCOLS
# ============================================================
order_protocols:
  admission_orders:
    labs:
      - {test: "CRP", urgency: "stat"}
      - {test: "WBC", urgency: "stat"}
      - {test: "PCT", urgency: "stat", probability: 0.60}
      - {test: "Albumin", urgency: "stat"}
      - {test: "Creatinine", urgency: "stat"}
      - {test: "BUN", urgency: "stat"}
      - {test: "Na", urgency: "stat"}
      - {test: "K", urgency: "stat"}
      - {test: "Glucose", urgency: "stat"}
      - {test: "Hb", urgency: "stat"}
      - {test: "Plt", urgency: "stat"}
      - {test: "AST", urgency: "stat", probability: 0.70}
      - {test: "ALT", urgency: "stat", probability: 0.70}
      - {test: "Lactate", urgency: "stat", probability: 0.50}
      - {test: "ABG", urgency: "stat", probability: 0.60}
      - {test: "Blood_culture_x2", urgency: "stat", probability: 0.65}
      - {test: "Sputum_culture", urgency: "stat", probability: 0.50}
    imaging:
      - {test: "Chest_Xray_PA_Lateral", urgency: "stat"}
    supportive:
      - {type: "NPO", detail: "Nothing by mouth until swallowing evaluation completed"}
      - {type: "IV_fluid", detail: "NS 80-125 mL/h"}
      - {type: "O2", detail: "Nasal cannula SpO2 >= 94%"}
      - {type: "HOB_elevation", detail: "Head of bed elevated 30-45 degrees"}
      - {type: "aspiration_precautions", detail: "Suction at bedside, HOB elevation, lateral positioning"}
      - {type: "antipyretic", detail: "Acetaminophen 500mg IV PRN temp >= 38.5 (NPO)"}
      - {type: "DVT_prophylaxis", detail: "Enoxaparin 2000IU SC daily"}
      - {type: "oral_care", detail: "Chlorhexidine oral care q6h"}

  daily_monitoring:
    labs:
      - {test: "CRP", frequency: "daily"}
      - {test: "WBC", frequency: "daily"}
      - {test: "Creatinine", frequency: "daily"}
    vitals:
      stable: "q4h"
      unstable: "q1h"
    imaging:
      - {test: "Chest_Xray", frequency: "day_3_and_prn", condition: "no improvement or worsening"}
    assessments:
      - {task: "swallowing_screen", frequency: "day_2_if_stable", note: "by trained nurse or SLP"}

  trigger_orders:
    no_defervescence_72h:
      condition: "inflammation_level > 0.5 at Day 3"
      actions:
        - {type: "lab", test: "Blood_culture_repeat"}
        - {type: "imaging", test: "Chest_CT_with_contrast"}
        - {type: "medication_change", action: "escalate_antibiotic"}
        - {type: "evaluate", action: "lung_abscess_or_empyema"}
    spo2_below_90:
      condition: "SpO2 < 90% on supplemental O2"
      actions:
        - {type: "lab", test: "ABG"}
        - {type: "respiratory", action: "increase_O2_or_HFNC"}
        - {type: "evaluate", action: "consider_ICU_transfer"}
    recurrent_aspiration:
      condition: "witnessed_aspiration_during_admission"
      actions:
        - {type: "order", action: "strict_NPO"}
        - {type: "consult", target: "speech_language_pathology"}
        - {type: "evaluate", action: "consider_NG_or_PEG_tube"}
    renal_deterioration:
      condition: "Creatinine rise > 0.3 from baseline"
      actions:
        - {type: "medication_change", action: "adjust_antibiotic_for_renal"}
        - {type: "fluid", action: "reassess_volume_status"}

  discharge_criteria:
    japan:
      - "Afebrile (< 37.0C) for 48 hours"
      - "CRP declining and < 50% of peak"
      - "Oral medication tolerated for 24 hours (or alternative route established)"
      - "SpO2 >= 95% on room air"
      - "Swallowing evaluation completed with dietary plan"
      - "Aspiration precautions education provided"
      - "ADL and nutritional support arranged"
    us:
      - "Afebrile (< 37.5C) for 24 hours"
      - "Clinically stable"
      - "Safe swallowing plan established"
      - "SpO2 >= 92% on room air"
      - "Follow-up arranged"

# ============================================================
# DIAGNOSTIC SECTION
# Source: Marik PE Chest 2001, JRS Guidelines
# ============================================================
diagnostic:
  diagnostic_difficulty: 0.25  # clinical history + CXR pattern, but overlap with CAP
  differential:
    - {disease: "aspiration_pneumonia", icd: "J69.0", name: "Aspiration pneumonia", prior: 0.50}
    - {disease: "bacterial_pneumonia", icd: "J18.9", name: "Community-acquired pneumonia", prior: 0.20}
    - {disease: "chemical_pneumonitis", icd: "J68.0", name: "Chemical pneumonitis (sterile aspiration)", prior: 0.08}
    - {disease: "heart_failure_exacerbation", icd: "I50.9", name: "Heart failure with pulmonary edema", prior: 0.07}
    - {disease: "pulmonary_embolism", icd: "I26.9", name: "Pulmonary embolism", prior: 0.04}
    - {disease: "lung_abscess", icd: "J85.2", name: "Lung abscess", prior: 0.03}
    - {disease: "tuberculosis", icd: "A15.0", name: "Pulmonary tuberculosis", prior: 0.03}
    - {disease: "other", icd: "J98.4", name: "Other disorders of lung", prior: 0.05}

# ============================================================
# LIKELIHOOD RATIO TABLE
# Source: Marik PE, clinical diagnostic studies
# ============================================================
likelihood_ratios:
  witnessed_aspiration_event:
    aspiration_pneumonia: {positive_LR: 15.0, negative_LR: 0.4}
    bacterial_pneumonia: {positive_LR: 0.5, negative_LR: 1.1}
    chemical_pneumonitis: {positive_LR: 10.0, negative_LR: 0.5}

  dependent_lobe_infiltrate:
    aspiration_pneumonia: {positive_LR: 5.0, negative_LR: 0.5}
    bacterial_pneumonia: {positive_LR: 1.5, negative_LR: 0.8}

  dysphagia_known:
    aspiration_pneumonia: {positive_LR: 8.0, negative_LR: 0.4}
    bacterial_pneumonia: {positive_LR: 1.2, negative_LR: 0.95}

  dementia_or_stroke:
    aspiration_pneumonia: {positive_LR: 4.0, negative_LR: 0.5}
    bacterial_pneumonia: {positive_LR: 1.5, negative_LR: 0.9}

  procalcitonin_above_0.5:
    aspiration_pneumonia: {positive_LR: 3.0, negative_LR: 0.4}
    bacterial_pneumonia: {positive_LR: 6.0, negative_LR: 0.15}
    chemical_pneumonitis: {positive_LR: 0.3, negative_LR: 2.0}

  rapid_resolution_48h:
    chemical_pneumonitis: {positive_LR: 8.0, negative_LR: 0.3}
    aspiration_pneumonia: {positive_LR: 0.3, negative_LR: 1.5}

  anaerobic_culture_positive:
    aspiration_pneumonia: {positive_LR: 10.0, negative_LR: 0.8}
    bacterial_pneumonia: {positive_LR: 0.5, negative_LR: 1.0}

# ============================================================
# EXPECTED LAB DISTRIBUTIONS
# ============================================================
expected_lab_distributions:
  admission:
    CRP:
      unit: "mg/L"
      median: 90
      iqr: [35, 160]
      range: [5, 400]
    WBC:
      unit: "/uL"
      median: 13000
      iqr: [9000, 17000]
      range: [3000, 30000]
    PCT:
      unit: "ng/mL"
      median: 1.0
      iqr: [0.2, 5.0]
      range: [0.05, 80]
      note: "lower than typical bacterial pneumonia if chemical pneumonitis component"
    Albumin:
      unit: "g/dL"
      median: 2.8
      iqr: [2.3, 3.3]
      range: [1.2, 4.0]
      note: "often low due to malnutrition in aspiration-prone patients"
    Creatinine:
      unit: "mg/dL"
      median: 1.0
      iqr: [0.7, 1.5]
      range: [0.4, 5.0]
    BUN:
      unit: "mg/dL"
      median: 25
      iqr: [16, 40]
      range: [8, 100]
    Glucose:
      unit: "mg/dL"
      median: 140
      iqr: [105, 200]
      range: [70, 450]
      note: "stress hyperglycemia and diabetes common in this population"
    Lactate:
      unit: "mmol/L"
      median: 1.8
      iqr: [1.0, 3.0]
      range: [0.5, 12.0]

  discharge:
    CRP:
      unit: "mg/L"
      median: 15
      iqr: [5, 35]
      note: "JP waits for more normalization"
    WBC:
      unit: "/uL"
      median: 8000
      iqr: [6000, 10000]

# ============================================================
# EXPECTED VITAL SIGN DISTRIBUTIONS
# ============================================================
expected_vital_distributions:
  admission:
    temperature:
      unit: "C"
      mean: 38.3
      sd: 0.9
      range: [36.5, 40.5]
    heart_rate:
      unit: "bpm"
      mean: 100
      sd: 18
      range: [60, 140]
    systolic_bp:
      unit: "mmHg"
      mean: 120
      sd: 22
      range: [75, 180]
    respiratory_rate:
      unit: "/min"
      mean: 24
      sd: 6
      range: [14, 40]
    spo2:
      unit: "%"
      mean: 93
      sd: 4
      range: [75, 99]
      note: "often lower than CAP due to large-volume aspiration"

# ============================================================
# TREATMENT REFERENCE — Drug selection data
# Source: JRS Aspiration Pneumonia Guidelines, IDSA, Mandell et al.
# ============================================================
drugs:
  first_line:
    japan:
      - drug: "Ampicillin/Sulbactam"
        code_yj: "6131405"
        dose: "3g IV q6h"
        route: IV
        note: "Preferred — covers oral anaerobes and streptococci"
        renal_adjustment:
          eGFR_30_60: "1.5g IV q6h"
          eGFR_below_30: "1.5g IV q12h"
        pregnancy_safe: true
    us:
      - drug: "Ampicillin/Sulbactam"
        code_rxnorm: "212446"
        dose: "3g IV q6h"
        route: IV
        note: "Primary choice for aspiration pneumonia"
        renal_adjustment:
          eGFR_30_60: "1.5g IV q6h"
          eGFR_below_30: "1.5g IV q12h"
        pregnancy_safe: true

  alternative_penicillin_allergy:
    japan:
      - drug: "Clindamycin"
        code_yj: "6152002"
        dose: "600mg IV q8h"
        note: "Good anaerobic coverage but C.diff risk"
        pregnancy_safe: false
      - drug: "Meropenem"
        code_yj: "6139401"
        dose: "1g IV q8h"
        note: "If severe or hospital-acquired aspiration"
        renal_adjustment:
          eGFR_below_30: "0.5g IV q12h"
        pregnancy_safe: true
    us:
      - drug: "Clindamycin"
        code_rxnorm: "2623"
        dose: "600mg IV q8h"
        pregnancy_safe: false
      - drug: "Moxifloxacin"
        code_rxnorm: "139462"
        dose: "400mg IV daily"
        note: "Alternative with anaerobic coverage"
        pregnancy_safe: false

  escalation:
    japan:
      - drug: "Meropenem"
        code_yj: "6139401"
        dose: "1g IV q8h"
        indication: "no_defervescence_72h or lung_abscess"
        renal_adjustment:
          eGFR_below_30: "0.5g IV q12h"
      - drug: "Metronidazole"
        code_yj: "6419002"
        dose: "500mg IV q8h"
        note: "Added for enhanced anaerobic coverage"
    us:
      - drug: "Piperacillin/Tazobactam"
        code_rxnorm: "240984"
        dose: "4.5g IV q6h"
        indication: "no_defervescence_72h or hospital-acquired"
      - drug: "Metronidazole"
        code_rxnorm: "6922"
        dose: "500mg IV q8h"
        note: "Added if lung abscess or empyema suspected"

  discharge_oral:
    japan:
      - drug: "Amoxicillin/Clavulanate"
        code_yj: "6131100"
        dose: "500/125mg PO TID"
        duration_days: 7
    us:
      - drug: "Amoxicillin/Clavulanate"
        code_rxnorm: "562251"
        dose: "875/125mg PO BID"
        duration_days: 7

# ============================================================
# DRUG INTERACTIONS
# ============================================================
drug_interactions:
  - drug_a: "Clindamycin"
    drug_b: "Erythromycin"
    severity: "major"
    effect: "Antagonism at ribosomal binding site"
    action: "Do not use together"

  - drug_a: "Metronidazole"
    drug_b: "Warfarin"
    severity: "major"
    effect: "Increased INR, bleeding risk"
    action: "Monitor INR closely"

  - drug_a: "Metronidazole"
    drug_b: "Alcohol"
    severity: "major"
    effect: "Disulfiram-like reaction"
    action: "Avoid alcohol during and 48h after treatment"

  - drug_a: "Meropenem"
    drug_b: "Valproic_acid"
    severity: "contraindicated"
    effect: "Dramatically reduces valproate levels"
    action: "Do not use together"

# ============================================================
# REFERENCE RANGES
# ============================================================
reference_ranges:
  CRP:
    unit: "mg/L"
    all: {low: 0, high: 3}
  WBC:
    unit: "/uL"
    all: {low: 3500, high: 9500}
  Hb:
    unit: "g/dL"
    male: {low: 13.5, high: 17.5}
    female: {low: 11.5, high: 15.5}
  Plt:
    unit: "x10^3/uL"
    all: {low: 150, high: 400}
  Creatinine:
    unit: "mg/dL"
    male: {low: 0.6, high: 1.1}
    female: {low: 0.4, high: 0.8}
  BUN:
    unit: "mg/dL"
    all: {low: 8, high: 20}
  Na:
    unit: "mEq/L"
    all: {low: 136, high: 145}
  K:
    unit: "mEq/L"
    all: {low: 3.5, high: 5.0}
  Glucose:
    unit: "mg/dL"
    fasting: {low: 70, high: 100}
    random: {low: 70, high: 140}
  Albumin:
    unit: "g/dL"
    all: {low: 3.5, high: 5.0}
  PCT:
    unit: "ng/mL"
    all: {low: 0, high: 0.05}
  Lactate:
    unit: "mmol/L"
    all: {low: 0.5, high: 2.0}

# ============================================================
# TARGET LENGTH OF STAY
# ============================================================
target_los:
  japan:
    mild: {mean: 14, sd: 4, min: 8, max: 21}
    moderate: {mean: 18, sd: 5, min: 10, max: 28}
    severe: {mean: 28, sd: 8, min: 14, max: 45}
  us:
    mild: {mean: 5, sd: 2, min: 3, max: 8}
    moderate: {mean: 7, sd: 3, min: 4, max: 12}
    severe: {mean: 12, sd: 4, min: 7, max: 21}

# ============================================================
# IMAGING ORDERS
# ============================================================
imaging_orders:
  - modality: CR
    body_site: chest
    views: [PA, Lateral]
    urgency: routine
    clinical_indication: "Suspected aspiration pneumonia"
    day: 0
    abnormal_rate_by_severity:
      mild: 0.80
      moderate: 0.92
      severe: 0.98
  - modality: CT
    body_site: chest
    contrast: false
    urgency: routine
    clinical_indication: "Evaluate extent and rule out empyema"
    day: 1
    only_if_severity: [moderate, severe]
    abnormal_rate_by_severity:
      moderate: 0.88
      severe: 0.98

# ============================================================
# OUTCOME BENCHMARKS
# ============================================================
outcome_benchmarks:
  japan:
    median_los: 18
    los_iqr: [12, 25]
    in_hospital_mortality: 0.15
    icu_transfer_rate: 0.10
    thirty_day_readmission: 0.25
    antibiotic_switch_rate: 0.15
    swallowing_evaluation_rate: 0.85
    peg_tube_placement_rate: 0.12
    recurrent_aspiration_rate: 0.20
    mean_age_admitted: 82
    male_ratio: 0.55

  us:
    median_los: 7
    los_iqr: [4, 10]
    in_hospital_mortality: 0.10
    icu_transfer_rate: 0.12
    thirty_day_readmission: 0.22
    antibiotic_switch_rate: 0.12
    swallowing_evaluation_rate: 0.80
    peg_tube_placement_rate: 0.08
    recurrent_aspiration_rate: 0.18
    mean_age_admitted: 78
    male_ratio: 0.52

# ============================================================
# CLINICAL COURSE ARCHETYPES
# ============================================================
course_archetypes:
  smooth_recovery:
    probability: 0.35
    description: "Responds to antibiotics and aspiration precautions; swallowing improves"
    trajectory:
      inflammation_level: {0: 0.05, 1: -0.02, 2: -0.06, 3: -0.06, 5: -0.05, 7: -0.05, 10: -0.04, 14: -0.03, 21: -0.02}
      volume_status: {0: 0.02, 1: 0.03, 2: 0.02, 3: 0.02, 5: 0.01, 7: 0.00, 10: 0.00, 14: 0.00, 21: 0.00}
      renal_function: {0: 0.00, 1: 0.00, 2: 0.01, 3: 0.01, 5: 0.01, 7: 0.01, 10: 0.00, 14: 0.00, 21: 0.00}
      perfusion_status: {0: 0.00, 1: 0.01, 2: 0.01, 3: 0.01, 5: 0.00, 7: 0.00, 10: 0.00, 14: 0.00, 21: 0.00}
    order_modifications: {}
    treatment_modifications: {}

    daily_trajectory:
      day_0:
        subjective: "症状あり"
        objective: "バイタル安定、検査所見あり"
        assessment: "初期診断確定、治療開始"
        plan: "治療継続、経過観察"
      day_1:
        subjective: "症状緩和傾向"
        objective: "バイタル安定、検査所見改善"
        assessment: "治療反応良好"
        plan: "治療継続"

  dip_then_recovery:
    probability: 0.20
    description: "Chemical pneumonitis phase worsens Day 1-3, then bacterial component treated"
    trajectory:
      inflammation_level: {0: 0.12, 1: 0.08, 2: 0.03, 3: -0.02, 5: -0.06, 7: -0.08, 10: -0.06, 14: -0.04, 21: -0.02}
      volume_status: {0: -0.05, 1: -0.03, 2: 0.02, 3: 0.02, 5: 0.02, 7: 0.01, 10: 0.00, 14: 0.00, 21: 0.00}
      perfusion_status: {0: -0.05, 1: -0.03, 2: 0.00, 3: 0.02, 5: 0.02, 7: 0.01, 10: 0.00, 14: 0.00, 21: 0.00}
      renal_function: {0: -0.03, 1: -0.02, 2: 0.00, 3: 0.01, 5: 0.01, 7: 0.01, 10: 0.01, 14: 0.00, 21: 0.00}
    order_modifications:
      day_2:
        add_labs: ["Lactate", "ABG"]
        add_imaging: ["Chest_Xray_portable"]
    treatment_modifications:
      day_2:
        add_fluid: {detail: "NS 500mL bolus if hypotensive"}

  plateau_then_recovery:
    probability: 0.15
    description: "Slow response; swallowing dysfunction prolongs NPO and hospital stay"
    trajectory:
      inflammation_level: {0: 0.05, 1: 0.02, 2: 0.00, 3: 0.00, 5: 0.00, 7: -0.05, 10: -0.06, 14: -0.05, 21: -0.03}
      volume_status: {0: 0.01, 1: 0.01, 2: 0.00, 3: 0.00, 5: 0.00, 7: 0.01, 10: 0.01, 14: 0.00, 21: 0.00}
    order_modifications:
      day_5:
        add_labs: ["Albumin", "Prealbumin"]
        add_consult: ["speech_language_pathology", "nutrition"]
      day_7:
        add_imaging: ["Video_fluoroscopic_swallowing_study"]
    treatment_modifications:
      day_5:
        evaluate: "consider_NG_tube_feeding"

  treatment_resistant:
    probability: 0.12
    description: "Lung abscess formation or necrotizing pneumonia requiring antibiotic change"
    trajectory:
      inflammation_level: {0: 0.10, 1: 0.06, 2: 0.04, 3: 0.02, 5: -0.02, 7: -0.04, 10: -0.08, 14: -0.06, 21: -0.04}
      volume_status: {0: -0.03, 1: -0.02, 2: -0.01, 3: 0.00, 5: 0.02, 7: 0.02, 10: 0.01, 14: 0.00, 21: 0.00}
      renal_function: {0: -0.02, 1: -0.01, 2: -0.01, 3: 0.00, 5: 0.01, 7: 0.01, 10: 0.01, 14: 0.00, 21: 0.00}
    order_modifications:
      day_3:
        add_labs: ["Blood_culture_repeat", "Sputum_culture"]
        add_imaging: ["Chest_CT_with_contrast"]
        add_consult: ["infectious_disease", "pulmonology"]
    treatment_modifications:
      day_3:
        stop: ["Ampicillin/Sulbactam"]
        start:
          japan: [{drug: "Meropenem", dose: "1g IV q8h"}, {drug: "Metronidazole", dose: "500mg IV q8h"}]
          us: [{drug: "Piperacillin/Tazobactam", dose: "4.5g IV q6h"}, {drug: "Metronidazole", dose: "500mg IV q8h"}]
    triggers:
      - day: 3
        condition: "inflammation_level > 0.5 or new_cavitation_on_imaging"
        actions: ["escalate_antibiotic", "CT_chest", "ID_consult"]

  gradual_deterioration:
    probability: 0.12
    description: "Progressive respiratory failure, recurrent aspiration, sepsis"
    trajectory:
      inflammation_level: {0: 0.12, 1: 0.08, 2: 0.06, 3: 0.05, 5: 0.03, 7: 0.01, 10: 0.00, 14: -0.02, 21: -0.02}
      perfusion_status: {0: -0.08, 1: -0.05, 2: -0.03, 3: -0.03, 5: -0.02, 7: 0.00, 10: 0.01, 14: 0.01, 21: 0.01}
      renal_function: {0: -0.05, 1: -0.03, 2: -0.02, 3: -0.01, 5: 0.00, 7: 0.01, 10: 0.01, 14: 0.01, 21: 0.00}
    order_modifications:
      day_3:
        add_labs: ["ABG", "Lactate", "Blood_culture_repeat"]
      day_5:
        add_labs: ["ABG", "Lactate"]
        add_imaging: ["Chest_CT"]
    treatment_modifications:
      day_3:
        stop: ["Ampicillin/Sulbactam"]
        start:
          japan: [{drug: "Meropenem", dose: "1g IV q8h"}]
          us: [{drug: "Piperacillin/Tazobactam", dose: "4.5g IV q6h"}]
      day_5:
        start:
          japan: [{drug: "Norepinephrine", dose: "0.05ug/kg/min IV drip"}]
        action: "icu_transfer"
    triggers:
      - day: 5
        condition: "perfusion_status < 0.4"
        actions: ["icu_transfer", "intubation_evaluation"]

  sudden_deterioration:
    probability: 0.06
    description: "Massive aspiration or acute respiratory failure on Day 1-2"
    trajectory:
      inflammation_level: {0: 0.08, 1: 0.30, 2: 0.10, 3: -0.05, 5: -0.08, 7: -0.06, 10: -0.05, 14: -0.03, 21: -0.02}
      perfusion_status: {0: -0.05, 1: -0.30, 2: -0.05, 3: 0.05, 5: 0.05, 7: 0.03, 10: 0.02, 14: 0.01, 21: 0.01}
      renal_function: {0: 0.00, 1: -0.15, 2: -0.05, 3: 0.02, 5: 0.02, 7: 0.02, 10: 0.01, 14: 0.01, 21: 0.00}
      ph_status: {0: 0.00, 1: -0.10, 2: -0.03, 3: 0.02, 5: 0.02, 7: 0.01, 10: 0.01, 14: 0.00, 21: 0.00}
    order_modifications:
      day_1:
        add_labs: ["ABG", "Lactate", "Blood_culture_x2", "Troponin"]
        add_imaging: ["Chest_Xray_portable"]
    treatment_modifications:
      day_1:
        stop: ["Ampicillin/Sulbactam"]
        start:
          japan:
            - {drug: "Meropenem", dose: "1g IV q8h"}
            - {drug: "Norepinephrine", dose: "0.1ug/kg/min IV drip"}
          us:
            - {drug: "Piperacillin/Tazobactam", dose: "4.5g IV q6h"}
            - {drug: "Norepinephrine", dose: "0.1ug/kg/min IV drip"}
        action: "icu_transfer"
        action_2: "intubation"
    triggers:
      - day: 1
        condition: "SpO2 < 85% or perfusion_status < 0.3"
        actions: ["icu_transfer", "intubation", "start_vasopressor"]

archetype_modifiers:
  - condition: "dementia_advanced"
    effect: {gradual_deterioration: 0.10, smooth_recovery: -0.10}
  - condition: "age >= 85"
    effect: {gradual_deterioration: 0.08, smooth_recovery: -0.08}
  - condition: "poor_functional_status"
    effect: {plateau_then_recovery: 0.08, smooth_recovery: -0.08}
  - condition: "dysphagia_known"
    effect: {treatment_resistant: 0.05, smooth_recovery: -0.05}

# ============================================================
# COMPLICATIONS
# ============================================================
complications:
  - name: "lung_abscess"
    description: "Cavitary lesion from anaerobic infection"
    probability_per_day: 0.006
    onset_day_range: [5, 21]
    risk_factors:
      - {condition: "poor_dentition", multiplier: 2.5}
      - {condition: "alcohol_dependence", multiplier: 2.0}
      - {condition: "immunosuppressed", multiplier: 2.0}
    state_impact:
      inflammation_level: 0.15
    detection:
      test: "chest_CT"
      finding: "cavitary_lesion_with_air_fluid_level"
    actions: ["prolonged_antibiotics_4_6_weeks", "CT_guided_drainage_if_large", "pulmonology_consult"]

  - name: "empyema"
    description: "Infected pleural effusion from aspiration pneumonia"
    probability_per_day: 0.005
    onset_day_range: [3, 14]
    risk_factors:
      - {condition: "severity_severe", multiplier: 3.0}
      - {condition: "delayed_antibiotic", multiplier: 2.0}
    state_impact:
      inflammation_level: 0.15
      perfusion_status: -0.05
    detection:
      test: "chest_xray_and_ultrasound"
      finding: "loculated_effusion"
    actions: ["chest_tube_drainage", "escalate_antibiotic", "thoracic_surgery_consult"]

  - name: "acute_respiratory_distress_syndrome"
    description: "ARDS from massive aspiration or severe pneumonia"
    probability_per_day: 0.008
    onset_day_range: [0, 5]
    risk_factors:
      - {condition: "severity_severe", multiplier: 3.0}
      - {condition: "massive_aspiration", multiplier: 5.0}
    state_impact:
      perfusion_status: -0.25
      ph_status: -0.10
    detection:
      test: "ABG_and_chest_xray"
      finding: "PaO2_FiO2_below_200_bilateral_infiltrates"
    actions: ["icu_transfer", "intubation_lung_protective_ventilation", "prone_positioning"]

  - name: "recurrent_aspiration"
    description: "New aspiration event during hospitalization"
    probability_per_day: 0.015
    onset_day_range: [1, 21]
    risk_factors:
      - {condition: "severe_dysphagia", multiplier: 4.0}
      - {condition: "dementia_advanced", multiplier: 3.0}
      - {condition: "reduced_consciousness", multiplier: 3.0}
    state_impact:
      inflammation_level: 0.20
      perfusion_status: -0.10
    detection:
      test: "clinical_witnessed_or_xray"
      finding: "new_infiltrate_with_aspiration_event"
    actions: ["strict_NPO", "NG_tube", "SLP_reevaluation", "PEG_tube_discussion"]

  - name: "acute_kidney_injury"
    description: "Pre-renal AKI from sepsis/dehydration"
    probability_per_day: 0.010
    onset_day_range: [1, 7]
    risk_factors:
      - {condition: "CKD", multiplier: 3.0}
      - {condition: "volume_status < -0.3", multiplier: 2.0}
      - {condition: "age_over_80", multiplier: 1.5}
    state_impact:
      renal_function: -0.15
      ph_status: -0.05
    detection:
      test: "creatinine"
      finding: "rise_above_0.3_from_baseline"
    actions: ["iv_fluid_bolus", "hold_nephrotoxic_drugs", "monitor_urine_output"]

  - name: "delirium"
    description: "Acute confusion — very common in aspiration pneumonia population"
    probability_per_day: 0.025
    onset_day_range: [0, 7]
    risk_factors:
      - {condition: "dementia", multiplier: 3.0}
      - {condition: "age_over_80", multiplier: 2.5}
      - {condition: "icu_stay", multiplier: 2.0}
    state_impact: {}
    detection:
      test: "CAM_screening"
      finding: "positive"
    actions: ["reorientation", "sleep_hygiene", "avoid_benzodiazepines", "treat_underlying_infection"]

  - name: "malnutrition_worsening"
    description: "Progressive malnutrition from prolonged NPO and high metabolic demand"
    probability_per_day: 0.020
    onset_day_range: [3, 21]
    risk_factors:
      - {condition: "baseline_malnutrition", multiplier: 3.0}
      - {condition: "prolonged_NPO", multiplier: 2.5}
    state_impact:
      inflammation_level: 0.03
    detection:
      test: "albumin_and_prealbumin"
      finding: "albumin_below_2.5_or_declining"
    actions: ["nutrition_consult", "consider_NG_tube_feeding", "consider_PEG_if_prolonged"]

  - name: "c_diff_colitis"
    description: "Clostridioides difficile infection from antibiotic use"
    probability_per_day: 0.005
    onset_day_range: [5, 21]
    risk_factors:
      - {condition: "antibiotic_duration_over_7_days", multiplier: 2.0}
      - {condition: "age_over_65", multiplier: 1.5}
      - {condition: "clindamycin_use", multiplier: 2.5}
    state_impact:
      inflammation_level: 0.10
      volume_status: -0.10
    detection:
      test: "c_diff_toxin"
      finding: "positive"
    actions: ["stop_offending_antibiotic", "start_oral_vancomycin", "contact_precautions"]

  - name: "dvt"
    description: "Deep vein thrombosis from immobility"
    probability_per_day: 0.010
    onset_day_range: [3, 21]
    risk_factors:
      - {condition: "immobility_days > 3", multiplier: 2.0}
      - {condition: "dvt_susceptibility > 0.3", multiplier: 2.0}
    state_impact:
      coagulation_status: 0.05
    detection:
      test: "d_dimer_then_ultrasound"
      finding: "dvt_confirmed"
    actions: ["start_anticoagulation"]
    cascade: ["pulmonary_embolism"]

  - name: "pulmonary_embolism"
    description: "PE from DVT embolization"
    probability_given_parent: 0.10
    parent_complication: "dvt"
    onset_days_after_parent: [0, 7]
    state_impact:
      perfusion_status: -0.20
      ph_status: -0.05
    actions: ["ct_angiography", "anticoagulation", "consider_icu"]

