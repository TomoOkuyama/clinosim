# Bacterial Pneumonia — Complete Reference Data
# Sources cited per section. All rates are approximate and should be validated
# against the most current published data before production use.

disease_id: bacterial_pneumonia
chief_complaint:
  en: "Fever, cough, dyspnea"
  ja: "発熱・咳嗽・呼吸困難"
department: pulmonology
encounter_type: medical
requires_surgery: false
readmission_eligible: true

icd_codes:
  primary: "J18.9"  # Pneumonia, unspecified organism
  variants:
    - {code: "J13", name: "Pneumonia due to Streptococcus pneumoniae", probability: 0.25}
    - {code: "J15.7", name: "Pneumonia due to Mycoplasma pneumoniae", probability: 0.15}
    - {code: "J15.1", name: "Pneumonia due to Pseudomonas", probability: 0.05}
    - {code: "J15.0", name: "Pneumonia due to Klebsiella pneumoniae", probability: 0.05}
    - {code: "J15.9", name: "Unspecified bacterial pneumonia", probability: 0.30}
    - {code: "J18.1", name: "Lobar pneumonia, unspecified organism", probability: 0.20}

# ============================================================
# INCIDENCE (per 100,000 per year, by age band and sex)
# Source: JP — 患者調査 2020, 感染症発生動向調査
#         US — CDC NHDS, Jain et al. NEJM 2015
# ============================================================
incidence:
  japan:
    "0-4":   {M: 800, F: 600}
    "5-14":  {M: 150, F: 120}
    "15-24": {M: 50, F: 40}
    "25-34": {M: 60, F: 50}
    "35-44": {M: 80, F: 60}
    "45-54": {M: 120, F: 80}
    "55-64": {M: 200, F: 130}
    "65-74": {M: 500, F: 350}
    "75-84": {M: 1200, F: 900}
    "85+":   {M: 2500, F: 2000}
  us:
    "0-4":   {M: 900, F: 700}
    "5-14":  {M: 100, F: 80}
    "15-24": {M: 40, F: 35}
    "25-34": {M: 50, F: 45}
    "35-44": {M: 70, F: 55}
    "45-54": {M: 100, F: 75}
    "55-64": {M: 180, F: 120}
    "65-74": {M: 450, F: 320}
    "75-84": {M: 1100, F: 850}
    "85+":   {M: 2200, F: 1800}

  risk_multipliers:
    - {condition: "COPD", multiplier: 3.0}
    - {condition: "diabetes", multiplier: 1.5}
    - {condition: "heart_failure", multiplier: 2.0}
    - {condition: "CKD", multiplier: 1.8}
    - {condition: "liver_cirrhosis", multiplier: 2.5}
    - {condition: "smoking_current", multiplier: 1.8}
    - {condition: "alcohol_dependence", multiplier: 2.0}
    - {condition: "immunosuppressed", multiplier: 5.0}
    - {condition: "dementia", multiplier: 2.5}   # aspiration risk
    - {condition: "stroke_history", multiplier: 2.0}  # aspiration risk

  seasonal_curve:  # monthly multiplier (1.0 = baseline)
    1: 1.8   # Jan
    2: 1.6
    3: 1.3
    4: 1.0
    5: 0.8
    6: 0.7
    7: 0.7
    8: 0.7
    9: 0.8
    10: 1.0
    11: 1.3
    12: 1.7

  vaccine_protection:
    pneumococcal:
      effectiveness: 0.45   # ~45% reduction in pneumococcal pneumonia
      duration_days: 1825   # ~5 years
    influenza:
      effectiveness: 0.20   # indirect: reduces post-influenza bacterial pneumonia
      duration_days: 365

# ============================================================
# SEVERITY DISTRIBUTION
# Source: CAP severity studies (CURB-65, PSI), JP DPC data
# ============================================================
severity:
  distribution:
    mild: 0.30        # outpatient manageable
    moderate: 0.55    # requires hospitalization
    severe: 0.15      # requires ICU
  modifiers:
    - {condition: "age_over_75", mild_multiplier: 0.6, severe_multiplier: 1.8}
    - {condition: "COPD", moderate_multiplier: 1.3, severe_multiplier: 1.5}
    - {condition: "heart_failure", severe_multiplier: 2.0}
    - {condition: "immunosuppressed", severe_multiplier: 2.5, mild_multiplier: 0.3}
    - {condition: "dementia", severe_multiplier: 1.5}

# ============================================================
# INITIAL PHYSIOLOGICAL STATE IMPACT
# How this disease changes physiological state at onset (added to patient baseline)
# ============================================================
initial_state_impact:
  mild:
    inflammation_level: 0.25
    volume_status: -0.10
    sodium_status: -0.10
    anion_gap_status: 0.0     # AG axis: mild pneumonia — no AG shift
  moderate:
    inflammation_level: 0.50
    volume_status: -0.20
    perfusion_status: -0.05
    renal_function: -0.05
    sodium_status: -0.25
    anion_gap_status: 0.2     # AG axis: moderate sepsis-like contribution
  severe:
    inflammation_level: 0.75
    volume_status: -0.30
    perfusion_status: -0.20
    renal_function: -0.15
    anion_gap_status: 0.4     # AG axis: severe CAP / septic lactate (AG 14-18)
    ph_status: -0.10
    sodium_status: -0.40

# ============================================================
# ORDER PROTOCOLS (what to order and when)
# All admission orders, daily monitoring, and discharge criteria
# are defined here — the engine reads this, not hardcoded.
# ============================================================
order_protocols:
  admission_orders:
    labs:
      - {test: "CRP", urgency: "stat"}
      - {test: "WBC", urgency: "stat"}
      - {test: "PCT", urgency: "stat"}
      - {test: "Albumin", urgency: "stat"}
      - {test: "Creatinine", urgency: "stat"}
      - {test: "BUN", urgency: "stat"}
      - {test: "Na", urgency: "stat"}
      - {test: "K", urgency: "stat"}
      - {test: "Glucose", urgency: "stat"}
      - {test: "Hb", urgency: "stat"}
      - {test: "Plt", urgency: "stat"}
      - {test: "AST", urgency: "stat", probability: 0.85}       # optional: physician discretion
      - {test: "ALT", urgency: "stat", probability: 0.85}       # optional: often ordered with AST
      - {test: "LDH", urgency: "stat", probability: 0.40}       # some physicians order, not all
      - {test: "Lactate", urgency: "stat", probability: 0.50}   # if sepsis concern
    imaging:
      - {test: "Chest_Xray_PA_Lateral", urgency: "stat"}
    supportive:
      - {type: "IV_fluid", detail: "NS 80-125 mL/h"}
      - {type: "O2", detail: "Nasal cannula SpO2 >= 94%"}
      - {type: "antipyretic", detail: "Acetaminophen 500mg PO q6h PRN temp >= 38.5"}
      - {type: "DVT_prophylaxis", detail: "Enoxaparin 2000IU SC daily"}

  daily_monitoring:
    labs:
      - {test: "CRP", frequency: "daily"}
      - {test: "WBC", frequency: "daily"}
      - {test: "Creatinine", frequency: "daily"}
    vitals:
      stable: "q4h"
      unstable: "q1h"
    imaging:
      - {test: "Chest_Xray", frequency: "day_3_and_prn", condition: "no improvement or worsening"}

  trigger_orders:
    no_defervescence_72h:
      condition: "inflammation_level > 0.5 at Day 3"
      actions:
        - {type: "lab", test: "Blood_culture_repeat"}
        - {type: "imaging", test: "Chest_CT_with_contrast"}
        - {type: "medication_change", action: "escalate_antibiotic"}
        - {type: "consult", target: "infectious_disease"}
    spo2_below_90:
      condition: "SpO2 < 90% on supplemental O2"
      actions:
        - {type: "lab", test: "ABG"}
        - {type: "respiratory", action: "increase_O2_or_HFNC"}
        - {type: "evaluate", action: "consider_ICU_transfer"}
    renal_deterioration:
      condition: "Creatinine rise > 0.3 from baseline"
      actions:
        - {type: "medication_change", action: "adjust_antibiotic_for_renal"}
        - {type: "fluid", action: "reassess_volume_status"}

  discharge_criteria:
    japan:
      - "Afebrile (< 37.0C) for 48 hours"
      - "CRP declining and < 50% of peak"
      - "Oral medication tolerated for 24 hours"
      - "SpO2 >= 95% on room air"
      - "ADL independent or with available support"
    us:
      - "Afebrile (< 37.5C) for 24 hours"
      - "Oral medication tolerated"
      - "Clinically stable (no escalation in 24h)"
      - "SpO2 >= 92% on room air"

# ============================================================
# LIKELIHOOD RATIO TABLE
# Source: Clinical diagnostic studies meta-analyses
#         Metlay et al. Ann Intern Med 2003
#         Christ-Crain et al. Am J Respir Crit Care Med 2004
# ============================================================
likelihood_ratios:
  # Finding → {disease: {positive_LR, negative_LR}}
  chest_xray_consolidation:
    bacterial_pneumonia: {positive_LR: 8.0, negative_LR: 0.3}
    viral_pneumonia: {positive_LR: 2.0, negative_LR: 0.7}
    heart_failure: {positive_LR: 0.5, negative_LR: 1.1}
    pulmonary_embolism: {positive_LR: 0.3, negative_LR: 1.0}

  procalcitonin_above_0.5:
    bacterial_pneumonia: {positive_LR: 6.0, negative_LR: 0.15}
    viral_pneumonia: {positive_LR: 0.3, negative_LR: 2.0}
    heart_failure: {positive_LR: 0.8, negative_LR: 1.0}
    tuberculosis: {positive_LR: 1.5, negative_LR: 0.8}

  crp_above_100:
    bacterial_pneumonia: {positive_LR: 3.5, negative_LR: 0.4}
    viral_pneumonia: {positive_LR: 0.5, negative_LR: 1.5}
    heart_failure: {positive_LR: 0.8, negative_LR: 1.1}

  wbc_above_15000:
    bacterial_pneumonia: {positive_LR: 2.5, negative_LR: 0.6}
    viral_pneumonia: {positive_LR: 0.5, negative_LR: 1.3}

  blood_culture_positive:
    bacterial_pneumonia: {positive_LR: 15.0, negative_LR: 0.85}
    # Sensitivity only ~10-20%, so negative LR is weak

  urinary_antigen_pneumococcus_positive:
    bacterial_pneumonia: {positive_LR: 20.0, negative_LR: 0.70}
    # Sensitivity ~70% for pneumococcal, specificity ~95%

  urinary_antigen_legionella_positive:
    bacterial_pneumonia: {positive_LR: 50.0, negative_LR: 0.95}
    # Very specific for Legionella serogroup 1

  sputum_gram_stain_gpc_dominant:
    bacterial_pneumonia: {positive_LR: 4.0, negative_LR: 0.7}

  bilateral_infiltrates:
    bacterial_pneumonia: {positive_LR: 1.5, negative_LR: 0.8}
    viral_pneumonia: {positive_LR: 3.0, negative_LR: 0.5}
    heart_failure: {positive_LR: 3.0, negative_LR: 0.4}

  pleural_effusion:
    bacterial_pneumonia: {positive_LR: 2.0, negative_LR: 0.9}
    heart_failure: {positive_LR: 4.0, negative_LR: 0.5}
    tuberculosis: {positive_LR: 3.0, negative_LR: 0.8}

# ============================================================
# LAB REFERENCE RANGES (admission values for pneumonia patients)
# For benchmarking generated data
# Source: Clinical studies, textbook values
# ============================================================
expected_lab_distributions:
  admission:
    CRP:
      unit: "mg/L"
      median: 80
      iqr: [30, 150]
      range: [5, 400]
    WBC:
      unit: "/uL"
      median: 12000
      iqr: [8000, 16000]
      range: [2000, 30000]
    PCT:
      unit: "ng/mL"
      median: 1.5
      iqr: [0.3, 8.0]
      range: [0.05, 100]
    Albumin:
      unit: "g/dL"
      median: 3.2
      iqr: [2.8, 3.6]
      range: [1.5, 4.0]
    Creatinine:
      unit: "mg/dL"
      median: 0.9
      iqr: [0.7, 1.3]
      range: [0.4, 5.0]
      note: "higher if pre-existing CKD or dehydration"
    BUN:
      unit: "mg/dL"
      median: 20
      iqr: [14, 30]
      range: [8, 80]
    Glucose:
      unit: "mg/dL"
      median: 130
      iqr: [100, 180]
      range: [70, 400]
      note: "stress hyperglycemia common"
    Lactate:
      unit: "mmol/L"
      median: 1.5
      iqr: [1.0, 2.5]
      range: [0.5, 10.0]
      note: ">4 suggests severe sepsis"

  discharge:
    CRP:
      unit: "mg/L"
      median: 8
      iqr: [3, 20]
      note: "JP waits for more normalization than US"
    WBC:
      unit: "/uL"
      median: 7500
      iqr: [5500, 9500]

# ============================================================
# VITAL SIGN DISTRIBUTIONS
# Source: Clinical studies on CAP
# ============================================================
expected_vital_distributions:
  admission:
    temperature:
      unit: "C"
      mean: 38.5
      sd: 0.8
      range: [36.5, 40.5]
    heart_rate:
      unit: "bpm"
      mean: 100
      sd: 15
      range: [60, 140]
    systolic_bp:
      unit: "mmHg"
      mean: 125
      sd: 20
      range: [80, 180]
    respiratory_rate:
      unit: "/min"
      mean: 22
      sd: 5
      range: [14, 40]
    spo2:
      unit: "%"
      mean: 94
      sd: 3
      range: [80, 99]

# ============================================================
# TREATMENT REFERENCE — Drug selection data
# Source: IDSA/ATS CAP Guidelines 2019, JRS CAP Guidelines 2017
# ============================================================
drugs:
  first_line:
    japan:
      - drug: "Ampicillin/Sulbactam"
        code_yj: "6131405"
        dose: "3g IV q6h"
        route: IV
        renal_adjustment:
          eGFR_30_60: "1.5g IV q6h"
          eGFR_below_30: "1.5g IV q12h"
        pregnancy_safe: true

    us:
      - drug: "Ceftriaxone"
        code_rxnorm: "309090"
        dose: "1g IV daily"
        route: IV
        pregnancy_safe: true
      - drug: "Azithromycin"
        code_rxnorm: "248656"
        dose: "500mg IV daily"
        route: IV
        note: "Added for atypical coverage"
        pregnancy_safe: true

  alternative_penicillin_allergy:
    japan:
      - drug: "Levofloxacin"
        code_yj: "6241013"
        dose: "500mg IV daily"
        renal_adjustment:
          eGFR_below_50: "250mg IV daily"
        pregnancy_safe: false
    us:
      - drug: "Levofloxacin"
        code_rxnorm: "82122"
        dose: "750mg IV daily"
        renal_adjustment:
          eGFR_below_50: "500mg IV daily"
        pregnancy_safe: false

  escalation:  # when first-line fails (Day 3 no improvement)
    japan:
      - drug: "Meropenem"
        code_yj: "6139400"
        dose: "1g IV q8h"
        indication: "no_defervescence_72h or culture_resistant_organism"
        renal_adjustment:
          eGFR_below_30: "0.5g IV q12h"
    us:
      - drug: "Piperacillin/Tazobactam"
        code_rxnorm: "240984"
        dose: "4.5g IV q6h"
        indication: "same"

  discharge_oral:
    japan:
      - drug: "Amoxicillin"
        code_yj: "6131001"
        dose: "250mg PO TID"
        duration_days: 5
    us:
      - drug: "Amoxicillin/Clavulanate"
        code_rxnorm: "562251"
        dose: "875/125mg PO BID"
        duration_days: 5

# ============================================================
# DRUG INTERACTIONS relevant to pneumonia treatment
# ============================================================
drug_interactions:
  - drug_a: "Levofloxacin"
    drug_b: "Warfarin"
    severity: "major"
    effect: "Increased INR, bleeding risk"
    action: "Monitor INR closely"

  - drug_a: "Azithromycin"
    drug_b: "Amiodarone"
    severity: "major"
    effect: "QT prolongation risk"
    action: "Avoid combination or monitor ECG"

  - drug_a: "Meropenem"
    drug_b: "Valproic acid"
    severity: "contraindicated"
    effect: "Dramatically reduces valproate levels"
    action: "Do not use together"

# ============================================================
# ============================================================
# TARGET LENGTH OF STAY (country-specific)
# ============================================================
target_los:
  japan:
    mild: {mean: 10, sd: 3, min: 5, max: 18}
    moderate: {mean: 14, sd: 4, min: 8, max: 25}
    severe: {mean: 21, sd: 6, min: 14, max: 35}
  us:
    mild: {mean: 3, sd: 1, min: 2, max: 5}
    moderate: {mean: 5, sd: 2, min: 3, max: 8}
    severe: {mean: 8, sd: 3, min: 5, max: 14}

# ============================================================
# IMAGING ORDERS
# ============================================================
imaging_orders:
  - modality: CR
    body_site: chest
    views: [PA, Lateral]
    urgency: routine
    clinical_indication: "Suspected pneumonia, evaluate consolidation"
    day: 0
    abnormal_rate_by_severity:
      mild: 0.85
      moderate: 0.95
      severe: 1.0
  - modality: CT
    body_site: chest
    contrast: false
    urgency: routine
    clinical_indication: "Confirm extent of consolidation"
    day: 1
    only_if_severity: [moderate, severe]
    abnormal_rate_by_severity:
      moderate: 0.9
      severe: 1.0

# OUTCOME BENCHMARKS
# For validating generated data against reality
# ============================================================
outcome_benchmarks:
  japan:
    median_los: 14
    los_iqr: [10, 18]
    in_hospital_mortality: 0.07
    icu_transfer_rate: 0.07
    thirty_day_readmission: 0.17
    antibiotic_switch_rate: 0.12
    blood_culture_positivity: 0.15
    mean_time_to_first_abx_hours: 3.0
    chest_xray_consolidation_rate: 0.85
    mean_age_admitted: 72
    male_ratio: 0.55

  us:
    median_los: 4.5
    los_iqr: [3, 6]
    in_hospital_mortality: 0.05
    icu_transfer_rate: 0.10
    thirty_day_readmission: 0.18
    antibiotic_switch_rate: 0.10
    blood_culture_positivity: 0.12
    mean_time_to_first_abx_hours: 2.5
    chest_xray_consolidation_rate: 0.85
    mean_age_admitted: 68
    male_ratio: 0.52

# ============================================================
# CLINICAL COURSE ARCHETYPES (daily state variable changes)
# Each archetype defines day-by-day deltas for physiological state variables.
# Disease authors specify these trajectories — the engine interpolates between days.
# Patient profile (immune_reactivity, treatment_sensitivity) modulates amplitude.
# ============================================================
course_archetypes:
  smooth_recovery:
    probability: 0.55
    description: "Steady improvement from Day 1-2 after treatment initiation"
    trajectory:
      inflammation_level: {0: 0.05, 1: -0.02, 2: -0.08, 3: -0.08, 5: -0.06, 7: -0.06, 10: -0.04, 14: -0.02}
      volume_status: {0: 0.02, 1: 0.03, 2: 0.03, 3: 0.02, 5: 0.01, 7: 0.01, 10: 0.00, 14: 0.00}
      renal_function: {0: 0.00, 1: 0.00, 2: 0.01, 3: 0.01, 5: 0.01, 7: 0.01, 10: 0.01, 14: 0.01}
      perfusion_status: {0: 0.00, 1: 0.00, 2: 0.01, 3: 0.01, 5: 0.00, 7: 0.00, 10: 0.00, 14: 0.00}
    # Smooth recovery: no order/treatment modifications needed
    order_modifications: {}
    treatment_modifications: {}

    daily_trajectory:
      day_0:
        subjective: "症状あり"
        objective: "バイタル安定、検査所見あり"
        assessment: "初期診断確定、治療開始"
        plan: "治療継続、経過観察"
      day_1:
        subjective: "症状緩和傾向"
        objective: "バイタル安定、検査所見改善"
        assessment: "治療反応良好"
        plan: "治療継続"

  dip_then_recovery:
    probability: 0.20
    description: "Worsening Day 1-3, then gradual improvement"
    trajectory:
      inflammation_level: {0: 0.10, 1: 0.05, 2: 0.02, 3: -0.02, 5: -0.08, 7: -0.10, 10: -0.08, 14: -0.05}
      volume_status: {0: -0.05, 1: -0.03, 2: 0.02, 3: 0.03, 5: 0.02, 7: 0.01, 10: 0.00, 14: 0.00}
      renal_function: {0: -0.02, 1: -0.01, 2: 0.00, 3: 0.01, 5: 0.01, 7: 0.01, 10: 0.01, 14: 0.01}
      perfusion_status: {0: -0.03, 1: -0.02, 2: 0.00, 3: 0.01, 5: 0.01, 7: 0.00, 10: 0.00, 14: 0.00}
    order_modifications:
      day_2:  # temporary worsening triggers additional monitoring
        add_labs: ["Lactate", "Blood_culture_repeat"]
        add_imaging: ["Chest_Xray_portable"]
    treatment_modifications:
      day_2:
        add_fluid: {detail: "NS 500mL bolus for hypotension"}

  plateau_then_recovery:
    probability: 0.10
    description: "No change for 3-5 days, then improvement"
    trajectory:
      inflammation_level: {0: 0.03, 1: 0.02, 2: 0.00, 3: 0.00, 5: 0.00, 7: -0.08, 10: -0.10, 14: -0.05}
      volume_status: {0: 0.01, 1: 0.01, 2: 0.01, 3: 0.00, 5: 0.00, 7: 0.01, 10: 0.01, 14: 0.00}
    order_modifications:
      day_5:  # no improvement for 5 days → more investigation
        add_labs: ["Blood_culture_repeat", "Procalcitonin"]
        add_imaging: ["Chest_CT"]
    treatment_modifications: {}  # continue same antibiotic (patience)

  treatment_resistant:
    probability: 0.08
    description: "No response to first-line; requires antibiotic change at Day 3"
    trajectory:
      inflammation_level: {0: 0.08, 1: 0.05, 2: 0.05, 3: 0.02, 5: -0.02, 7: -0.05, 10: -0.10, 14: -0.08}
      volume_status: {0: -0.03, 1: -0.02, 2: -0.01, 3: 0.00, 5: 0.02, 7: 0.02, 10: 0.01, 14: 0.00}
      renal_function: {0: -0.02, 1: -0.01, 2: -0.01, 3: 0.00, 5: 0.01, 7: 0.01, 10: 0.01, 14: 0.01}
    order_modifications:
      day_3:
        add_labs: ["Blood_culture_repeat", "Sputum_culture", "Procalcitonin"]
        add_imaging: ["Chest_CT_with_contrast"]
        add_consult: ["infectious_disease"]
    treatment_modifications:
      day_3:
        stop: ["Ampicillin/Sulbactam"]
        start:
          japan: [{drug: "Meropenem", dose: "1g IV q8h"}]
          us: [{drug: "Piperacillin/Tazobactam", dose: "4.5g IV q6h"}]
    triggers:
      - day: 3
        condition: "inflammation_level > 0.5"
        actions: ["escalate_antibiotic", "order_ct", "consult_infectious_disease"]

  gradual_deterioration:
    probability: 0.05
    description: "Slow worsening despite treatment -> ICU transfer"
    trajectory:
      inflammation_level: {0: 0.10, 1: 0.08, 2: 0.08, 3: 0.05, 5: 0.05, 7: 0.03, 10: 0.02, 14: 0.00}
      perfusion_status: {0: -0.05, 1: -0.05, 2: -0.03, 3: -0.03, 5: -0.02, 7: 0.00, 10: 0.01, 14: 0.01}
      renal_function: {0: -0.03, 1: -0.03, 2: -0.02, 3: -0.02, 5: -0.01, 7: 0.00, 10: 0.01, 14: 0.01}
    order_modifications:
      day_3:
        add_labs: ["ABG", "Lactate", "Blood_culture_repeat"]
      day_5:
        add_labs: ["ABG", "Lactate"]
        add_imaging: ["Chest_CT"]
    treatment_modifications:
      day_3:
        stop: ["Ampicillin/Sulbactam"]
        start:
          japan: [{drug: "Meropenem", dose: "1g IV q8h"}]
      day_5:
        start:
          japan: [{drug: "Norepinephrine", dose: "0.05ug/kg/min IV drip"}]
        action: "icu_transfer"
    triggers:
      - day: 5
        condition: "perfusion_status < 0.4"
        actions: ["icu_transfer"]

  sudden_deterioration:
    probability: 0.02
    description: "Sudden critical worsening (sepsis, PE, etc.) on Day 2"
    trajectory:
      inflammation_level: {0: 0.05, 1: -0.02, 2: 0.30, 3: 0.10, 5: -0.05, 7: -0.08, 10: -0.06, 14: -0.03}
      perfusion_status: {0: 0.00, 1: 0.00, 2: -0.30, 3: -0.05, 5: 0.05, 7: 0.05, 10: 0.02, 14: 0.01}
      renal_function: {0: 0.00, 1: 0.00, 2: -0.15, 3: -0.05, 5: 0.02, 7: 0.02, 10: 0.01, 14: 0.01}
    order_modifications:
      day_2:
        add_labs: ["ABG", "Lactate", "Blood_culture_x2", "D_dimer", "Troponin"]
        add_imaging: ["CT_angiography"]
    treatment_modifications:
      day_2:
        stop: ["Ampicillin/Sulbactam"]
        start:
          japan:
            - {drug: "Meropenem", dose: "1g IV q8h"}
            - {drug: "Norepinephrine", dose: "0.1ug/kg/min IV drip"}
        action: "icu_transfer"
        action_2: "intubation_evaluation"
    triggers:
      - day: 2
        condition: "perfusion_status < 0.4"
        actions: ["icu_transfer", "start_vasopressor", "intubation_evaluation"]

# Archetype selection modifiers (patient profile dependent)
archetype_modifiers:
  - condition: "immune_reactivity < 0.3"
    effect: {treatment_resistant: 0.10, smooth_recovery: -0.10}
  - condition: "age >= 80"
    effect: {gradual_deterioration: 0.05, smooth_recovery: -0.05}
  - condition: "treatment_sensitivity > 1.2"
    effect: {smooth_recovery: 0.10, treatment_resistant: -0.05}

# ============================================================
# COMPLICATIONS (secondary events during hospitalization)
# Each complication has: trigger conditions, timing, probability,
# physiological impact, and detection/treatment actions.
# Complications can themselves trigger further complications (cascade).
# ============================================================
complications:
  - name: "parapneumonic_effusion"
    description: "Pleural effusion complicating pneumonia"
    probability_per_day: 0.008
    onset_day_range: [2, 7]
    risk_factors:
      - {condition: "severity_severe", multiplier: 3.0}
      - {condition: "age_over_75", multiplier: 1.5}
    state_impact:
      volume_status: 0.05         # fluid accumulation
      inflammation_level: 0.03   # continued inflammation
    detection:
      test: "chest_xray"
      finding: "pleural_effusion"
    actions: ["order_chest_xray", "consider_thoracentesis"]
    cascade: ["empyema"]          # can lead to empyema

  - name: "empyema"
    description: "Infected pleural effusion"
    probability_given_parent: 0.15    # 15% of parapneumonic effusions become empyema
    parent_complication: "parapneumonic_effusion"
    onset_days_after_parent: [2, 5]
    state_impact:
      inflammation_level: 0.15
      perfusion_status: -0.05
    actions: ["chest_tube_drainage", "escalate_antibiotic"]

  - name: "acute_kidney_injury"
    description: "Pre-renal AKI from sepsis/dehydration"
    probability_per_day: 0.01
    onset_day_range: [1, 5]
    risk_factors:
      - {condition: "renal_function < 0.5", multiplier: 3.0}
      - {condition: "volume_status < -0.3", multiplier: 2.0}
      - {condition: "age_over_75", multiplier: 1.5}
    state_impact:
      renal_function: -0.15
      ph_status: -0.05
    detection:
      test: "creatinine"
      finding: "rise_above_0.3_from_baseline"
    actions: ["iv_fluid_bolus", "hold_nephrotoxic_drugs", "monitor_urine_output"]

  - name: "delirium"
    description: "Acute confusion, especially in elderly"
    probability_per_day: 0.015
    onset_day_range: [1, 7]
    risk_factors:
      - {condition: "age_over_75", multiplier: 2.5}
      - {condition: "dementia", multiplier: 3.0}
      - {condition: "icu_stay", multiplier: 2.0}
      - {condition: "delirium_susceptibility > 0.3", multiplier: 2.0}
    state_impact: {}              # delirium doesn't change physiological state variables directly
    detection:
      test: "CAM_screening"
      finding: "positive"
    actions: ["reorientation", "sleep_hygiene", "avoid_benzodiazepines", "consider_haloperidol"]

  - name: "c_diff_colitis"
    description: "Clostridioides difficile infection from antibiotic use"
    probability_per_day: 0.005
    onset_day_range: [5, 21]
    risk_factors:
      - {condition: "antibiotic_duration_over_7_days", multiplier: 2.0}
      - {condition: "age_over_65", multiplier: 1.5}
      - {condition: "fluoroquinolone_use", multiplier: 2.0}
    state_impact:
      inflammation_level: 0.10
      volume_status: -0.10        # diarrhea → dehydration
    detection:
      test: "c_diff_toxin"
      finding: "positive"
    actions: ["stop_offending_antibiotic", "start_oral_vancomycin", "contact_precautions"]

  - name: "dvt"
    description: "Deep vein thrombosis"
    probability_per_day: 0.01
    onset_day_range: [3, 14]
    risk_factors:
      - {condition: "immobility_days > 3", multiplier: 2.0}
      - {condition: "dvt_susceptibility > 0.3", multiplier: 2.0}
      - {condition: "no_dvt_prophylaxis", multiplier: 3.0}
    state_impact:
      coagulation_status: 0.05
    detection:
      test: "d_dimer_then_ultrasound"
      finding: "dvt_confirmed"
    actions: ["start_anticoagulation"]
    cascade: ["pulmonary_embolism"]

  - name: "pulmonary_embolism"
    description: "PE from DVT embolization"
    probability_given_parent: 0.10
    parent_complication: "dvt"
    onset_days_after_parent: [0, 7]
    state_impact:
      perfusion_status: -0.20
      inflammation_level: 0.05
      ph_status: -0.05
    actions: ["ct_angiography", "anticoagulation", "consider_icu"]

  - name: "hospital_acquired_pneumonia"
    description: "New pneumonia acquired during hospitalization (different from admission diagnosis)"
    probability_per_day: 0.003
    onset_day_range: [5, 21]
    risk_factors:
      - {condition: "intubation", multiplier: 5.0}
      - {condition: "age_over_75", multiplier: 1.5}
      - {condition: "immunosuppressed", multiplier: 2.0}
    state_impact:
      inflammation_level: 0.30
      perfusion_status: -0.05
    actions: ["new_cultures", "broad_spectrum_antibiotic"]

