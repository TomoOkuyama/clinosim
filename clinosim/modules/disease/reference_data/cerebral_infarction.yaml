# ============================================================
# TARGET LENGTH OF STAY (country-specific)
# JP includes inpatient rehabilitation; US transfers to rehab facility
# Source: JP — DPC data, US — AHA Get With The Guidelines
# ============================================================
target_los:
  japan:
    moderate: {mean: 22, sd: 5, min: 14, max: 35}
    severe: {mean: 30, sd: 7, min: 18, max: 50}
  us:
    moderate: {mean: 5, sd: 1.5, min: 3, max: 8}
    severe: {mean: 7, sd: 2, min: 4, max: 14}

# OUTCOME BENCHMARKS
# For validating generated data against reality
# Source: JP — 脳卒中データバンク 2021, US — AHA Statistics 2023
# ============================================================
outcome_benchmarks:
  japan:
    median_los: 24
    los_iqr: [18, 30]
    in_hospital_mortality: 0.08
    icu_transfer_rate: 0.15
    thirty_day_readmission: 0.10
    tpa_administration_rate: 0.10
    thrombectomy_rate: 0.05
    hemorrhagic_transformation_rate: 0.06
    af_detection_rate: 0.25
    mean_nihss_at_admission: 8
    mean_age_admitted: 74
    male_ratio: 0.58

  us:
    median_los: 5
    los_iqr: [3, 7]
    in_hospital_mortality: 0.05
    icu_transfer_rate: 0.20
    thirty_day_readmission: 0.12
    tpa_administration_rate: 0.12
    thrombectomy_rate: 0.08
    hemorrhagic_transformation_rate: 0.06
    af_detection_rate: 0.25
    mean_nihss_at_admission: 8
    mean_age_admitted: 70
    male_ratio: 0.52

# ============================================================
# CLINICAL COURSE ARCHETYPES (daily state variable changes)
# Stroke trajectory differs from infection: perfusion and neurological recovery
# are primary axes. Inflammation is mild. Rehabilitation milestones matter.
# ============================================================
course_archetypes:
  smooth_recovery:
    probability: 0.40
    description: "Steady neurological improvement from Day 1; good response to reperfusion or collaterals"
    trajectory:
      perfusion_status: {0: -0.05, 1: 0.03, 2: 0.04, 3: 0.04, 5: 0.03, 7: 0.02, 10: 0.02, 14: 0.01, 21: 0.01, 28: 0.00}
      inflammation_level: {0: 0.02, 1: 0.01, 2: -0.01, 3: -0.02, 5: -0.02, 7: -0.01, 10: -0.01, 14: 0.00, 21: 0.00, 28: 0.00}
      cardiac_function: {0: 0.00, 1: 0.00, 2: 0.01, 3: 0.01, 5: 0.01, 7: 0.00, 10: 0.00, 14: 0.00, 21: 0.00, 28: 0.00}
      volume_status: {0: 0.01, 1: 0.02, 2: 0.01, 3: 0.01, 5: 0.00, 7: 0.00, 10: 0.00, 14: 0.00, 21: 0.00, 28: 0.00}
    order_modifications: {}
    treatment_modifications: {}

  dip_then_recovery:
    probability: 0.20
    description: "Early worsening Day 1-3 (edema, extension), then gradual recovery with rehab"
    trajectory:
      perfusion_status: {0: -0.08, 1: -0.05, 2: -0.03, 3: 0.00, 5: 0.03, 7: 0.04, 10: 0.03, 14: 0.02, 21: 0.01, 28: 0.01}
      inflammation_level: {0: 0.05, 1: 0.03, 2: 0.02, 3: 0.00, 5: -0.02, 7: -0.02, 10: -0.01, 14: -0.01, 21: 0.00, 28: 0.00}
      cardiac_function: {0: -0.02, 1: -0.01, 2: 0.00, 3: 0.00, 5: 0.01, 7: 0.01, 10: 0.00, 14: 0.00, 21: 0.00, 28: 0.00}
    order_modifications:
      day_2:
        add_labs: ["CT_head_noncontrast_repeat"]
        add_imaging: ["MRI_brain_if_not_done"]
    treatment_modifications:
      day_2:
        add_fluid: {detail: "NS bolus if hypotensive; otherwise maintain euvolemia"}

  plateau:
    probability: 0.20
    description: "Stable deficit without significant improvement; requires prolonged rehabilitation"
    trajectory:
      perfusion_status: {0: -0.02, 1: 0.00, 2: 0.00, 3: 0.00, 5: 0.01, 7: 0.01, 10: 0.01, 14: 0.01, 21: 0.01, 28: 0.00}
      inflammation_level: {0: 0.02, 1: 0.00, 2: -0.01, 3: -0.01, 5: 0.00, 7: 0.00, 10: 0.00, 14: 0.00, 21: 0.00, 28: 0.00}
      cardiac_function: {0: 0.00, 1: 0.00, 2: 0.00, 3: 0.00, 5: 0.00, 7: 0.00, 10: 0.00, 14: 0.00, 21: 0.00, 28: 0.00}
    order_modifications:
      day_7:
        add_imaging: ["MRI_brain_follow_up"]
    treatment_modifications: {}

  treatment_resistant:
    probability: 0.05
    description: "Progressive stroke despite treatment; large vessel occlusion without recanalization"
    trajectory:
      perfusion_status: {0: -0.10, 1: -0.05, 2: -0.03, 3: -0.02, 5: 0.00, 7: 0.01, 10: 0.01, 14: 0.01, 21: 0.01, 28: 0.00}
      inflammation_level: {0: 0.08, 1: 0.05, 2: 0.03, 3: 0.01, 5: -0.01, 7: -0.02, 10: -0.02, 14: -0.01, 21: -0.01, 28: 0.00}
      cardiac_function: {0: -0.03, 1: -0.02, 2: -0.01, 3: 0.00, 5: 0.00, 7: 0.01, 10: 0.01, 14: 0.00, 21: 0.00, 28: 0.00}
      renal_function: {0: -0.02, 1: -0.01, 2: 0.00, 3: 0.00, 5: 0.00, 7: 0.01, 10: 0.01, 14: 0.00, 21: 0.00, 28: 0.00}
    order_modifications:
      day_1:
        add_imaging: ["CT_angiography_repeat", "CT_perfusion"]
        add_consult: ["interventional_neuroradiology"]
      day_3:
        add_imaging: ["MRI_brain"]
        add_labs: ["Repeat_coagulation_panel"]
    treatment_modifications:
      day_1:
        evaluate: "thrombectomy_candidacy"
    triggers:
      - day: 1
        condition: "perfusion_status < 0.3 and large_vessel_occlusion"
        actions: ["consider_thrombectomy", "interventional_neuroradiology_consult"]

  gradual_deterioration:
    probability: 0.10
    description: "Slow worsening from cerebral edema, secondary complications -> may need ICU"
    trajectory:
      perfusion_status: {0: -0.08, 1: -0.05, 2: -0.05, 3: -0.03, 5: -0.03, 7: -0.01, 10: 0.01, 14: 0.01, 21: 0.01, 28: 0.00}
      inflammation_level: {0: 0.05, 1: 0.05, 2: 0.05, 3: 0.03, 5: 0.02, 7: 0.00, 10: -0.02, 14: -0.02, 21: -0.01, 28: 0.00}
      cardiac_function: {0: -0.03, 1: -0.03, 2: -0.02, 3: -0.01, 5: 0.00, 7: 0.00, 10: 0.01, 14: 0.01, 21: 0.00, 28: 0.00}
      renal_function: {0: -0.02, 1: -0.02, 2: -0.02, 3: -0.01, 5: -0.01, 7: 0.00, 10: 0.01, 14: 0.01, 21: 0.00, 28: 0.00}
    order_modifications:
      day_2:
        add_labs: ["Osmolality", "Na"]
        add_imaging: ["CT_head_noncontrast_stat"]
      day_5:
        add_labs: ["ABG", "Lactate"]
        add_imaging: ["CT_head_noncontrast_stat"]
    treatment_modifications:
      day_2:
        start:
          japan: [{drug: "Mannitol", dose: "200mL IV q8h"}]
          us: [{drug: "Mannitol", dose: "1g/kg IV q6h"}]
        note: "Hyperosmolar therapy for cerebral edema"
      day_5:
        action: "icu_transfer"
        evaluate: "decompressive_craniectomy_if_malignant_MCA"
    triggers:
      - day: 3
        condition: "midline_shift > 5mm on CT"
        actions: ["neurosurgery_consult", "consider_decompressive_craniectomy"]
      - day: 5
        condition: "perfusion_status < 0.3"
        actions: ["icu_transfer"]

  sudden_deterioration:
    probability: 0.05
    description: "Sudden worsening from hemorrhagic transformation or recurrent stroke"
    trajectory:
      perfusion_status: {0: -0.03, 1: 0.02, 2: -0.25, 3: -0.05, 5: 0.03, 7: 0.03, 10: 0.02, 14: 0.01, 21: 0.01, 28: 0.00}
      inflammation_level: {0: 0.02, 1: -0.01, 2: 0.15, 3: 0.05, 5: -0.03, 7: -0.03, 10: -0.02, 14: -0.01, 21: -0.01, 28: 0.00}
      cardiac_function: {0: 0.00, 1: 0.00, 2: -0.10, 3: -0.03, 5: 0.02, 7: 0.02, 10: 0.01, 14: 0.00, 21: 0.00, 28: 0.00}
      renal_function: {0: 0.00, 1: 0.00, 2: -0.10, 3: -0.03, 5: 0.01, 7: 0.01, 10: 0.01, 14: 0.01, 21: 0.00, 28: 0.00}
    order_modifications:
      day_2:
        add_labs: ["PT_INR_stat", "aPTT_stat", "Fibrinogen", "Type_and_Screen"]
        add_imaging: ["CT_head_noncontrast_stat"]
    treatment_modifications:
      day_2:
        stop: ["Aspirin", "Clopidogrel", "Apixaban", "Edoxaban", "Warfarin"]
        action: "icu_transfer"
        evaluate: "neurosurgery_consult_for_hemorrhagic_transformation"
    triggers:
      - day: 2
        condition: "acute_neurological_decline"
        actions: ["stat_ct_head", "hold_antithrombotics", "icu_transfer", "neurosurgery_consult"]

# Archetype selection modifiers (patient profile dependent)
archetype_modifiers:
  - condition: "atrial_fibrillation"
    effect: {sudden_deterioration: 0.03, smooth_recovery: -0.03}
  - condition: "age >= 80"
    effect: {gradual_deterioration: 0.05, plateau: 0.05, smooth_recovery: -0.10}
  - condition: "tpa_received"
    effect: {smooth_recovery: 0.15, treatment_resistant: -0.05, sudden_deterioration: 0.02}
    note: "tPA improves outcome but slightly increases hemorrhagic transformation risk"
  - condition: "diabetes"
    effect: {plateau: 0.05, smooth_recovery: -0.05}
  - condition: "prior_stroke"
    effect: {treatment_resistant: 0.05, gradual_deterioration: 0.03, smooth_recovery: -0.08}

# ============================================================
# COMPLICATIONS (secondary events during hospitalization)
# ============================================================
complications:
  - name: "hemorrhagic_transformation"
    description: "Bleeding into infarcted brain tissue"
    probability_per_day: 0.008
    onset_day_range: [1, 7]
    risk_factors:
      - {condition: "tpa_received", multiplier: 3.0}
      - {condition: "anticoagulation", multiplier: 2.5}
      - {condition: "large_infarct_volume", multiplier: 2.0}
      - {condition: "severity_severe", multiplier: 2.0}
      - {condition: "age_over_75", multiplier: 1.5}
    state_impact:
      perfusion_status: -0.20
      inflammation_level: 0.10
    detection:
      test: "ct_head_noncontrast"
      finding: "new_hemorrhage_within_infarct"
    actions: ["hold_antithrombotics", "stat_coagulation_panel", "neurosurgery_consult", "consider_icu"]

  - name: "aspiration_pneumonia"
    description: "Pneumonia from dysphagia-related aspiration"
    probability_per_day: 0.012
    onset_day_range: [1, 10]
    risk_factors:
      - {condition: "dysphagia", multiplier: 4.0}
      - {condition: "decreased_consciousness", multiplier: 3.0}
      - {condition: "age_over_75", multiplier: 1.5}
      - {condition: "brainstem_infarct", multiplier: 2.5}
    state_impact:
      inflammation_level: 0.20
      perfusion_status: -0.05
      volume_status: -0.10
    detection:
      test: "chest_xray"
      finding: "new_infiltrate"
    actions: ["start_antibiotics", "NPO", "speech_therapy_reassessment"]

  - name: "dvt"
    description: "Deep vein thrombosis from immobility and paresis"
    probability_per_day: 0.008
    onset_day_range: [3, 21]
    risk_factors:
      - {condition: "hemiplegia", multiplier: 3.0}
      - {condition: "immobility_days > 3", multiplier: 2.0}
      - {condition: "no_dvt_prophylaxis", multiplier: 3.0}
      - {condition: "age_over_75", multiplier: 1.5}
    state_impact:
      coagulation_status: 0.05
    detection:
      test: "d_dimer_then_ultrasound"
      finding: "dvt_confirmed"
    actions: ["start_anticoagulation"]
    cascade: ["pulmonary_embolism"]

  - name: "pulmonary_embolism"
    description: "PE from DVT embolization"
    probability_given_parent: 0.10
    parent_complication: "dvt"
    onset_days_after_parent: [0, 7]
    state_impact:
      perfusion_status: -0.20
      inflammation_level: 0.05
      ph_status: -0.05
    actions: ["ct_angiography", "anticoagulation", "consider_icu"]

  - name: "seizure"
    description: "Post-stroke seizure from cortical irritation"
    probability_per_day: 0.005
    onset_day_range: [1, 14]
    risk_factors:
      - {condition: "cortical_infarct", multiplier: 3.0}
      - {condition: "hemorrhagic_transformation", multiplier: 2.5}
      - {condition: "severity_severe", multiplier: 2.0}
    state_impact:
      perfusion_status: -0.05
    detection:
      test: "clinical_observation_or_eeg"
      finding: "seizure_activity"
    actions: ["antiepileptic_medication", "eeg_monitoring", "rule_out_recurrent_stroke"]

  - name: "cerebral_edema"
    description: "Malignant cerebral edema with mass effect (large MCA infarct)"
    probability_per_day: 0.006
    onset_day_range: [2, 5]
    risk_factors:
      - {condition: "large_mca_infarct", multiplier: 5.0}
      - {condition: "age_under_60", multiplier: 2.0}  # paradoxically worse in younger due to less atrophy
      - {condition: "severity_severe", multiplier: 2.5}
    state_impact:
      perfusion_status: -0.15
      inflammation_level: 0.05
    detection:
      test: "ct_head"
      finding: "midline_shift_or_effacement"
    actions: ["hyperosmolar_therapy", "icu_transfer", "neurosurgery_consult", "consider_decompressive_craniectomy"]

  - name: "post_stroke_depression"
    description: "Depression developing during hospitalization or early recovery"
    probability_per_day: 0.010
    onset_day_range: [5, 30]
    risk_factors:
      - {condition: "frontal_lobe_infarct", multiplier: 2.0}
      - {condition: "severe_disability", multiplier: 2.0}
      - {condition: "prior_depression", multiplier: 3.0}
      - {condition: "social_isolation", multiplier: 1.5}
    state_impact: {}  # does not directly change physiological state variables
    detection:
      test: "PHQ9_screening"
      finding: "score_above_9"
    actions: ["psychiatry_consult", "consider_SSRI", "supportive_counseling"]

  - name: "urinary_tract_infection"
    description: "UTI from indwelling catheter or urinary retention"
    probability_per_day: 0.008
    onset_day_range: [3, 14]
    risk_factors:
      - {condition: "urinary_catheter", multiplier: 3.0}
      - {condition: "urinary_retention", multiplier: 2.0}
      - {condition: "diabetes", multiplier: 1.5}
      - {condition: "female", multiplier: 1.5}
    state_impact:
      inflammation_level: 0.10
    detection:
      test: "urinalysis_and_culture"
      finding: "pyuria_and_bacteriuria"
    actions: ["remove_catheter_if_possible", "start_antibiotics"]

  - name: "delirium"
    description: "Acute confusion, especially in elderly stroke patients"
    probability_per_day: 0.012
    onset_day_range: [1, 7]
    risk_factors:
      - {condition: "age_over_75", multiplier: 2.5}
      - {condition: "dementia", multiplier: 3.0}
      - {condition: "right_hemisphere_infarct", multiplier: 1.5}
      - {condition: "icu_stay", multiplier: 2.0}
    state_impact: {}
    detection:
      test: "CAM_screening"
      finding: "positive"
    actions: ["reorientation", "sleep_hygiene", "avoid_benzodiazepines", "treat_underlying_cause"]

# ============================================================
# REHABILITATION PROTOCOL
# Rehabilitation is critical for stroke recovery — PT/OT/ST from early days
# Source: AHA/ASA Guidelines, 日本脳卒中学会リハビリガイドライン
# ============================================================
rehabilitation:
  start_timing: "Day 2 (once medically stable and no hemorrhagic transformation)"
  components:
    physical_therapy:
      description: "Mobility, gait training, balance, strengthening of affected limbs"
      frequency: "Daily (BID in JP inpatient rehab phase)"
      duration_minutes: 40
      goals:
        - "Sit to stand independently"
        - "Ambulate with or without assistive device"
        - "Stair navigation"
    occupational_therapy:
      description: "ADL training, fine motor skills, upper extremity function"
      frequency: "Daily"
      duration_minutes: 40
      goals:
        - "Self-feeding"
        - "Dressing and grooming"
        - "Handwriting or adaptive techniques"
    speech_therapy:
      description: "Swallowing rehabilitation, aphasia therapy, cognitive-communication"
      frequency: "Daily (if aphasia or dysphagia present)"
      duration_minutes: 30
      probability: 0.60  # not all stroke patients need ST
      goals:
        - "Safe oral intake (pass swallowing evaluation)"
        - "Functional communication"
        - "Cognitive-linguistic recovery"

  japan_specific:
    kaifuku_ki_rehab: true  # 回復期リハビリテーション — JP-specific rehab ward transfer
    typical_rehab_ward_los: {mean: 60, sd: 20, min: 30, max: 120}
    note: "Most JP stroke patients transfer to rehab ward (回復期リハ病棟) after acute phase"

  us_specific:
    inpatient_rehab_facility_transfer: true
    typical_irf_los: {mean: 16, sd: 5, min: 7, max: 30}
    note: "US patients typically transfer to IRF or SNF after acute hospital stay"

