    male: {low: 0.6, high: 1.1}
    female: {low: 0.4, high: 0.8}
  BUN:
    unit: "mg/dL"
    all: {low: 8, high: 20}
  Na:
    unit: "mEq/L"
    all: {low: 136, high: 145}
  K:
    unit: "mEq/L"
    all: {low: 3.5, high: 5.0}
  Glucose:
    unit: "mg/dL"
    fasting: {low: 70, high: 100}
    random: {low: 70, high: 140}
  PCT:
    unit: "ng/mL"
    all: {low: 0, high: 0.05}
  ABG_pH:
    unit: ""
    all: {low: 7.35, high: 7.45}
  ABG_pCO2:
    unit: "mmHg"
    all: {low: 35, high: 45}
  ABG_pO2:
    unit: "mmHg"
    all: {low: 80, high: 100}
  ABG_HCO3:
    unit: "mEq/L"
    all: {low: 22, high: 26}
  BNP:
    unit: "pg/mL"
    all: {low: 0, high: 100}
    age_over_75: {low: 0, high: 200}

# ============================================================
# TARGET LENGTH OF STAY (country-specific)
# Source: MHLW DPC data (JP), HCUP NIS (US), GOLD 2023
# ============================================================
target_los:
  japan:
    mild: {mean: 8, sd: 2, min: 5, max: 12}
    moderate: {mean: 12, sd: 3, min: 8, max: 18}
    severe: {mean: 18, sd: 5, min: 12, max: 30}
  us:
    mild: {mean: 3, sd: 1, min: 2, max: 5}
    moderate: {mean: 5, sd: 2, min: 3, max: 8}
    severe: {mean: 8, sd: 3, min: 5, max: 14}

# ============================================================
# OUTCOME BENCHMARKS
# For validating generated data against reality
# Source: MHLW DPC data, ATS/ERS, Lindenauer et al., GOLD 2023
# ============================================================
outcome_benchmarks:
  japan:
    median_los: 12
    los_iqr: [8, 16]
    in_hospital_mortality: 0.05
    icu_transfer_rate: 0.08
    thirty_day_readmission: 0.18
    niv_use_rate: 0.15
    intubation_rate: 0.05
    antibiotic_use_rate: 0.65    # not all exacerbations need antibiotics
    mean_age_admitted: 74
    male_ratio: 0.70             # COPD still male-predominant in Japan

  us:
    median_los: 5
    los_iqr: [3, 7]
    in_hospital_mortality: 0.03
    icu_transfer_rate: 0.10
    thirty_day_readmission: 0.20   # COPD is a CMS readmission penalty condition
    niv_use_rate: 0.18
    intubation_rate: 0.06
    antibiotic_use_rate: 0.70
    mean_age_admitted: 68
    male_ratio: 0.48              # near-equal in US (female smoking rates caught up)

# ============================================================
# CLINICAL COURSE ARCHETYPES (daily state variable changes)
# Each archetype defines day-by-day deltas for physiological state variables.
# Disease authors specify these trajectories — the engine interpolates between days.
# Patient profile (immune_reactivity, treatment_sensitivity) modulates amplitude.
# ============================================================
course_archetypes:
  smooth_recovery:
    probability: 0.50
    description: "Steady improvement from Day 1-2 with bronchodilators and steroids"
    trajectory:
      inflammation_level: {0: 0.03, 1: -0.03, 2: -0.05, 3: -0.06, 5: -0.05, 7: -0.04, 10: -0.03, 14: -0.01}
      ph_status: {0: -0.02, 1: 0.03, 2: 0.04, 3: 0.03, 5: 0.02, 7: 0.01, 10: 0.01, 14: 0.00}
      volume_status: {0: 0.02, 1: 0.02, 2: 0.02, 3: 0.01, 5: 0.01, 7: 0.00, 10: 0.00, 14: 0.00}
      perfusion_status: {0: 0.00, 1: 0.01, 2: 0.01, 3: 0.01, 5: 0.00, 7: 0.00, 10: 0.00, 14: 0.00}
    order_modifications: {}
    treatment_modifications: {}

  dip_then_recovery:
    probability: 0.15
    description: "Initial worsening Day 1-2 (e.g., infectious trigger), then improvement with antibiotics"
    trajectory:
      inflammation_level: {0: 0.08, 1: 0.05, 2: 0.02, 3: -0.03, 5: -0.06, 7: -0.08, 10: -0.05, 14: -0.03}
      ph_status: {0: -0.05, 1: -0.03, 2: 0.01, 3: 0.03, 5: 0.03, 7: 0.02, 10: 0.01, 14: 0.00}
      volume_status: {0: -0.03, 1: -0.02, 2: 0.01, 3: 0.02, 5: 0.01, 7: 0.01, 10: 0.00, 14: 0.00}
      perfusion_status: {0: -0.02, 1: -0.01, 2: 0.00, 3: 0.01, 5: 0.01, 7: 0.00, 10: 0.00, 14: 0.00}
    order_modifications:
      day_2:
        add_labs: ["ABG", "Sputum_culture", "Blood_culture"]
        add_imaging: ["Chest_Xray_portable"]
    treatment_modifications:
      day_2:
        start:
          japan: [{drug: "Ceftriaxone", dose: "1g IV daily"}]
          us: [{drug: "Ceftriaxone", dose: "1g IV daily"}]

  plateau:
    probability: 0.15
    description: "Minimal change for 3-5 days despite treatment, then gradual improvement"
    trajectory:
      inflammation_level: {0: 0.02, 1: 0.01, 2: 0.00, 3: 0.00, 5: -0.01, 7: -0.05, 10: -0.06, 14: -0.04}
      ph_status: {0: -0.01, 1: 0.01, 2: 0.01, 3: 0.00, 5: 0.00, 7: 0.02, 10: 0.02, 14: 0.01}
      volume_status: {0: 0.01, 1: 0.01, 2: 0.00, 3: 0.00, 5: 0.00, 7: 0.01, 10: 0.01, 14: 0.00}
    order_modifications:
      day_5:
        add_labs: ["ABG", "PCT", "Sputum_culture"]
        add_imaging: ["Chest_CT"]
    treatment_modifications:
      day_5:
        note: "consider extending steroid course or adding antibiotic if not already on one"

  treatment_resistant:
    probability: 0.10
    description: "Poor response to bronchodilators/steroids; may need NIV and antibiotic escalation"
    trajectory:
      inflammation_level: {0: 0.08, 1: 0.05, 2: 0.03, 3: 0.02, 5: -0.01, 7: -0.04, 10: -0.08, 14: -0.06}
      ph_status: {0: -0.05, 1: -0.03, 2: -0.02, 3: 0.00, 5: 0.02, 7: 0.03, 10: 0.03, 14: 0.02}
      volume_status: {0: -0.03, 1: -0.02, 2: -0.01, 3: 0.00, 5: 0.01, 7: 0.01, 10: 0.01, 14: 0.00}
      renal_function: {0: -0.02, 1: -0.01, 2: 0.00, 3: 0.00, 5: 0.01, 7: 0.01, 10: 0.01, 14: 0.01}
    order_modifications:
      day_3:
        add_labs: ["ABG", "Sputum_culture_repeat", "PCT", "Blood_culture"]
        add_imaging: ["Chest_CT_with_contrast"]
        add_consult: ["pulmonology"]
    treatment_modifications:
      day_2:
        start:
          japan: [{drug: "NIV_BiPAP", dose: "IPAP 12 / EPAP 5 cmH2O"}]
          us: [{drug: "NIV_BiPAP", dose: "IPAP 12 / EPAP 5 cmH2O"}]
      day_3:
        start:
          japan: [{drug: "Meropenem", dose: "1g IV q8h"}]
          us: [{drug: "Piperacillin/Tazobactam", dose: "4.5g IV q6h"}]
    triggers:
      - day: 3
        condition: "ph_status < 7.30 or inflammation_level > 0.5"
        actions: ["escalate_antibiotic", "order_ct", "consult_pulmonology"]

  gradual_deterioration:
    probability: 0.07
    description: "Slow worsening despite treatment -> ICU transfer, NIV or intubation"
    trajectory:
      inflammation_level: {0: 0.08, 1: 0.06, 2: 0.05, 3: 0.04, 5: 0.03, 7: 0.02, 10: 0.00, 14: -0.02}
      ph_status: {0: -0.06, 1: -0.04, 2: -0.03, 3: -0.02, 5: -0.01, 7: 0.01, 10: 0.02, 14: 0.02}
      perfusion_status: {0: -0.03, 1: -0.03, 2: -0.02, 3: -0.02, 5: -0.01, 7: 0.00, 10: 0.01, 14: 0.01}
      renal_function: {0: -0.02, 1: -0.02, 2: -0.02, 3: -0.01, 5: -0.01, 7: 0.00, 10: 0.01, 14: 0.01}
    order_modifications:
      day_3:
        add_labs: ["ABG", "Lactate", "Blood_culture"]
      day_5:
        add_labs: ["ABG", "Lactate"]
        add_imaging: ["Chest_CT"]
    treatment_modifications:
      day_2:
        start:
          japan: [{drug: "NIV_BiPAP", dose: "IPAP 14 / EPAP 6 cmH2O"}]
          us: [{drug: "NIV_BiPAP", dose: "IPAP 14 / EPAP 6 cmH2O"}]
      day_5:
        start:
          japan: [{drug: "Meropenem", dose: "1g IV q8h"}]
        action: "icu_transfer"
        action_2: "evaluate_intubation"
    triggers:
      - day: 5
        condition: "ph_status < 7.25 or perfusion_status < 0.4"
        actions: ["icu_transfer", "intubation_evaluation"]

  sudden_deterioration:
    probability: 0.03
    description: "Sudden critical worsening (pneumothorax, PE, acute respiratory failure) on Day 1-2"
    trajectory:
      inflammation_level: {0: 0.05, 1: -0.01, 2: 0.20, 3: 0.08, 5: -0.03, 7: -0.06, 10: -0.05, 14: -0.03}
      ph_status: {0: -0.03, 1: 0.01, 2: -0.20, 3: -0.05, 5: 0.05, 7: 0.05, 10: 0.03, 14: 0.01}
      perfusion_status: {0: 0.00, 1: 0.00, 2: -0.25, 3: -0.05, 5: 0.05, 7: 0.04, 10: 0.02, 14: 0.01}
      renal_function: {0: 0.00, 1: 0.00, 2: -0.10, 3: -0.03, 5: 0.02, 7: 0.02, 10: 0.01, 14: 0.01}
    order_modifications:
      day_2:
        add_labs: ["ABG", "Lactate", "D_dimer", "Troponin", "Blood_culture_x2"]
        add_imaging: ["CT_angiography", "Chest_Xray_portable"]
    treatment_modifications:
      day_2:
        start:
          japan:
            - {drug: "Intubation_and_mechanical_ventilation", dose: "TV 6mL/kg, PEEP 5"}
            - {drug: "Meropenem", dose: "1g IV q8h"}
          us:
            - {drug: "Intubation_and_mechanical_ventilation", dose: "TV 6mL/kg, PEEP 5"}
            - {drug: "Piperacillin/Tazobactam", dose: "4.5g IV q6h"}
        action: "icu_transfer"
        action_2: "intubation"
    triggers:
      - day: 2
        condition: "ph_status < 7.20 or perfusion_status < 0.4"
        actions: ["icu_transfer", "intubation", "start_vasopressor_if_hypotensive"]

# Archetype selection modifiers (patient profile dependent)
archetype_modifiers:
  - condition: "FEV1_below_30"
    effect: {treatment_resistant: 0.08, gradual_deterioration: 0.05, smooth_recovery: -0.13}
  - condition: "age >= 80"
    effect: {gradual_deterioration: 0.05, sudden_deterioration: 0.02, smooth_recovery: -0.07}
  - condition: "treatment_sensitivity > 1.2"
    effect: {smooth_recovery: 0.10, treatment_resistant: -0.05, gradual_deterioration: -0.05}
  - condition: "prior_icu_admission"
    effect: {gradual_deterioration: 0.05, treatment_resistant: 0.05, smooth_recovery: -0.10}
  - condition: "home_oxygen_use"
    effect: {treatment_resistant: 0.05, smooth_recovery: -0.05}

# ============================================================
# COMPLICATIONS (secondary events during hospitalization)
# Each complication has: trigger conditions, timing, probability,
# physiological impact, and detection/treatment actions.
# Complications can themselves trigger further complications (cascade).
# ============================================================
complications:
  - name: "pneumothorax"
    description: "Spontaneous pneumothorax from bullous emphysema"
    probability_per_day: 0.005
    onset_day_range: [0, 10]
    risk_factors:
      - {condition: "severity_severe", multiplier: 3.0}
      - {condition: "mechanical_ventilation", multiplier: 5.0}
      - {condition: "emphysema_predominant", multiplier: 2.0}
    state_impact:
      perfusion_status: -0.20
      ph_status: -0.10
    detection:
      test: "chest_xray"
      finding: "pneumothorax"
    actions: ["chest_tube_insertion", "icu_transfer"]

  - name: "respiratory_failure_requiring_niv"
    description: "Acute hypercapnic respiratory failure requiring non-invasive ventilation"
    probability_per_day: 0.015
    onset_day_range: [0, 5]
    risk_factors:
      - {condition: "severity_severe", multiplier: 2.0}
      - {condition: "hypercapnia_baseline", multiplier: 2.5}
      - {condition: "age_over_75", multiplier: 1.5}
    state_impact:
      ph_status: -0.10
      perfusion_status: -0.05
    detection:
      test: "ABG"
      finding: "pH < 7.30 and pCO2 > 55"
    actions: ["initiate_NIV_BiPAP", "continuous_monitoring", "ABG_q2h"]
    cascade: ["intubation_required"]

  - name: "intubation_required"
    description: "NIV failure requiring intubation and mechanical ventilation"
    probability_given_parent: 0.20    # 20% of NIV patients fail and require intubation
    parent_complication: "respiratory_failure_requiring_niv"
    onset_days_after_parent: [0, 3]
    state_impact:
      ph_status: -0.05
      inflammation_level: 0.10      # ventilator-associated inflammation
      perfusion_status: -0.10
    actions: ["intubation", "icu_transfer", "sedation_protocol"]

  - name: "cardiac_arrhythmia"
    description: "Atrial fibrillation or flutter from hypoxia, acidosis, and beta-agonist use"
    probability_per_day: 0.008
    onset_day_range: [0, 7]
    risk_factors:
      - {condition: "age_over_75", multiplier: 2.0}
      - {condition: "heart_failure", multiplier: 2.5}
      - {condition: "hypoxemia_severe", multiplier: 2.0}
      - {condition: "hypokalemia", multiplier: 1.8}
    state_impact:
      perfusion_status: -0.10
    detection:
      test: "ecg_or_telemetry"
      finding: "atrial_fibrillation_or_flutter"
    actions: ["rate_control_with_diltiazem_or_amiodarone", "correct_electrolytes", "ecg_monitoring"]

  - name: "pulmonary_embolism"
    description: "PE — COPD patients have elevated VTE risk"
    probability_per_day: 0.004
    onset_day_range: [2, 14]
    risk_factors:
      - {condition: "immobility_days > 3", multiplier: 2.0}
      - {condition: "no_dvt_prophylaxis", multiplier: 3.0}
      - {condition: "polycythemia", multiplier: 1.5}
    state_impact:
      perfusion_status: -0.20
      ph_status: -0.05
      inflammation_level: 0.05
    detection:
      test: "ct_angiography"
      finding: "pulmonary_embolism_confirmed"
    actions: ["anticoagulation", "consider_icu", "echocardiography"]

  - name: "acute_kidney_injury"
    description: "Pre-renal AKI from dehydration and poor intake"
    probability_per_day: 0.008
    onset_day_range: [1, 7]
    risk_factors:
      - {condition: "renal_function < 0.5", multiplier: 3.0}
      - {condition: "volume_status < -0.3", multiplier: 2.0}
      - {condition: "age_over_75", multiplier: 1.5}
    state_impact:
      renal_function: -0.15
      ph_status: -0.05
    detection:
      test: "creatinine"
      finding: "rise_above_0.3_from_baseline"
    actions: ["iv_fluid_bolus", "hold_nephrotoxic_drugs", "monitor_urine_output"]

  - name: "delirium"
    description: "Acute confusion from hypoxia, hypercapnia, steroids, and age"
    probability_per_day: 0.012
    onset_day_range: [1, 7]
    risk_factors:
      - {condition: "age_over_75", multiplier: 2.5}
      - {condition: "dementia", multiplier: 3.0}
      - {condition: "hypercapnia", multiplier: 2.0}
      - {condition: "steroid_use", multiplier: 1.5}
    state_impact: {}
    detection:
      test: "CAM_screening"
      finding: "positive"
    actions: ["reorientation", "sleep_hygiene", "avoid_benzodiazepines", "consider_haloperidol"]

  - name: "steroid_hyperglycemia"
    description: "Significant hyperglycemia from systemic corticosteroids"
    probability_per_day: 0.020
    onset_day_range: [1, 5]
    risk_factors:
      - {condition: "diabetes", multiplier: 3.0}
      - {condition: "age_over_65", multiplier: 1.3}
    state_impact: {}     # hyperglycemia managed separately from core physiological state
    detection:
      test: "glucose"
      finding: "above_200_mg_dL"
    actions: ["sliding_scale_insulin", "endocrine_consult_if_severe", "monitor_glucose_q6h"]

# ============================================================
# FORCED GENERATION (for testing / specific scenario creation)
