# Crush Injury of Hand (Industrial / Occupational)
# Severe hand/finger crush injury from press machines, conveyors, etc.
# Sources: Japan Occupational Injury Statistics, OSHA reports
disease_id: crush_injury_hand
chief_complaint:
  en: "Industrial hand crush injury with possible amputation"
  ja: "手部挫滅創（労災、指切断の可能性）"
department: orthopedics
encounter_type: surgical
requires_surgery: true
minimum_severity: moderate
readmission_eligible: false

icd_codes:
  primary: "S67.2"
  variants:
    - {code: "S67.2", name: "Crushing injury of hand", probability: 0.60}
    - {code: "S68.1", name: "Traumatic amputation of finger", probability: 0.25}
    - {code: "S67.8", name: "Crushing injury of other parts of wrist and hand", probability: 0.15}

incidence:
  japan:
    "0-44": {M: 50, F: 10}
    "45-64": {M: 40, F: 8}
    "65+":   {M: 5, F: 1}
  risk_multipliers: []
  trigger_type: "trauma"
  time_of_day_pattern: "day_peak"

severity:
  distribution:
    mild: 0.0
    moderate: 0.60
    severe: 0.40

initial_state_impact:
  moderate:
    inflammation_level: 0.25
    anemia_level: 0.10
    volume_status: -0.05
    perfusion_status: -0.05
    anion_gap_status: 0.3     # AG axis: rhabdomyolysis (SO4/PO4 from muscle)
  severe:
    inflammation_level: 0.45
    anemia_level: 0.25
    volume_status: -0.15
    perfusion_status: -0.10
    anion_gap_status: 0.4     # AG axis: severe rhabdo + AKI (AG 15-20)

presenting_symptoms:
  - {name: "pain", probability: 1.0, severity_range: [0.8, 1.0]}
  - {name: "hand_deformity", probability: 1.0, severity_range: [0.7, 1.0]}
  - {name: "bleeding", probability: 0.80, severity_range: [0.3, 0.8]}
  - {name: "finger_amputation", probability: 0.25, severity_range: [0.9, 1.0]}

# ============================================================
# COURSE ARCHETYPES (FP-ARCH-2/3)
# Localized occupational hand-crush injury; zero mortality. Post-debridement /
# reconstruction course: inflammation_level (wound) and perfusion_status (local
# tissue) recover, anemia_level resolves post-op. Wound infection / dehiscence =
# treatment_resistant; compartment syndrome = sudden_deterioration. Recovery-heavy
# (localized, non-life-threatening). Canonical names.
# ============================================================
course_archetypes:
  smooth_recovery:
    probability: 0.50
    description: "Uneventful post-debridement healing; wound and perfusion recover"
    trajectory:
      inflammation_level: {0: 0.00, 1: -0.04, 2: -0.06, 3: -0.07, 5: -0.07, 7: -0.05, 10: -0.03, 14: -0.02}
      perfusion_status:   {0: 0.00, 1: 0.02, 2: 0.04, 3: 0.05, 5: 0.04, 7: 0.03, 10: 0.02, 14: 0.01}
      anemia_level:       {0: 0.02, 2: -0.02, 5: -0.03, 7: -0.03, 10: -0.02, 14: -0.01}
    order_modifications: {}
    treatment_modifications: {}

  dip_then_recovery:
    probability: 0.20
    description: "Post-op wound edema peaks Day 1-2, then healing resumes"
    trajectory:
      inflammation_level: {0: 0.05, 1: 0.05, 2: 0.02, 3: -0.03, 5: -0.06, 7: -0.06, 10: -0.04, 14: -0.02}
      perfusion_status:   {0: -0.03, 1: -0.03, 2: 0.00, 3: 0.03, 5: 0.04, 7: 0.04, 10: 0.02, 14: 0.01}
    order_modifications:
      day_2:
        add_labs: ["CRP", "WBC"]

  plateau_then_recovery:
    probability: 0.13
    description: "Slow wound healing; inflammation plateaus 3-4 days then resolves"
    trajectory:
      inflammation_level: {0: 0.02, 1: 0.01, 2: 0.00, 3: -0.02, 5: -0.05, 7: -0.06, 10: -0.04, 14: -0.02}
      perfusion_status:   {0: 0.00, 1: 0.00, 3: 0.01, 5: 0.03, 7: 0.03, 10: 0.02, 14: 0.01}

  treatment_resistant:
    probability: 0.10
    description: "Wound infection / dehiscence; healing slow after debridement escalation"
    trajectory:
      inflammation_level: {0: 0.03, 1: 0.03, 3: 0.02, 5: 0.00, 7: -0.03, 10: -0.04, 14: -0.03}
      perfusion_status:   {0: -0.02, 1: -0.02, 3: -0.01, 5: 0.01, 7: 0.02, 10: 0.02, 14: 0.02}
    order_modifications:
      day_3:
        add_labs: ["CRP", "WBC"]
        add_consult: ["orthopedics"]

  gradual_deterioration:
    probability: 0.05
    description: "Progressive wound infection with worsening local inflammation"
    trajectory:
      inflammation_level: {0: 0.04, 1: 0.04, 2: 0.03, 3: 0.03, 5: 0.02, 7: 0.02}
      perfusion_status:   {0: -0.02, 1: -0.02, 2: -0.02, 3: -0.02, 5: -0.01, 7: -0.01}

  sudden_deterioration:
    probability: 0.02
    description: "Compartment syndrome / acute ischemia with abrupt Day 1-2 perfusion loss"
    trajectory:
      perfusion_status:   {0: 0.00, 1: -0.10, 2: -0.20, 3: -0.06, 5: 0.03, 7: 0.04}
      inflammation_level: {0: 0.00, 1: 0.08, 2: 0.15, 3: 0.06, 5: -0.04, 7: -0.05}

# ============================================================
# COMPLICATIONS — SSI / wound dehiscence / compartment syndrome
# risk_factor conditions restricted to those _evaluate_risk_condition supports.
# ============================================================
complications:
  - name: "surgical_site_infection"
    description: "Wound infection at the crush / reconstruction site"
    probability_per_day: 0.02
    onset_day_range: [2, 10]
    risk_factors:
      - {condition: "severity_severe", multiplier: 2.5}
    state_impact:
      inflammation_level: 0.06
    detection:
      test: "CRP"
      finding: "wound_infection"
    actions: ["order_wound_culture", "start_antibiotics"]

  - name: "wound_dehiscence"
    description: "Wound breakdown requiring reoperation / repeat closure"
    probability_per_day: 0.008
    onset_day_range: [3, 14]
    risk_factors:
      - {condition: "severity_severe", multiplier: 2.0}
    state_impact:
      inflammation_level: 0.04
      perfusion_status: -0.03
    detection:
      test: "wound_inspection"
      finding: "dehiscence"
    actions: ["orthopedics_consult", "reoperation"]

  - name: "compartment_syndrome"
    description: "Elevated compartment pressure with tissue ischemia"
    probability_per_day: 0.006
    onset_day_range: [0, 3]
    risk_factors:
      - {condition: "severity_severe", multiplier: 4.0}
      - {condition: "perfusion_status < 0.3", multiplier: 3.0}
    state_impact:
      perfusion_status: -0.20
      inflammation_level: 0.05
    detection:
      test: "compartment_pressure"
      finding: "elevated_pressure"
    actions: ["icu_transfer", "emergent_fasciotomy"]

order_protocols:
  admission_orders:
    labs:
      - {test: "CRP", urgency: "stat"}
      - {test: "WBC", urgency: "stat"}
      - {test: "Hb", urgency: "stat"}
      - {test: "PT_INR", urgency: "stat"}
      - {test: "Creatinine", urgency: "stat"}
      - {test: "Blood_Type_Crossmatch", urgency: "stat"}
    imaging:
      - {test: "Hand_Xray", urgency: "stat"}
      - {test: "Hand_CT", urgency: "stat", note: "if suspected complex fracture"}
    supportive:
      - {type: "IV_fluid", detail: "NS 80-125 mL/h"}
      - {type: "pain_management", detail: "Fentanyl 25-50mcg IV PRN, transition to oral"}
      - {type: "tetanus_prophylaxis", detail: "Td booster if > 5 years"}
  daily_monitoring:
    labs:
      - {test: "CRP", frequency: "daily"}
      - {test: "WBC", frequency: "daily"}
    vitals:
      stable: "q6h"
  discharge_criteria:
    japan:
      - "Surgical wound healing without infection"
      - "Pain controlled with oral analgesics"
      - "Hand therapy plan established"
    us:
      - "Wound healing appropriately"
      - "Pain controlled on oral medications"
      - "Outpatient hand therapy scheduled"

drugs:
  first_line:
    japan:
      - {drug: "Cefazolin", dose: "1g IV q8h", note: "surgical prophylaxis"}
      - {drug: "Fentanyl", dose: "25-50mcg IV PRN", route: "IV"}
      - {drug: "Acetaminophen", dose: "1000mg IV q6h", route: "IV"}
    us:
      - {drug: "Cefazolin", dose: "2g IV q8h", note: "surgical prophylaxis"}
      - {drug: "Fentanyl", dose: "25-100mcg IV PRN", route: "IV"}
      - {drug: "Acetaminophen", dose: "1000mg IV q6h", route: "IV"}
  post_op:
    japan:
      - {drug: "Acetaminophen", dose: "1000mg PO q6h"}
      - {drug: "Loxoprofen", dose: "60mg PO tid"}
      - {drug: "Cephalexin", dose: "500mg PO qid x7d"}
    us:
      - {drug: "Oxycodone", dose: "5mg PO q4-6h PRN"}
      - {drug: "Acetaminophen", dose: "1000mg PO q6h"}
      - {drug: "Cephalexin", dose: "500mg PO qid x7d"}

procedure:
  type: "complex hand surgery / replantation"
  procedure_code_jp: "K089"
  procedure_code_us: "20838"
  typical_duration_minutes: {mean: 150, sd: 60, min: 60, max: 360}
  anesthesia: "general"
  estimated_blood_loss_ml: {mean: 150, sd: 100, min: 30, max: 500}
  approach:
    "complex hand surgery / replantation": "debridement, fixation, tendon/nerve repair; replantation if amputation"

target_los:
  japan:
    moderate: {mean: 10, sd: 4, min: 5, max: 14}
    severe: {mean: 21, sd: 7, min: 14, max: 30}
  us:
    moderate: {mean: 3, sd: 2, min: 1, max: 7}
    severe: {mean: 7, sd: 3, min: 5, max: 14}

outcome_benchmarks:
  japan:
    median_los: 14
    in_hospital_mortality: 0.00
    thirty_day_readmission: 0.08
    surgical_site_infection_rate: 0.10
    mean_age_admitted: 42
    female_ratio: 0.15
  us:
    median_los: 5
    in_hospital_mortality: 0.00
    thirty_day_readmission: 0.10
    surgical_site_infection_rate: 0.08
    mean_age_admitted: 38
    female_ratio: 0.15

# ============================================================
# NARRATIVE SPEC (Tier 1 #3 α-min-1)
# Consumed by TemplateNarrativeGenerator (Task 6)
# ============================================================
narrative:
  hpi_template:
    onset_pattern:
      mild: "症状は数日前より緩徐に出現。"
      moderate: "症状は数日前より出現し漸次増悪。"
      severe: "症状急速に増悪、本日受診。"
    trigger_options:
      - "急性発症"
  physical_exam_findings:
    smooth_recovery:
      day_0:
        general:
          all: "意識清明、苦痛様"
        cardiovascular:
          all: "整、心雑音なし"
        respiratory:
          all: "肺音清明"
        abdominal: "平坦、軟、圧痛なし"
        neurological: "麻痺なし、項部硬直なし"
  discharge_instructions:
    follow_up:
      en: "Follow up with PCP in 7-10 days."
      ja: "退院後 1-2 週間以内に外来受診をお願いします。"
    activity:
      en: "Gradual return to normal activity."
      ja: "徐々に通常活動を再開してください。"
    medications:
      en: "Complete prescribed medications as directed."
      ja: "処方された薬を指示通り内服してください。"
    emergency:
      en: "Return to ER if symptoms worsen."
      ja: "症状悪化があれば速やかに救急受診してください。"
    diet_lifestyle:
      en: "Maintain balanced diet and adequate hydration."
      ja: "バランスの良い食事と十分な水分摂取を心がけてください。"
