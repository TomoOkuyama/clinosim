      unit: "/uL"
      median: 8500
      iqr: [6500, 11000]
      range: [4000, 16000]
    Hb:
      unit: "g/dL"
      median: 13.0
      iqr: [11.5, 14.5]
      range: [8.0, 17.0]
    Plt:
      unit: "x10^3/uL"
      median: 250
      iqr: [200, 320]
      range: [100, 500]
    PT_INR:
      unit: ""
      median: 1.0
      iqr: [0.9, 1.1]
      range: [0.8, 1.3]
    aPTT:
      unit: "sec"
      median: 30
