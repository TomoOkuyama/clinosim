      iqr: [1.0, 4.0]
      note: "declining but may remain elevated for weeks"

# ============================================================
# VITAL SIGN DISTRIBUTIONS
# ============================================================
expected_vital_distributions:
  admission:
    temperature:
      unit: "C"
      mean: 37.0
      sd: 0.4
      range: [36.2, 38.0]
      note: "low-grade fever possible"
    heart_rate:
      unit: "bpm"
      mean: 82
      sd: 12
      range: [60, 110]
    systolic_bp:
      unit: "mmHg"
      mean: 130
      sd: 18
      range: [90, 175]
    respiratory_rate:
      unit: "/min"
      mean: 16
      sd: 2
      range: [12, 22]
    spo2:
      unit: "%"
      mean: 98
      sd: 1
      range: [93, 99]

# ============================================================
# TREATMENT — Drug selection data
# Source: ACCP VTE Guidelines 2021, CHEST guidelines,
#         JP 肺血栓塞栓症/深部静脈血栓症ガイドライン 2017
# ============================================================
drugs:
  first_line:
    japan:
      - drug: "Unfractionated Heparin"
        code_yj: "3334400"
        dose: "80 U/kg IV bolus, then 18 U/kg/h infusion"
        route: IV
        note: "Target aPTT 1.5-2.5x control"
        renal_adjustment: {}
        pregnancy_safe: true
      - drug: "Edoxaban"
        code_yj: "3339006"
        dose: "60mg PO daily (after 5+ days heparin)"
        route: PO
        note: "Start after initial heparin phase"
        renal_adjustment:
          eGFR_15_50: "30mg PO daily"
          eGFR_below_15: "avoid"
        pregnancy_safe: false
    us:
      - drug: "Rivaroxaban"
        code_rxnorm: "1114195"
        dose: "15mg PO BID x21 days, then 20mg PO daily"
        route: PO
        note: "Direct oral route — no heparin bridge needed for most patients"
        renal_adjustment:
          eGFR_below_30: "avoid"
        pregnancy_safe: false
      - drug: "Unfractionated Heparin"
        code_rxnorm: "5224"
        dose: "80 U/kg IV bolus, then 18 U/kg/h"
        route: IV
        note: "For patients requiring bridging (cancer, renal failure)"
        pregnancy_safe: true

  alternative_doac_contraindicated:
    japan:
      - drug: "Warfarin"
        code_yj: "3332001"
        dose: "Initial 2-5mg PO daily, target INR 1.5-2.5 (JP) or 2.0-3.0"
        route: PO
        note: "Overlap with heparin until INR therapeutic for 24h"
        pregnancy_safe: false
    us:
      - drug: "Warfarin"
        code_rxnorm: "11289"
        dose: "Initial 5mg PO daily, target INR 2.0-3.0"
        route: PO
        note: "Overlap with heparin for minimum 5 days and INR >= 2.0 for 24h"
        pregnancy_safe: false

  cancer_associated_vte:
    japan:
      - drug: "Edoxaban"
        code_yj: "3339006"
        dose: "60mg PO daily"
        route: PO
        note: "DOAC preferred over LMWH in most cancer-associated VTE (Hokusai-VTE Cancer)"
    us:
      - drug: "Rivaroxaban"
        code_rxnorm: "1114195"
        dose: "15mg PO BID x21d then 20mg daily"
        route: PO
        note: "Alternative: apixaban or LMWH per ASCO guidelines"
      - drug: "Enoxaparin"
        code_rxnorm: "67108"
        dose: "1mg/kg SC BID"
        route: SC
        note: "Preferred if GI cancer with mucosal involvement"

  escalation:  # for iliofemoral DVT or phlegmasia
    japan:
      - drug: "Catheter-directed thrombolysis"
        code_yj: "N/A"
        dose: "Urokinase 60,000-240,000 IU via catheter"
        route: catheter
        indication: "iliofemoral_dvt_acute_phlegmasia"
    us:
      - drug: "Catheter-directed thrombolysis"
        code_rxnorm: "N/A"
        dose: "Alteplase 0.5-1mg/h via catheter x12-24h"
        route: catheter
        indication: "iliofemoral_dvt_phlegmasia"

  alternative_penicillin_allergy:
    japan: []
    us: []

  discharge_oral:
    japan:
      - drug: "Edoxaban"
        code_yj: "3339006"
        dose: "60mg PO daily"
        duration_days: 90
        note: "Minimum 3 months; extend if unprovoked or ongoing risk"
    us:
      - drug: "Rivaroxaban"
        code_rxnorm: "1114195"
        dose: "20mg PO daily with food"
        duration_days: 90
        note: "Minimum 3 months; consider extended for unprovoked DVT"

# ============================================================
# DRUG INTERACTIONS
# ============================================================
drug_interactions:
  - drug_a: "Warfarin"
    drug_b: "NSAID"
    severity: "major"
    effect: "Increased bleeding risk"
    action: "Avoid combination"

  - drug_a: "Rivaroxaban"
    drug_b: "Ketoconazole"
    severity: "contraindicated"
    effect: "Strong CYP3A4 and P-gp inhibition dramatically increases rivaroxaban levels"
    action: "Do not use together"

  - drug_a: "Rivaroxaban"
    drug_b: "Rifampin"
    severity: "major"
    effect: "Strong CYP3A4 induction reduces rivaroxaban levels"
    action: "Avoid combination; consider alternative anticoagulant"

  - drug_a: "Edoxaban"
    drug_b: "Dronedarone"
    severity: "major"
    effect: "Increased edoxaban levels via P-gp inhibition"
    action: "Reduce edoxaban dose to 30mg"

  - drug_a: "Heparin"
    drug_b: "NSAID"
    severity: "major"
    effect: "Increased bleeding risk"
    action: "Avoid combination or monitor closely"

