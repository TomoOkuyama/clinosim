# ============================================================
# DIAGNOSTIC
# ============================================================
diagnostic:
  diagnostic_difficulty: 0.3  # D-dimer + ultrasound; clinical pretest probability assessment needed
  differential:
    - {disease: "deep_vein_thrombosis", icd: "I82.40", name: "Deep vein thrombosis", prior: 0.40}
    - {disease: "cellulitis", icd: "L03.11", name: "Cellulitis of lower limb", prior: 0.15}
    - {disease: "baker_cyst_rupture", icd: "M71.2", name: "Baker cyst (ruptured)", prior: 0.10}
    - {disease: "muscle_strain", icd: "S86.9", name: "Calf muscle strain / tear", prior: 0.10}
    - {disease: "lymphedema", icd: "I89.0", name: "Lymphedema", prior: 0.05}
    - {disease: "heart_failure", icd: "I50.9", name: "Heart failure (bilateral edema)", prior: 0.08}
    - {disease: "superficial_thrombophlebitis", icd: "I80.0", name: "Superficial thrombophlebitis", prior: 0.07}
    - {disease: "other", icd: "M79.6", name: "Other limb pain", prior: 0.05}

# ============================================================
# CLINICAL COURSE ARCHETYPES
# ============================================================
course_archetypes:
  smooth_recovery:
    probability: 0.55
    description: "Anticoagulation therapeutic quickly, symptoms improve, transition to oral therapy"
    trajectory:
      inflammation_level: {0: 0.03, 1: -0.02, 2: -0.03, 3: -0.03, 5: -0.02, 7: -0.01}
      coagulation_status: {0: -0.02, 1: -0.03, 2: -0.02, 3: -0.01, 5: -0.01, 7: -0.01}
      volume_status: {0: 0.01, 1: 0.01, 2: 0.01, 3: 0.00, 5: 0.00, 7: 0.00}
    order_modifications: {}
    treatment_modifications: {}

  dip_then_recovery:
    probability: 0.18
    description: "Initial worsening of swelling Day 1-2 before anticoagulation takes effect"
    trajectory:
      inflammation_level: {0: 0.05, 1: 0.02, 2: -0.02, 3: -0.03, 5: -0.03, 7: -0.02, 10: -0.01}
      coagulation_status: {0: 0.02, 1: 0.00, 2: -0.02, 3: -0.03, 5: -0.02, 7: -0.01, 10: -0.01}
      volume_status: {0: -0.02, 1: 0.00, 2: 0.01, 3: 0.01, 5: 0.00, 7: 0.00, 10: 0.00}
    order_modifications:
      day_2:
        add_labs: ["D_dimer", "Repeat_compression_ultrasound"]
    treatment_modifications: {}

  plateau_then_recovery:
    probability: 0.10
    description: "Slow improvement over 5-7 days; persistent edema"
    trajectory:
      inflammation_level: {0: 0.03, 1: 0.01, 2: 0.00, 3: 0.00, 5: -0.02, 7: -0.03, 10: -0.02}
      coagulation_status: {0: 0.01, 1: 0.00, 2: 0.00, 3: -0.01, 5: -0.02, 7: -0.02, 10: -0.01}
    order_modifications:
      day_5:
        add_imaging: ["Repeat_compression_ultrasound"]
    treatment_modifications: {}

  treatment_resistant:
    probability: 0.08
    description: "Thrombus propagation despite standard anticoagulation, requires dose adjustment or intervention"
    trajectory:
      inflammation_level: {0: 0.06, 1: 0.03, 2: 0.02, 3: 0.00, 5: -0.02, 7: -0.04, 10: -0.04, 14: -0.02}
      coagulation_status: {0: 0.03, 1: 0.02, 2: 0.01, 3: -0.01, 5: -0.02, 7: -0.03, 10: -0.02, 14: -0.01}
    order_modifications:
      day_3:
        add_imaging: ["Repeat_compression_ultrasound"]
        add_labs: ["Anti_Xa_level", "HIT_antibody"]
    treatment_modifications:
      day_3:
        action: "increase_anticoagulation_or_switch"
    triggers:
      - day: 3
        condition: "worsening_swelling_despite_therapeutic_anticoagulation"
        actions: ["repeat_ultrasound", "consider_catheter_thrombolysis"]

  gradual_deterioration:
    probability: 0.06
    description: "Development of PE or post-thrombotic syndrome features"
    trajectory:
      inflammation_level: {0: 0.05, 1: 0.03, 2: 0.02, 3: 0.02, 5: 0.01, 7: -0.01, 10: -0.02, 14: -0.02}
      coagulation_status: {0: 0.03, 1: 0.02, 2: 0.01, 3: 0.01, 5: 0.00, 7: -0.01, 10: -0.02, 14: -0.01}
      perfusion_status: {0: -0.02, 1: -0.02, 2: -0.01, 3: -0.01, 5: 0.00, 7: 0.01, 10: 0.01, 14: 0.00}
    order_modifications:
      day_3:
        add_labs: ["D_dimer", "Troponin"]
      day_5:
        add_imaging: ["CT_Angiography_Chest"]
    treatment_modifications: {}
    triggers:
      - day: 5
        condition: "new_dyspnea_or_chest_pain"
        actions: ["rule_out_PE"]

  sudden_deterioration:
    probability: 0.03
    description: "Acute massive PE from DVT embolization"
    trajectory:
      inflammation_level: {0: 0.03, 1: 0.00, 2: 0.20, 3: 0.05, 5: -0.05, 7: -0.08, 10: -0.05, 14: -0.03}
      perfusion_status: {0: 0.00, 1: 0.00, 2: -0.25, 3: -0.05, 5: 0.05, 7: 0.05, 10: 0.03, 14: 0.01}
      coagulation_status: {0: -0.01, 1: -0.01, 2: 0.05, 3: 0.00, 5: -0.02, 7: -0.02, 10: -0.01, 14: -0.01}
    order_modifications:
      day_2:
        add_labs: ["ABG", "Troponin", "BNP", "Lactate"]
        add_imaging: ["CT_Angiography_Chest_stat", "Echocardiogram"]
    treatment_modifications:
      day_2:
        action: "icu_transfer"
        start:
          japan: [{drug: "Heparin_increase", dose: "Increase infusion rate"}]
          us: [{drug: "Heparin_increase", dose: "Increase infusion rate"}]
        action_2: "consider_systemic_thrombolysis"
    triggers:
      - day: 2
        condition: "acute_dyspnea_hypotension_or_desaturation"
        actions: ["icu_transfer", "emergent_ct_angiography", "consider_thrombolysis"]

# Archetype selection modifiers
archetype_modifiers:
  - condition: "active_cancer"
    effect: {treatment_resistant: 0.08, gradual_deterioration: 0.05, smooth_recovery: -0.13}
  - condition: "prior_vte"
    effect: {treatment_resistant: 0.05, smooth_recovery: -0.05}
  - condition: "iliofemoral_location"
    effect: {sudden_deterioration: 0.05, gradual_deterioration: 0.05, smooth_recovery: -0.10}

# ============================================================
# COMPLICATIONS
# ============================================================
complications:
  - name: "pulmonary_embolism"
    description: "PE from DVT embolization — most feared complication"
    probability_per_day: 0.008
    onset_day_range: [0, 14]
    risk_factors:
      - {condition: "proximal_dvt", multiplier: 4.0}
      - {condition: "free_floating_thrombus", multiplier: 6.0}
      - {condition: "subtherapeutic_anticoagulation", multiplier: 3.0}
    state_impact:
      perfusion_status: -0.20
      ph_status: -0.05
      inflammation_level: 0.05
    detection:
      test: "ct_angiography"
      finding: "filling_defect_in_pulmonary_arteries"
    actions: ["increase_anticoagulation", "consider_thrombolysis_if_massive", "icu_transfer_if_hemodynamically_unstable"]

  - name: "heparin_induced_thrombocytopenia"
    description: "HIT — immune-mediated platelet destruction causing paradoxical thrombosis"
    probability_per_day: 0.002
    onset_day_range: [5, 14]
    risk_factors:
      - {condition: "unfractionated_heparin_use", multiplier: 5.0}
      - {condition: "surgical_patient", multiplier: 2.0}
    state_impact:
      coagulation_status: 0.15
    detection:
      test: "platelet_count"
      finding: "drop_above_50_percent_from_baseline"
    actions: ["stop_all_heparin", "start_argatroban_or_fondaparinux", "send_HIT_antibody"]

  - name: "major_bleeding"
    description: "Major bleeding from anticoagulation therapy"
    probability_per_day: 0.004
    onset_day_range: [1, 14]
    risk_factors:
      - {condition: "age_over_75", multiplier: 2.0}
      - {condition: "CKD", multiplier: 2.0}
      - {condition: "concurrent_antiplatelet", multiplier: 2.5}
      - {condition: "liver_disease", multiplier: 2.0}
    state_impact:
      volume_status: -0.10
      perfusion_status: -0.05
    detection:
      test: "hb_drop_or_clinical_bleeding"
      finding: "Hb drop > 2 g/dL or overt bleeding"
    actions: ["hold_anticoagulation", "transfuse_if_needed", "consider_reversal", "consider_IVC_filter"]

  - name: "post_thrombotic_syndrome"
    description: "Chronic venous insufficiency from valve damage — develops later"
    probability_per_day: 0.003
    onset_day_range: [14, 90]
    risk_factors:
      - {condition: "proximal_dvt", multiplier: 2.0}
      - {condition: "recurrent_dvt", multiplier: 3.0}
      - {condition: "obesity", multiplier: 1.5}
    state_impact: {}
    detection:
      test: "clinical_assessment"
      finding: "chronic_swelling_skin_changes"
    actions: ["compression_therapy", "elevation", "exercise_program"]

  - name: "phlegmasia_cerulea_dolens"
    description: "Massive iliofemoral DVT with limb-threatening ischemia"
    probability_per_day: 0.001
    onset_day_range: [0, 5]
    risk_factors:
      - {condition: "iliofemoral_dvt", multiplier: 10.0}
      - {condition: "active_cancer", multiplier: 3.0}
    state_impact:
      perfusion_status: -0.20
      volume_status: -0.10
    detection:
      test: "clinical_exam"
      finding: "massively_swollen_cyanotic_limb"
    actions: ["emergent_catheter_thrombolysis", "surgical_thrombectomy", "fasciotomy_if_compartment_syndrome"]

  - name: "thrombus_extension"
    description: "Extension of DVT to more proximal veins despite anticoagulation"
    probability_per_day: 0.005
    onset_day_range: [2, 10]
    risk_factors:
      - {condition: "subtherapeutic_anticoagulation", multiplier: 3.0}
      - {condition: "active_cancer", multiplier: 2.0}
    state_impact:
      inflammation_level: 0.05
      coagulation_status: 0.05
    detection:
      test: "repeat_compression_ultrasound"
      finding: "proximal_extension"
    actions: ["optimize_anticoagulation", "consider_catheter_thrombolysis", "IVC_filter_if_continued_progression"]
