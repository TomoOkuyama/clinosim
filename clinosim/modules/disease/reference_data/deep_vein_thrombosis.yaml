# Deep Vein Thrombosis — Complete Reference Data
# Sources cited per section. All rates are approximate and should be validated
# against the most current published data before production use.

disease_id: deep_vein_thrombosis
chief_complaint:
  en: "Unilateral leg swelling, pain, warmth"
  ja: "一側下肢の腫脹・疼痛・熱感"
department: internal_medicine
encounter_type: medical
requires_surgery: false
readmission_eligible: true
minimum_severity: null
diagnostic_difficulty: 0.3   # D-dimer + compression ultrasound confirm; clinical diagnosis alone unreliable

icd_codes:
  primary: "I80.20"  # Phlebitis and thrombophlebitis of unspecified deep vessels of lower extremity
  variants:
    - {code: "I82.40", name: "Acute embolism and thrombosis of unspecified deep veins of lower extremity", probability: 0.30}
    - {code: "I82.41", name: "Acute embolism and thrombosis of femoral vein", probability: 0.25}
    - {code: "I82.42", name: "Acute embolism and thrombosis of iliac vein", probability: 0.10}
    - {code: "I82.43", name: "Acute embolism and thrombosis of popliteal vein", probability: 0.20}
    - {code: "I82.49", name: "Acute embolism and thrombosis of other specified deep vein of lower extremity", probability: 0.15}

# ============================================================
# INCIDENCE (per 100,000 per year, by age band and sex)
# Source: JP — 静脈血栓塞栓症ガイドライン, 患者調査
#         US — Heit et al. Arch Intern Med 2002, White RH. Circulation 2003
# Hospitalized DVT only
# ============================================================
incidence:
  japan:
    "0-4":   {M: 0, F: 0}
    "5-14":  {M: 1, F: 1}
    "15-24": {M: 3, F: 5}
    "25-34": {M: 5, F: 10}
    "35-44": {M: 8, F: 15}
    "45-54": {M: 15, F: 25}
    "55-64": {M: 30, F: 40}
    "65-74": {M: 60, F: 75}
    "75-84": {M: 100, F: 120}
    "85+":   {M: 150, F: 180}
  us:
    "0-4":   {M: 0, F: 0}
    "5-14":  {M: 1, F: 1}
    "15-24": {M: 5, F: 8}
    "25-34": {M: 10, F: 15}
    "35-44": {M: 15, F: 25}
    "45-54": {M: 30, F: 40}
    "55-64": {M: 50, F: 60}
    "65-74": {M: 90, F: 100}
    "75-84": {M: 150, F: 170}
    "85+":   {M: 250, F: 280}

  risk_multipliers:
    - {condition: "active_cancer", multiplier: 5.0}
    - {condition: "recent_surgery", multiplier: 4.0}
    - {condition: "immobility_prolonged", multiplier: 3.0}
    - {condition: "prior_vte", multiplier: 3.5}
    - {condition: "pregnancy_postpartum", multiplier: 5.0}
    - {condition: "oral_contraceptive", multiplier: 3.0}
    - {condition: "hormone_replacement", multiplier: 2.0}
    - {condition: "obesity_bmi_over_30", multiplier: 2.0}
    - {condition: "heart_failure", multiplier: 2.0}
    - {condition: "nephrotic_syndrome", multiplier: 3.0}
    - {condition: "antiphospholipid_syndrome", multiplier: 6.0}
    - {condition: "factor_V_Leiden", multiplier: 5.0}
    - {condition: "smoking_current", multiplier: 1.5}
    - {condition: "long_haul_travel", multiplier: 2.0}

  seasonal_curve:  # minimal seasonality
    1: 1.0
    2: 1.0
    3: 1.0
    4: 1.0
    5: 1.0
    6: 1.0
    7: 1.0
    8: 1.0
    9: 1.0
    10: 1.0
    11: 1.0
    12: 1.0

  vaccine_protection: {}

# ============================================================
# SEVERITY DISTRIBUTION
# Source: ACCP VTE Guidelines, clinical staging
# ============================================================
severity:
  distribution:
    mild: 0.35        # distal DVT (calf), limited swelling
    moderate: 0.50    # proximal DVT (femoral/popliteal), significant symptoms
    severe: 0.15      # iliofemoral DVT, phlegmasia, or hemodynamically significant PE risk
  modifiers:
    - {condition: "iliofemoral_location", severe_multiplier: 3.0}
    - {condition: "active_cancer", moderate_multiplier: 1.3, severe_multiplier: 1.8}
    - {condition: "bilateral_dvt", severe_multiplier: 2.5}
    - {condition: "phlegmasia_signs", severe_multiplier: 5.0}

# ============================================================
# INITIAL PHYSIOLOGICAL STATE IMPACT
# Key: inflammatory response, risk of embolization, fluid redistribution
# ============================================================
initial_state_impact:
  mild:
    inflammation_level: 0.10
    coagulation_status: 0.10
  moderate:
    inflammation_level: 0.18
    coagulation_status: 0.15
    volume_status: -0.05
  severe:
    inflammation_level: 0.30
    coagulation_status: 0.25
    volume_status: -0.10
    perfusion_status: -0.05

# ============================================================
# ORDER PROTOCOLS
# ============================================================
order_protocols:
  admission_orders:
    labs:
      - {test: "D_dimer", urgency: "stat"}
      - {test: "CBC", urgency: "stat"}
      - {test: "PT_INR", urgency: "stat"}
      - {test: "aPTT", urgency: "stat"}
      - {test: "Creatinine", urgency: "stat"}
      - {test: "BUN", urgency: "stat"}
      - {test: "Na", urgency: "stat"}
      - {test: "K", urgency: "stat"}
      - {test: "AST", urgency: "stat"}
      - {test: "ALT", urgency: "stat"}
      - {test: "Troponin", urgency: "stat", probability: 0.60}  # if PE suspected
      - {test: "BNP", urgency: "stat", probability: 0.50}        # if PE suspected
    imaging:
      - {test: "Compression_Ultrasound_Lower_Extremity", urgency: "stat"}
      - {test: "CT_Angiography_Chest", urgency: "stat", probability: 0.50}  # rule out concurrent PE
    supportive:
      - {type: "IV_fluid", detail: "NS 80 mL/h"}
      - {type: "leg_elevation", detail: "Elevate affected limb above heart level"}
      - {type: "compression_stocking", detail: "Graduated compression stocking on unaffected leg"}

  daily_monitoring:
    labs:
      - {test: "aPTT", frequency: "q6h_initially_if_heparin", note: "until therapeutic, then daily"}
      - {test: "PT_INR", frequency: "daily_if_warfarin_started"}
      - {test: "CBC", frequency: "daily", note: "monitor for HIT"}
      - {test: "Creatinine", frequency: "every_other_day"}
    vitals:
      stable: "q6h"
      unstable: "q2h"
    assessments:
      - {test: "Leg_circumference_measurement", frequency: "daily"}
      - {test: "Signs_of_PE", frequency: "q4h", note: "dyspnea, chest pain, tachycardia"}

  trigger_orders:
    pe_suspected:
      condition: "New dyspnea, chest pain, tachycardia, or SpO2 decline"
      actions:
        - {type: "imaging", test: "CT_Angiography_Chest_stat"}
        - {type: "lab", test: "ABG"}
        - {type: "lab", test: "Troponin"}
        - {type: "lab", test: "BNP"}
    hit_suspected:
      condition: "Platelet drop > 50% from baseline or new thrombosis on heparin"
      actions:
        - {type: "lab", test: "HIT_antibody_PF4"}
        - {type: "medication_change", action: "stop_heparin_start_argatroban"}
    thrombus_extension:
      condition: "Worsening swelling or pain despite anticoagulation"
      actions:
        - {type: "imaging", test: "Repeat_compression_ultrasound"}
        - {type: "evaluate", action: "consider_catheter_directed_thrombolysis"}
    bleeding_complication:
      condition: "Active bleeding or Hb drop > 2 g/dL"
      actions:
        - {type: "medication_change", action: "hold_anticoagulation"}
        - {type: "lab", test: "CBC_stat_type_and_screen"}
        - {type: "evaluate", action: "IVC_filter_consideration"}

  discharge_criteria:
    japan:
      - "Therapeutic anticoagulation achieved"
      - "No signs of PE"
      - "Pain and swelling improving"
      - "Oral anticoagulation stable"
      - "Patient educated on signs of PE, bleeding precautions"
      - "Follow-up appointment within 1 week"
    us:
      - "Therapeutic anticoagulation achieved (INR 2-3 if warfarin, or stable on DOAC)"
      - "No signs of PE"
      - "Ambulatory"
      - "Outpatient anticoagulation monitoring arranged"

# ============================================================
# LIKELIHOOD RATIO TABLE
# Source: Wells et al. Lancet 1997, Goodacre et al. BMJ 2005
# ============================================================
likelihood_ratios:
  compression_ultrasound_positive:
    deep_vein_thrombosis: {positive_LR: 25.0, negative_LR: 0.05}
    # Sensitivity ~95% for proximal DVT, ~70% for calf DVT
    cellulitis: {positive_LR: 0.1, negative_LR: 1.0}
    baker_cyst: {positive_LR: 0.1, negative_LR: 1.0}

  d_dimer_elevated:
    deep_vein_thrombosis: {positive_LR: 2.0, negative_LR: 0.10}
    # High sensitivity (~95%), low specificity (~40%)
    cellulitis: {positive_LR: 1.5, negative_LR: 0.5}
    baker_cyst: {positive_LR: 0.8, negative_LR: 1.0}
    cancer: {positive_LR: 2.0, negative_LR: 0.5}

  unilateral_leg_swelling:
    deep_vein_thrombosis: {positive_LR: 3.0, negative_LR: 0.4}
    cellulitis: {positive_LR: 2.0, negative_LR: 0.5}
    baker_cyst: {positive_LR: 2.5, negative_LR: 0.7}
    lymphedema: {positive_LR: 1.5, negative_LR: 0.8}

  calf_tenderness:
    deep_vein_thrombosis: {positive_LR: 1.8, negative_LR: 0.6}
    cellulitis: {positive_LR: 2.0, negative_LR: 0.5}
    muscle_strain: {positive_LR: 2.0, negative_LR: 0.5}

  wells_score_high:
    deep_vein_thrombosis: {positive_LR: 5.0, negative_LR: 0.25}

  homan_sign_positive:
    deep_vein_thrombosis: {positive_LR: 1.3, negative_LR: 0.9}
    # Poor sensitivity and specificity — largely abandoned

  pitting_edema:
    deep_vein_thrombosis: {positive_LR: 2.0, negative_LR: 0.6}
    heart_failure: {positive_LR: 2.5, negative_LR: 0.5}
    cellulitis: {positive_LR: 1.5, negative_LR: 0.8}

# ============================================================
# LAB REFERENCE RANGES
# ============================================================
expected_lab_distributions:
  admission:
    D_dimer:
      unit: "ug/mL"
      median: 4.0
      iqr: [2.0, 8.0]
