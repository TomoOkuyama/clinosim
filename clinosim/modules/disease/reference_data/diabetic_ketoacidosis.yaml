    icu_transfer_rate: 0.15
    thirty_day_readmission: 0.20
    anion_gap_closure_median_hours: 12
    insulin_drip_median_hours: 18
    mean_age_admitted: 52
    male_ratio: 0.55
    type_1_ratio: 0.40

  us:
    median_los: 3.5
    los_iqr: [2.5, 5]
    in_hospital_mortality: 0.01
    icu_transfer_rate: 0.20
    thirty_day_readmission: 0.22
    anion_gap_closure_median_hours: 10
    insulin_drip_median_hours: 14
    mean_age_admitted: 45
    male_ratio: 0.50
    type_1_ratio: 0.45

# ============================================================
# CLINICAL COURSE ARCHETYPES (daily state variable changes)
# Each archetype defines day-by-day deltas for physiological state variables.
# Disease authors specify these trajectories — the engine interpolates between days.
# Patient profile (immune_reactivity, treatment_sensitivity) modulates amplitude.
# ============================================================
course_archetypes:
  smooth_recovery:
    probability: 0.60
    description: "Anion gap closes within 12-24h, smooth transition to SC insulin"
    trajectory:
      ph_status: {0: 0.05, 0.5: 0.15, 1: 0.10, 2: 0.05, 3: 0.02, 5: 0.01, 7: 0.00}
      volume_status: {0: 0.10, 0.5: 0.10, 1: 0.08, 2: 0.05, 3: 0.03, 5: 0.02, 7: 0.00}
      glucose_status: {0: -0.10, 0.5: -0.20, 1: -0.15, 2: -0.08, 3: -0.05, 5: -0.02, 7: 0.00}
      renal_function: {0: 0.02, 0.5: 0.03, 1: 0.04, 2: 0.03, 3: 0.02, 5: 0.01, 7: 0.00}
      electrolyte_status: {0: 0.03, 0.5: 0.05, 1: 0.05, 2: 0.03, 3: 0.02, 5: 0.01, 7: 0.00}
    order_modifications: {}
    treatment_modifications: {}

  dip_then_recovery:
    probability: 0.15
    description: "Initial K drops too fast or glucose rebounds; stabilizes by Day 2-3"
    trajectory:
      ph_status: {0: 0.03, 0.5: 0.08, 1: 0.02, 2: 0.08, 3: 0.05, 5: 0.02, 7: 0.00}
      volume_status: {0: 0.08, 0.5: 0.06, 1: 0.04, 2: 0.05, 3: 0.04, 5: 0.02, 7: 0.00}
      glucose_status: {0: -0.08, 0.5: -0.15, 1: 0.05, 2: -0.10, 3: -0.08, 5: -0.03, 7: 0.00}
      electrolyte_status: {0: 0.02, 0.5: -0.05, 1: -0.03, 2: 0.05, 3: 0.05, 5: 0.02, 7: 0.00}
      renal_function: {0: 0.01, 0.5: 0.02, 1: 0.02, 2: 0.03, 3: 0.03, 5: 0.01, 7: 0.00}
    order_modifications:
      day_1:
        add_labs: ["K_stat", "Glucose_stat", "ABG"]
    treatment_modifications:
      day_1:
        adjust: {detail: "Increase K replacement rate; adjust insulin drip"}

  plateau:
    probability: 0.10
    description: "Anion gap slow to close; persistent mild ketosis for 2-3 days"
    trajectory:
      ph_status: {0: 0.03, 0.5: 0.05, 1: 0.03, 2: 0.02, 3: 0.05, 5: 0.05, 7: 0.02}
      volume_status: {0: 0.08, 0.5: 0.06, 1: 0.04, 2: 0.02, 3: 0.02, 5: 0.01, 7: 0.00}
      glucose_status: {0: -0.08, 0.5: -0.12, 1: -0.05, 2: -0.02, 3: -0.05, 5: -0.05, 7: -0.02}
      electrolyte_status: {0: 0.02, 0.5: 0.03, 1: 0.02, 2: 0.02, 3: 0.03, 5: 0.03, 7: 0.01}
    order_modifications:
      day_2:
        add_labs: ["Beta_hydroxybutyrate", "Anion_gap", "Lactate"]
    treatment_modifications:
      day_2:
        adjust: {detail: "Increase insulin drip rate if AG not closing"}

  treatment_resistant:
    probability: 0.08
    description: "Underlying infection or non-compliance complicates recovery; prolonged insulin drip"
    trajectory:
      ph_status: {0: 0.02, 0.5: 0.03, 1: 0.01, 2: 0.00, 3: 0.02, 5: 0.05, 7: 0.05, 10: 0.03}
      volume_status: {0: 0.05, 0.5: 0.04, 1: 0.03, 2: 0.02, 3: 0.03, 5: 0.03, 7: 0.02, 10: 0.01}
      glucose_status: {0: -0.05, 0.5: -0.08, 1: -0.03, 2: 0.02, 3: -0.05, 5: -0.08, 7: -0.05, 10: -0.02}
      renal_function: {0: 0.01, 0.5: 0.01, 1: 0.00, 2: -0.01, 3: 0.01, 5: 0.02, 7: 0.02, 10: 0.01}
      electrolyte_status: {0: 0.01, 0.5: 0.02, 1: 0.01, 2: -0.02, 3: 0.02, 5: 0.03, 7: 0.03, 10: 0.01}
    order_modifications:
      day_2:
        add_labs: ["Blood_culture_x2", "CRP", "Urinalysis", "Chest_Xray"]
        add_consult: ["infectious_disease"]
      day_4:
        add_labs: ["Beta_hydroxybutyrate", "ABG", "Lactate"]
    treatment_modifications:
      day_2:
        start:
          japan: [{drug: "Broad spectrum antibiotic", indication: "suspected occult infection"}]
          us: [{drug: "Broad spectrum antibiotic", indication: "suspected occult infection"}]
    triggers:
      - day: 2
        condition: "anion_gap > 16 despite treatment"
        actions: ["increase_insulin_rate", "infection_workup", "reassess_fluid_status"]

  gradual_deterioration:
    probability: 0.05
    description: "Multi-organ involvement; progressive AKI, possible ICU transfer"
    trajectory:
      ph_status: {0: 0.02, 0.5: 0.02, 1: 0.00, 2: -0.02, 3: 0.02, 5: 0.03, 7: 0.03, 10: 0.02}
      volume_status: {0: 0.05, 0.5: 0.03, 1: 0.01, 2: -0.02, 3: 0.02, 5: 0.02, 7: 0.02, 10: 0.01}
      glucose_status: {0: -0.05, 0.5: -0.08, 1: -0.03, 2: 0.05, 3: -0.02, 5: -0.05, 7: -0.05, 10: -0.03}
      renal_function: {0: 0.00, 0.5: -0.02, 1: -0.03, 2: -0.05, 3: -0.03, 5: 0.01, 7: 0.02, 10: 0.02}
      perfusion_status: {0: 0.00, 0.5: -0.02, 1: -0.05, 2: -0.05, 3: -0.02, 5: 0.02, 7: 0.02, 10: 0.01}
    order_modifications:
      day_1:
        add_labs: ["ABG", "Lactate", "Troponin"]
      day_2:
        add_labs: ["ABG", "Lactate", "Creatinine"]
        add_imaging: ["Renal_ultrasound"]
    treatment_modifications:
      day_2:
        start:
          japan: [{drug: "Norepinephrine", dose: "0.05ug/kg/min IV drip"}]
        action: "icu_transfer"
    triggers:
      - day: 2
        condition: "perfusion_status < 0.4"
        actions: ["icu_transfer", "start_vasopressor"]

  sudden_deterioration:
    probability: 0.02
    description: "Cerebral edema or cardiac arrest from electrolyte shift — rare but life-threatening"
    trajectory:
      ph_status: {0: 0.03, 0.5: 0.05, 1: -0.10, 2: -0.05, 3: 0.05, 5: 0.05, 7: 0.03}
      volume_status: {0: 0.05, 0.5: 0.04, 1: -0.10, 2: 0.05, 3: 0.05, 5: 0.03, 7: 0.01}
      glucose_status: {0: -0.08, 0.5: -0.15, 1: -0.10, 2: 0.00, 3: -0.05, 5: -0.03, 7: -0.02}
      perfusion_status: {0: 0.00, 0.5: 0.00, 1: -0.25, 2: 0.05, 3: 0.05, 5: 0.03, 7: 0.01}
      consciousness: {0: 0.00, 0.5: 0.00, 1: -0.30, 2: 0.05, 3: 0.05, 5: 0.05, 7: 0.03}
    order_modifications:
      day_1:
        add_labs: ["ABG", "K_stat", "Glucose_stat", "Troponin", "Lactate"]
        add_imaging: ["Head_CT"]
    treatment_modifications:
      day_1:
        start:
          japan:
            - {drug: "Mannitol", dose: "1g/kg IV over 20min", indication: "cerebral edema"}
          us:
            - {drug: "Mannitol", dose: "0.5-1g/kg IV over 20min", indication: "cerebral edema"}
            - {drug: "Hypertonic saline 3%", dose: "5mL/kg IV over 30min", indication: "alternative to mannitol"}
        action: "icu_transfer"
        action_2: "intubation_evaluation"
    triggers:
      - day: 1
        condition: "consciousness < 0.3 or cardiac_arrest"
        actions: ["icu_transfer", "intubation", "mannitol_if_cerebral_edema"]

# Archetype selection modifiers (patient profile dependent)
archetype_modifiers:
  - condition: "age < 18"
    effect: {sudden_deterioration: 0.03, smooth_recovery: -0.03}  # cerebral edema more common in children
  - condition: "age >= 70"
    effect: {gradual_deterioration: 0.05, smooth_recovery: -0.05}
  - condition: "prior_dka_episodes >= 3"
    effect: {treatment_resistant: 0.05, smooth_recovery: -0.05}   # non-compliance pattern
  - condition: "treatment_sensitivity > 1.2"
    effect: {smooth_recovery: 0.10, treatment_resistant: -0.05}
  - condition: "CKD"
    effect: {gradual_deterioration: 0.05, plateau: 0.03, smooth_recovery: -0.08}
  - condition: "active_infection"
    effect: {treatment_resistant: 0.10, smooth_recovery: -0.10}

# ============================================================
# COMPLICATIONS (secondary events during hospitalization)
# Each complication has: trigger conditions, timing, probability,
# physiological impact, and detection/treatment actions.
# Complications can themselves trigger further complications (cascade).
# ============================================================
complications:
  - name: "hypokalemia"
    description: "K drops rapidly with insulin therapy; life-threatening arrhythmia risk"
    probability_per_day: 0.05
    onset_day_range: [0, 2]
    risk_factors:
      - {condition: "admission_K_below_4", multiplier: 2.0}
      - {condition: "aggressive_insulin_without_K_monitoring", multiplier: 3.0}
      - {condition: "vomiting", multiplier: 1.5}
    state_impact:
      electrolyte_status: -0.15
    detection:
      test: "K"
      finding: "K_below_3.3"
    actions: ["hold_insulin", "K_replacement_40mEq_IV", "continuous_cardiac_monitor", "recheck_K_1h"]

  - name: "hypoglycemia"
    description: "Glucose drops too fast or too low from insulin treatment"
    probability_per_day: 0.04
    onset_day_range: [0, 3]
    risk_factors:
      - {condition: "not_switched_to_D5_timely", multiplier: 3.0}
      - {condition: "renal_impairment", multiplier: 1.5}
      - {condition: "poor_oral_intake", multiplier: 1.5}
    state_impact:
      glucose_status: -0.30
      consciousness: -0.10
    detection:
      test: "glucose"
      finding: "glucose_below_70"
    actions: ["D50_IV_push", "reduce_insulin_rate", "recheck_glucose_15min"]

  - name: "cerebral_edema"
    description: "Brain swelling from rapid osmolality shifts; more common in children"
    probability_per_day: 0.002
    onset_day_range: [0, 1]
    risk_factors:
      - {condition: "age_under_18", multiplier: 10.0}
      - {condition: "new_onset_T1DM", multiplier: 3.0}
      - {condition: "severe_acidosis_pH_below_7.0", multiplier: 2.0}
      - {condition: "rapid_glucose_drop_over_100_per_hour", multiplier: 2.5}
    state_impact:
      consciousness: -0.40
      perfusion_status: -0.10
    detection:
      test: "clinical_assessment"
      finding: "altered_consciousness_headache_papilledema"
    actions: ["mannitol_IV", "elevate_head_of_bed", "reduce_IV_rate", "head_CT", "icu_transfer"]

  - name: "acute_kidney_injury"
    description: "Prerenal AKI from severe volume depletion; may progress to intrinsic if prolonged"
    probability_per_day: 0.02
    onset_day_range: [0, 3]
    risk_factors:
      - {condition: "volume_status < -0.5", multiplier: 2.5}
      - {condition: "age_over_65", multiplier: 1.5}
      - {condition: "CKD_baseline", multiplier: 2.0}
      - {condition: "NSAID_use", multiplier: 1.8}
    state_impact:
      renal_function: -0.20
      electrolyte_status: -0.05
    detection:
      test: "creatinine"
      finding: "rise_above_0.3_from_baseline_or_50_percent"
    actions: ["aggressive_IV_hydration", "hold_nephrotoxic_drugs", "monitor_urine_output", "renal_consult_if_no_improvement"]

  - name: "aspiration_pneumonia"
    description: "Aspiration from vomiting with altered consciousness"
    probability_per_day: 0.005
    onset_day_range: [0, 2]
    risk_factors:
      - {condition: "altered_consciousness", multiplier: 5.0}
      - {condition: "active_vomiting", multiplier: 3.0}
      - {condition: "severe_DKA", multiplier: 2.0}
    state_impact:
      inflammation_level: 0.20
      perfusion_status: -0.05
    detection:
      test: "chest_xray"
      finding: "new_infiltrate"
    actions: ["start_antibiotics", "supplemental_O2", "consider_intubation_if_severe"]

  - name: "cardiac_arrhythmia"
    description: "Arrhythmia from K/Mg shifts or severe acidosis"
    probability_per_day: 0.008
    onset_day_range: [0, 2]
    risk_factors:
      - {condition: "K_below_3.0_or_above_6.0", multiplier: 5.0}
      - {condition: "pre_existing_cardiac_disease", multiplier: 2.0}
      - {condition: "pH_below_7.0", multiplier: 2.5}
    state_impact:
      perfusion_status: -0.15
    detection:
      test: "cardiac_monitor_or_ECG"
      finding: "arrhythmia_detected"
    actions: ["correct_electrolytes_emergently", "12_lead_ECG", "cardiology_consult", "consider_icu"]

  - name: "rhabdomyolysis"
    description: "Muscle breakdown from severe volume depletion and electrolyte shifts"
    probability_per_day: 0.003
    onset_day_range: [1, 4]
    risk_factors:
      - {condition: "severe_dehydration", multiplier: 3.0}
      - {condition: "hypophosphatemia", multiplier: 2.0}
    state_impact:
      renal_function: -0.10
    detection:
      test: "CK"
      finding: "CK_above_5x_upper_limit"
    actions: ["aggressive_IV_fluids", "monitor_CK_and_renal_function", "urine_alkalinization"]

  - name: "dvt"
    description: "Deep vein thrombosis from dehydration and immobility"
    probability_per_day: 0.005
    onset_day_range: [2, 10]
    risk_factors:
      - {condition: "immobility_days > 2", multiplier: 2.0}
      - {condition: "severe_dehydration", multiplier: 1.5}
      - {condition: "no_dvt_prophylaxis", multiplier: 3.0}
    state_impact:
      coagulation_status: 0.05
    detection:
      test: "d_dimer_then_ultrasound"
      finding: "dvt_confirmed"
    actions: ["start_anticoagulation"]
    cascade: ["pulmonary_embolism"]

  - name: "pulmonary_embolism"
    description: "PE from DVT embolization"
    probability_given_parent: 0.10
    parent_complication: "dvt"
    onset_days_after_parent: [0, 7]
    state_impact:
      perfusion_status: -0.20
      ph_status: -0.05
    actions: ["ct_angiography", "anticoagulation", "consider_icu"]

# ============================================================
# DIFFERENTIAL DIAGNOSIS
# Used by the diagnostic reasoning engine
# ============================================================
differential_diagnosis:
  - disease: "diabetic_ketoacidosis"
    pre_test_probability: 0.40
    key_distinguishing: "Glucose >250, AG metabolic acidosis, ketonemia, known DM"

  - disease: "hyperosmolar_hyperglycemic_state"
    pre_test_probability: 0.15
    key_distinguishing: "Glucose often >600, osmolality >320, minimal ketosis, no significant acidosis"

  - disease: "alcoholic_ketoacidosis"
    pre_test_probability: 0.10
    key_distinguishing: "Alcohol history, glucose low/normal/mildly elevated, ketones+, AG acidosis"

  - disease: "starvation_ketosis"
    pre_test_probability: 0.05
    key_distinguishing: "Prolonged fasting, mild ketosis, glucose low/normal, minimal acidosis"

  - disease: "lactic_acidosis"
    pre_test_probability: 0.15
    key_distinguishing: "Elevated lactate >4, AG acidosis, low/absent ketones, various causes (sepsis, metformin, shock)"

  - disease: "uremic_acidosis"
    pre_test_probability: 0.05
    key_distinguishing: "Severely elevated BUN/Cr, AG acidosis, known CKD/ESRD"

  - disease: "toxic_ingestion"
    pre_test_probability: 0.05
    key_distinguishing: "History of ingestion (methanol, ethylene glycol, salicylate), osmolar gap"

  - disease: "sepsis"
    pre_test_probability: 0.05
    key_distinguishing: "Fever, source of infection, lactic acidosis predominant, may coexist with DKA as trigger"

# ============================================================
# PRECIPITANT / TRIGGER IDENTIFICATION
# DKA always has a trigger — identifying it is critical for treatment
# ============================================================
precipitants:
  - trigger: "infection"
    probability: 0.40
    workup: ["CBC", "CRP", "Blood_culture", "Urinalysis", "Chest_Xray"]
    treatment: "Treat underlying infection with appropriate antibiotics"

  - trigger: "insulin_non_compliance"
    probability: 0.25
    workup: ["Medication reconciliation", "Social work consult"]
    treatment: "Diabetes education, insulin restart, address barriers to compliance"

  - trigger: "new_onset_diabetes"
    probability: 0.15
    workup: ["HbA1c", "C-peptide", "GAD antibodies", "Islet cell antibodies"]
    treatment: "Establish insulin regimen, diabetes education, endocrinology follow-up"

  - trigger: "medication_related"
    probability: 0.05
    workup: ["Medication review (corticosteroids, SGLT2 inhibitors, atypical antipsychotics)"]
    treatment: "Discontinue or adjust offending agent"

  - trigger: "myocardial_infarction"
    probability: 0.05
    workup: ["Troponin", "ECG", "Echocardiogram"]
    treatment: "Cardiology consult, appropriate cardiac intervention"

  - trigger: "unknown"
    probability: 0.10
    workup: ["Comprehensive workup if no clear trigger identified"]
    treatment: "Close follow-up, adherence support"

