# Diabetic Ketoacidosis (DKA) — Complete Reference Data
# Sources cited per section. All rates are approximate and should be validated
# against the most current published data before production use.

disease_id: diabetic_ketoacidosis
chief_complaint: "Nausea, vomiting, abdominal pain, polyuria, altered consciousness"
department: internal_medicine  # endocrinology
encounter_type: medical
requires_surgery: false
readmission_eligible: true
minimum_severity: moderate
diagnostic_difficulty: 0.2  # glucose + ABG + ketones confirms quickly

icd_codes:
  primary: "E11.10"  # Type 2 DM with ketoacidosis without coma
  variants:
    - {code: "E10.10", name: "Type 1 DM with ketoacidosis without coma", probability: 0.40}
    - {code: "E11.10", name: "Type 2 DM with ketoacidosis without coma", probability: 0.30}
    - {code: "E10.11", name: "Type 1 DM with ketoacidosis with coma", probability: 0.05}
    - {code: "E11.11", name: "Type 2 DM with ketoacidosis with coma", probability: 0.03}
    - {code: "E11.65", name: "Type 2 DM with hyperglycemia", probability: 0.15}
    - {code: "E10.65", name: "Type 1 DM with hyperglycemia", probability: 0.07}

# ============================================================
# INCIDENCE (per 100,000 per year, by age band and sex)
# Source: JP — 患者調査 2020, Japan Diabetes Society reports
#         US — CDC Diabetes Surveillance, Benoit et al. Diabetes Care 2018
# ============================================================
incidence:
  japan:
    "0-4":   {M: 1, F: 1}
    "5-14":  {M: 3, F: 4}
    "15-24": {M: 5, F: 6}
    "25-34": {M: 6, F: 5}
    "35-44": {M: 8, F: 6}
    "45-54": {M: 12, F: 8}
    "55-64": {M: 15, F: 10}
    "65-74": {M: 18, F: 14}
    "75-84": {M: 20, F: 16}
    "85+":   {M: 15, F: 12}
  us:
    "0-4":   {M: 2, F: 2}
    "5-14":  {M: 8, F: 10}
    "15-24": {M: 15, F: 18}
    "25-34": {M: 20, F: 16}
    "35-44": {M: 25, F: 18}
    "45-54": {M: 30, F: 22}
    "55-64": {M: 35, F: 25}
    "65-74": {M: 30, F: 22}
    "75-84": {M: 25, F: 20}
    "85+":   {M: 18, F: 15}

  risk_multipliers:
    - {condition: "type_1_diabetes", multiplier: 10.0}
    - {condition: "type_2_diabetes_insulin", multiplier: 3.0}
    - {condition: "type_2_diabetes_non_insulin", multiplier: 1.5}
    - {condition: "prior_dka", multiplier: 4.0}
    - {condition: "insulin_pump_user", multiplier: 2.0}
    - {condition: "psychiatric_illness", multiplier: 2.5}      # non-compliance risk
    - {condition: "substance_abuse", multiplier: 2.0}
    - {condition: "low_socioeconomic", multiplier: 1.8}        # access to care
    - {condition: "infection_active", multiplier: 3.0}         # common precipitant
    - {condition: "CKD", multiplier: 1.5}

  seasonal_curve:  # monthly multiplier (1.0 = baseline); mild seasonal variation
    1: 1.1   # Jan — infections
    2: 1.1
    3: 1.0
    4: 1.0
    5: 1.0
    6: 1.0
    7: 1.0
    8: 1.0
    9: 1.0
    10: 1.0
    11: 1.0
    12: 1.1

  vaccine_protection: {}  # not directly vaccine-preventable

# ============================================================
# SEVERITY DISTRIBUTION
# Source: ADA DKA classification (mild/moderate/severe by pH and HCO3)
# ============================================================
severity:
  distribution:
    mild: 0.00        # DKA by definition requires hospitalization; minimum_severity is moderate
    moderate: 0.65    # pH 7.00-7.24, HCO3 10-15
    severe: 0.35      # pH <7.00, HCO3 <10, obtunded/coma
  modifiers:
    - {condition: "age_over_65", moderate_multiplier: 0.8, severe_multiplier: 1.5}
    - {condition: "CKD", severe_multiplier: 1.5}
    - {condition: "heart_failure", severe_multiplier: 1.3}
    - {condition: "first_presentation_T1DM", severe_multiplier: 1.4}
    - {condition: "delayed_presentation", severe_multiplier: 2.0, moderate_multiplier: 0.5}

# ============================================================
# INITIAL PHYSIOLOGICAL STATE IMPACT
# How this disease changes physiological state at onset (added to patient baseline)
# ============================================================
initial_state_impact:
  moderate:
    ph_status: -0.35            # major: metabolic acidosis (pH 7.00-7.24)
    volume_status: -0.40        # severe dehydration (3-6L deficit typical)
    glucose_status: 0.60        # markedly elevated (300-500 mg/dL)
    renal_function: -0.15       # prerenal AKI from volume depletion
    perfusion_status: -0.10     # tachycardia, mild hypotension
    electrolyte_status: -0.20   # total body K depleted despite normal/high serum K
  severe:
    ph_status: -0.60            # severe acidosis (pH <7.00)
    volume_status: -0.60        # severe dehydration (6-9L deficit)
    glucose_status: 0.80        # very high (>500 mg/dL)
    renal_function: -0.30       # significant prerenal AKI
    perfusion_status: -0.30     # hypotension, shock possible
    electrolyte_status: -0.40   # severe electrolyte derangement
    consciousness: -0.30        # obtunded or comatose

# ============================================================
# ORDER PROTOCOLS (what to order and when)
# All admission orders, daily monitoring, and discharge criteria
# are defined here — the engine reads this, not hardcoded.
# ============================================================
order_protocols:
  admission_orders:
    labs:
      - {test: "Glucose", urgency: "stat"}
      - {test: "ABG", urgency: "stat"}
      - {test: "Beta_hydroxybutyrate", urgency: "stat"}
      - {test: "BMP", urgency: "stat"}    # Na, K, Cl, HCO3, BUN, Creatinine, Glucose
      - {test: "Na", urgency: "stat"}
      - {test: "K", urgency: "stat"}
      - {test: "Cl", urgency: "stat"}
      - {test: "HCO3", urgency: "stat"}
      - {test: "BUN", urgency: "stat"}
      - {test: "Creatinine", urgency: "stat"}
      - {test: "Anion_gap", urgency: "stat"}  # calculated: Na - (Cl + HCO3)
      - {test: "Phosphate", urgency: "stat"}
      - {test: "Mg", urgency: "stat"}
      - {test: "Lactate", urgency: "stat", probability: 0.70}
      - {test: "Urinalysis", urgency: "stat"}  # ketones, glucose, infection screen
      - {test: "HbA1c", urgency: "routine"}
      - {test: "CBC", urgency: "stat"}
      - {test: "CRP", urgency: "stat", probability: 0.60}      # infection screen
      - {test: "Blood_culture_x2", urgency: "stat", probability: 0.50}  # if infection suspected
      - {test: "Lipase", urgency: "stat", probability: 0.40}   # abdominal pain differential
      - {test: "Troponin", urgency: "stat", probability: 0.30} # if cardiac concern
    imaging:
      - {test: "Chest_Xray_PA", urgency: "stat", probability: 0.70}  # infection screen
      - {test: "ECG", urgency: "stat"}   # K+ effects, cardiac assessment
    supportive:
      - {type: "IV_fluid", detail: "NS 1000mL/h x 1h, then 500mL/h x 4h, then 250mL/h"}
      - {type: "IV_insulin", detail: "Regular insulin 0.1 U/kg/h continuous drip (after K >= 3.3)"}
      - {type: "K_replacement", detail: "KCl 20-40 mEq/L in IV fluids, target K 4.0-5.0"}
      - {type: "monitoring", detail: "Continuous cardiac monitoring"}
      - {type: "glucose_check", detail: "Fingerstick glucose q1h"}
      - {type: "I_and_O", detail: "Strict intake and output monitoring"}
      - {type: "DVT_prophylaxis", detail: "Enoxaparin 2000IU SC daily (once hemodynamically stable)"}

  daily_monitoring:
    labs:
      - {test: "BMP", frequency: "q4-6h until AG closed, then daily"}
      - {test: "Glucose", frequency: "q1-2h until stable, then q4h"}
      - {test: "ABG_or_VBG", frequency: "q2-4h until pH > 7.30, then q6h"}
      - {test: "Beta_hydroxybutyrate", frequency: "q4-6h until normal"}
      - {test: "K", frequency: "q2h during insulin drip"}
      - {test: "Anion_gap", frequency: "q4-6h until closed"}
      - {test: "Phosphate", frequency: "daily"}
    vitals:
      stable: "q2h"
      unstable: "q1h"
    imaging: []  # no routine imaging unless indicated

  trigger_orders:
    glucose_below_250:
      condition: "glucose < 250 mg/dL while on insulin drip"
      actions:
        - {type: "fluid_change", action: "switch_to_D5_half_NS"}
        - {type: "insulin_adjust", action: "reduce_insulin_rate_to_0.05_U_kg_h"}
    potassium_below_3.3:
      condition: "K < 3.3 mEq/L"
      actions:
        - {type: "insulin_hold", action: "hold_insulin_drip_until_K_above_3.3"}
        - {type: "K_replace", action: "KCl_40mEq_IV_over_1h"}
    potassium_3.3_to_5.3:
      condition: "K 3.3-5.3 mEq/L"
      actions:
        - {type: "K_replace", action: "KCl_20-40_mEq_per_L_in_each_liter_IV_fluid"}
    anion_gap_closed:
      condition: "Anion gap < 12 and patient tolerating PO"
      actions:
        - {type: "transition", action: "start_SC_insulin_overlap_1-2h_then_stop_drip"}
    persistent_acidosis:
      condition: "pH < 7.10 despite 6h treatment"
      actions:
        - {type: "evaluate", action: "consider_ICU_transfer"}
        - {type: "lab", test: "Lactate"}
        - {type: "evaluate", action: "reassess_insulin_rate_and_hydration"}

  discharge_criteria:
    japan:
      - "Anion gap closed (<12) for >= 24 hours"
      - "Tolerating oral intake for >= 24 hours"
      - "Subcutaneous insulin regimen established and stable"
      - "Glucose 100-250 mg/dL on SC insulin"
      - "K 3.5-5.0 without IV replacement"
      - "Trigger identified and addressed (infection treated, insulin education done)"
      - "HbA1c result reviewed, outpatient plan established"
      - "Diabetes education completed (insulin technique, sick-day rules)"
    us:
      - "Anion gap closed (<12) for >= 12 hours"
      - "Tolerating oral intake"
      - "SC insulin regimen started, drip discontinued >= 2 hours"
      - "Glucose < 250 mg/dL on SC insulin"
      - "K 3.5-5.0 without replacement"
      - "Precipitant identified and addressed"
      - "Outpatient follow-up arranged within 1 week"

# ============================================================
# LIKELIHOOD RATIO TABLE
# Source: Clinical diagnostic studies
#         Kitabchi et al. Diabetes Care 2009 (ADA consensus)
#         Umpierrez & Korytkowski. Nat Rev Endocrinol 2016
# ============================================================
likelihood_ratios:
  glucose_above_250:
    diabetic_ketoacidosis: {positive_LR: 3.0, negative_LR: 0.05}
    hyperosmolar_hyperglycemic_state: {positive_LR: 3.0, negative_LR: 0.05}
    stress_hyperglycemia: {positive_LR: 1.5, negative_LR: 0.5}

  ph_below_7.30:
    diabetic_ketoacidosis: {positive_LR: 8.0, negative_LR: 0.15}
    lactic_acidosis: {positive_LR: 4.0, negative_LR: 0.5}
    alcoholic_ketoacidosis: {positive_LR: 5.0, negative_LR: 0.3}
    starvation_ketosis: {positive_LR: 2.0, negative_LR: 0.6}

  beta_hydroxybutyrate_above_3:
    diabetic_ketoacidosis: {positive_LR: 15.0, negative_LR: 0.10}
    alcoholic_ketoacidosis: {positive_LR: 6.0, negative_LR: 0.3}
    starvation_ketosis: {positive_LR: 3.0, negative_LR: 0.5}
    hyperosmolar_hyperglycemic_state: {positive_LR: 0.5, negative_LR: 1.5}

  anion_gap_above_12:
    diabetic_ketoacidosis: {positive_LR: 6.0, negative_LR: 0.10}
    lactic_acidosis: {positive_LR: 5.0, negative_LR: 0.3}
    alcoholic_ketoacidosis: {positive_LR: 4.0, negative_LR: 0.4}

  urine_ketones_positive:
    diabetic_ketoacidosis: {positive_LR: 4.0, negative_LR: 0.20}
    alcoholic_ketoacidosis: {positive_LR: 3.0, negative_LR: 0.4}
    starvation_ketosis: {positive_LR: 3.0, negative_LR: 0.4}

  serum_osmolality_above_320:
    hyperosmolar_hyperglycemic_state: {positive_LR: 10.0, negative_LR: 0.2}
    diabetic_ketoacidosis: {positive_LR: 1.5, negative_LR: 0.8}

  hba1c_above_10:
    diabetic_ketoacidosis: {positive_LR: 3.0, negative_LR: 0.5}
    hyperosmolar_hyperglycemic_state: {positive_LR: 3.0, negative_LR: 0.5}

# ============================================================
# LAB REFERENCE RANGES (admission values for DKA patients)
# For benchmarking generated data
# Source: Kitabchi et al. Diabetes Care 2009, clinical studies
# ============================================================
expected_lab_distributions:
  admission:
    Glucose:
      unit: "mg/dL"
      median: 450
      iqr: [350, 600]
      range: [250, 1000]
    pH:
      unit: ""
      median: 7.18
      iqr: [7.05, 7.28]
      range: [6.80, 7.35]
    HCO3:
      unit: "mEq/L"
      median: 10
      iqr: [6, 15]
      range: [2, 20]
    Beta_hydroxybutyrate:
      unit: "mmol/L"
      median: 5.5
      iqr: [3.5, 8.0]
      range: [3.0, 15.0]
    Anion_gap:
      unit: "mEq/L"
      median: 22
      iqr: [18, 28]
      range: [12, 40]
    K:
      unit: "mEq/L"
      median: 5.0
      iqr: [4.2, 5.8]
      range: [2.5, 7.5]
      note: "Often normal/high on admission despite total body depletion; drops with insulin"
    Na:
      unit: "mEq/L"
      median: 131
      iqr: [128, 135]
      range: [120, 145]
      note: "Pseudohyponatremia from hyperglycemia; corrected Na = measured + 1.6*(glucose-100)/100"
    Creatinine:
      unit: "mg/dL"
      median: 1.5
      iqr: [1.0, 2.2]
      range: [0.6, 6.0]
      note: "Elevated due to volume depletion (prerenal AKI)"
    BUN:
      unit: "mg/dL"
      median: 28
      iqr: [18, 40]
      range: [10, 80]
    Phosphate:
      unit: "mg/dL"
      median: 4.5
      iqr: [3.0, 6.0]
      range: [1.5, 8.0]
      note: "Often normal/high initially; drops with insulin treatment"
    Lactate:
      unit: "mmol/L"
      median: 2.0
      iqr: [1.2, 3.5]
      range: [0.5, 10.0]
    WBC:
      unit: "/uL"
      median: 14000
      iqr: [10000, 20000]
      range: [5000, 35000]
      note: "Leukocytosis common even without infection (stress response)"
    HbA1c:
      unit: "%"
      median: 11.5
      iqr: [9.5, 13.5]
      range: [7.0, 16.0]

  discharge:
    Glucose:
      unit: "mg/dL"
      median: 160
      iqr: [120, 200]
    pH:
      unit: ""
      median: 7.40
      iqr: [7.37, 7.43]
    HCO3:
      unit: "mEq/L"
      median: 22
      iqr: [20, 25]
    Anion_gap:
      unit: "mEq/L"
      median: 10
      iqr: [8, 12]
    K:
      unit: "mEq/L"
      median: 4.0
      iqr: [3.8, 4.5]
    Creatinine:
      unit: "mg/dL"
      median: 0.9
      iqr: [0.7, 1.2]

# ============================================================
# VITAL SIGN DISTRIBUTIONS
# Source: Clinical studies on DKA
# ============================================================
expected_vital_distributions:
  admission:
    temperature:
      unit: "C"
      mean: 37.0
      sd: 0.6
      range: [35.5, 39.0]
      note: "Often normothermic or hypothermic; fever suggests infection as trigger"
    heart_rate:
      unit: "bpm"
      mean: 110
      sd: 18
      range: [70, 150]
      note: "Tachycardia from dehydration and acidosis"
    systolic_bp:
      unit: "mmHg"
      mean: 110
      sd: 22
      range: [70, 170]
      note: "Often low-normal from volume depletion"
    respiratory_rate:
      unit: "/min"
      mean: 24
      sd: 6
      range: [16, 40]
      note: "Kussmaul breathing (deep, rapid) is classic compensatory response"
    spo2:
      unit: "%"
      mean: 97
      sd: 2
      range: [90, 100]
      note: "Usually preserved unless pulmonary complication"

# ============================================================
# TREATMENT REFERENCE — Drug / fluid / insulin protocols
# Source: ADA DKA Guidelines (Kitabchi et al. 2009),
#         JDS Guidelines, Umpierrez & Korytkowski 2016
# ============================================================
drugs:
  first_line:
    japan:
      - drug: "Regular insulin (continuous IV)"
        code_yj: "2491404"
        dose: "0.1 U/kg/h continuous infusion"
        route: IV
        note: "Start after confirming K >= 3.3 mEq/L"
      - drug: "Normal saline"
        code_yj: "3311401"
        dose: "1000mL/h x 1h, then 500mL/h x 4h, then 250mL/h"
        route: IV
      - drug: "Potassium chloride"
        code_yj: "3319501"
        dose: "20-40 mEq/L in IV fluids"
        route: IV
        note: "Hold if K > 5.3; increase if K < 3.3"

    us:
      - drug: "Regular insulin (continuous IV)"
        code_rxnorm: "311034"
        dose: "0.1 U/kg/h continuous infusion (or 0.14 U/kg/h without bolus)"
        route: IV
        note: "ADA protocol: 0.1 U/kg bolus then 0.1 U/kg/h, OR 0.14 U/kg/h no bolus"
      - drug: "Normal saline (0.9% NaCl)"
        code_rxnorm: "313002"
        dose: "15-20 mL/kg/h x 1h (1-1.5L), then 250-500 mL/h"
        route: IV
      - drug: "Potassium chloride"
        code_rxnorm: "8591"
        dose: "20-40 mEq/L added to IV fluids"
        route: IV

  glucose_management:
    japan:
      - drug: "D5 half-NS (5% dextrose in 0.45% NaCl)"
        dose: "250 mL/h"
        route: IV
        indication: "glucose < 250 mg/dL"
        note: "Switch from NS to D5 when glucose approaches 200-250"
    us:
      - drug: "D5 half-NS (5% dextrose in 0.45% NaCl)"
        code_rxnorm: "308971"
        dose: "150-250 mL/h"
        route: IV
        indication: "glucose < 200 mg/dL (ADA: 200 for DKA)"

  bicarbonate:
    japan:
      - drug: "Sodium bicarbonate"
        code_yj: "3319002"
        dose: "100 mEq in 400mL sterile water + 20mEq KCl, infuse over 2h"
        route: IV
        indication: "pH < 6.9 ONLY"
        note: "Controversial; only for pH < 6.9. Repeat q2h until pH > 7.0"
    us:
      - drug: "Sodium bicarbonate"
        code_rxnorm: "8782"
        dose: "100 mEq in 400mL sterile water + 20mEq KCl, infuse over 2h"
        route: IV
        indication: "pH < 6.9"

  transition_to_subcutaneous:
    japan:
      - drug: "Insulin glargine"
        code_yj: "2492414"
        dose: "0.2-0.3 U/kg SC daily"
        route: SC
        note: "Give 1-2h before stopping drip; add rapid-acting insulin with meals"
      - drug: "Insulin aspart"
        code_yj: "2492411"
        dose: "Dose per carb counting or sliding scale"
        route: SC
    us:
      - drug: "Insulin glargine"
        code_rxnorm: "261551"
        dose: "0.2-0.3 U/kg SC daily (or resume home dose)"
        route: SC
        note: "Overlap with IV insulin for 1-2h"
      - drug: "Insulin lispro"
        code_rxnorm: "86009"
        dose: "Dose per carb counting or sliding scale"
        route: SC

  discharge_oral:
    japan:
      - drug: "Insulin glargine"
        code_yj: "2492414"
        dose: "Per established regimen"
        duration_days: ongoing
        note: "T1DM: always insulin. T2DM: may add metformin once stable."
    us:
      - drug: "Insulin glargine"
        code_rxnorm: "261551"
        dose: "Per established regimen"
        duration_days: ongoing

# ============================================================
# DRUG INTERACTIONS relevant to DKA treatment
# ============================================================
drug_interactions:
  - drug_a: "Insulin"
    drug_b: "Beta-blockers"
    severity: "moderate"
    effect: "Masked hypoglycemia symptoms, impaired glucose recovery"
    action: "Monitor glucose more frequently"

  - drug_a: "Insulin"
    drug_b: "Corticosteroids"
    severity: "moderate"
    effect: "Hyperglycemia, increased insulin requirement"
    action: "Increase insulin dose; monitor glucose q4h"

  - drug_a: "Potassium chloride IV"
    drug_b: "ACE inhibitors"
    severity: "major"
    effect: "Hyperkalemia risk"
    action: "Monitor K closely; reduce KCl supplementation if needed"

  - drug_a: "Potassium chloride IV"
    drug_b: "Spironolactone"
    severity: "major"
    effect: "Hyperkalemia risk"
    action: "Hold spironolactone during DKA treatment"

  - drug_a: "Metformin"
    drug_b: "IV contrast"
    severity: "major"
    effect: "Lactic acidosis risk"
    action: "Hold metformin 48h before/after contrast"

