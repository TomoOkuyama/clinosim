# Fall From Height (Construction / Industrial, ≥2 meters)
# Major trauma from scaffolding, ladders, elevated work platforms
# Sources: OSHA Fatal Four, Japan Occupational Safety data
disease_id: fall_from_height
chief_complaint:
  en: "Fall from height at work site, multiple trauma"
  ja: "高所墜落による多発外傷（労災）"
department: trauma_surgery
encounter_type: surgical
requires_surgery: true
minimum_severity: moderate
readmission_eligible: false

icd_codes:
  primary: "T07"
  variants:
    - {code: "T07", name: "Multiple injuries, unspecified", probability: 0.40}
    - {code: "S32.0", name: "Fracture of lumbar vertebra", probability: 0.20}
    - {code: "S72.0", name: "Fracture of neck of femur", probability: 0.15}
    - {code: "S22.0", name: "Fracture of thoracic vertebra", probability: 0.15}
    - {code: "S06.9", name: "Intracranial injury, unspecified", probability: 0.10}

incidence:
  japan:
    "0-44": {M: 40, F: 8}
    "45-64": {M: 35, F: 7}
    "65+":   {M: 20, F: 5}
  risk_multipliers:
    - {condition: "F10", multiplier: 2.0}
  trigger_type: "trauma"
  time_of_day_pattern: "day_peak"

severity:
  distribution:
    mild: 0.0
    moderate: 0.45
    severe: 0.55

initial_state_impact:
  moderate:
    inflammation_level: 0.40
    anemia_level: 0.25
    volume_status: -0.25
    perfusion_status: -0.15
    renal_function: -0.05
    anion_gap_status: 0.2     # AG axis: hemorrhagic shock contribution
  severe:
    inflammation_level: 0.60
    anemia_level: 0.40
    volume_status: -0.50
    perfusion_status: -0.35
    renal_function: -0.15
    anion_gap_status: 0.3     # AG axis: severe shock lactate (AG 14-18)

presenting_symptoms:
  - {name: "multiple_trauma", probability: 1.0, severity_range: [0.7, 1.0]}
  - {name: "pain", probability: 1.0, severity_range: [0.8, 1.0]}
  - {name: "spinal_injury", probability: 0.40, severity_range: [0.5, 1.0]}
  - {name: "altered_consciousness", probability: 0.30, severity_range: [0.3, 0.8]}
  - {name: "hypotension", probability: 0.30, severity_range: [0.3, 0.7]}

# ============================================================
# COURSE ARCHETYPES (FP-ARCH-2/3)
# Major polytrauma course: hemorrhage-driven anemia_level + volume_status recover
# with resuscitation/transfusion (anemia slower — marrow response takes days), while
# inflammation_level (SIRS) and perfusion_status normalize. Re-bleed / multi-organ
# failure = gradual_deterioration / sudden_deterioration. Canonical archetype names.
# ============================================================
course_archetypes:
  smooth_recovery:
    probability: 0.38
    description: "Damage-control resuscitation succeeds; shock reverses, hemostasis achieved"
    trajectory:
      volume_status:      {0: 0.00, 1: 0.08, 2: 0.10, 3: 0.10, 5: 0.08, 7: 0.06, 10: 0.04, 14: 0.02}
      perfusion_status:   {0: 0.00, 1: 0.05, 2: 0.06, 3: 0.06, 5: 0.05, 7: 0.04, 10: 0.02, 14: 0.01}
      anemia_level:       {0: 0.03, 1: 0.02, 2: -0.02, 3: -0.03, 5: -0.04, 7: -0.04, 10: -0.03, 14: -0.02}
      inflammation_level: {0: 0.00, 1: -0.02, 2: -0.04, 3: -0.05, 5: -0.05, 7: -0.04, 10: -0.03, 14: -0.02}
    order_modifications: {}
    treatment_modifications: {}

  dip_then_recovery:
    probability: 0.18
    description: "Early shock worsening / transfusion requirement, then hemodynamics stabilize"
    trajectory:
      volume_status:      {0: -0.05, 1: -0.03, 2: 0.02, 3: 0.06, 5: 0.08, 7: 0.06, 10: 0.04, 14: 0.02}
      perfusion_status:   {0: -0.04, 1: -0.03, 2: 0.00, 3: 0.03, 5: 0.05, 7: 0.04, 10: 0.02, 14: 0.01}
      anemia_level:       {0: 0.06, 1: 0.05, 2: 0.02, 3: -0.02, 5: -0.04, 7: -0.04, 10: -0.03, 14: -0.02}
    order_modifications:
      day_2:
        add_labs: ["Hb", "Lactate"]

  plateau_then_recovery:
    probability: 0.13
    description: "Slow recovery from polytrauma; shock indices plateau then improve"
    trajectory:
      volume_status:      {0: -0.02, 1: 0.00, 2: 0.01, 3: 0.02, 5: 0.05, 7: 0.06, 10: 0.05, 14: 0.03}
      perfusion_status:   {0: 0.00, 1: 0.00, 3: 0.01, 5: 0.03, 7: 0.04, 10: 0.03, 14: 0.02}
      anemia_level:       {0: 0.02, 1: 0.02, 3: 0.00, 5: -0.02, 7: -0.03, 10: -0.03, 14: -0.02}
    order_modifications:
      day_3:
        add_labs: ["Hb", "CRP"]

  treatment_resistant:
    probability: 0.13
    description: "Ongoing transfusion need / persistent SIRS; slow resolution after escalation"
    trajectory:
      volume_status:      {0: -0.03, 1: -0.02, 3: 0.00, 5: 0.03, 7: 0.05, 10: 0.05, 14: 0.03}
      anemia_level:       {0: 0.05, 1: 0.04, 3: 0.03, 5: 0.01, 7: -0.01, 10: -0.02, 14: -0.02}
      inflammation_level: {0: 0.03, 1: 0.03, 3: 0.02, 5: 0.01, 7: -0.02, 10: -0.03, 14: -0.03}
    order_modifications:
      day_3:
        add_labs: ["Hb", "Lactate", "CRP"]
        add_consult: ["trauma_surgery"]

  gradual_deterioration:
    probability: 0.12
    description: "Progressive multi-organ dysfunction from persistent shock / hypoperfusion"
    trajectory:
      volume_status:      {0: -0.03, 1: -0.03, 2: -0.03, 3: -0.02, 5: -0.02, 7: -0.02}
      perfusion_status:   {0: -0.04, 1: -0.04, 2: -0.03, 3: -0.03, 5: -0.02, 7: -0.02}
      renal_function:     {0: -0.03, 1: -0.03, 2: -0.02, 3: -0.02, 5: -0.02, 7: -0.01}
      inflammation_level: {0: 0.04, 1: 0.04, 2: 0.03, 3: 0.03, 5: 0.02, 7: 0.02}

  sudden_deterioration:
    probability: 0.06
    description: "Delayed hemorrhage / massive PE with abrupt Day 1-3 collapse"
    trajectory:
      volume_status:      {0: 0.00, 1: -0.10, 2: -0.25, 3: -0.08, 5: 0.03, 7: 0.05}
      perfusion_status:   {0: 0.00, 1: -0.10, 2: -0.25, 3: -0.08, 5: 0.03, 7: 0.04}
      anemia_level:       {0: 0.00, 1: 0.08, 2: 0.15, 3: 0.05, 5: 0.00, 7: -0.02}

# ============================================================
# COMPLICATIONS — hemorrhagic shock / ARDS / AKI / VTE / SSI (drive ICU transfer)
# risk_factor conditions restricted to those _evaluate_risk_condition supports.
# ============================================================
complications:
  - name: "hemorrhagic_shock"
    description: "Ongoing / delayed hemorrhage with hypoperfusion requiring massive transfusion"
    probability_per_day: 0.015
    onset_day_range: [0, 3]
    risk_factors:
      - {condition: "severity_severe", multiplier: 4.0}
      - {condition: "perfusion_status < 0.3", multiplier: 3.0}
    state_impact:
      volume_status: -0.15
      perfusion_status: -0.15
      anemia_level: 0.10
    detection:
      test: "Hb"
      finding: "falling_hemoglobin"
    actions: ["icu_transfer", "activate_massive_transfusion"]

  - name: "acute_respiratory_distress"
    description: "ARDS from pulmonary contusion / transfusion-related lung injury"
    probability_per_day: 0.01
    onset_day_range: [1, 7]
    risk_factors:
      - {condition: "severity_severe", multiplier: 3.5}
    state_impact:
      perfusion_status: -0.12
      inflammation_level: 0.05
    detection:
      test: "Chest_Xray"
      finding: "bilateral_infiltrates"
    actions: ["icu_transfer", "lung_protective_ventilation"]

  - name: "acute_kidney_injury"
    description: "AKI from shock / rhabdomyolysis after crush component"
    probability_per_day: 0.02
    onset_day_range: [1, 7]
    risk_factors:
      - {condition: "severity_severe", multiplier: 3.0}
      - {condition: "perfusion_status < 0.3", multiplier: 2.0}
    state_impact:
      renal_function: -0.06
    detection:
      test: "Creatinine"
      finding: "rising_creatinine"
    actions: ["order_renal_panel"]

  - name: "venous_thromboembolism"
    description: "DVT / PE from immobility and trauma hypercoagulability"
    probability_per_day: 0.008
    onset_day_range: [3, 14]
    risk_factors:
      - {condition: "immobility_days > 3", multiplier: 2.5}
    state_impact:
      perfusion_status: -0.04
    detection:
      test: "lower_extremity_doppler"
      finding: "deep_vein_thrombosis"
    actions: ["order_doppler"]

  - name: "surgical_site_infection"
    description: "Deep or superficial surgical site infection after fracture fixation"
    probability_per_day: 0.01
    onset_day_range: [3, 14]
    risk_factors:
      - {condition: "severity_severe", multiplier: 2.0}
      - {condition: "immobility_days > 3", multiplier: 1.5}
    state_impact:
      inflammation_level: 0.06
    detection:
      test: "CRP"
      finding: "rising_crp"
    actions: ["order_wound_culture", "start_antibiotics"]

order_protocols:
  admission_orders:
    labs:
      - {test: "CRP", urgency: "stat"}
      - {test: "WBC", urgency: "stat"}
      - {test: "Hb", urgency: "stat"}
      - {test: "Plt", urgency: "stat"}
      - {test: "Creatinine", urgency: "stat"}
      - {test: "Na", urgency: "stat"}
      - {test: "K", urgency: "stat"}
      - {test: "PT_INR", urgency: "stat"}
      - {test: "Lactate", urgency: "stat"}
      - {test: "Blood_Type_Crossmatch", urgency: "stat"}
    imaging:
      - {test: "FAST_Ultrasound", urgency: "stat"}
      - {test: "CT_Whole_Body", urgency: "stat", note: "pan-scan"}
      - {test: "Cervical_Spine_CT", urgency: "stat"}
      - {test: "Chest_Xray", urgency: "stat"}
      - {test: "Pelvis_Xray", urgency: "stat"}
    supportive:
      - {type: "IV_fluid", detail: "NS or LR wide open, titrate to MAP > 65"}
      - {type: "cervical_immobilization", detail: "Cervical collar until cleared"}
      - {type: "pain_management", detail: "Fentanyl 25-50mcg IV PRN"}
      - {type: "DVT_prophylaxis", detail: "Sequential compression devices initially"}
      - {type: "urinary_catheter", detail: "Foley catheter"}
  daily_monitoring:
    labs:
      - {test: "CRP", frequency: "daily"}
      - {test: "Hb", frequency: "q6-8h first 48h"}
      - {test: "Creatinine", frequency: "daily"}
    vitals:
      stable: "q2h"
      icu: "continuous"
  discharge_criteria:
    japan:
      - "Hemodynamically stable"
      - "Pain controlled on oral analgesics"
      - "Mobility plan / brace in place"
      - "Rehab plan established"
    us:
      - "Hemodynamically stable"
      - "Pain controlled on oral meds"
      - "Safe discharge destination"

drugs:
  first_line:
    japan:
      - {drug: "Fentanyl", dose: "25-50mcg IV q1h PRN", route: "IV"}
      - {drug: "Acetaminophen", dose: "1000mg IV q6h", route: "IV"}
      - {drug: "Cefazolin", dose: "1g IV q8h", note: "surgical prophylaxis"}
      - {drug: "Famotidine", dose: "20mg IV q12h"}
    us:
      - {drug: "Fentanyl", dose: "25-100mcg IV q1h PRN", route: "IV"}
      - {drug: "Acetaminophen", dose: "1000mg IV q6h", route: "IV"}
      - {drug: "Cefazolin", dose: "2g IV q8h"}
      - {drug: "Pantoprazole", dose: "40mg IV daily"}
  post_op:
    japan:
      - {drug: "Acetaminophen", dose: "1000mg PO q6h"}
      - {drug: "Enoxaparin", dose: "2000IU SC daily"}
      - {drug: "Loxoprofen", dose: "60mg PO tid"}
    us:
      - {drug: "Oxycodone", dose: "5-10mg PO q4-6h PRN"}
      - {drug: "Acetaminophen", dose: "1000mg PO q6h"}
      - {drug: "Enoxaparin", dose: "40mg SC daily"}

procedure:
  type: "orthopedic fracture fixation"
  procedure_code_jp: "K081"
  procedure_code_us: "22325"
  typical_duration_minutes: {mean: 180, sd: 90, min: 60, max: 480}
