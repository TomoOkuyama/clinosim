      moderate: "症状は数日前より出現し漸次増悪。"
      severe: "症状急速に増悪、本日受診。"
    trigger_options:
      - "急性発症"
  physical_exam_findings:
    smooth_recovery:
      day_0:
        general:
          all: "意識清明、苦痛様"
        cardiovascular:
          all: "整、心雑音なし"
        respiratory:
          all: "肺音清明"
        abdominal: "平坦、軟、圧痛なし"
        neurological: "麻痺なし、項部硬直なし"
  discharge_instructions:
