# ============================================================
# CLINICAL COURSE ARCHETYPES (daily state variable changes)
# Each archetype defines day-by-day deltas for physiological state variables.
# Disease authors specify these trajectories — the engine interpolates between days.
# Patient profile (immune_reactivity, treatment_sensitivity) modulates amplitude.
# ============================================================
course_archetypes:
  smooth_recovery:
    probability: 0.55
    description: "Bleeding controlled by endoscopy/PPI; steady Hb recovery"
    trajectory:
      anemia_level: {0: 0.05, 1: 0.00, 2: -0.03, 3: -0.05, 5: -0.05, 7: -0.04, 10: -0.03, 14: -0.02}
      volume_status: {0: 0.05, 1: 0.05, 2: 0.03, 3: 0.02, 5: 0.01, 7: 0.00, 10: 0.00, 14: 0.00}
      perfusion_status: {0: 0.02, 1: 0.02, 2: 0.01, 3: 0.01, 5: 0.00, 7: 0.00, 10: 0.00, 14: 0.00}
      inflammation_level: {0: 0.00, 1: -0.01, 2: -0.01, 3: -0.01, 5: -0.01, 7: 0.00, 10: 0.00, 14: 0.00}
      renal_function: {0: 0.00, 1: 0.01, 2: 0.01, 3: 0.01, 5: 0.01, 7: 0.00, 10: 0.00, 14: 0.00}
    order_modifications: {}
    treatment_modifications: {}

  dip_then_recovery:
    probability: 0.15
    description: "Initial stabilization then rebleed Day 2-3, controlled by repeat endoscopy"
    trajectory:
      anemia_level: {0: 0.05, 1: -0.02, 2: 0.15, 3: 0.05, 5: -0.05, 7: -0.05, 10: -0.04, 14: -0.03}
      volume_status: {0: 0.05, 1: 0.03, 2: -0.10, 3: 0.05, 5: 0.03, 7: 0.01, 10: 0.00, 14: 0.00}
      perfusion_status: {0: 0.02, 1: 0.01, 2: -0.10, 3: 0.02, 5: 0.02, 7: 0.01, 10: 0.00, 14: 0.00}
      renal_function: {0: 0.00, 1: 0.01, 2: -0.05, 3: 0.00, 5: 0.01, 7: 0.01, 10: 0.01, 14: 0.00}
    order_modifications:
      day_2:
        add_labs: ["Hb_stat", "Type_and_crossmatch"]
        add_procedures: ["Repeat_upper_endoscopy"]
    treatment_modifications:
      day_2:
        add_transfusion: {detail: "pRBC 2 units for rebleed"}
        add_fluid: {detail: "NS 500mL bolus"}

  plateau:
    probability: 0.10
    description: "Bleeding stops but Hb remains low; slow recovery over extended stay"
    trajectory:
      anemia_level: {0: 0.02, 1: 0.00, 2: 0.00, 3: 0.00, 5: -0.01, 7: -0.02, 10: -0.03, 14: -0.03}
      volume_status: {0: 0.03, 1: 0.02, 2: 0.01, 3: 0.00, 5: 0.00, 7: 0.00, 10: 0.00, 14: 0.00}
      perfusion_status: {0: 0.01, 1: 0.01, 2: 0.00, 3: 0.00, 5: 0.00, 7: 0.00, 10: 0.00, 14: 0.00}
    order_modifications:
      day_5:
        add_labs: ["Reticulocyte_count", "Iron_studies", "Ferritin"]
    treatment_modifications:
      day_3:
        start:
          japan: [{drug: "Ferrous_fumarate", dose: "200mg PO daily"}]
          us: [{drug: "Ferrous_sulfate", dose: "325mg PO daily"}]

  treatment_resistant:
    probability: 0.10
    description: "Endoscopic hemostasis fails; requires interventional radiology or surgery"
    trajectory:
      anemia_level: {0: 0.08, 1: 0.05, 2: 0.05, 3: -0.02, 5: -0.05, 7: -0.05, 10: -0.04, 14: -0.03}
      volume_status: {0: -0.05, 1: -0.03, 2: -0.02, 3: 0.05, 5: 0.03, 7: 0.01, 10: 0.00, 14: 0.00}
      perfusion_status: {0: -0.05, 1: -0.05, 2: -0.03, 3: 0.03, 5: 0.02, 7: 0.01, 10: 0.00, 14: 0.00}
      renal_function: {0: -0.03, 1: -0.02, 2: -0.01, 3: 0.01, 5: 0.01, 7: 0.01, 10: 0.01, 14: 0.00}
    order_modifications:
      day_2:
        add_labs: ["Hb_stat", "Lactate", "Type_and_crossmatch"]
        add_imaging: ["CT_angiography"]
        add_consult: ["interventional_radiology", "surgery"]
    treatment_modifications:
      day_2:
        add_transfusion: {detail: "pRBC 4 units, FFP 2 units (massive transfusion protocol)"}
        action: "interventional_radiology_embolization"
    triggers:
      - day: 2
        condition: "anemia_level > 0.7 and perfusion_status < 0.4"
        actions: ["interventional_radiology", "consider_surgery"]

  gradual_deterioration:
    probability: 0.07
    description: "Ongoing slow bleed -> progressive organ dysfunction -> ICU"
    trajectory:
      anemia_level: {0: 0.08, 1: 0.05, 2: 0.05, 3: 0.03, 5: 0.02, 7: 0.00, 10: -0.02, 14: -0.02}
      volume_status: {0: -0.05, 1: -0.03, 2: -0.03, 3: -0.02, 5: -0.01, 7: 0.00, 10: 0.01, 14: 0.01}
      perfusion_status: {0: -0.05, 1: -0.05, 2: -0.03, 3: -0.03, 5: -0.02, 7: -0.01, 10: 0.01, 14: 0.01}
      renal_function: {0: -0.03, 1: -0.03, 2: -0.03, 3: -0.02, 5: -0.01, 7: 0.00, 10: 0.01, 14: 0.01}
    order_modifications:
      day_3:
        add_labs: ["Hb_stat", "Lactate", "ABG"]
        add_procedures: ["Repeat_upper_endoscopy"]
      day_5:
        add_labs: ["Lactate", "ABG"]
        add_imaging: ["CT_angiography"]
    treatment_modifications:
      day_3:
        add_transfusion: {detail: "pRBC 2 units"}
      day_5:
        action: "icu_transfer"
        add_transfusion: {detail: "massive_transfusion_protocol"}
    triggers:
      - day: 5
        condition: "perfusion_status < 0.35"
        actions: ["icu_transfer", "interventional_radiology_or_surgery"]

  sudden_deterioration:
    probability: 0.03
    description: "Sudden massive hemorrhage (e.g., variceal rupture, Dieulafoy lesion) on Day 1-2"
    trajectory:
      anemia_level: {0: 0.05, 1: 0.30, 2: 0.05, 3: -0.05, 5: -0.05, 7: -0.04, 10: -0.03, 14: -0.02}
      volume_status: {0: 0.00, 1: -0.30, 2: 0.10, 3: 0.05, 5: 0.02, 7: 0.01, 10: 0.00, 14: 0.00}
      perfusion_status: {0: 0.00, 1: -0.30, 2: 0.05, 3: 0.05, 5: 0.03, 7: 0.02, 10: 0.01, 14: 0.00}
      renal_function: {0: 0.00, 1: -0.15, 2: -0.05, 3: 0.02, 5: 0.02, 7: 0.02, 10: 0.01, 14: 0.01}
      ph_status: {0: 0.00, 1: -0.10, 2: -0.03, 3: 0.02, 5: 0.02, 7: 0.01, 10: 0.00, 14: 0.00}
    order_modifications:
      day_1:
        add_labs: ["Hb_stat", "ABG", "Lactate", "Type_and_crossmatch", "Fibrinogen"]
        add_procedures: ["Emergency_endoscopy"]
    treatment_modifications:
      day_1:
        action: "icu_transfer"
        add_transfusion: {detail: "massive_transfusion_protocol"}
        start:
          japan:
            - {drug: "Norepinephrine", dose: "0.05ug/kg/min IV drip"}
          us:
            - {drug: "Norepinephrine", dose: "0.05ug/kg/min IV drip"}
        action_2: "intubation_evaluation"
    triggers:
      - day: 1
        condition: "perfusion_status < 0.3"
        actions: ["icu_transfer", "massive_transfusion", "emergency_endoscopy", "intubation_evaluation"]

# Archetype selection modifiers (patient profile dependent)
archetype_modifiers:
  - condition: "liver_cirrhosis"
    effect: {sudden_deterioration: 0.08, smooth_recovery: -0.08}
  - condition: "anticoagulant_use"
    effect: {treatment_resistant: 0.05, dip_then_recovery: 0.05, smooth_recovery: -0.10}
  - condition: "age >= 80"
    effect: {gradual_deterioration: 0.05, smooth_recovery: -0.05}
  - condition: "peptic_ulcer_history"
    effect: {dip_then_recovery: 0.05, smooth_recovery: -0.05}

# ============================================================
# COMPLICATIONS (secondary events during hospitalization)
# Each complication has: trigger conditions, timing, probability,
# physiological impact, and detection/treatment actions.
# Complications can themselves trigger further complications (cascade).
# ============================================================
complications:
  - name: "rebleeding"
    description: "Recurrence of GI hemorrhage after initial hemostasis"
    probability_per_day: 0.02
    onset_day_range: [1, 7]
    risk_factors:
      - {condition: "ulcer_with_visible_vessel", multiplier: 3.0}
      - {condition: "variceal_source", multiplier: 2.5}
      - {condition: "anticoagulant_use", multiplier: 2.0}
      - {condition: "coagulopathy", multiplier: 2.5}
      - {condition: "age_over_75", multiplier: 1.5}
    state_impact:
      anemia_level: 0.20
      volume_status: -0.15
      perfusion_status: -0.10
    detection:
      test: "hemoglobin_and_vitals"
      finding: "Hb_drop_or_hematemesis_recurrence"
    actions: ["repeat_endoscopy", "transfuse_prbc", "consider_interventional_radiology"]
    cascade: ["hemorrhagic_shock"]

  - name: "hemorrhagic_shock"
    description: "Severe hypovolemic shock from massive blood loss"
    probability_given_parent: 0.10
    parent_complication: "rebleeding"
    onset_days_after_parent: [0, 1]
    state_impact:
      perfusion_status: -0.30
      renal_function: -0.15
      ph_status: -0.10
    actions: ["massive_transfusion_protocol", "icu_transfer", "vasopressors", "emergency_surgery_or_IR"]

  - name: "aspiration_pneumonia"
    description: "Aspiration of blood or gastric contents during hematemesis"
    probability_per_day: 0.008
    onset_day_range: [0, 3]
    risk_factors:
      - {condition: "hematemesis", multiplier: 3.0}
      - {condition: "altered_consciousness", multiplier: 4.0}
      - {condition: "age_over_75", multiplier: 2.0}
      - {condition: "hepatic_encephalopathy", multiplier: 3.0}
    state_impact:
      inflammation_level: 0.20
      perfusion_status: -0.05
    detection:
      test: "chest_xray"
      finding: "new_infiltrate"
    actions: ["start_antibiotic", "oxygen_supplementation", "respiratory_monitoring"]

  - name: "transfusion_reaction"
    description: "Adverse reaction to blood product transfusion"
    probability_per_day: 0.005
    onset_day_range: [0, 7]
    risk_factors:
      - {condition: "multiple_transfusions", multiplier: 2.0}
      - {condition: "prior_transfusion_reaction", multiplier: 5.0}
    state_impact:
      inflammation_level: 0.10
    detection:
      test: "vitals_and_symptoms"
      finding: "fever_urticaria_or_dyspnea_during_transfusion"
    actions: ["stop_transfusion", "antihistamine", "reassess_blood_compatibility"]

  - name: "acute_kidney_injury"
    description: "Pre-renal AKI from hypoperfusion due to blood loss"
    probability_per_day: 0.012
    onset_day_range: [1, 5]
    risk_factors:
      - {condition: "renal_function < 0.5", multiplier: 3.0}
      - {condition: "volume_status < -0.3", multiplier: 2.5}
      - {condition: "age_over_75", multiplier: 1.5}
      - {condition: "NSAID_use", multiplier: 2.0}
    state_impact:
      renal_function: -0.15
      ph_status: -0.05
    detection:
      test: "creatinine"
      finding: "rise_above_0.3_from_baseline"
    actions: ["aggressive_iv_fluid", "hold_nephrotoxic_drugs", "monitor_urine_output"]

  - name: "hepatic_encephalopathy"
    description: "Encephalopathy triggered by blood protein load in cirrhotic patients"
    probability_per_day: 0.010
    onset_day_range: [1, 5]
    risk_factors:
      - {condition: "liver_cirrhosis", multiplier: 10.0}
      - {condition: "portal_hypertension", multiplier: 5.0}
    state_impact:
      inflammation_level: 0.05
    detection:
      test: "mental_status_and_ammonia"
      finding: "confusion_asterixis_elevated_ammonia"
    actions: ["lactulose", "rifaximin", "protein_restriction"]

  - name: "dvt"
    description: "Deep vein thrombosis from immobility"
    probability_per_day: 0.005
    onset_day_range: [3, 14]
    risk_factors:
      - {condition: "immobility_days > 3", multiplier: 2.0}
      - {condition: "dvt_susceptibility > 0.3", multiplier: 2.0}
      - {condition: "no_dvt_prophylaxis", multiplier: 3.0}
    note: "DVT prophylaxis often held due to active bleeding"
    state_impact:
      coagulation_status: 0.05
    detection:
      test: "d_dimer_then_ultrasound"
      finding: "dvt_confirmed"
    actions: ["evaluate_bleeding_risk_vs_anticoagulation", "IVC_filter_if_contraindicated"]
    cascade: ["pulmonary_embolism"]

  - name: "pulmonary_embolism"
    description: "PE from DVT embolization"
    probability_given_parent: 0.10
    parent_complication: "dvt"
    onset_days_after_parent: [0, 7]
    state_impact:
      perfusion_status: -0.20
      ph_status: -0.05
    actions: ["ct_angiography", "evaluate_anticoagulation_vs_IVC_filter", "consider_icu"]

# ============================================================
# DIFFERENTIAL DIAGNOSIS
# For LLM-driven clinical reasoning and documentation
# ============================================================
differential_diagnosis:
  - diagnosis: "Peptic ulcer bleeding (gastric/duodenal)"
    probability: 0.35
    distinguishing_features: ["epigastric pain", "NSAID or H. pylori history", "EGD confirms ulcer"]
  - diagnosis: "Esophageal or gastric variceal bleeding"
    probability: 0.15
    distinguishing_features: ["known liver cirrhosis", "massive hematemesis", "spider angiomata", "ascites"]
  - diagnosis: "Mallory-Weiss tear"
    probability: 0.08
    distinguishing_features: ["preceded by vomiting or retching", "self-limited", "EGD shows mucosal tear at GEJ"]
  - diagnosis: "Diverticular bleeding (lower GI)"
    probability: 0.12
    distinguishing_features: ["painless hematochezia", "older patient", "colonoscopy confirms"]
  - diagnosis: "Colorectal malignancy"
    probability: 0.08
    distinguishing_features: ["weight loss", "iron deficiency anemia", "change in bowel habits", "colonoscopy with mass"]
  - diagnosis: "Angiodysplasia"
    probability: 0.05
    distinguishing_features: ["recurrent occult or overt bleeding", "elderly", "CKD or aortic stenosis"]
  - diagnosis: "Erosive gastritis/esophagitis"
    probability: 0.10
    distinguishing_features: ["diffuse mucosal erosions on EGD", "NSAID or alcohol use", "usually less severe"]
  - diagnosis: "Dieulafoy lesion"
    probability: 0.03
    distinguishing_features: ["massive arterial bleeding", "small submucosal vessel", "difficult to locate on EGD"]
  - diagnosis: "Aortoenteric fistula"
    probability: 0.02
    distinguishing_features: ["prior aortic surgery", "herald bleed then massive hemorrhage", "CT angiography"]
  - diagnosis: "Upper GI malignancy (gastric/esophageal cancer)"
    probability: 0.02
    distinguishing_features: ["weight loss", "dysphagia", "mass on EGD"]

