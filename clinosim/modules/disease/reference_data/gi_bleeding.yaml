# Gastrointestinal Bleeding — Complete Reference Data
# Sources cited per section. All rates are approximate and should be validated
# against the most current published data before production use.

disease_id: gi_bleeding
chief_complaint:
  en: "Hematemesis, melena, dizziness, syncope"
  ja: "吐血・下血（タール便）・めまい・失神"
department: gastroenterology
encounter_type: medical
requires_surgery: false  # endoscopy is interventional, not surgical
readmission_eligible: true  # high readmission rate ~15%

icd_codes:
  primary: "K92.2"  # Gastrointestinal hemorrhage, unspecified
  variants:
    - {code: "K92.0", name: "Hematemesis", probability: 0.25}
    - {code: "K92.1", name: "Melena", probability: 0.20}
    - {code: "K25.4", name: "Acute gastric ulcer with hemorrhage", probability: 0.20}
    - {code: "K26.4", name: "Acute duodenal ulcer with hemorrhage", probability: 0.15}
    - {code: "K22.6", name: "Gastro-esophageal laceration-hemorrhage syndrome (Mallory-Weiss)", probability: 0.08}
    - {code: "I85.01", name: "Esophageal varices with bleeding", probability: 0.07}
    - {code: "K57.31", name: "Diverticulosis of large intestine with bleeding", probability: 0.05}

# ============================================================
# INCIDENCE (per 100,000 per year, by age band and sex)
# Source: JP — DPC data, JGES registry
#         US — Laine et al. Am J Gastroenterol 2012, Peery et al. Gastroenterology 2019
# ============================================================
incidence:
  japan:
    "0-4":   {M: 2, F: 1}
    "5-14":  {M: 3, F: 2}
    "15-24": {M: 10, F: 5}
    "25-34": {M: 20, F: 10}
    "35-44": {M: 40, F: 20}
    "45-54": {M: 80, F: 40}
    "55-64": {M: 150, F: 80}
    "65-74": {M: 300, F: 180}
    "75-84": {M: 500, F: 350}
    "85+":   {M: 700, F: 500}
  us:
    "0-4":   {M: 2, F: 1}
    "5-14":  {M: 3, F: 2}
    "15-24": {M: 12, F: 6}
    "25-34": {M: 25, F: 12}
    "35-44": {M: 45, F: 25}
    "45-54": {M: 90, F: 50}
    "55-64": {M: 160, F: 90}
    "65-74": {M: 320, F: 200}
    "75-84": {M: 520, F: 380}
    "85+":   {M: 750, F: 550}

  risk_multipliers:
    - {condition: "peptic_ulcer_history", multiplier: 5.0}
    - {condition: "liver_cirrhosis", multiplier: 6.0}
    - {condition: "NSAID_use", multiplier: 4.0}
    - {condition: "anticoagulant_use", multiplier: 3.0}
    - {condition: "antiplatelet_use", multiplier: 2.5}
    - {condition: "H_pylori_positive", multiplier: 3.0}
    - {condition: "alcohol_dependence", multiplier: 3.0}
    - {condition: "CKD", multiplier: 2.0}
    - {condition: "heart_failure", multiplier: 1.5}
    - {condition: "prior_gi_bleed", multiplier: 4.0}
    - {condition: "coagulopathy", multiplier: 3.5}

  seasonal_curve:  # monthly multiplier (1.0 = baseline); minimal seasonality
    1: 1.05
    2: 1.05
    3: 1.0
    4: 1.0
    5: 1.0
    6: 0.95
    7: 0.95
    8: 0.95
    9: 1.0
    10: 1.0
    11: 1.05
    12: 1.1   # Dec — holiday alcohol/NSAID use

  vaccine_protection: {}  # no vaccine relevant

# ============================================================
# SEVERITY DISTRIBUTION
# Source: Rockall score distribution studies, Blatchford score validation
# ============================================================
severity:
  distribution:
    mild: 0.25        # self-limited, stable hemodynamics
    moderate: 0.55    # requires hospitalization and endoscopy
    severe: 0.20      # hemodynamic instability, transfusion, ICU
  modifiers:
    - {condition: "age_over_75", mild_multiplier: 0.5, severe_multiplier: 2.0}
    - {condition: "liver_cirrhosis", mild_multiplier: 0.3, severe_multiplier: 2.5}
    - {condition: "anticoagulant_use", moderate_multiplier: 1.3, severe_multiplier: 1.8}
    - {condition: "coagulopathy", severe_multiplier: 2.0, mild_multiplier: 0.4}
    - {condition: "CKD", severe_multiplier: 1.5}

# ============================================================
# DIAGNOSTIC DIFFICULTY
# Source: Clinical experience; EGD required for definitive source ID
# ============================================================
diagnostic_difficulty: 0.35

# ============================================================
# INITIAL PHYSIOLOGICAL STATE IMPACT
# How this disease changes physiological state at onset (added to patient baseline)
# Key pathophysiology: acute blood loss -> anemia, hypovolemia, hypoperfusion
# ============================================================
initial_state_impact:
  # anemia_level → Hb = base_hb(15 M / 13 F) * (1 - anemia*0.7).
  # Acute GI hemorrhage should present anemic; mild self-limited bleeds still
  # drop into the low-normal/mildly-anemic range, moderate below the ~8 g/dL
  # transfusion-consideration band, severe near the <7 g/dL transfusion trigger.
  mild:
    anemia_level: 0.32     # Hb ~10–11.6 g/dL
    volume_status: -0.10
    inflammation_level: 0.05
  moderate:
    anemia_level: 0.52     # Hb ~8.4–9.8 g/dL
    volume_status: -0.25
    perfusion_status: -0.10
    inflammation_level: 0.10
    renal_function: -0.05
  severe:
    anemia_level: 0.72     # Hb ~6.5–7.4 g/dL
    volume_status: -0.40
    perfusion_status: -0.25
    inflammation_level: 0.15
    renal_function: -0.15
    ph_status: -0.10

# ============================================================
# ORDER PROTOCOLS (what to order and when)
# All admission orders, daily monitoring, and discharge criteria
# are defined here — the engine reads this, not hardcoded.
# ============================================================
order_protocols:
  admission_orders:
    labs:
      - {test: "Hb", urgency: "stat"}
      - {test: "Hct", urgency: "stat"}
      - {test: "Plt", urgency: "stat"}
      - {test: "PT_INR", urgency: "stat"}
      - {test: "APTT", urgency: "stat"}
      - {test: "BUN", urgency: "stat"}
      - {test: "Creatinine", urgency: "stat"}
      - {test: "Na", urgency: "stat"}
      - {test: "K", urgency: "stat"}
      - {test: "Type_and_crossmatch", urgency: "stat"}
      - {test: "Lactate", urgency: "stat", probability: 0.70}
      - {test: "Albumin", urgency: "stat", probability: 0.60}
      - {test: "AST", urgency: "stat", probability: 0.70}
      - {test: "ALT", urgency: "stat", probability: 0.70}
      - {test: "Total_bilirubin", urgency: "stat", probability: 0.60}
    imaging:
      - {test: "Chest_Xray_PA", urgency: "routine", probability: 0.50}
    procedures:
      - {test: "Upper_endoscopy_EGD", urgency: "urgent", probability: 0.80,
         note: "Within 24h for non-variceal; within 12h for variceal"}
      - {test: "Colonoscopy", urgency: "semi_urgent", probability: 0.30,
         note: "If upper GI source not identified"}
      - {test: "CT_angiography", urgency: "stat", probability: 0.10,
         note: "If massive bleeding with hemodynamic instability"}
    supportive:
      - {type: "IV_fluid", detail: "NS or LR 500-1000mL bolus, then 125-250mL/h"}
      - {type: "NPO", detail: "Nothing by mouth pending endoscopy"}
      - {type: "large_bore_IV", detail: "Two large-bore (16-18G) peripheral IVs"}
      - {type: "PPI", detail: "Omeprazole 80mg IV bolus, then 8mg/h continuous infusion"}
      - {type: "hold_anticoagulants", detail: "Hold warfarin, DOACs, heparin"}
      - {type: "transfusion", detail: "pRBC if Hb < 7g/dL (or < 8 if cardiac comorbidity)"}

  daily_monitoring:
    labs:
      - {test: "Hb", frequency: "q6h_first_24h_then_daily"}
      - {test: "Hct", frequency: "q6h_first_24h_then_daily"}
      - {test: "BUN", frequency: "daily"}
      - {test: "Creatinine", frequency: "daily"}
      - {test: "PT_INR", frequency: "daily", condition: "if on anticoagulant or coagulopathy"}
    vitals:
      stable: "q4h"
      unstable: "q1h"
      note: "Include orthostatic vitals when able to stand"
    stool:
      - {test: "Stool_color_and_consistency", frequency: "each_bowel_movement"}

  trigger_orders:
    hb_drop_2_from_baseline:
      condition: "Hb drop >= 2 g/dL from admission"
      actions:
        - {type: "lab", test: "Hb_stat"}
        - {type: "lab", test: "Type_and_crossmatch_recheck"}
        - {type: "transfusion", action: "transfuse_pRBC"}
        - {type: "evaluate", action: "consider_repeat_endoscopy_or_interventional_radiology"}
    hemodynamic_instability:
      condition: "SBP < 90 or HR > 110 despite resuscitation"
      actions:
        - {type: "fluid", action: "aggressive_IV_resuscitation"}
        - {type: "transfusion", action: "transfuse_pRBC_and_FFP"}
        - {type: "imaging", test: "CT_angiography"}
        - {type: "evaluate", action: "consider_ICU_transfer"}
    rebleeding:
      condition: "Recurrent hematemesis or melena with Hb drop after initial stabilization"
      actions:
        - {type: "procedure", test: "Repeat_endoscopy"}
        - {type: "evaluate", action: "consider_interventional_radiology_embolization"}
        - {type: "evaluate", action: "consider_surgical_consult"}

  discharge_criteria:
    japan:
      - "No evidence of active bleeding for >= 72 hours"
      - "Hb stable (< 0.5 g/dL drop over 24h) for 48 hours"
      - "Tolerating oral diet for 24 hours"
      - "Hemodynamically stable off IV fluids"
      - "PT-INR corrected (if applicable)"
      - "Endoscopic hemostasis confirmed successful"
      - "ADL independent or with available support"
    us:
      - "No evidence of active bleeding for >= 24 hours"
      - "Hb stable for 24 hours"
      - "Tolerating oral PPI and diet"
      - "Hemodynamically stable"
      - "Follow-up arranged within 7 days"

# ============================================================
# LIKELIHOOD RATIO TABLE
# Source: Clinical diagnostic studies
#         Srygley et al. JAMA 2012 (systematic review of UGIB diagnosis)
# ============================================================
likelihood_ratios:
  melena_on_exam:
    upper_gi_bleed: {positive_LR: 5.1, negative_LR: 0.5}
    lower_gi_bleed: {positive_LR: 0.3, negative_LR: 1.2}

  hematemesis:
    upper_gi_bleed: {positive_LR: 10.0, negative_LR: 0.6}
    lower_gi_bleed: {positive_LR: 0.05, negative_LR: 1.1}

  bun_creatinine_ratio_above_30:
    upper_gi_bleed: {positive_LR: 7.5, negative_LR: 0.5}
    lower_gi_bleed: {positive_LR: 0.5, negative_LR: 1.3}

  nasogastric_aspirate_bloody:
    upper_gi_bleed: {positive_LR: 11.0, negative_LR: 0.6}

  nasogastric_aspirate_clear:
    upper_gi_bleed: {positive_LR: 0.5, negative_LR: 1.5}
    note: "Clear aspirate does not rule out duodenal source"

  bright_red_blood_per_rectum:
    lower_gi_bleed: {positive_LR: 3.0, negative_LR: 0.6}
    upper_gi_bleed: {positive_LR: 0.8, negative_LR: 1.0}
    note: "Massive UGIB can present with hematochezia"

  spider_angiomata_or_ascites:
    variceal_bleed: {positive_LR: 5.0, negative_LR: 0.7}
    peptic_ulcer: {positive_LR: 0.5, negative_LR: 1.1}

  egd_ulcer_with_visible_vessel:
    peptic_ulcer_bleed: {positive_LR: 20.0, negative_LR: 0.3}

  egd_clean_base_ulcer:
    low_risk_rebleed: {positive_LR: 8.0, negative_LR: 0.5}

# ============================================================
# LAB REFERENCE RANGES (admission values for GI bleeding patients)
# For benchmarking generated data
# Source: Clinical studies, textbook values
# ============================================================
expected_lab_distributions:
  admission:
    Hb:
      unit: "g/dL"
      median: 8.5
      iqr: [6.5, 10.5]
      range: [3.0, 14.0]
      note: "May be falsely normal early due to hemoconcentration"
    Hct:
      unit: "%"
      median: 26
      iqr: [20, 32]
      range: [10, 42]
    Plt:
      unit: "x10^3/uL"
      median: 210
      iqr: [150, 280]
      range: [30, 450]
      note: "Low if cirrhosis with portal hypertension"
    PT_INR:
      unit: ""
      median: 1.1
      iqr: [0.9, 1.4]
      range: [0.8, 5.0]
      note: "Elevated if on anticoagulants or liver disease"
    BUN:
      unit: "mg/dL"
      median: 35
      iqr: [22, 55]
      range: [10, 100]
      note: "Elevated due to digested blood in upper GI bleed"
    Creatinine:
      unit: "mg/dL"
      median: 1.0
      iqr: [0.7, 1.5]
      range: [0.4, 5.0]
    Lactate:
      unit: "mmol/L"
      median: 2.0
      iqr: [1.2, 3.5]
      range: [0.5, 12.0]
      note: "> 4 suggests significant hypoperfusion"
    Albumin:
      unit: "g/dL"
      median: 3.0
      iqr: [2.5, 3.5]
      range: [1.5, 4.5]

  discharge:
    Hb:
      unit: "g/dL"
      median: 9.5
      iqr: [8.5, 11.0]
      note: "May remain below normal; outpatient iron supplementation"
    BUN:
      unit: "mg/dL"
      median: 18
      iqr: [12, 25]

# ============================================================
# VITAL SIGN DISTRIBUTIONS
# Source: Clinical studies on acute GI hemorrhage
# ============================================================
expected_vital_distributions:
  admission:
    temperature:
      unit: "C"
      mean: 36.8
      sd: 0.4
      range: [36.0, 37.5]
      note: "Usually afebrile unless aspiration or infection"
    heart_rate:
      unit: "bpm"
      mean: 100
      sd: 18
      range: [60, 140]
      note: "Tachycardia from hypovolemia; may be blunted by beta-blockers"
    systolic_bp:
      unit: "mmHg"
      mean: 110
      sd: 22
      range: [60, 170]
      note: "Hypotension indicates significant blood loss"
    respiratory_rate:
      unit: "/min"
      mean: 18
      sd: 4
      range: [12, 30]
    spo2:
      unit: "%"
      mean: 97
      sd: 2
      range: [88, 100]

# ============================================================
# TREATMENT REFERENCE — Drug and procedure data
# Source: ACG Guidelines 2012, JGES Guidelines 2020,
#         NICE UGIB guidelines, Barkun et al. Ann Intern Med 2019
# ============================================================
drugs:
  first_line:
    japan:
      - drug: "Omeprazole"
        code_yj: "2329021"
        dose: "80mg IV bolus, then 8mg/h continuous infusion x 72h"
        route: IV
        note: "High-dose PPI for peptic ulcer bleeding"
        pregnancy_safe: false
      - drug: "Omeprazole"
        code_yj: "2329020"
        dose: "20mg PO daily (after IV course)"
        route: PO
        note: "Step-down oral PPI"
        pregnancy_safe: false
    us:
      - drug: "Pantoprazole"
        code_rxnorm: "261255"
        dose: "80mg IV bolus, then 8mg/h continuous infusion x 72h"
        route: IV
        note: "Pantoprazole preferred in US"
        pregnancy_safe: false
      - drug: "Pantoprazole"
        code_rxnorm: "261257"
        dose: "40mg PO daily (after IV course)"
        route: PO
        pregnancy_safe: false

  variceal_specific:
    japan:
      - drug: "Octreotide"
        code_yj: "7229401"
        dose: "50mcg IV bolus, then 50mcg/h continuous infusion x 3-5 days"
        route: IV
        note: "Somatostatin analog for variceal bleeding"
        pregnancy_safe: false
      - drug: "Ceftriaxone"
        code_yj: "6132414"
        dose: "1g IV daily x 7 days"
        route: IV
        note: "Antibiotic prophylaxis for cirrhotic patients with GI bleed"
        pregnancy_safe: true
    us:
      - drug: "Octreotide"
        code_rxnorm: "203675"
        dose: "50mcg IV bolus, then 50mcg/h continuous infusion x 3-5 days"
        route: IV
        pregnancy_safe: false
      - drug: "Ceftriaxone"
        code_rxnorm: "309090"
        dose: "1g IV daily x 7 days"
        route: IV
        note: "Antibiotic prophylaxis for cirrhotic patients"
        pregnancy_safe: true

  transfusion:
    japan:
      - drug: "Packed_red_blood_cells"
        dose: "2 units pRBC per transfusion"
        route: IV
        threshold: "Hb < 7 g/dL (or < 8 if cardiac comorbidity)"
      - drug: "Fresh_frozen_plasma"
        dose: "2-4 units"
        route: IV
        threshold: "PT-INR > 1.5 with active bleeding"
    us:
      - drug: "Packed_red_blood_cells"
        dose: "2 units pRBC per transfusion"
        route: IV
        threshold: "Hb < 7 g/dL (or < 8 if cardiac comorbidity)"
      - drug: "Fresh_frozen_plasma"
        dose: "2-4 units"
        route: IV
        threshold: "PT-INR > 1.5 with active bleeding"

  reversal_agents:
    - drug: "Vitamin_K"
      dose: "10mg IV slow infusion"
      indication: "Warfarin-related coagulopathy"
    - drug: "Idarucizumab"
      dose: "5g IV"
      indication: "Dabigatran reversal"
    - drug: "Andexanet_alfa"
      dose: "Per weight-based protocol"
      indication: "Factor Xa inhibitor reversal (rivaroxaban, apixaban)"

  discharge_oral:
    japan:
      - drug: "Omeprazole"
        code_yj: "2329020"
        dose: "20mg PO daily"
        duration_days: 56  # 8 weeks for ulcer healing
      - drug: "Ferrous_fumarate"
        dose: "200mg PO daily"
        duration_days: 90
        note: "Iron supplementation for anemia recovery"
    us:
      - drug: "Pantoprazole"
        code_rxnorm: "261257"
        dose: "40mg PO daily"
        duration_days: 56
      - drug: "Ferrous_sulfate"
        code_rxnorm: "310325"
        dose: "325mg PO daily"
        duration_days: 90

# ============================================================
# DRUG INTERACTIONS relevant to GI bleeding treatment
# ============================================================
drug_interactions:
  - drug_a: "Omeprazole"
    drug_b: "Clopidogrel"
    severity: "major"
    effect: "Reduced antiplatelet effect of clopidogrel via CYP2C19 inhibition"
    action: "Use pantoprazole instead; or alternative antiplatelet strategy"

  - drug_a: "Octreotide"
    drug_b: "Insulin"
    severity: "moderate"
    effect: "Altered glucose regulation"
    action: "Monitor blood glucose closely"

  - drug_a: "Ceftriaxone"
    drug_b: "Calcium_containing_IV_solutions"
    severity: "major"
    effect: "Risk of ceftriaxone-calcium precipitates"
    action: "Do not co-administer via same IV line"

