# Heart Failure Exacerbation — Reference Data
# Sources: MHLW Patient Survey, ACC/AHA Guidelines, ESC Guidelines, JP JCARE-CARD registry

disease_id: heart_failure_exacerbation
chief_complaint:
  en: "Dyspnea on exertion, orthopnea, lower extremity edema"
  ja: "労作時呼吸困難・起座呼吸・下肢浮腫"
department: cardiology
encounter_type: medical
requires_surgery: false
readmission_eligible: true

# Hold oral diuretics during acute phase — IV furosemide replaces PO
medication_holds:
  - drugs: ["Furosemide"]
    reason: "Acute HF exacerbation — oral diuretic replaced by IV furosemide"

icd_codes:
  primary: "I50.9"
  variants:
    - {code: "I50.0", name: "Congestive heart failure", probability: 0.40}
    - {code: "I50.1", name: "Left ventricular failure", probability: 0.30}
    - {code: "I50.9", name: "Heart failure, unspecified", probability: 0.30}

incidence:
  japan:
    "0-44":  {M: 5, F: 3}
    "45-54": {M: 30, F: 15}
    "55-64": {M: 80, F: 50}
    "65-74": {M: 250, F: 180}
    "75-84": {M: 600, F: 500}
    "85+":   {M: 1200, F: 1000}
  risk_multipliers:
    - {condition: "I10", multiplier: 2.0}     # Hypertension
    - {condition: "E11.9", multiplier: 1.8}   # Diabetes
    - {condition: "I25", multiplier: 2.5}     # Coronary artery disease
    - {condition: "I48", multiplier: 2.0}     # Atrial fibrillation
    - {condition: "N18", multiplier: 2.5}     # CKD
    - {condition: "J44", multiplier: 1.5}     # COPD
  seasonal_curve:
    1: 1.3    # winter: cold stress + fluid retention
    2: 1.2
    3: 1.1
    4: 1.0
    5: 0.9
    6: 0.9
    7: 1.1    # summer: heat stress
    8: 1.2
    9: 1.0
    10: 1.0
    11: 1.1
    12: 1.3
  # HF exacerbation requires prior HF diagnosis
  requires_prior_condition: "I50"

severity:
  distribution:
    mild: 0.20
    moderate: 0.55
    severe: 0.25
  modifiers:
    - {condition: "age_over_80", severe_multiplier: 1.5}
    - {condition: "N18", severe_multiplier: 1.8}
    - {condition: "I48", severe_multiplier: 1.3}

initial_state_impact:
  mild:
    cardiac_function: -0.15
    volume_status: 0.30
    inflammation_level: 0.10
    sodium_status: -0.20
  moderate:
    cardiac_function: -0.25
    volume_status: 0.50
    perfusion_status: -0.10
    inflammation_level: 0.15
    renal_function: -0.05
    sodium_status: -0.35
  severe:
    cardiac_function: -0.40
    volume_status: 0.70
    perfusion_status: -0.25
    inflammation_level: 0.20
    renal_function: -0.15
    ph_status: -0.10
    sodium_status: -0.50

presenting_symptoms:
  - {name: "dyspnea", probability: 0.95, severity_range: [0.4, 0.9]}
  - {name: "orthopnea", probability: 0.70, severity_range: [0.3, 0.8]}
  - {name: "edema", probability: 0.80, severity_range: [0.3, 0.7]}
  - {name: "weight_gain", probability: 0.75, severity_range: [0.2, 0.6]}
  - {name: "fatigue", probability: 0.85, severity_range: [0.3, 0.7]}
  - {name: "cough", probability: 0.40, severity_range: [0.1, 0.4]}

# ============================================================
# COURSE ARCHETYPES (FP-ARCH-1)
# Decompensated-HF course is diuresis-driven: volume_status falls toward 0 as
# diuresis works and cardiac_function recovers, unlike the generic infection
# fallback. Canonical archetype names; trajectories interpolated over the LOS.
# ============================================================
course_archetypes:
  smooth_recovery:
    probability: 0.42
    description: "Steady diuresis from Day 1; congestion and cardiac output improve"
    trajectory:
      volume_status:    {0: 0.00, 1: -0.08, 2: -0.10, 3: -0.10, 5: -0.08, 7: -0.06, 10: -0.04, 14: -0.02}
      cardiac_function: {0: 0.00, 1: 0.02, 2: 0.04, 3: 0.05, 5: 0.05, 7: 0.04, 10: 0.03, 14: 0.02}
      perfusion_status: {0: 0.00, 1: 0.02, 2: 0.03, 3: 0.03, 5: 0.02, 7: 0.01, 10: 0.01, 14: 0.00}
      inflammation_level: {0: 0.00, 2: -0.03, 5: -0.04, 7: -0.03, 10: -0.02, 14: -0.01}
    order_modifications: {}
    treatment_modifications: {}

  dip_then_recovery:
    probability: 0.18
    description: "Early cardiorenal worsening (WRF), then diuresis takes hold"
    trajectory:
      volume_status:    {0: 0.05, 1: 0.03, 2: -0.04, 3: -0.08, 5: -0.08, 7: -0.06, 10: -0.04, 14: -0.02}
      renal_function:   {0: -0.04, 1: -0.03, 2: -0.01, 3: 0.01, 5: 0.02, 7: 0.02, 10: 0.02, 14: 0.01}
      cardiac_function: {0: -0.02, 1: 0.00, 2: 0.02, 3: 0.04, 5: 0.05, 7: 0.04, 10: 0.03, 14: 0.02}
      perfusion_status: {0: -0.03, 1: -0.02, 2: 0.01, 3: 0.02, 5: 0.02, 7: 0.01, 10: 0.00, 14: 0.00}
    order_modifications:
      day_2:
        add_labs: ["BNP", "Basic_metabolic_panel"]

  plateau_then_recovery:
    probability: 0.13
    description: "Slow diuretic response; congestion plateaus 3-4 days then clears"
    trajectory:
      volume_status:    {0: 0.02, 1: 0.01, 2: 0.00, 3: -0.02, 5: -0.06, 7: -0.08, 10: -0.06, 14: -0.03}
      cardiac_function: {0: 0.00, 1: 0.00, 3: 0.01, 5: 0.03, 7: 0.04, 10: 0.03, 14: 0.02}
      perfusion_status: {0: 0.00, 3: 0.00, 5: 0.01, 7: 0.02, 10: 0.01, 14: 0.00}
    order_modifications:
      day_3:
        add_labs: ["BNP", "Basic_metabolic_panel"]

  treatment_resistant:
    probability: 0.13
    description: "Diuretic resistance; congestion clears slowly after escalation"
    trajectory:
      volume_status:    {0: 0.03, 1: 0.02, 2: 0.01, 3: 0.00, 5: -0.03, 7: -0.05, 10: -0.06, 14: -0.05}
      renal_function:   {0: -0.03, 1: -0.03, 3: -0.02, 5: -0.01, 7: 0.00, 10: 0.01, 14: 0.01}
      cardiac_function: {0: -0.02, 1: -0.01, 3: 0.00, 5: 0.02, 7: 0.03, 10: 0.03, 14: 0.02}
    order_modifications:
      day_3:
        add_labs: ["BNP", "Basic_metabolic_panel"]
        add_consult: ["cardiology"]

  gradual_deterioration:
    probability: 0.09
    description: "Progressive pump failure; congestion and hypoperfusion worsen"
    trajectory:
      volume_status:    {0: 0.03, 1: 0.03, 2: 0.03, 3: 0.02, 5: 0.02, 7: 0.01}
      cardiac_function: {0: -0.03, 1: -0.03, 2: -0.03, 3: -0.02, 5: -0.02, 7: -0.02}
      perfusion_status: {0: -0.04, 1: -0.04, 2: -0.03, 3: -0.03, 5: -0.02, 7: -0.02}
      renal_function:   {0: -0.03, 1: -0.03, 2: -0.02, 3: -0.02, 5: -0.01, 7: -0.01}

  sudden_deterioration:
    probability: 0.05
    description: "Flash pulmonary edema / arrhythmia; abrupt Day 2-3 decompensation"
    trajectory:
      volume_status:    {0: 0.00, 1: -0.02, 2: 0.15, 3: 0.05, 5: -0.05, 7: -0.06}
      perfusion_status: {0: 0.00, 1: 0.00, 2: -0.25, 3: -0.08, 5: 0.03, 7: 0.04}
      cardiac_function: {0: 0.00, 1: 0.00, 2: -0.15, 3: -0.05, 5: 0.02, 7: 0.03}

# ============================================================
# COMPLICATIONS — cardiorenal / arrhythmia / shock (drive ICU transfer)
# ============================================================
complications:
  - name: "acute_kidney_injury"
    description: "Cardiorenal syndrome — worsening renal function from low output / diuresis"
    probability_per_day: 0.02
    onset_day_range: [1, 7]
    risk_factors:
      - {condition: "severity_severe", multiplier: 3.0}
      - {condition: "age_over_75", multiplier: 1.5}
    state_impact:
      renal_function: -0.05
    detection:
      test: "Basic_metabolic_panel"
      finding: "rising_creatinine"
    actions: ["order_renal_panel"]

  - name: "atrial_fibrillation_rvr"
    description: "New/worsened atrial fibrillation with rapid ventricular response"
    probability_per_day: 0.015
    onset_day_range: [0, 5]
    risk_factors:
      - {condition: "age_over_75", multiplier: 1.5}
    state_impact:
      cardiac_function: -0.03
      perfusion_status: -0.03
    detection:
      test: "ecg"
      finding: "atrial_fibrillation"
    actions: ["order_ecg", "rate_control"]

  - name: "cardiogenic_shock"
    description: "Low-output state with end-organ hypoperfusion"
    probability_per_day: 0.004
    onset_day_range: [0, 5]
    risk_factors:
      - {condition: "severity_severe", multiplier: 5.0}
    state_impact:
      perfusion_status: -0.15
      cardiac_function: -0.10
    actions: ["icu_transfer", "inotrope_support"]

  - name: "respiratory_failure"
    description: "Acute pulmonary edema requiring respiratory support"
    probability_per_day: 0.006
    onset_day_range: [0, 4]
    risk_factors:
      - {condition: "severity_severe", multiplier: 4.0}
    state_impact:
      perfusion_status: -0.10
    actions: ["icu_transfer"]

order_protocols:
  admission_orders:
    labs:
      - {test: "BNP", urgency: "stat"}
      - {test: "CRP", urgency: "stat"}
      - {test: "Creatinine", urgency: "stat"}
      - {test: "Na", urgency: "stat"}
      - {test: "K", urgency: "stat"}
      - {test: "Hb", urgency: "stat"}
      - {test: "Albumin", urgency: "stat"}
      - {test: "AST", urgency: "stat"}
      - {test: "ALT", urgency: "stat"}
      - {test: "Glucose", urgency: "stat"}
      - {test: "PT_INR", urgency: "stat"}
    imaging:
      - {test: "Chest_Xray_PA", urgency: "stat"}
      - {test: "Echocardiogram", urgency: "urgent"}
    supportive:
      - {type: "IV_fluid_restriction", detail: "Restrict to 1000 mL/day"}
      - {type: "O2", detail: "Nasal cannula SpO2 >= 94%"}
      - {type: "diet", detail: "Low sodium (6g/day)"}
      - {type: "daily_weight", detail: "Daily weight monitoring"}
      - {type: "fluid_balance", detail: "Strict I/O monitoring"}
  daily_monitoring:
    labs:
      - {test: "Creatinine", frequency: "daily"}
      - {test: "K", frequency: "daily"}
      - {test: "Na", frequency: "daily"}
      - {test: "BNP", frequency: "every_3_days"}
    vitals:
      stable: "q4h"
      unstable: "q2h"
  discharge_criteria:
    japan:
      - "Dry weight achieved (weight stable for 48h)"
      - "Oral diuretic tolerated"
      - "SpO2 >= 95% on room air"
      - "No orthopnea"
      - "Stable renal function"
    us:
      - "Euvolemic on oral diuretics"
      - "Functional status at baseline"
      - "Stable renal function"

drugs:
  first_line:
    japan:
      - {drug: "Furosemide", code_yj: "2139007", dose: "20-40mg IV", route: "IV"}
    us:
      - {drug: "Furosemide", code_rxnorm: "4603", dose: "40mg IV", route: "IV"}
  additional:
    japan:
      - {drug: "Carperitide", code_yj: "2179100", dose: "0.1ug/kg/min IV", note: "JP-specific: hANP"}
    us:
      - {drug: "Nitroglycerin", code_rxnorm: "4917", dose: "5-200ug/min IV drip"}
  discharge_oral:
    japan:
      - {drug: "Furosemide", dose: "20mg PO daily"}
      - {drug: "Enalapril", dose: "5mg PO daily"}
      - {drug: "Carvedilol", dose: "2.5mg PO BID"}
    us:
      - {drug: "Furosemide", dose: "40mg PO daily"}
      - {drug: "Lisinopril", dose: "10mg PO daily"}
      - {drug: "Carvedilol", dose: "6.25mg PO BID"}

target_los:
  japan:
    mild: {mean: 10, sd: 3, min: 5, max: 18}
    moderate: {mean: 17, sd: 5, min: 10, max: 30}
    severe: {mean: 24, sd: 7, min: 14, max: 45}
  us:
    mild: {mean: 3, sd: 1, min: 2, max: 5}
    moderate: {mean: 5, sd: 2, min: 3, max: 10}
    severe: {mean: 8, sd: 3, min: 5, max: 18}

diagnostic:
  # 0.0 = trivial (fracture on X-ray), 1.0 = very difficult (rare disease)
  diagnostic_difficulty: 0.35  # BNP+echo helps but pneumonia overlap complicates
  differential:
    - {disease: "heart_failure_exacerbation", icd: "I50.9", name: "Heart failure exacerbation", prior: 0.55}
    - {disease: "pneumonia", icd: "J18.9", name: "Pneumonia", prior: 0.15}
    - {disease: "acute_coronary_syndrome", icd: "I21.9", name: "Acute coronary syndrome", prior: 0.10}
    - {disease: "pulmonary_embolism", icd: "I26.9", name: "Pulmonary embolism", prior: 0.05}
    - {disease: "copd_exacerbation", icd: "J44.1", name: "COPD exacerbation", prior: 0.05}
    - {disease: "other", icd: "R06.0", name: "Other dyspnea", prior: 0.10}
  likelihood_ratios:
    bnp_elevated:
      heart_failure_exacerbation: {pos: 8.0, neg: 0.15}
      pneumonia: {pos: 1.2, neg: 0.9}
    bilateral_infiltrates:
      heart_failure_exacerbation: {pos: 3.0, neg: 0.4}
      pneumonia: {pos: 2.0, neg: 0.7}
    diuretic_response:
      heart_failure_exacerbation: {pos: 6.0, neg: 0.3}
  confirmation_threshold: 0.90
  diagnosis_progression:
    heart_failure_exacerbation:
      - [0.0, "I50.9", "Heart failure, unspecified"]
      - [0.7, "I50.0", "Congestive heart failure"]
      - [0.9, "I50.0", "Congestive heart failure, acute exacerbation"]

outcome_benchmarks:
  japan:
    median_los: 17
    in_hospital_mortality: 0.06
    thirty_day_readmission: 0.22
    icu_transfer_rate: 0.12
    mean_age_admitted: 78
    male_ratio: 0.52
  us:
    median_los: 5
    in_hospital_mortality: 0.04
    thirty_day_readmission: 0.23
    mean_age_admitted: 73
    male_ratio: 0.50

# ============================================================
# NARRATIVE SPEC (Tier 1 #3 α-min-1)
# ============================================================
narrative:
  hpi_template:
    onset_pattern:
      mild: "数日前より下腿浮腫・労作時呼吸困難が増悪し受診。"
      moderate: "安静時呼吸困難・起坐呼吸・浮腫の増悪を認め緊急受診。"
      severe: "急性肺水腫・著明な呼吸困難にて救急搬入。"
    trigger_options:
      - "塩分・水分制限の不徹底"
      - "内服コンプライアンス不良"
      - "感染症の合併"
      - "心房細動の発症"
      - "腎機能低下"
  physical_exam_findings:
    smooth_recovery:
      day_0:
        general:
          mild: "意識清明、軽度苦痛様"
          moderate: "意識清明、中等度苦痛様、起坐呼吸"
          severe: "意識混濁、高度苦痛様、著明な呼吸困難"
        cardiovascular:
          all: "頻脈、心雑音（MR）、頸静脈怒張、末梢浮腫"
        respiratory:
          mild: "両側下肺野に軽度湿性ラ音"
          moderate: "両側湿性ラ音、SpO2 低下"
          severe: "広範な湿性ラ音・ピンク色泡沫状喀痰、SpO2 著明低下"
        abdominal: "肝腫大・腹水の有無確認"
        neurological: "意識レベル評価"
      day_3:
        general:
          all: "意識清明、浮腫軽減傾向"
        cardiovascular:
          all: "頻脈改善、頸静脈怒張軽減"
        respiratory:
          all: "肺音改善、SpO2 安定"
        abdominal: "肝腫大軽減、腹水減少"
        neurological: "麻痺なし"
  discharge_instructions:
    follow_up:
      en: "Cardiology follow-up within 7-14 days post-discharge. Daily weight monitoring at home."
      ja: "退院後 7-14 日以内に循環器科外来を受診してください。毎朝同じ条件で体重を測定してください。"
    activity:
      en: "Gradually increase activity. Cardiac rehabilitation recommended. Rest when dyspneic."
      ja: "徐々に活動を増やしてください。心臓リハビリへの参加をお勧めします。息切れ時は休息してください。"
    medications:
      en: "Take all heart failure medications as directed. Do NOT stop diuretics without physician guidance."
      ja: "心不全薬は全て指示通り内服してください。利尿薬は医師の指示なしに中断しないでください。"
    emergency:
      en: "Return immediately if: weight gain >2kg in 2 days, worsening dyspnea, leg swelling increases."
      ja: "2 日で 2 kg 以上の体重増加、呼吸困難の増悪、下腿浮腫の増悪があれば速やかに受診してください。"
    diet_lifestyle:
      en: "Strict sodium restriction (<2g/day). Fluid restriction per cardiologist. Daily weight monitoring."
      ja: "厳格な塩分制限（1 日 2 g 未満）を守ってください。水分制限は循環器科医の指示に従い、毎日体重を記録してください。"
