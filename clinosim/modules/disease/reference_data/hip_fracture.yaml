# Hip Fracture (Femoral Neck / Intertrochanteric) — Reference Data
# Sources: MHLW Patient Survey, Japanese Orthopaedic Association, AAOS, Cochrane reviews

disease_id: hip_fracture
chief_complaint:
  en: "Hip pain after fall, unable to walk"
  ja: "転倒後の股関節痛・歩行不能"
department: orthopedics
encounter_type: surgical
requires_surgery: true
minimum_severity: moderate
readmission_eligible: false  # Surgical — readmissions are for complications, not same disease

icd_codes:
  primary: "S72.0"
  variants:
    - {code: "S72.00", name: "Fracture of neck of femur", probability: 0.50}
    - {code: "S72.10", name: "Intertrochanteric fracture", probability: 0.45}
    - {code: "S72.2", name: "Subtrochanteric fracture", probability: 0.05}

incidence:
  japan:
    "0-44":  {M: 5, F: 3}
    "45-54": {M: 10, F: 8}
    "55-64": {M: 25, F: 30}
    "65-74": {M: 60, F: 120}
    "75-84": {M: 150, F: 400}
    "85+":   {M: 350, F: 900}
  risk_multipliers:
    - {condition: "M81", multiplier: 3.0}     # Osteoporosis
    - {condition: "F00", multiplier: 2.5}     # Dementia (fall risk)
    - {condition: "G20", multiplier: 2.0}     # Parkinson's
    - {condition: "I10", multiplier: 1.3}     # HT (orthostatic hypotension)
    - {condition: "E11.9", multiplier: 1.5}   # DM (neuropathy)
  seasonal_curve:
    1: 1.4    # winter: icy conditions
    2: 1.3
    3: 1.1
    4: 1.0
    5: 0.9
    6: 0.8
    7: 0.8
    8: 0.8
    9: 0.9
    10: 1.0
    11: 1.1
    12: 1.3
  # Trauma-triggered: falls
  trigger_type: "trauma"
  time_of_day_pattern: "bimodal"   # morning activity + evening (home falls)

severity:
  distribution:
    mild: 0.0       # hip fracture is never mild — always requires admission
    moderate: 0.70   # standard surgical case
    severe: 0.30     # complex (multiple comorbidities, delayed surgery)
  modifiers:
    - {condition: "age_over_85", severe_multiplier: 1.8}
    - {condition: "dementia", severe_multiplier: 1.5}
    - {condition: "anticoagulant_use", severe_multiplier: 1.5}

initial_state_impact:
  moderate:
    inflammation_level: 0.20
    anemia_level: 0.10       # fracture site bleeding
    volume_status: -0.15     # blood loss + fasting
    perfusion_status: -0.05
  severe:
    inflammation_level: 0.30
    anemia_level: 0.20
    volume_status: -0.25
    perfusion_status: -0.15
    renal_function: -0.05

presenting_symptoms:
  - {name: "hip_pain", probability: 1.0, severity_range: [0.7, 1.0]}
  - {name: "inability_to_walk", probability: 0.95, severity_range: [0.8, 1.0]}
  - {name: "leg_shortening", probability: 0.70, severity_range: [0.5, 0.8]}
  - {name: "external_rotation", probability: 0.65, severity_range: [0.5, 0.8]}

# ============================================================
# COURSE ARCHETYPES (FP-ARCH-1)
# Post-operative geriatric fracture course: inflammation_level (surgical stress)
# and anemia_level (intra-op / fracture-site blood loss) resolve as haematopoiesis
# recovers, volume_status normalizes with resuscitation / transfusion, and
# perfusion_status improves. Slow rehab / cardiorenal setbacks map to
# plateau/treatment_resistant; peri-operative cardiac / multi-organ events map to
# gradual/sudden_deterioration. Canonical archetype names; interpolated over LOS.
# ============================================================
course_archetypes:
  smooth_recovery:
    probability: 0.42
    description: "Uneventful post-op recovery; pain, anaemia and mobility improve on schedule"
    trajectory:
      inflammation_level: {0: 0.00, 1: -0.02, 2: -0.04, 3: -0.05, 5: -0.05, 7: -0.04, 10: -0.03, 14: -0.02}
      anemia_level:       {0: 0.03, 1: 0.02, 2: 0.00, 3: -0.02, 5: -0.03, 7: -0.03, 10: -0.02, 14: -0.01}
      volume_status:      {0: 0.00, 1: 0.05, 2: 0.06, 3: 0.05, 5: 0.04, 7: 0.03, 10: 0.02, 14: 0.01}
      perfusion_status:   {0: 0.00, 1: 0.02, 2: 0.03, 3: 0.03, 5: 0.02, 7: 0.02, 10: 0.01, 14: 0.00}
    order_modifications: {}
    treatment_modifications: {}

  dip_then_recovery:
    probability: 0.18
    description: "Post-op anaemia / hypovolaemia dips Day 1-2, corrects with transfusion then recovers"
    trajectory:
      anemia_level:       {0: 0.05, 1: 0.06, 2: 0.03, 3: -0.01, 5: -0.03, 7: -0.03, 10: -0.02, 14: -0.01}
      volume_status:      {0: -0.05, 1: -0.05, 2: 0.00, 3: 0.04, 5: 0.05, 7: 0.04, 10: 0.02, 14: 0.01}
      inflammation_level: {0: 0.03, 1: 0.03, 2: 0.00, 3: -0.03, 5: -0.05, 7: -0.05, 10: -0.03, 14: -0.02}
      perfusion_status:   {0: -0.03, 1: -0.03, 2: 0.00, 3: 0.02, 5: 0.03, 7: 0.02, 10: 0.01, 14: 0.00}
    order_modifications:
      day_2:
        add_labs: ["Hb", "CRP"]

  plateau_then_recovery:
    probability: 0.13
    description: "Slow geriatric rehab; deconditioning plateaus 3-5 days then improves"
    trajectory:
      inflammation_level: {0: 0.02, 1: 0.01, 2: 0.00, 3: -0.01, 5: -0.03, 7: -0.05, 10: -0.04, 14: -0.02}
      anemia_level:       {0: 0.03, 1: 0.03, 3: 0.02, 5: 0.00, 7: -0.02, 10: -0.02, 14: -0.01}
      volume_status:      {0: 0.00, 1: 0.00, 3: 0.02, 5: 0.03, 7: 0.03, 10: 0.02, 14: 0.01}
    order_modifications:
      day_3:
        add_labs: ["Hb", "Albumin"]

  treatment_resistant:
    probability: 0.13
    description: "Persistent anaemia / cardiorenal stress; slow correction after escalation"
    trajectory:
      anemia_level:       {0: 0.04, 1: 0.04, 3: 0.03, 5: 0.01, 7: -0.01, 10: -0.02, 14: -0.02}
      renal_function:     {0: -0.04, 1: -0.04, 3: -0.03, 5: -0.01, 7: 0.00, 10: 0.01, 14: 0.01}
      inflammation_level: {0: 0.03, 1: 0.03, 3: 0.02, 5: 0.00, 7: -0.02, 10: -0.03, 14: -0.03}
      volume_status:      {0: -0.03, 1: -0.02, 3: 0.00, 5: 0.02, 7: 0.03, 10: 0.02, 14: 0.01}
    order_modifications:
      day_3:
        add_labs: ["Hb", "Creatinine"]
        add_consult: ["internal_medicine"]

  gradual_deterioration:
    probability: 0.09
    description: "Progressive multi-organ decline in the frail elderly; perfusion and renal function worsen"
    trajectory:
      perfusion_status:   {0: -0.03, 1: -0.03, 2: -0.03, 3: -0.02, 5: -0.02, 7: -0.02}
      renal_function:     {0: -0.03, 1: -0.03, 2: -0.02, 3: -0.02, 5: -0.02, 7: -0.01}
      inflammation_level: {0: 0.03, 1: 0.03, 2: 0.02, 3: 0.02, 5: 0.02, 7: 0.01}
      anemia_level:       {0: 0.02, 1: 0.02, 2: 0.02, 3: 0.02, 5: 0.01, 7: 0.01}

  sudden_deterioration:
    probability: 0.05
    description: "Peri-operative cardiac event / pulmonary embolism with abrupt Day 1-3 decline"
    trajectory:
      perfusion_status:   {0: 0.00, 1: -0.10, 2: -0.20, 3: -0.06, 5: 0.03, 7: 0.04}
      cardiac_function:   {0: 0.00, 1: -0.08, 2: -0.15, 3: -0.05, 5: 0.02, 7: 0.03}
      inflammation_level: {0: 0.00, 1: 0.05, 2: 0.10, 3: 0.05, 5: -0.02, 7: -0.03}

# ============================================================
# COMPLICATIONS — geriatric post-op cascade (delirium / VTE / SSI / bleed / cardiac)
# risk_factor conditions restricted to those _evaluate_risk_condition supports.
# ============================================================
complications:
  - name: "postoperative_delirium"
    description: "Post-operative delirium (very common in elderly hip-fracture patients)"
    probability_per_day: 0.06
    onset_day_range: [0, 7]
    risk_factors:
      - {condition: "age_over_75", multiplier: 1.6}
      - {condition: "delirium_susceptibility > 0.3", multiplier: 1.5}
    state_impact:
      inflammation_level: 0.02
    detection:
      test: "cam_icu"
      finding: "delirium"
    actions: ["order_delirium_assessment", "nonpharmacologic_measures"]

  - name: "venous_thromboembolism"
    description: "DVT / PE from post-fracture immobility"
    probability_per_day: 0.006
    onset_day_range: [2, 14]
    risk_factors:
      - {condition: "immobility_days > 3", multiplier: 2.0}
      - {condition: "age_over_75", multiplier: 1.3}
    state_impact:
      perfusion_status: -0.03
    detection:
      test: "lower_extremity_doppler"
      finding: "deep_vein_thrombosis"
    actions: ["order_doppler"]

  - name: "surgical_site_infection"
    description: "Wound / deep surgical-site infection after fracture fixation"
    probability_per_day: 0.004
    onset_day_range: [3, 14]
    risk_factors:
      - {condition: "severity_severe", multiplier: 2.5}
    state_impact:
      inflammation_level: 0.08
    detection:
      test: "CRP"
      finding: "rising_inflammatory_markers"
    actions: ["order_wound_culture", "start_antibiotics"]

  - name: "postoperative_hemorrhage"
    description: "Continued fracture-site / surgical bleeding with symptomatic anaemia"
    probability_per_day: 0.008
    onset_day_range: [0, 3]
    risk_factors:
      - {condition: "severity_severe", multiplier: 2.5}
      - {condition: "age_over_75", multiplier: 1.3}
    state_impact:
      anemia_level: 0.10
      volume_status: -0.08
    detection:
      test: "Hb"
      finding: "falling_hemoglobin"
    actions: ["order_cbc", "transfuse_prbc"]

  - name: "perioperative_cardiac_event"
    description: "Peri-operative myocardial injury / acute coronary event in the elderly"
    probability_per_day: 0.004
    onset_day_range: [0, 5]
    risk_factors:
      - {condition: "severity_severe", multiplier: 3.0}
      - {condition: "perfusion_status < 0.3", multiplier: 2.5}
    state_impact:
      perfusion_status: -0.12
      cardiac_function: -0.10
    actions: ["icu_transfer", "order_ecg", "cardiology_consult"]

order_protocols:
  admission_orders:
    labs:
      - {test: "CRP", urgency: "stat"}
      - {test: "WBC", urgency: "stat"}
      - {test: "Hb", urgency: "stat"}
      - {test: "Plt", urgency: "stat"}
      - {test: "Creatinine", urgency: "stat"}
      - {test: "Na", urgency: "stat"}
      - {test: "K", urgency: "stat"}
      - {test: "PT_INR", urgency: "stat"}
      - {test: "Glucose", urgency: "stat"}
      - {test: "Albumin", urgency: "stat"}
    imaging:
      - {test: "Hip_Xray_AP_Lateral", urgency: "stat"}
      - {test: "Chest_Xray_preop", urgency: "urgent"}
    supportive:
      - {type: "IV_fluid", detail: "NS 80-125 mL/h"}
      - {type: "pain_management", detail: "Acetaminophen 1000mg IV q6h + PRN opioid"}
      - {type: "DVT_prophylaxis", detail: "Enoxaparin 2000IU SC daily (hold 12h pre-op)"}
      - {type: "urinary_catheter", detail: "Foley catheter for perioperative period"}
  daily_monitoring:
    labs:
      - {test: "CRP", frequency: "daily"}
      - {test: "Hb", frequency: "daily", note: "monitor for bleeding"}
      - {test: "Creatinine", frequency: "daily"}
    vitals:
      stable: "q4h"
      post_op_24h: "q2h"
  discharge_criteria:
    japan:
      - "Pain controlled with oral analgesics"
      - "Independent transfer with walker"
      - "Wound clean, no signs of infection"
      - "Stable hemoglobin"
      - "Rehab goals progressing"
    us:
      - "Medically stable"
      - "Safe for SNF/rehab facility discharge"
      - "Pain controlled on oral meds"
      - "DVT prophylaxis plan in place"

drugs:
  first_line:
    japan:
      - {drug: "Acetaminophen", dose: "1000mg IV q6h PRN", route: "IV"}
      - {drug: "Enoxaparin", dose: "2000IU SC daily", note: "DVT prophylaxis"}
    us:
      - {drug: "Acetaminophen", dose: "1000mg IV q6h PRN", route: "IV"}
      - {drug: "Enoxaparin", dose: "40mg SC daily", note: "DVT prophylaxis"}
  post_op:
    japan:
      - {drug: "Celecoxib", dose: "200mg PO daily"}
      - {drug: "Enoxaparin", dose: "2000IU SC daily x14 days"}
    us:
      - {drug: "Oxycodone", dose: "5mg PO q4-6h PRN"}
      - {drug: "Enoxaparin", dose: "40mg SC daily"}
  discharge_oral:
    japan:
      - {drug: "Celecoxib", dose: "200mg PO daily", duration_days: 14}
      - {drug: "Acetaminophen", dose: "500mg PO q6h PRN", duration_days: 28}
      - {drug: "Enoxaparin", dose: "2000IU SC daily", duration_days: 14}
      - {drug: "Calcium/Vitamin D", dose: "1 tablet PO daily", duration_days: 90}
    us:
      - {drug: "Oxycodone/Acetaminophen", dose: "5/325mg PO q4-6h PRN", duration_days: 14}
      - {drug: "Acetaminophen", dose: "500mg PO q6h PRN", duration_days: 28}
      - {drug: "Enoxaparin", dose: "40mg SC daily", duration_days: 28}
      - {drug: "Calcium/Vitamin D", dose: "1 tablet PO daily", duration_days: 90}

# Surgical procedure info
procedure:
  type: "ORIF or hemiarthroplasty"
  procedure_code_jp: "K0461"   # 骨折観血的手術（大腿）
  procedure_code_us: "27236"   # CPT: open treatment femoral fracture
  typical_duration_minutes: {mean: 90, sd: 30, min: 45, max: 180}
  anesthesia: "spinal or general"
  estimated_blood_loss_ml: {mean: 300, sd: 150, min: 100, max: 800}
  approach:
    ORIF: "lateral approach to proximal femur"
    hemiarthroplasty: "posterolateral approach to hip joint"
  time_to_surgery:
    japan: {mean_hours: 48, sd_hours: 24, note: "often day 1-2 after admission"}
    us: {mean_hours: 24, sd_hours: 12, note: "target < 24h, ideally < 48h"}

target_los:
  japan:
    moderate: {mean: 28, sd: 8, min: 14, max: 60}
    severe: {mean: 40, sd: 12, min: 21, max: 90}
  us:
    moderate: {mean: 5, sd: 2, min: 3, max: 10}
    severe: {mean: 8, sd: 3, min: 5, max: 18}

# Rehabilitation (critical for hip fracture)
diagnostic:
  diagnostic_difficulty: 0.05  # X-ray confirms immediately
  differential:
    - {disease: "hip_fracture", icd: "S72.0", name: "Hip fracture", prior: 0.85}
    - {disease: "pathological_fracture", icd: "M84.4", name: "Pathological fracture (tumor)", prior: 0.05}
    - {disease: "pelvic_fracture", icd: "S32.1", name: "Pelvic fracture", prior: 0.05}
    - {disease: "other", icd: "M79.6", name: "Other hip pain", prior: 0.05}
  likelihood_ratios:
    xray_fracture_confirmed:
      hip_fracture: {pos: 50.0, neg: 0.1}
      pathological_fracture: {pos: 5.0, neg: 0.5}
  confirmation_threshold: 0.95
  diagnosis_progression:
    hip_fracture:
      - [0.0, "S72.0", "Fracture of neck of femur"]
      - [0.7, "S72.00", "Fracture of neck of femur, closed"]
      - [0.9, "S72.00", "Fracture of neck of femur, closed"]

outcome_benchmarks:
  japan:
    median_los: 30
    in_hospital_mortality: 0.04
    thirty_day_readmission: 0.08
    surgical_site_infection_rate: 0.03
    dvt_rate: 0.05
    delirium_rate: 0.25
    mean_age_admitted: 82
    female_ratio: 0.75
  us:
    median_los: 5
    in_hospital_mortality: 0.03
    thirty_day_readmission: 0.12
    surgical_site_infection_rate: 0.02
    dvt_rate: 0.04
    delirium_rate: 0.20
    mean_age_admitted: 80
    female_ratio: 0.70

# ============================================================
# NARRATIVE SPEC (Tier 1 #3 α-min-1)
# Consumed by TemplateNarrativeGenerator (Task 6)
# ============================================================
narrative:
  hpi_template:
    onset_pattern:
      mild: "症状は数日前より緩徐に出現。"
      moderate: "症状は数日前より出現し漸次増悪。"
      severe: "症状急速に増悪、本日受診。"
    trigger_options:
      - "急性発症"
  physical_exam_findings:
    smooth_recovery:
      day_0:
        general:
          all: "意識清明、苦痛様"
        cardiovascular:
          all: "整、心雑音なし"
        respiratory:
          all: "肺音清明"
        abdominal: "平坦、軟、圧痛なし"
        neurological: "麻痺なし、項部硬直なし"
  discharge_instructions:
    follow_up:
      en: "Follow up with PCP in 7-10 days."
      ja: "退院後 1-2 週間以内に外来受診をお願いします。"
    activity:
      en: "Gradual return to normal activity."
      ja: "徐々に通常活動を再開してください。"
    medications:
      en: "Complete prescribed medications as directed."
      ja: "処方された薬を指示通り内服してください。"
    emergency:
      en: "Return to ER if symptoms worsen."
      ja: "症状悪化があれば速やかに救急受診してください。"
    diet_lifestyle:
      en: "Maintain balanced diet and adequate hydration."
      ja: "バランスの良い食事と十分な水分摂取を心がけてください。"

# ============================================================
# IMAGING ORDERS (CO-1 / RM-5 continuation — session 43)
# ============================================================
imaging_orders:
  - modality: CR
    body_site: hip
    views: [AP, Lateral]
    urgency: stat
    clinical_indication: "Confirm hip fracture"
    day: 0
    abnormal_rate_by_severity:
      mild: 0.9
      moderate: 0.95
      severe: 1.0
  - modality: CT
    body_site: hip
    contrast: false
    urgency: routine
    clinical_indication: "Pre-op planning / occult fracture assessment"
    day: 1
    abnormal_rate_by_severity:
      mild: 0.6
      moderate: 0.8
      severe: 0.95
