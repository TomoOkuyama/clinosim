# Ileus / Intestinal Obstruction — Complete Reference Data
# Sources cited per section. All rates are approximate and should be validated
# against the most current published data before production use.

disease_id: ileus
chief_complaint:
  en: "Abdominal pain, vomiting, constipation, abdominal distension"
  ja: "腹痛・嘔吐・排便停止・腹部膨満"
department: gastroenterology
encounter_type: medical
requires_surgery: false
readmission_eligible: true
minimum_severity: null
diagnostic_difficulty: 0.3   # CT usually confirms, but adhesive vs. mechanical distinction can be tricky

icd_codes:
  primary: "K56.6"  # Other and unspecified intestinal obstruction
  variants:
    - {code: "K56.0", name: "Paralytic ileus", probability: 0.30}
    - {code: "K56.5", name: "Intestinal adhesions with obstruction", probability: 0.35}
    - {code: "K56.1", name: "Intussusception", probability: 0.05}
    - {code: "K56.2", name: "Volvulus", probability: 0.08}
    - {code: "K56.4", name: "Other impaction of intestine", probability: 0.07}
    - {code: "K56.69", name: "Other intestinal obstruction", probability: 0.15}

# ============================================================
# INCIDENCE (per 100,000 per year, by age band and sex)
# Source: JP — MHLW Patient Survey, DPC data
#         US — NHDS, Nationwide Inpatient Sample (NIS)
# ============================================================
incidence:
  japan:
    "0-4":   {M: 30, F: 15}
    "5-14":  {M: 10, F: 8}
    "15-24": {M: 15, F: 12}
    "25-34": {M: 20, F: 18}
    "35-44": {M: 35, F: 30}
    "45-54": {M: 55, F: 45}
    "55-64": {M: 90, F: 70}
    "65-74": {M: 160, F: 130}
    "75-84": {M: 280, F: 250}
    "85+":   {M: 400, F: 380}
  us:
    "0-4":   {M: 25, F: 12}
    "5-14":  {M: 8, F: 6}
    "15-24": {M: 12, F: 10}
    "25-34": {M: 18, F: 15}
    "35-44": {M: 30, F: 25}
    "45-54": {M: 50, F: 40}
    "55-64": {M: 80, F: 65}
    "65-74": {M: 140, F: 120}
    "75-84": {M: 250, F: 220}
    "85+":   {M: 360, F: 340}

  risk_multipliers:
    - {condition: "prior_abdominal_surgery", multiplier: 5.0}
    - {condition: "colorectal_cancer", multiplier: 4.0}
    - {condition: "hernia", multiplier: 3.0}
    - {condition: "Crohn_disease", multiplier: 2.5}
    - {condition: "diabetes", multiplier: 1.3}
    - {condition: "opioid_use", multiplier: 2.0}
    - {condition: "hypothyroidism", multiplier: 1.5}
    - {condition: "dementia", multiplier: 1.3}
    - {condition: "Parkinson_disease", multiplier: 1.8}
    - {condition: "immobility", multiplier: 1.5}

  seasonal_curve:  # monthly multiplier (1.0 = baseline)
    1: 1.0
    2: 1.0
    3: 1.0
    4: 1.0
    5: 1.0
    6: 1.0
    7: 1.0
    8: 1.0
    9: 1.0
    10: 1.0
    11: 1.0
    12: 1.0

  vaccine_protection: {}

# ============================================================
# SEVERITY DISTRIBUTION
# Source: DPC data, surgical literature
# ============================================================
severity:
  distribution:
    mild: 0.25        # partial obstruction, resolves with conservative Rx
    moderate: 0.55    # complete obstruction requiring decompression
    severe: 0.20      # strangulation, perforation risk, may need surgery
  modifiers:
    - {condition: "age_over_75", mild_multiplier: 0.7, severe_multiplier: 1.5}
    - {condition: "colorectal_cancer", moderate_multiplier: 1.2, severe_multiplier: 2.0}
    - {condition: "hernia_incarcerated", severe_multiplier: 3.0, mild_multiplier: 0.3}
    - {condition: "prior_abdominal_surgery", moderate_multiplier: 1.2}
    - {condition: "immunosuppressed", severe_multiplier: 1.5}

# ============================================================
# INITIAL PHYSIOLOGICAL STATE IMPACT
# ============================================================
initial_state_impact:
  mild:
    inflammation_level: 0.10
    volume_status: -0.10
  moderate:
    inflammation_level: 0.25
    volume_status: -0.25
    perfusion_status: -0.05
    renal_function: -0.05
  severe:
    inflammation_level: 0.50
    volume_status: -0.35
    perfusion_status: -0.15
    renal_function: -0.15
    ph_status: -0.10

# ============================================================
# ORDER PROTOCOLS
# ============================================================
order_protocols:
  admission_orders:
    labs:
      - {test: "WBC", urgency: "stat"}
      - {test: "CRP", urgency: "stat"}
      - {test: "Creatinine", urgency: "stat"}
      - {test: "BUN", urgency: "stat"}
      - {test: "Na", urgency: "stat"}
      - {test: "K", urgency: "stat"}
      - {test: "Cl", urgency: "stat"}
      - {test: "Lactate", urgency: "stat"}
      - {test: "Hb", urgency: "stat"}
      - {test: "Plt", urgency: "stat"}
      - {test: "AST", urgency: "stat", probability: 0.70}
      - {test: "ALT", urgency: "stat", probability: 0.70}
      - {test: "Amylase", urgency: "stat", probability: 0.50}
      - {test: "Lipase", urgency: "stat", probability: 0.40}
    imaging:
      - {test: "Abdominal_Xray_erect_supine", urgency: "stat"}
      - {test: "CT_abdomen_pelvis_with_contrast", urgency: "stat", probability: 0.85}
    supportive:
      - {type: "NPO", detail: "Nothing by mouth"}
      - {type: "NG_tube", detail: "Nasogastric tube to low intermittent suction"}
      - {type: "IV_fluid", detail: "Lactated Ringer 125-250 mL/h"}
      - {type: "DVT_prophylaxis", detail: "Enoxaparin 2000IU SC daily"}

  daily_monitoring:
    labs:
      - {test: "WBC", frequency: "daily"}
      - {test: "CRP", frequency: "daily"}
      - {test: "Na", frequency: "daily"}
      - {test: "K", frequency: "daily"}
      - {test: "Creatinine", frequency: "daily"}
    vitals:
      stable: "q4h"
      unstable: "q2h"
    imaging:
      - {test: "Abdominal_Xray", frequency: "daily", condition: "monitor for resolution or worsening"}
    other:
      - {type: "NG_output", detail: "Record volume and character q4h"}
      - {type: "bowel_sounds", detail: "Auscultate q8h"}

  trigger_orders:
    no_improvement_72h:
      condition: "no flatus, no bowel sounds, persistent distension at Day 3"
      actions:
        - {type: "imaging", test: "CT_abdomen_pelvis_with_contrast_repeat"}
        - {type: "consult", target: "surgery"}
        - {type: "evaluate", action: "consider_operative_intervention"}
    signs_of_strangulation:
      condition: "fever, tachycardia, rebound tenderness, rising lactate"
      actions:
        - {type: "lab", test: "Lactate"}
        - {type: "lab", test: "ABG"}
        - {type: "consult", target: "surgery_emergent"}
        - {type: "evaluate", action: "emergent_laparotomy"}
    electrolyte_derangement:
      condition: "K < 3.0 or Na < 130"
      actions:
        - {type: "medication_change", action: "electrolyte_replacement"}
        - {type: "fluid", action: "reassess_iv_fluid_rate"}

  discharge_criteria:
    japan:
      - "Flatus or bowel movement present"
      - "Tolerating oral diet for 24 hours"
      - "Afebrile (< 37.0C) for 24 hours"
      - "NG tube removed"
      - "Abdominal distension resolved"
      - "CRP declining"
    us:
      - "Flatus or bowel movement present"
      - "Tolerating oral diet"
      - "Afebrile for 24 hours"
      - "Pain controlled with oral medications"

# ============================================================
# LIKELIHOOD RATIO TABLE
# Source: Clinical diagnostic studies
# ============================================================
likelihood_ratios:
  air_fluid_levels_on_xray:
    ileus: {positive_LR: 5.0, negative_LR: 0.4}
    paralytic_ileus: {positive_LR: 2.0, negative_LR: 0.6}
    gastroparesis: {positive_LR: 0.5, negative_LR: 1.0}

  ct_transition_point:
    ileus: {positive_LR: 12.0, negative_LR: 0.2}
    paralytic_ileus: {positive_LR: 0.3, negative_LR: 1.5}

  dilated_bowel_loops_on_ct:
    ileus: {positive_LR: 6.0, negative_LR: 0.3}
    paralytic_ileus: {positive_LR: 3.0, negative_LR: 0.5}

  elevated_lactate:
    ileus: {positive_LR: 3.5, negative_LR: 0.7}
    mesenteric_ischemia: {positive_LR: 5.0, negative_LR: 0.4}

  wbc_above_15000:
    ileus: {positive_LR: 2.0, negative_LR: 0.7}
    peritonitis: {positive_LR: 3.0, negative_LR: 0.5}

  absent_bowel_sounds:
    ileus: {positive_LR: 3.0, negative_LR: 0.5}
    paralytic_ileus: {positive_LR: 4.0, negative_LR: 0.4}

# ============================================================
# LAB REFERENCE RANGES (admission values)
# ============================================================
expected_lab_distributions:
  admission:
    WBC:
      unit: "/uL"
      median: 11000
      iqr: [8000, 15000]
      range: [4000, 25000]
    CRP:
      unit: "mg/L"
      median: 30
      iqr: [10, 80]
      range: [2, 250]
    Creatinine:
      unit: "mg/dL"
      median: 1.0
      iqr: [0.7, 1.5]
      range: [0.4, 4.0]
      note: "dehydration may elevate"
    BUN:
      unit: "mg/dL"
      median: 22
      iqr: [15, 35]
      range: [8, 80]
    Na:
      unit: "mEq/L"
      median: 138
      iqr: [135, 141]
      range: [125, 148]
    K:
      unit: "mEq/L"
      median: 3.8
      iqr: [3.3, 4.3]
      range: [2.5, 6.0]
      note: "vomiting causes hypokalemia"
    Lactate:
      unit: "mmol/L"
      median: 1.5
      iqr: [1.0, 2.5]
      range: [0.5, 8.0]
      note: ">4 suggests strangulation"
    Amylase:
      unit: "U/L"
      median: 80
      iqr: [50, 120]
      range: [30, 300]

  discharge:
    WBC:
      unit: "/uL"
      median: 7000
      iqr: [5000, 9000]
    CRP:
      unit: "mg/L"
      median: 10
      iqr: [3, 25]

# ============================================================
# VITAL SIGN DISTRIBUTIONS
# ============================================================
expected_vital_distributions:
  admission:
    temperature:
      unit: "C"
      mean: 37.2
      sd: 0.6
      range: [36.2, 39.0]
    heart_rate:
      unit: "bpm"
      mean: 92
      sd: 15
      range: [60, 130]
    systolic_bp:
      unit: "mmHg"
      mean: 120
      sd: 22
      range: [80, 170]
    respiratory_rate:
      unit: "/min"
      mean: 18
      sd: 4
      range: [12, 30]
    spo2:
      unit: "%"
      mean: 97
      sd: 2
      range: [90, 100]

# ============================================================
# TREATMENT REFERENCE — Drug selection data
# Source: Japanese Society of Gastroenterology guidelines, ACG guidelines
# ============================================================
drugs:
  first_line:
    japan:
      - drug: "Lactated Ringer"
        code_yj: "3319501"
        dose: "125-250 mL/h IV"
        route: IV
        pregnancy_safe: true
      - drug: "Metoclopramide"
        code_yj: "2399100"
        dose: "10mg IV q8h"
        route: IV
        note: "Prokinetic for paralytic ileus"
        pregnancy_safe: true
      - drug: "Daikenchuto"
        code_yj: "5200110"
        dose: "5g PO TID"
        route: PO
        note: "Kampo medicine — widely used in JP for postoperative ileus"
        pregnancy_safe: false

    us:
      - drug: "Lactated Ringer"
        code_rxnorm: "313002"
        dose: "125-250 mL/h IV"
        route: IV
        pregnancy_safe: true
      - drug: "Metoclopramide"
        code_rxnorm: "6915"
        dose: "10mg IV q6h"
        route: IV
        pregnancy_safe: true

  alternative_penicillin_allergy: {}  # Not applicable

  escalation:  # when conservative management fails
    japan:
      - drug: "Cefmetazole"
        code_yj: "6132405"
        dose: "1g IV q8h"
        indication: "fever or suspected bowel ischemia — prophylactic antibiotic"
        renal_adjustment:
          eGFR_below_30: "0.5g IV q12h"
    us:
      - drug: "Piperacillin/Tazobactam"
        code_rxnorm: "240984"
        dose: "3.375g IV q6h"
        indication: "suspected bowel ischemia or perforation"

  discharge_oral:
    japan:
      - drug: "Mosapride"
        code_yj: "2399009"
        dose: "5mg PO TID"
        duration_days: 7
    us:
      - drug: "Metoclopramide"
        code_rxnorm: "6915"
        dose: "10mg PO TID before meals"
        duration_days: 5

# ============================================================
# DRUG INTERACTIONS
# ============================================================
drug_interactions:
  - drug_a: "Metoclopramide"
    drug_b: "Haloperidol"
    severity: "major"
    effect: "Increased extrapyramidal symptoms"
    action: "Avoid combination"

  - drug_a: "Metoclopramide"
    drug_b: "Levodopa"
    severity: "major"
    effect: "Decreased levodopa efficacy"
    action: "Avoid combination in Parkinson patients"

# ============================================================
# LAB ITEM REFERENCE RANGES
# ============================================================
reference_ranges:
  WBC:
    unit: "/uL"
    all: {low: 3500, high: 9500}
  CRP:
    unit: "mg/L"
    all: {low: 0, high: 3}
  Hb:
    unit: "g/dL"
    male: {low: 13.5, high: 17.5}
    female: {low: 11.5, high: 15.5}
  Plt:
    unit: "x10^3/uL"
    all: {low: 150, high: 400}
  Creatinine:
    unit: "mg/dL"
    male: {low: 0.6, high: 1.1}
    female: {low: 0.4, high: 0.8}
  BUN:
    unit: "mg/dL"
    all: {low: 8, high: 20}
  Na:
    unit: "mEq/L"
    all: {low: 136, high: 145}
  K:
    unit: "mEq/L"
    all: {low: 3.5, high: 5.0}
  Cl:
    unit: "mEq/L"
    all: {low: 98, high: 106}
  Lactate:
    unit: "mmol/L"
    all: {low: 0.5, high: 2.0}
  Amylase:
    unit: "U/L"
    all: {low: 30, high: 110}
  Lipase:
    unit: "U/L"
    all: {low: 13, high: 60}

# ============================================================
# TARGET LENGTH OF STAY (country-specific)
# ============================================================
target_los:
  japan:
    mild: {mean: 8, sd: 3, min: 4, max: 14}
    moderate: {mean: 12, sd: 4, min: 7, max: 20}
    severe: {mean: 18, sd: 6, min: 10, max: 30}
  us:
    mild: {mean: 3, sd: 1, min: 2, max: 5}
    moderate: {mean: 5, sd: 2, min: 3, max: 9}
    severe: {mean: 8, sd: 3, min: 5, max: 14}

# ============================================================
# OUTCOME BENCHMARKS
# ============================================================
outcome_benchmarks:
  japan:
    median_los: 12
    los_iqr: [8, 16]
    in_hospital_mortality: 0.03
    icu_transfer_rate: 0.05
    thirty_day_readmission: 0.15
    surgery_conversion_rate: 0.20
    ng_tube_days_median: 3
    mean_age_admitted: 70
    male_ratio: 0.55

  us:
    median_los: 5
    los_iqr: [3, 7]
    in_hospital_mortality: 0.02
    icu_transfer_rate: 0.06
    thirty_day_readmission: 0.12
    surgery_conversion_rate: 0.25
    ng_tube_days_median: 2
    mean_age_admitted: 65
    male_ratio: 0.52

# ============================================================
# CLINICAL COURSE ARCHETYPES
# ============================================================
course_archetypes:
  smooth_recovery:
    probability: 0.45
    description: "Conservative management succeeds — bowel function returns by Day 3-4"
    trajectory:
      inflammation_level: {0: 0.03, 1: 0.00, 2: -0.03, 3: -0.05, 5: -0.04, 7: -0.03, 10: -0.02, 14: -0.01}
      volume_status: {0: 0.05, 1: 0.05, 2: 0.03, 3: 0.02, 5: 0.01, 7: 0.00, 10: 0.00, 14: 0.00}
      renal_function: {0: 0.00, 1: 0.01, 2: 0.01, 3: 0.01, 5: 0.01, 7: 0.00, 10: 0.00, 14: 0.00}
    order_modifications: {}
    treatment_modifications: {}

  dip_then_recovery:
    probability: 0.20
    description: "Initial worsening with distension Day 1-2, then gradual resolution"
    trajectory:
      inflammation_level: {0: 0.05, 1: 0.05, 2: 0.02, 3: -0.02, 5: -0.05, 7: -0.05, 10: -0.03, 14: -0.02}
      volume_status: {0: -0.05, 1: -0.03, 2: 0.02, 3: 0.03, 5: 0.02, 7: 0.01, 10: 0.00, 14: 0.00}
      renal_function: {0: -0.02, 1: -0.01, 2: 0.00, 3: 0.01, 5: 0.01, 7: 0.01, 10: 0.00, 14: 0.00}
    order_modifications:
      day_2:
        add_labs: ["Lactate", "Na", "K"]
        add_imaging: ["Abdominal_Xray"]
    treatment_modifications:
      day_2:
        add_fluid: {detail: "NS 500mL bolus for dehydration"}

  plateau_then_recovery:
    probability: 0.12
    description: "No change for 4-5 days, then spontaneous resolution"
    trajectory:
      inflammation_level: {0: 0.03, 1: 0.02, 2: 0.01, 3: 0.00, 5: 0.00, 7: -0.04, 10: -0.05, 14: -0.03}
      volume_status: {0: 0.02, 1: 0.01, 2: 0.00, 3: 0.00, 5: 0.00, 7: 0.02, 10: 0.01, 14: 0.00}
    order_modifications:
      day_5:
        add_labs: ["Lactate", "CRP"]
        add_imaging: ["CT_abdomen_pelvis_with_contrast"]
        add_consult: ["surgery"]
    treatment_modifications: {}

  treatment_resistant:
    probability: 0.10
    description: "Conservative management fails — requires surgical intervention at Day 3-5"
    trajectory:
      inflammation_level: {0: 0.08, 1: 0.05, 2: 0.05, 3: 0.03, 5: -0.05, 7: -0.08, 10: -0.06, 14: -0.04}
      volume_status: {0: -0.05, 1: -0.03, 2: -0.02, 3: 0.00, 5: 0.03, 7: 0.02, 10: 0.01, 14: 0.00}
      renal_function: {0: -0.03, 1: -0.02, 2: -0.01, 3: 0.00, 5: 0.01, 7: 0.01, 10: 0.01, 14: 0.00}
    order_modifications:
      day_3:
        add_labs: ["Lactate", "Blood_culture"]
        add_imaging: ["CT_abdomen_pelvis_with_contrast"]
        add_consult: ["surgery_emergent"]
    treatment_modifications:
      day_4:
        action: "surgical_intervention_laparotomy"
        start:
          japan: [{drug: "Cefmetazole", dose: "1g IV q8h"}]
          us: [{drug: "Piperacillin/Tazobactam", dose: "3.375g IV q6h"}]
    triggers:
      - day: 3
        condition: "no_bowel_function_and_worsening_distension"
        actions: ["surgery_consult", "repeat_ct"]

  gradual_deterioration:
    probability: 0.08
    description: "Progressive worsening suggesting strangulation — emergent surgery"
    trajectory:
      inflammation_level: {0: 0.10, 1: 0.10, 2: 0.08, 3: 0.05, 5: 0.03, 7: -0.05, 10: -0.05, 14: -0.03}
      perfusion_status: {0: -0.05, 1: -0.05, 2: -0.05, 3: -0.03, 5: 0.02, 7: 0.02, 10: 0.01, 14: 0.00}
      renal_function: {0: -0.05, 1: -0.03, 2: -0.03, 3: -0.02, 5: 0.01, 7: 0.01, 10: 0.01, 14: 0.01}
    order_modifications:
      day_2:
        add_labs: ["Lactate", "ABG", "Blood_culture"]
        add_imaging: ["CT_abdomen_pelvis_with_contrast"]
    treatment_modifications:
      day_2:
        start:
          japan: [{drug: "Cefmetazole", dose: "1g IV q8h"}]
          us: [{drug: "Piperacillin/Tazobactam", dose: "3.375g IV q6h"}]
        action: "emergent_laparotomy"
    triggers:
      - day: 2
        condition: "lactate > 4 or peritoneal signs"
        actions: ["emergent_surgery", "icu_transfer"]

  sudden_deterioration:
    probability: 0.05
    description: "Sudden perforation or bowel necrosis — emergent laparotomy"
    trajectory:
      inflammation_level: {0: 0.05, 1: 0.00, 2: 0.35, 3: 0.10, 5: -0.08, 7: -0.10, 10: -0.06, 14: -0.03}
      perfusion_status: {0: 0.00, 1: 0.00, 2: -0.25, 3: -0.05, 5: 0.05, 7: 0.05, 10: 0.02, 14: 0.01}
      renal_function: {0: 0.00, 1: 0.00, 2: -0.15, 3: -0.05, 5: 0.02, 7: 0.02, 10: 0.01, 14: 0.01}
    order_modifications:
      day_2:
        add_labs: ["ABG", "Lactate", "Blood_culture_x2", "Hb", "Type_and_screen"]
        add_imaging: ["CT_abdomen_pelvis_with_contrast"]
    treatment_modifications:
      day_2:
        start:
          japan:
            - {drug: "Meropenem", dose: "1g IV q8h"}
            - {drug: "Norepinephrine", dose: "0.05ug/kg/min IV drip"}
          us:
            - {drug: "Meropenem", dose: "1g IV q8h"}
            - {drug: "Norepinephrine", dose: "0.05ug/kg/min IV drip"}
        action: "emergent_laparotomy"
        action_2: "icu_transfer"
    triggers:
      - day: 2
        condition: "perfusion_status < 0.4"
        actions: ["emergent_surgery", "icu_transfer", "start_vasopressor"]

# Archetype selection modifiers
archetype_modifiers:
  - condition: "prior_abdominal_surgery > 2"
    effect: {treatment_resistant: 0.08, smooth_recovery: -0.08}
  - condition: "age >= 80"
    effect: {gradual_deterioration: 0.05, smooth_recovery: -0.05}
  - condition: "hernia_incarcerated"
    effect: {sudden_deterioration: 0.10, smooth_recovery: -0.10}

# ============================================================
# COMPLICATIONS
# ============================================================
complications:
  - name: "bowel_perforation"
    description: "Intestinal perforation from prolonged obstruction or strangulation"
    probability_per_day: 0.005
    onset_day_range: [2, 7]
    risk_factors:
      - {condition: "severity_severe", multiplier: 4.0}
      - {condition: "age_over_75", multiplier: 1.5}
      - {condition: "closed_loop_obstruction", multiplier: 5.0}
    state_impact:
      inflammation_level: 0.30
      perfusion_status: -0.15
    detection:
      test: "ct_abdomen"
      finding: "free_air_or_extraluminal_contrast"
    actions: ["emergent_laparotomy", "broad_spectrum_antibiotics"]
    cascade: ["peritonitis"]

  - name: "peritonitis"
    description: "Peritoneal infection following perforation"
    probability_given_parent: 0.80
    parent_complication: "bowel_perforation"
    onset_days_after_parent: [0, 2]
    state_impact:
      inflammation_level: 0.25
      perfusion_status: -0.15
