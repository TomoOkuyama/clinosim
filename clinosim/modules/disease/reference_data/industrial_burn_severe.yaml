# Severe Industrial Burn (Thermal / Chemical, ≥ 10% TBSA or deep)
# Sources: Japan Burn Association, American Burn Association
disease_id: industrial_burn_severe
chief_complaint:
  en: "Severe thermal/chemical burn from industrial accident"
  ja: "労災による重度熱傷・化学熱傷"
department: general_surgery
encounter_type: surgical
requires_surgery: true
minimum_severity: moderate
readmission_eligible: false

icd_codes:
  primary: "T31.2"
  variants:
    - {code: "T31.2", name: "Burns involving 20-29% of body surface", probability: 0.45}
    - {code: "T31.3", name: "Burns involving 30-39% of body surface", probability: 0.25}
    - {code: "T30.0", name: "Burn of unspecified body region, unspecified degree", probability: 0.20}
    - {code: "T54.3", name: "Toxic effect of corrosive alkalis and alkali-like substances", probability: 0.10}

incidence:
  japan:
    "0-44": {M: 35, F: 7}
    "45-64": {M: 25, F: 5}
    "65+":   {M: 5, F: 1}
  risk_multipliers: []
  trigger_type: "trauma"
  time_of_day_pattern: "day_peak"

severity:
  distribution:
    mild: 0.0
    moderate: 0.55
    severe: 0.45

initial_state_impact:
  moderate:
    inflammation_level: 0.40
    anemia_level: 0.10
    volume_status: -0.35    # massive fluid loss
    perfusion_status: -0.20
    renal_function: -0.10
    anion_gap_status: 0.4     # AG axis: tissue hypoperfusion + lactate (AG 14-18)
  severe:
    inflammation_level: 0.60
    anemia_level: 0.20
    volume_status: -0.55
    perfusion_status: -0.35
    renal_function: -0.20
    anion_gap_status: 0.5     # AG axis: severe shock + lactate (AG 16-22)

presenting_symptoms:
  - {name: "burn_wound", probability: 1.0, severity_range: [0.7, 1.0]}
  - {name: "pain", probability: 1.0, severity_range: [0.7, 1.0]}
  - {name: "hypovolemia", probability: 0.80, severity_range: [0.5, 0.9]}
  - {name: "inhalation_injury", probability: 0.20, severity_range: [0.5, 1.0]}

# ============================================================
# COURSE ARCHETYPES (FP-ARCH-1)
# Severe-burn course is prolonged and infection-driven: volume_status and
# perfusion_status recover slowly as resuscitation takes hold; inflammation_level
# stays high while wounds granulate/graft. Deterioration paths model septic
# MODS (gradual) and septic shock (sudden). plateau / treatment_resistant are
# thickened to reflect slow, staged wound closure. Canonical archetype names.
# ============================================================
course_archetypes:
  smooth_recovery:
    probability: 0.25
    description: "Successful resuscitation and staged grafting; wounds close, sepsis avoided"
    trajectory:
      volume_status:      {0: 0.00, 1: 0.05, 2: 0.08, 3: 0.10, 5: 0.12, 7: 0.12, 10: 0.10, 14: 0.08}
      perfusion_status:   {0: 0.00, 1: 0.03, 3: 0.08, 5: 0.10, 7: 0.10, 10: 0.08, 14: 0.06}
      inflammation_level: {0: 0.00, 2: -0.05, 5: -0.10, 7: -0.12, 10: -0.10, 14: -0.08}
      anemia_level:       {0: 0.02, 3: 0.00, 5: -0.02, 7: -0.03, 10: -0.03, 14: -0.02}
    order_modifications: {}
    treatment_modifications: {}

  dip_then_recovery:
    probability: 0.15
    description: "Early resuscitation lag / burn shock Day 1-2, then perfusion and volume recover"
    trajectory:
      volume_status:      {0: -0.05, 1: -0.05, 2: -0.02, 3: 0.02, 5: 0.08, 7: 0.10, 10: 0.10, 14: 0.08}
      perfusion_status:   {0: -0.05, 1: -0.05, 2: -0.02, 3: 0.02, 5: 0.06, 7: 0.08, 10: 0.07, 14: 0.05}
      inflammation_level: {0: 0.05, 1: 0.05, 2: 0.02, 3: -0.02, 5: -0.06, 7: -0.10, 10: -0.09, 14: -0.07}
      renal_function:     {0: -0.05, 1: -0.05, 3: -0.02, 5: 0.00, 7: 0.02, 10: 0.02, 14: 0.02}
    order_modifications:
      day_2:
        add_labs: ["Lactate", "Creatinine"]

  plateau_then_recovery:
    probability: 0.18
    description: "Slow wound bed granulation; inflammation plateaus then clears after grafting"
    trajectory:
      volume_status:      {0: 0.00, 2: 0.02, 3: 0.04, 5: 0.06, 7: 0.08, 10: 0.09, 14: 0.08}
      perfusion_status:   {0: 0.00, 3: 0.02, 5: 0.03, 7: 0.05, 10: 0.05, 14: 0.04}
      inflammation_level: {0: 0.03, 1: 0.02, 2: 0.00, 3: -0.01, 5: -0.03, 7: -0.06, 10: -0.08, 14: -0.07}
    order_modifications:
      day_3:
        add_labs: ["CRP", "Albumin"]

  treatment_resistant:
    probability: 0.17
    description: "Persistent wound infection needing repeat debridement/grafting; slow clearance"
    trajectory:
      inflammation_level: {0: 0.04, 1: 0.04, 3: 0.03, 5: 0.01, 7: -0.02, 10: -0.04, 14: -0.05}
      volume_status:      {0: -0.02, 1: -0.01, 3: 0.01, 5: 0.03, 7: 0.05, 10: 0.06, 14: 0.06}
      renal_function:     {0: -0.03, 1: -0.03, 3: -0.02, 5: -0.01, 7: 0.00, 10: 0.01, 14: 0.01}
      anemia_level:       {0: 0.03, 3: 0.03, 5: 0.02, 7: 0.01, 10: 0.00, 14: -0.01}
    order_modifications:
      day_3:
        add_labs: ["CRP", "WBC"]
        add_consult: ["general_surgery"]

  gradual_deterioration:
    probability: 0.15
    description: "Progressive burn sepsis with multi-organ dysfunction; hypoperfusion worsens"
    trajectory:
      inflammation_level: {0: 0.05, 1: 0.05, 2: 0.05, 3: 0.04, 5: 0.04, 7: 0.03}
      perfusion_status:   {0: -0.04, 1: -0.04, 2: -0.04, 3: -0.03, 5: -0.03, 7: -0.03}
      volume_status:      {0: -0.03, 1: -0.03, 2: -0.03, 3: -0.02, 5: -0.02, 7: -0.02}
      renal_function:     {0: -0.04, 1: -0.04, 2: -0.03, 3: -0.03, 5: -0.02, 7: -0.02}
      anemia_level:       {0: 0.03, 1: 0.03, 2: 0.03, 3: 0.02, 5: 0.02, 7: 0.02}

  sudden_deterioration:
    probability: 0.10
    description: "Septic shock; abrupt Day 2-3 collapse in perfusion with rising inflammation"
    trajectory:
      perfusion_status:   {0: 0.00, 1: -0.05, 2: -0.30, 3: -0.10, 5: 0.02, 7: 0.03}
      inflammation_level: {0: 0.00, 1: 0.10, 2: 0.25, 3: 0.10, 5: -0.03, 7: -0.05}
      volume_status:      {0: 0.00, 1: -0.05, 2: -0.20, 3: -0.06, 5: 0.03, 7: 0.04}
      renal_function:     {0: 0.00, 1: -0.03, 2: -0.12, 3: -0.05, 5: -0.01, 7: 0.00}

# ============================================================
# COMPLICATIONS — burn sepsis cascade (drive ICU transfer)
# risk_factor conditions restricted to those _evaluate_risk_condition supports.
# ============================================================
complications:
  - name: "burn_wound_infection"
    description: "Invasive burn wound infection / surgical site infection (high SSI burden)"
    probability_per_day: 0.04
    onset_day_range: [2, 14]
    risk_factors:
      - {condition: "severity_severe", multiplier: 2.0}
      - {condition: "immobility_days > 3", multiplier: 1.3}
    state_impact:
      inflammation_level: 0.06
    detection:
      test: "WBC"
      finding: "leukocytosis"
    actions: ["order_wound_culture", "escalate_antibiotics"]

  - name: "sepsis"
    description: "Burn sepsis with systemic hypoperfusion progressing toward shock"
    probability_per_day: 0.015
    onset_day_range: [3, 14]
    risk_factors:
      - {condition: "severity_severe", multiplier: 3.0}
      - {condition: "perfusion_status < 0.3", multiplier: 2.0}
    state_impact:
      perfusion_status: -0.15
      inflammation_level: 0.10
    detection:
      test: "Lactate"
      finding: "elevated_lactate"
    actions: ["icu_transfer", "broad_spectrum_antibiotics"]

  - name: "acute_kidney_injury"
    description: "AKI from burn shock hypovolemia / rhabdomyolysis (myoglobinuria)"
    probability_per_day: 0.02
    onset_day_range: [1, 7]
    risk_factors:
      - {condition: "severity_severe", multiplier: 3.0}
      - {condition: "age_over_75", multiplier: 1.5}
    state_impact:
      renal_function: -0.08
    detection:
      test: "Creatinine"
      finding: "rising_creatinine"
    actions: ["order_renal_panel"]

  - name: "inhalation_injury_respiratory_failure"
    description: "Airway/inhalation injury progressing to respiratory failure"
    probability_per_day: 0.01
    onset_day_range: [0, 3]
    risk_factors:
      - {condition: "severity_severe", multiplier: 4.0}
      - {condition: "perfusion_status < 0.3", multiplier: 2.0}
    state_impact:
      perfusion_status: -0.12
    actions: ["icu_transfer"]

order_protocols:
  admission_orders:
    labs:
      - {test: "CRP", urgency: "stat"}
      - {test: "WBC", urgency: "stat"}
      - {test: "Hb", urgency: "stat"}
      - {test: "Creatinine", urgency: "stat"}
      - {test: "Na", urgency: "stat"}
      - {test: "K", urgency: "stat"}
      - {test: "Lactate", urgency: "stat"}
      - {test: "CK", urgency: "stat", note: "rhabdomyolysis screen"}
      - {test: "Blood_Type_Crossmatch", urgency: "stat"}
    imaging:
      - {test: "Chest_Xray", urgency: "stat", note: "if inhalation injury suspected"}
    supportive:
      - {type: "IV_fluid", detail: "Parkland formula: LR 4mL × kg × %TBSA over 24h"}
      - {type: "pain_management", detail: "Fentanyl IV continuous or PRN"}
      - {type: "wound_care", detail: "Silver sulfadiazine cream, sterile dressings"}
      - {type: "nutritional_support", detail: "Early enteral feeding"}
      - {type: "DVT_prophylaxis", detail: "Enoxaparin SC daily"}
  daily_monitoring:
    labs:
      - {test: "CRP", frequency: "daily"}
      - {test: "Creatinine", frequency: "daily"}
      - {test: "Albumin", frequency: "daily"}
    vitals:
      stable: "q4h"
      icu: "continuous"
  discharge_criteria:
    japan:
      - "All wounds granulating or grafted"
      - "No active infection"
      - "Pain controlled on oral analgesics"
      - "Rehabilitation plan established"
    us:
      - "Wounds epithelializing or closed"
      - "No active infection"
      - "Pain controlled PO"
      - "Outpatient burn clinic follow-up"

drugs:
  first_line:
    japan:
      - {drug: "Fentanyl", dose: "25-50mcg IV q1h PRN", route: "IV"}
      - {drug: "Acetaminophen", dose: "1000mg IV q6h", route: "IV"}
      - {drug: "Cefazolin", dose: "1g IV q8h", note: "surgical prophylaxis for grafting"}
      - {drug: "Silver sulfadiazine", dose: "topical BID", route: "topical"}
    us:
      - {drug: "Fentanyl", dose: "25-100mcg IV q1h PRN", route: "IV"}
      - {drug: "Acetaminophen", dose: "1000mg IV q6h", route: "IV"}
      - {drug: "Cefazolin", dose: "2g IV q8h"}
      - {drug: "Silver sulfadiazine", dose: "topical BID", route: "topical"}
  post_op:
    japan:
      - {drug: "Acetaminophen", dose: "1000mg PO q6h"}
      - {drug: "Enoxaparin", dose: "2000IU SC daily"}
    us:
      - {drug: "Oxycodone", dose: "5-10mg PO q4-6h PRN"}
      - {drug: "Acetaminophen", dose: "1000mg PO q6h"}
      - {drug: "Enoxaparin", dose: "40mg SC daily"}

procedure:
  type: "debridement and skin grafting"
  procedure_code_jp: "K013"
  procedure_code_us: "15100"
  typical_duration_minutes: {mean: 180, sd: 90, min: 60, max: 360}
  anesthesia: "general"
  estimated_blood_loss_ml: {mean: 400, sd: 300, min: 100, max: 1500}
  approach:
    "debridement and skin grafting": "staged escharectomy followed by split-thickness autograft"

target_los:
  japan:
    moderate: {mean: 30, sd: 10, min: 20, max: 45}
    severe: {mean: 50, sd: 20, min: 30, max: 90}
  us:
    moderate: {mean: 14, sd: 6, min: 7, max: 21}
    severe: {mean: 28, sd: 12, min: 14, max: 60}

outcome_benchmarks:
  japan:
    median_los: 35
    in_hospital_mortality: 0.08
    thirty_day_readmission: 0.07
    surgical_site_infection_rate: 0.20
    mean_age_admitted: 40
    female_ratio: 0.20
  us:
    median_los: 18
    in_hospital_mortality: 0.06
    thirty_day_readmission: 0.12
    surgical_site_infection_rate: 0.15
    mean_age_admitted: 38
    female_ratio: 0.20

# ============================================================
# NARRATIVE SPEC (Tier 1 #3 α-min-1)
# Consumed by TemplateNarrativeGenerator (Task 6)
# ============================================================
