# Influenza — Complete Reference Data
# Sources cited per section. All rates are approximate and should be validated
# against the most current published data before production use.

disease_id: influenza
chief_complaint:
  en: "High fever, myalgia, cough, fatigue"
  ja: "高熱・筋肉痛・咳嗽・倦怠感"
department: pulmonology
encounter_type: medical
requires_surgery: false
readmission_eligible: true
minimum_severity: null

icd_codes:
  primary: "J10.1"  # Influenza due to other identified influenza virus with other respiratory manifestations
  variants:
    - {code: "J10.1", name: "Influenza with other respiratory manifestations, identified virus", probability: 0.40}
    - {code: "J11.1", name: "Influenza with other respiratory manifestations, unidentified virus", probability: 0.30}
    - {code: "J10.0", name: "Influenza with pneumonia, identified virus", probability: 0.15}
    - {code: "J11.0", name: "Influenza with pneumonia, unidentified virus", probability: 0.10}
    - {code: "J10.8", name: "Influenza with other manifestations, identified virus", probability: 0.05}

# ============================================================
# INCIDENCE (per 100,000 per year, by age band and sex)
# Source: JP — 感染症発生動向調査, 患者調査
#         US — CDC FluSurv-NET, Chaves et al. CID 2014
# Hospitalized influenza only (not all influenza infections)
# ============================================================
incidence:
  japan:
    "0-4":   {M: 120, F: 100}
    "5-14":  {M: 80, F: 70}
    "15-24": {M: 15, F: 12}
    "25-34": {M: 12, F: 10}
    "35-44": {M: 15, F: 12}
    "45-54": {M: 20, F: 15}
    "55-64": {M: 40, F: 30}
    "65-74": {M: 100, F: 80}
    "75-84": {M: 250, F: 200}
    "85+":   {M: 500, F: 400}
  us:
    "0-4":   {M: 100, F: 85}
    "5-14":  {M: 60, F: 50}
    "15-24": {M: 10, F: 8}
    "25-34": {M: 10, F: 8}
    "35-44": {M: 12, F: 10}
    "45-54": {M: 18, F: 14}
    "55-64": {M: 35, F: 25}
    "65-74": {M: 90, F: 70}
    "75-84": {M: 220, F: 180}
    "85+":   {M: 450, F: 360}

  risk_multipliers:
    - {condition: "COPD", multiplier: 2.5}
    - {condition: "asthma", multiplier: 2.0}
    - {condition: "heart_failure", multiplier: 2.5}
    - {condition: "diabetes", multiplier: 1.5}
    - {condition: "CKD", multiplier: 1.8}
    - {condition: "immunosuppressed", multiplier: 4.0}
    - {condition: "pregnancy", multiplier: 2.0}
    - {condition: "obesity_bmi_over_40", multiplier: 1.5}
    - {condition: "age_over_75", multiplier: 2.0}
    - {condition: "dementia", multiplier: 2.0}

  seasonal_curve:  # STRONG winter peak
    1: 1.8   # Jan — peak
    2: 1.5
    3: 0.8
    4: 0.2
    5: 0.1
    6: 0.1
    7: 0.1
    8: 0.1
    9: 0.1
    10: 0.2
    11: 0.5
    12: 1.5

  vaccine_protection:
    influenza:
      effectiveness: 0.45   # varies by season 30-60%
      duration_days: 180    # ~6 months of protection

# ============================================================
# SEVERITY DISTRIBUTION
# Source: CDC FluSurv-NET, JP DPC data
# ============================================================
severity:
  distribution:
    mild: 0.50        # manageable with observation, often short stay
    moderate: 0.40    # requires IV fluids, monitoring
    severe: 0.10      # pneumonia, ARDS risk, ICU
  modifiers:
    - {condition: "age_over_75", mild_multiplier: 0.6, severe_multiplier: 2.0}
    - {condition: "COPD", moderate_multiplier: 1.3, severe_multiplier: 1.8}
    - {condition: "heart_failure", severe_multiplier: 2.0}
    - {condition: "immunosuppressed", severe_multiplier: 3.0, mild_multiplier: 0.3}
    - {condition: "pregnancy", severe_multiplier: 1.5}

# ============================================================
# INITIAL PHYSIOLOGICAL STATE IMPACT
# ============================================================
initial_state_impact:
  mild:
    inflammation_level: 0.20
    volume_status: -0.05
  moderate:
    inflammation_level: 0.35
    volume_status: -0.15
    perfusion_status: -0.03
  severe:
    inflammation_level: 0.60
    volume_status: -0.25
    perfusion_status: -0.15
    renal_function: -0.10
    ph_status: -0.05

# ============================================================
# ORDER PROTOCOLS
# ============================================================
order_protocols:
  admission_orders:
    labs:
      - {test: "Rapid_Influenza_Antigen", urgency: "stat"}
      - {test: "CRP", urgency: "stat"}
      - {test: "WBC", urgency: "stat"}
      - {test: "Creatinine", urgency: "stat"}
      - {test: "BUN", urgency: "stat"}
      - {test: "Na", urgency: "stat"}
      - {test: "K", urgency: "stat"}
      - {test: "Glucose", urgency: "stat"}
      - {test: "Hb", urgency: "stat"}
      - {test: "Plt", urgency: "stat"}
      - {test: "AST", urgency: "stat", probability: 0.60}
      - {test: "ALT", urgency: "stat", probability: 0.60}
      - {test: "LDH", urgency: "stat", probability: 0.30}
      - {test: "PCT", urgency: "stat", probability: 0.40}  # to rule out bacterial co-infection
    imaging:
      - {test: "Chest_Xray_PA_Lateral", urgency: "stat", probability: 0.80}  # rule out pneumonia
    supportive:
      - {type: "IV_fluid", detail: "NS 80-125 mL/h"}
      - {type: "antipyretic", detail: "Acetaminophen 500mg PO q6h PRN temp >= 38.5"}
      - {type: "isolation", detail: "Droplet precautions"}

  daily_monitoring:
    labs:
      - {test: "CRP", frequency: "daily"}
      - {test: "WBC", frequency: "daily"}
      - {test: "Creatinine", frequency: "every_other_day"}
    vitals:
      stable: "q4h"
      unstable: "q1h"
    imaging:
      - {test: "Chest_Xray", frequency: "prn", condition: "worsening respiratory symptoms or SpO2 decline"}

  trigger_orders:
    no_defervescence_72h:
      condition: "inflammation_level > 0.4 at Day 3"
      actions:
        - {type: "lab", test: "Blood_culture"}
        - {type: "lab", test: "PCT"}
        - {type: "imaging", test: "Chest_Xray"}
        - {type: "medication_change", action: "add_antibiotic_for_bacterial_superinfection"}
    spo2_below_90:
      condition: "SpO2 < 90% on supplemental O2"
      actions:
        - {type: "lab", test: "ABG"}
        - {type: "respiratory", action: "increase_O2_or_HFNC"}
        - {type: "evaluate", action: "consider_ICU_transfer"}
    renal_deterioration:
      condition: "Creatinine rise > 0.3 from baseline"
      actions:
        - {type: "fluid", action: "reassess_volume_status"}

  discharge_criteria:
    japan:
      - "Afebrile (< 37.0C) for 24 hours"
      - "Oral intake adequate"
      - "SpO2 >= 95% on room air"
      - "CRP declining"
      - "No secondary bacterial infection"
    us:
      - "Afebrile (< 37.5C) for 24 hours"
      - "Oral intake tolerated"
      - "SpO2 >= 92% on room air"
      - "Clinically stable"

# ============================================================
# LIKELIHOOD RATIO TABLE
# Source: Chartrand et al. Ann Intern Med 2012 (rapid test meta-analysis)
# ============================================================
likelihood_ratios:
  rapid_influenza_antigen_positive:
    influenza: {positive_LR: 15.0, negative_LR: 0.45}
    # Sensitivity ~60% so negative LR is modest
    bacterial_pneumonia: {positive_LR: 0.1, negative_LR: 1.0}

  pcr_influenza_positive:
    influenza: {positive_LR: 50.0, negative_LR: 0.05}
    bacterial_pneumonia: {positive_LR: 0.05, negative_LR: 1.0}

  crp_above_100:
    influenza: {positive_LR: 0.5, negative_LR: 1.3}
    bacterial_pneumonia: {positive_LR: 3.5, negative_LR: 0.4}

  wbc_above_12000:
    influenza: {positive_LR: 0.6, negative_LR: 1.2}
    bacterial_pneumonia: {positive_LR: 2.5, negative_LR: 0.6}

  chest_xray_infiltrate:
    influenza: {positive_LR: 1.5, negative_LR: 0.8}
    bacterial_pneumonia: {positive_LR: 5.0, negative_LR: 0.4}

  bilateral_infiltrates:
    influenza: {positive_LR: 2.0, negative_LR: 0.8}
    viral_pneumonia: {positive_LR: 3.0, negative_LR: 0.5}

# ============================================================
# LAB REFERENCE RANGES
# ============================================================
expected_lab_distributions:
  admission:
    CRP:
      unit: "mg/L"
      median: 30
      iqr: [10, 60]
      range: [2, 200]
    WBC:
      unit: "/uL"
      median: 6500
      iqr: [4000, 9000]
      range: [2000, 15000]
      note: "leukopenia is common in influenza"
    Creatinine:
      unit: "mg/dL"
      median: 0.85
      iqr: [0.65, 1.1]
      range: [0.4, 3.0]
    LDH:
      unit: "U/L"
      median: 250
      iqr: [180, 350]
      range: [120, 800]
    Glucose:
      unit: "mg/dL"
      median: 120
      iqr: [95, 160]
      range: [70, 350]

  discharge:
    CRP:
      unit: "mg/L"
      median: 5
      iqr: [2, 12]
    WBC:
      unit: "/uL"
      median: 6000
      iqr: [4500, 8000]

# ============================================================
# VITAL SIGN DISTRIBUTIONS
# ============================================================
expected_vital_distributions:
  admission:
    temperature:
      unit: "C"
      mean: 39.0
      sd: 0.7
      range: [37.5, 41.0]
    heart_rate:
      unit: "bpm"
      mean: 95
      sd: 12
      range: [65, 130]
    systolic_bp:
      unit: "mmHg"
      mean: 120
      sd: 18
      range: [85, 170]
    respiratory_rate:
      unit: "/min"
      mean: 20
      sd: 4
      range: [14, 35]
    spo2:
      unit: "%"
      mean: 96
      sd: 2
      range: [88, 99]

# ============================================================
# TREATMENT — Drug selection data
# Source: IDSA/ATS Influenza Guidelines, JP 感染症学会ガイドライン
# Key: oseltamivir most effective within 48h of onset
# ============================================================
drugs:
  first_line:
    japan:
      - drug: "Oseltamivir"
        code_yj: "6250001"
        dose: "75mg PO BID"
        route: PO
        duration_days: 5
        renal_adjustment:
          eGFR_30_60: "75mg PO daily"
          eGFR_below_30: "30mg PO daily"
        pregnancy_safe: true
        note: "Most effective within 48h of symptom onset"
    us:
      - drug: "Oseltamivir"
        code_rxnorm: "352018"
        dose: "75mg PO BID"
        route: PO
        duration_days: 5
        renal_adjustment:
          eGFR_30_60: "75mg PO daily"
          eGFR_below_30: "30mg PO daily"
        pregnancy_safe: true

  alternative_oral_intolerance:
    japan:
      - drug: "Peramivir"
        code_yj: "6250101"
        dose: "300mg IV single dose"
        route: IV
        renal_adjustment:
          eGFR_below_30: "100mg IV single dose"
        note: "Single-dose IV antiviral for patients unable to take PO"
    us:
      - drug: "Peramivir"
        code_rxnorm: "1116534"
        dose: "600mg IV single dose"
        route: IV
        renal_adjustment:
          eGFR_below_30: "200mg IV single dose"

  alternative_penicillin_allergy:
    # Not applicable — antivirals, not antibiotics
    japan: []
    us: []

  escalation:  # bacterial superinfection suspected
    japan:
      - drug: "Ampicillin/Sulbactam"
        code_yj: "6131405"
        dose: "3g IV q6h"
        indication: "suspected_bacterial_superinfection"
    us:
      - drug: "Ceftriaxone"
        code_rxnorm: "309090"
        dose: "1g IV daily"
        indication: "suspected_bacterial_superinfection"
      - drug: "Azithromycin"
        code_rxnorm: "248656"
        dose: "500mg IV daily"
        indication: "atypical_coverage"

  discharge_oral:
    japan:
      - drug: "Oseltamivir"
        code_yj: "6250001"
        dose: "75mg PO BID"
        duration_days: 5
        note: "Continue to complete 5-day course if started late"
    us:
      - drug: "Oseltamivir"
        code_rxnorm: "352018"
        dose: "75mg PO BID"
        duration_days: 5

# ============================================================
# DRUG INTERACTIONS
# ============================================================
drug_interactions:
  - drug_a: "Oseltamivir"
    drug_b: "Warfarin"
    severity: "minor"
    effect: "Possible slight INR increase"
    action: "Monitor INR"

  - drug_a: "Oseltamivir"
    drug_b: "Probenecid"
    severity: "moderate"
    effect: "Increased oseltamivir levels (reduced renal clearance)"
    action: "No dose adjustment typically needed"

# ============================================================
# LAB ITEM REFERENCE RANGES
# ============================================================
reference_ranges:
  CRP:
    unit: "mg/L"
    all: {low: 0, high: 3}
  WBC:
    unit: "/uL"
    all: {low: 3500, high: 9500}
  Hb:
    unit: "g/dL"
    male: {low: 13.5, high: 17.5}
    female: {low: 11.5, high: 15.5}
  Plt:
    unit: "x10^3/uL"
    all: {low: 150, high: 400}
  Creatinine:
    unit: "mg/dL"
    male: {low: 0.6, high: 1.1}
    female: {low: 0.4, high: 0.8}
  BUN:
    unit: "mg/dL"
    all: {low: 8, high: 20}
  Na:
    unit: "mEq/L"
    all: {low: 136, high: 145}
  K:
    unit: "mEq/L"
    all: {low: 3.5, high: 5.0}
  Glucose:
    unit: "mg/dL"
    fasting: {low: 70, high: 100}
    random: {low: 70, high: 140}
  AST:
    unit: "U/L"
    all: {low: 10, high: 35}
  ALT:
    unit: "U/L"
    all: {low: 5, high: 40}
  LDH:
    unit: "U/L"
    all: {low: 120, high: 240}

# ============================================================
# TARGET LENGTH OF STAY (country-specific)
# ============================================================
target_los:
  japan:
    mild: {mean: 5, sd: 2, min: 3, max: 8}
    moderate: {mean: 7, sd: 2, min: 5, max: 12}
    severe: {mean: 14, sd: 4, min: 8, max: 25}
  us:
    mild: {mean: 2, sd: 1, min: 1, max: 4}
    moderate: {mean: 3, sd: 1, min: 2, max: 5}
    severe: {mean: 7, sd: 3, min: 4, max: 14}

# ============================================================
# OUTCOME BENCHMARKS
# Source: CDC FluSurv-NET, JP DPC data
# ============================================================
outcome_benchmarks:
  japan:
    median_los: 6
    los_iqr: [4, 8]
    in_hospital_mortality: 0.01
    icu_transfer_rate: 0.05
    thirty_day_readmission: 0.08
    mean_time_to_antiviral_hours: 6.0
    rapid_test_positivity_rate: 0.75
    bacterial_superinfection_rate: 0.08
    mean_age_admitted: 72
    male_ratio: 0.48

  us:
    median_los: 3
    los_iqr: [2, 4]
    in_hospital_mortality: 0.008
    icu_transfer_rate: 0.08
    thirty_day_readmission: 0.06
    mean_time_to_antiviral_hours: 4.0
    rapid_test_positivity_rate: 0.70
    bacterial_superinfection_rate: 0.10
    mean_age_admitted: 68
    male_ratio: 0.46

# ============================================================
# DIAGNOSTIC
# ============================================================
diagnostic:
  diagnostic_difficulty: 0.2  # rapid test confirms quickly
  differential:
    - {disease: "influenza", icd: "J10.1", name: "Influenza", prior: 0.55}
    - {disease: "bacterial_pneumonia", icd: "J18.9", name: "Bacterial pneumonia", prior: 0.15}
    - {disease: "covid19", icd: "U07.1", name: "COVID-19", prior: 0.10}
    - {disease: "rsv_infection", icd: "J20.5", name: "RSV infection", prior: 0.05}
    - {disease: "adenovirus_pharyngitis", icd: "J06.9", name: "Acute upper respiratory infection", prior: 0.10}
    - {disease: "other", icd: "R50.9", name: "Fever of unknown origin", prior: 0.05}

# ============================================================
# CLINICAL COURSE ARCHETYPES
# ============================================================
course_archetypes:
  smooth_recovery:
    probability: 0.60
    description: "Rapid defervescence with oseltamivir, discharged in 2-5 days"
    trajectory:
      inflammation_level: {0: 0.05, 1: -0.05, 2: -0.10, 3: -0.08, 5: -0.05, 7: -0.03}
      volume_status: {0: 0.02, 1: 0.03, 2: 0.02, 3: 0.01, 5: 0.00, 7: 0.00}
      renal_function: {0: 0.00, 1: 0.00, 2: 0.01, 3: 0.01, 5: 0.00, 7: 0.00}
      perfusion_status: {0: 0.00, 1: 0.01, 2: 0.01, 3: 0.00, 5: 0.00, 7: 0.00}
    order_modifications: {}
    treatment_modifications: {}

    daily_trajectory:
      day_0:
        subjective: "症状あり"
        objective: "バイタル安定、検査所見あり"
        assessment: "初期診断確定、治療開始"
        plan: "治療継続、経過観察"
      day_1:
        subjective: "症状緩和傾向"
        objective: "バイタル安定、検査所見改善"
        assessment: "治療反応良好"
        plan: "治療継続"

  dip_then_recovery:
    probability: 0.15
    description: "Brief worsening Day 1-2, then improvement — high fever persists before responding"
    trajectory:
      inflammation_level: {0: 0.08, 1: 0.03, 2: -0.02, 3: -0.08, 5: -0.08, 7: -0.05}
      volume_status: {0: -0.05, 1: -0.02, 2: 0.02, 3: 0.02, 5: 0.01, 7: 0.00}
      renal_function: {0: -0.02, 1: 0.00, 2: 0.01, 3: 0.01, 5: 0.00, 7: 0.00}
      perfusion_status: {0: -0.02, 1: 0.00, 2: 0.01, 3: 0.01, 5: 0.00, 7: 0.00}
    order_modifications:
      day_2:
        add_labs: ["Blood_culture", "PCT"]
    treatment_modifications: {}

  plateau_then_recovery:
    probability: 0.10
    description: "Prolonged fever for 3-4 days then gradual improvement"
    trajectory:
      inflammation_level: {0: 0.03, 1: 0.01, 2: 0.00, 3: 0.00, 5: -0.08, 7: -0.08, 10: -0.04}
      volume_status: {0: 0.01, 1: 0.01, 2: 0.00, 3: 0.00, 5: 0.01, 7: 0.01, 10: 0.00}
    order_modifications:
      day_3:
        add_labs: ["CRP", "PCT"]
        add_imaging: ["Chest_Xray"]
    treatment_modifications: {}

  treatment_resistant:
    probability: 0.08
    description: "Oseltamivir started too late (>48h) or resistant strain, bacterial superinfection develops"
    trajectory:
      inflammation_level: {0: 0.08, 1: 0.05, 2: 0.03, 3: 0.02, 5: -0.03, 7: -0.08, 10: -0.08, 14: -0.05}
      volume_status: {0: -0.03, 1: -0.02, 2: 0.00, 3: 0.01, 5: 0.02, 7: 0.01, 10: 0.00, 14: 0.00}
      renal_function: {0: -0.02, 1: -0.01, 2: 0.00, 3: 0.01, 5: 0.01, 7: 0.01, 10: 0.00, 14: 0.00}
    order_modifications:
      day_3:
        add_labs: ["Blood_culture", "PCT", "Sputum_culture"]
        add_imaging: ["Chest_Xray"]
    treatment_modifications:
      day_3:
        start:
          japan: [{drug: "Ampicillin/Sulbactam", dose: "3g IV q6h"}]
          us: [{drug: "Ceftriaxone", dose: "1g IV daily"}, {drug: "Azithromycin", dose: "500mg IV daily"}]
    triggers:
      - day: 3
        condition: "inflammation_level > 0.4"
        actions: ["add_antibiotic", "order_cultures"]

  gradual_deterioration:
    probability: 0.05
    description: "Progressive respiratory failure, viral pneumonia -> ARDS"
    trajectory:
      inflammation_level: {0: 0.10, 1: 0.08, 2: 0.05, 3: 0.05, 5: 0.03, 7: 0.02, 10: 0.00, 14: -0.02}
      perfusion_status: {0: -0.03, 1: -0.05, 2: -0.05, 3: -0.03, 5: -0.02, 7: 0.00, 10: 0.01, 14: 0.01}
      renal_function: {0: -0.02, 1: -0.03, 2: -0.02, 3: -0.01, 5: 0.00, 7: 0.01, 10: 0.01, 14: 0.01}
    order_modifications:
      day_3:
        add_labs: ["ABG", "Lactate", "Blood_culture"]
      day_5:
        add_labs: ["ABG", "Lactate"]
        add_imaging: ["Chest_CT"]
    treatment_modifications:
      day_3:
        start:
          japan: [{drug: "Ampicillin/Sulbactam", dose: "3g IV q6h"}]
      day_5:
        action: "icu_transfer"
    triggers:
      - day: 5
        condition: "perfusion_status < 0.4"
        actions: ["icu_transfer"]

  sudden_deterioration:
    probability: 0.02
    description: "Sudden cardiopulmonary collapse — myocarditis or massive viral pneumonia"
    trajectory:
      inflammation_level: {0: 0.05, 1: -0.02, 2: 0.25, 3: 0.08, 5: -0.05, 7: -0.08, 10: -0.06, 14: -0.03}
      perfusion_status: {0: 0.00, 1: 0.00, 2: -0.25, 3: -0.05, 5: 0.05, 7: 0.05, 10: 0.02, 14: 0.01}
      renal_function: {0: 0.00, 1: 0.00, 2: -0.10, 3: -0.03, 5: 0.02, 7: 0.02, 10: 0.01, 14: 0.01}
    order_modifications:
      day_2:
        add_labs: ["ABG", "Lactate", "Troponin", "BNP", "Blood_culture"]
        add_imaging: ["Chest_CT", "Echocardiogram"]
    treatment_modifications:
      day_2:
        start:
          japan:
            - {drug: "Meropenem", dose: "1g IV q8h"}
            - {drug: "Norepinephrine", dose: "0.05ug/kg/min IV drip"}
        action: "icu_transfer"
        action_2: "intubation_evaluation"
    triggers:
      - day: 2
        condition: "perfusion_status < 0.4"
        actions: ["icu_transfer", "start_vasopressor", "intubation_evaluation"]

# Archetype selection modifiers
archetype_modifiers:
  - condition: "immune_reactivity < 0.3"
    effect: {treatment_resistant: 0.08, smooth_recovery: -0.08}
  - condition: "age >= 80"
    effect: {gradual_deterioration: 0.05, smooth_recovery: -0.05}
  - condition: "treatment_sensitivity > 1.2"
    effect: {smooth_recovery: 0.08, treatment_resistant: -0.05}
  - condition: "antiviral_within_48h"
    effect: {smooth_recovery: 0.15, treatment_resistant: -0.10}

# ============================================================
# COMPLICATIONS
# ============================================================
complications:
  - name: "viral_pneumonia"
    description: "Primary influenza viral pneumonia"
    probability_per_day: 0.015
    onset_day_range: [1, 5]
    risk_factors:
      - {condition: "severity_severe", multiplier: 3.0}
      - {condition: "immunosuppressed", multiplier: 2.5}
