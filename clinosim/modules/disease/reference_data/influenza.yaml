    actions: ["start_antibiotic", "repeat_cultures"]

  - name: "ards"
    description: "Acute respiratory distress syndrome"
    probability_given_parent: 0.15
    parent_complication: "viral_pneumonia"
    onset_days_after_parent: [1, 4]
    state_impact:
      perfusion_status: -0.25
      ph_status: -0.10
      inflammation_level: 0.10
    actions: ["intubation", "lung_protective_ventilation", "prone_positioning"]

  - name: "myocarditis"
    description: "Influenza-associated myocarditis"
    probability_per_day: 0.002
    onset_day_range: [2, 7]
