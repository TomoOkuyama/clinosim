# Decompensated Liver Cirrhosis — Complete Reference Data
# Sources cited per section. All rates are approximate and should be validated
# against the most current published data before production use.

disease_id: liver_cirrhosis_decompensated
chief_complaint:
  en: "Abdominal distension, jaundice, confusion, hematemesis"
  ja: "腹部膨満・黄疸・意識混濁・吐血"
department: gastroenterology
encounter_type: medical
requires_surgery: false
readmission_eligible: true

icd_codes:
  primary: "K74.60"  # Unspecified cirrhosis of liver
  variants:
    - {code: "K70.31", name: "Alcoholic liver cirrhosis with ascites", probability: 0.35}
    - {code: "K74.60", name: "Unspecified cirrhosis of liver", probability: 0.20}
    - {code: "K76.6", name: "Portal hypertension", probability: 0.15}
    - {code: "K70.41", name: "Alcoholic hepatic failure with ascites", probability: 0.10}
    - {code: "K74.69", name: "Other cirrhosis of liver", probability: 0.10}
    - {code: "B18.2", name: "Chronic viral hepatitis C with cirrhosis", probability: 0.10}

# ============================================================
# INCIDENCE (per 100,000 per year, by age band and sex)
# Source: JP — 肝臓学会, 患者調査, 人口動態統計
#         US — NIDDK, GBD 2019, AASLD data
# ============================================================
incidence:
  japan:
    "0-4":   {M: 0, F: 0}
    "5-14":  {M: 0, F: 0}
    "15-24": {M: 1, F: 1}
    "25-34": {M: 5, F: 3}
    "35-44": {M: 15, F: 8}
    "45-54": {M: 50, F: 25}
    "55-64": {M: 120, F: 60}
    "65-74": {M: 200, F: 100}
    "75-84": {M: 250, F: 130}
    "85+":   {M: 180, F: 100}
  us:
    "0-4":   {M: 0, F: 0}
    "5-14":  {M: 0, F: 0}
    "15-24": {M: 2, F: 1}
    "25-34": {M: 8, F: 5}
    "35-44": {M: 25, F: 15}
    "45-54": {M: 80, F: 45}
    "55-64": {M: 150, F: 80}
    "65-74": {M: 220, F: 120}
    "75-84": {M: 200, F: 110}
    "85+":   {M: 150, F: 90}

  risk_multipliers:
    - {condition: "alcohol_dependence", multiplier: 5.0}
    - {condition: "hepatitis_C", multiplier: 4.0}
    - {condition: "hepatitis_B", multiplier: 3.5}
    - {condition: "NASH", multiplier: 2.5}
    - {condition: "diabetes", multiplier: 1.8}
    - {condition: "obesity", multiplier: 1.5}
    - {condition: "autoimmune_hepatitis", multiplier: 3.0}
    - {condition: "primary_biliary_cholangitis", multiplier: 3.0}
    - {condition: "hemochromatosis", multiplier: 2.0}

  seasonal_curve:
    1: 1.05
    2: 1.00
    3: 1.00
    4: 1.00
    5: 1.00
    6: 1.00
    7: 1.00
    8: 1.00
    9: 1.00
    10: 1.00
    11: 1.00
    12: 1.10    # holiday alcohol consumption

  prerequisite:
    note: "May have K74 (cirrhosis) in chronic conditions, but not required — can be first presentation"
    chronic_condition_codes: ["K74", "K70.3", "K74.6", "B18.1", "B18.2"]
    first_presentation_probability: 0.25

  vaccine_protection: {}

# ============================================================
# SEVERITY DISTRIBUTION (Child-Pugh based)
# Source: Child-Pugh, MELD score studies, D'Amico et al. J Hepatol 2006
# ============================================================
severity:
  distribution:
    mild: 0.25        # Child-Pugh A with single decompensation event
    moderate: 0.50    # Child-Pugh B with ascites/variceal bleeding
    severe: 0.25      # Child-Pugh C or multi-organ involvement
  modifiers:
    - {condition: "alcohol_dependence_active", moderate_multiplier: 1.3, severe_multiplier: 1.5}
    - {condition: "hepatocellular_carcinoma", severe_multiplier: 2.0}
    - {condition: "CKD", severe_multiplier: 1.8}
    - {condition: "diabetes", moderate_multiplier: 1.2, severe_multiplier: 1.3}
    - {condition: "age_over_75", severe_multiplier: 1.5}

# ============================================================
# INITIAL PHYSIOLOGICAL STATE IMPACT
# ============================================================
initial_state_impact:
  mild:
    inflammation_level: 0.15
    volume_status: 0.15          # ascites/fluid retention
    hepatic_function: -0.30
    perfusion_status: -0.05
    anion_gap_status: 0.2     # AG axis: impaired lactate clearance (mild)
  moderate:
    inflammation_level: 0.30
    volume_status: 0.25
    hepatic_function: -0.50
    perfusion_status: -0.10
    renal_function: -0.10
    coagulation_status: -0.15
    anion_gap_status: 0.3     # AG axis: lactate accumulation + HRS contribution
  severe:
    inflammation_level: 0.45
    volume_status: 0.35
    hepatic_function: -0.70
    perfusion_status: -0.20
    renal_function: -0.25
    coagulation_status: -0.25
    ph_status: -0.05
    anion_gap_status: 0.4     # AG axis: severe HRS + lactate (AG 15-20)

# ============================================================
# ORDER PROTOCOLS
# ============================================================
order_protocols:
  admission_orders:
    labs:
      - {test: "AST", urgency: "stat"}
      - {test: "ALT", urgency: "stat"}
      - {test: "Total_bilirubin", urgency: "stat"}
      - {test: "Direct_bilirubin", urgency: "stat"}
      - {test: "Albumin", urgency: "stat"}
      - {test: "PT_INR", urgency: "stat"}
      - {test: "Creatinine", urgency: "stat"}
      - {test: "BUN", urgency: "stat"}
      - {test: "Na", urgency: "stat"}
      - {test: "K", urgency: "stat"}
      - {test: "Glucose", urgency: "stat"}
      - {test: "WBC", urgency: "stat"}
      - {test: "Hb", urgency: "stat"}
      - {test: "Plt", urgency: "stat"}
      - {test: "CRP", urgency: "stat"}
      - {test: "Ammonia", urgency: "stat"}
      - {test: "Lactate", urgency: "stat", probability: 0.60}
      - {test: "ALP", urgency: "stat"}
      - {test: "GGT", urgency: "stat"}
      - {test: "Blood_type_and_screen", urgency: "stat"}
      - {test: "AFP", urgency: "routine", probability: 0.70}
    imaging:
      - {test: "Abdominal_ultrasound", urgency: "stat"}
      - {test: "Chest_Xray_PA", urgency: "stat"}
    procedures:
      - {test: "Diagnostic_paracentesis", urgency: "stat", probability: 0.80}
      - {test: "Ascitic_fluid_analysis", urgency: "stat", note: "cell count, albumin, culture, total protein"}
    supportive:
      - {type: "fluid_restriction", detail: "1-1.5L/day if Na < 125"}
      - {type: "sodium_restriction", detail: "<2g Na/day"}
      - {type: "fall_precautions", detail: "High risk due to encephalopathy and coagulopathy"}
      - {type: "lactulose", detail: "30mL PO TID if encephalopathy"}

  daily_monitoring:
    labs:
      - {test: "Creatinine", frequency: "daily"}
      - {test: "Na", frequency: "daily"}
      - {test: "K", frequency: "daily"}
      - {test: "Total_bilirubin", frequency: "every_other_day"}
      - {test: "Albumin", frequency: "every_other_day"}
      - {test: "PT_INR", frequency: "every_other_day"}
      - {test: "Ammonia", frequency: "daily_if_encephalopathy"}
    vitals:
      stable: "q4h"
      unstable: "q1h"
    fluid_balance:
      - {task: "strict_intake_output", frequency: "q8h"}
      - {task: "daily_weight", frequency: "daily"}
      - {task: "abdominal_girth", frequency: "daily"}

  trigger_orders:
    suspected_sbp:
      condition: "ascitic_fluid_PMN > 250 or new_fever_or_abdominal_pain"
      actions:
        - {type: "lab", test: "ascitic_fluid_culture"}
        - {type: "medication", action: "start_IV_cefotaxime"}
        - {type: "lab", test: "Blood_culture_x2"}
    variceal_bleeding:
      condition: "hematemesis or melena or Hb_drop > 2g"
      actions:
        - {type: "procedure", action: "emergent_EGD"}
        - {type: "medication", action: "octreotide_50ug_bolus_then_50ug_h"}
        - {type: "medication", action: "ceftriaxone_1g_IV_daily"}
        - {type: "fluid", action: "blood_transfusion_target_Hb_7"}
    hepatorenal_syndrome:
      condition: "creatinine_rise > 0.3 with no response to albumin challenge"
      actions:
        - {type: "medication", action: "albumin_1g_kg_day1_then_20_40g_daily"}
        - {type: "medication", action: "terlipressin_or_midodrine_octreotide"}
        - {type: "consult", target: "nephrology"}
        - {type: "evaluate", action: "consider_liver_transplant_evaluation"}
    worsening_encephalopathy:
      condition: "West_Haven_grade >= 3 or rapid_deterioration"
      actions:
        - {type: "lab", test: "Ammonia"}
        - {type: "medication", action: "increase_lactulose"}
        - {type: "medication", action: "add_rifaximin"}
        - {type: "evaluate", action: "exclude_other_causes_infection_GI_bleed"}

  discharge_criteria:
    japan:
      - "Ascites controlled (weight stable, no tense ascites)"
      - "Encephalopathy resolved (West Haven grade 0-1)"
      - "Creatinine stable"
      - "INR stable (may not normalize)"
      - "Na > 130 mEq/L"
      - "Oral medications tolerated"
      - "Adequate caloric intake"
      - "Follow-up hepatology arranged"
    us:
      - "Ascites managed (stable weight, on diuretic regimen)"
      - "Encephalopathy controlled"
      - "Creatinine stable"
      - "Hemodynamically stable"
      - "Outpatient follow-up within 7 days"

# ============================================================
# DIAGNOSTIC SECTION
# Source: AASLD Practice Guidelines, EASL Guidelines
# ============================================================
diagnostic:
  diagnostic_difficulty: 0.30  # clinical + labs + imaging usually confirmatory, but cause identification varies
  differential:
    - {disease: "liver_cirrhosis_decompensated", icd: "K74.60", name: "Decompensated cirrhosis", prior: 0.55}
    - {disease: "heart_failure", icd: "I50.9", name: "Right heart failure with hepatic congestion", prior: 0.10}
    - {disease: "budd_chiari_syndrome", icd: "I82.0", name: "Budd-Chiari syndrome", prior: 0.03}
    - {disease: "hepatocellular_carcinoma", icd: "C22.0", name: "Hepatocellular carcinoma", prior: 0.08}
    - {disease: "peritoneal_carcinomatosis", icd: "C78.6", name: "Peritoneal carcinomatosis", prior: 0.05}
    - {disease: "nephrotic_syndrome", icd: "N04.9", name: "Nephrotic syndrome", prior: 0.03}
    - {disease: "acute_hepatitis", icd: "K72.0", name: "Acute hepatic failure", prior: 0.05}
    - {disease: "other", icd: "R18.8", name: "Other causes of ascites", prior: 0.11}

# ============================================================
# LIKELIHOOD RATIO TABLE
# Source: AASLD Guidelines, Runyon BA Hepatology studies
# ============================================================
likelihood_ratios:
  saag_above_1_1:
    liver_cirrhosis_decompensated: {positive_LR: 12.0, negative_LR: 0.1}
    heart_failure: {positive_LR: 5.0, negative_LR: 0.3}
    peritoneal_carcinomatosis: {positive_LR: 0.2, negative_LR: 3.0}

  saag_below_1_1:
    peritoneal_carcinomatosis: {positive_LR: 8.0, negative_LR: 0.3}
    nephrotic_syndrome: {positive_LR: 6.0, negative_LR: 0.5}
    liver_cirrhosis_decompensated: {positive_LR: 0.1, negative_LR: 5.0}

  nodular_liver_on_ultrasound:
    liver_cirrhosis_decompensated: {positive_LR: 15.0, negative_LR: 0.3}
    hepatocellular_carcinoma: {positive_LR: 5.0, negative_LR: 0.5}

  thrombocytopenia_below_100k:
    liver_cirrhosis_decompensated: {positive_LR: 4.0, negative_LR: 0.4}
    heart_failure: {positive_LR: 0.5, negative_LR: 1.2}

  elevated_ammonia:
    liver_cirrhosis_decompensated: {positive_LR: 5.0, negative_LR: 0.3}
    acute_hepatitis: {positive_LR: 3.0, negative_LR: 0.6}

  inr_above_1_5:
    liver_cirrhosis_decompensated: {positive_LR: 5.0, negative_LR: 0.3}
    acute_hepatitis: {positive_LR: 4.0, negative_LR: 0.5}

