    temperature:
      unit: "C"
      mean: 37.2
      sd: 0.7
      range: [36.0, 39.5]
      note: "may be febrile if SBP or infection"
    heart_rate:
      unit: "bpm"
      mean: 90
      sd: 15
      range: [55, 130]
      note: "hyperdynamic circulation common"
    systolic_bp:
      unit: "mmHg"
      mean: 110
      sd: 20
      range: [70, 160]
      note: "may be hypotensive from vasodilation"
    respiratory_rate:
      unit: "/min"
      mean: 18
      sd: 4
      range: [12, 30]
    spo2:
      unit: "%"
      mean: 96
      sd: 2
      range: [88, 99]

# ============================================================
# TREATMENT REFERENCE — Drug selection data
# Source: AASLD/EASL Guidelines, JSH Guidelines
# ============================================================
drugs:
  first_line:
    japan:
      - drug: "Furosemide"
        code_yj: "2139002"
        dose: "20-40mg IV or PO daily"
        route: IV
        note: "Combined with spironolactone for ascites"
        pregnancy_safe: false
      - drug: "Spironolactone"
        code_yj: "2133002"
        dose: "25-100mg PO daily"
        route: PO
        note: "Primary diuretic for cirrhotic ascites (100:40 ratio with furosemide)"
        pregnancy_safe: false
      - drug: "Lactulose"
        code_yj: "2359003"
        dose: "30mL PO TID (titrate to 2-3 soft stools/day)"
        route: PO
        indication: "hepatic_encephalopathy"
        pregnancy_safe: true
    us:
      - drug: "Furosemide"
        code_rxnorm: "4603"
        dose: "40mg PO daily"
        route: PO
        pregnancy_safe: false
      - drug: "Spironolactone"
        code_rxnorm: "9997"
        dose: "100mg PO daily"
        route: PO
        pregnancy_safe: false
      - drug: "Lactulose"
        code_rxnorm: "6026"
        dose: "30mL PO TID"
        route: PO
        indication: "hepatic_encephalopathy"
        pregnancy_safe: true

  sbp_treatment:
    japan:
      - drug: "Cefotaxime"
        code_yj: "6132401"
        dose: "2g IV q8h"
        route: IV
        indication: "ascitic_PMN > 250"
        duration_days: 5
      - drug: "Albumin"
        code_yj: "6343401"
        dose: "1.5g/kg Day 1, 1g/kg Day 3"
        route: IV
        note: "Prevents hepatorenal syndrome in SBP"
    us:
      - drug: "Cefotaxime"
        code_rxnorm: "2059"
        dose: "2g IV q8h"
        route: IV
        duration_days: 5
      - drug: "Albumin"
        code_rxnorm: "596"
        dose: "1.5g/kg Day 1, 1g/kg Day 3"
        route: IV

  variceal_bleeding:
    japan:
      - drug: "Octreotide"
        code_yj: "2413600"
        dose: "50ug IV bolus, then 50ug/h continuous"
        route: IV
        duration_days: 5
      - drug: "Ceftriaxone"
        code_yj: "6132404"
        dose: "1g IV daily"
        route: IV
        note: "Antibiotic prophylaxis in variceal bleed"
        duration_days: 7
    us:
      - drug: "Octreotide"
        code_rxnorm: "7435"
        dose: "50ug IV bolus, then 50ug/h"
        route: IV
        duration_days: 5
      - drug: "Ceftriaxone"
        code_rxnorm: "2193"
        dose: "1g IV daily"
        route: IV
        duration_days: 7

  encephalopathy_adjunct:
    japan:
      - drug: "Rifaximin"
        code_yj: "6119001"
        dose: "400mg PO TID"
        route: PO
        indication: "recurrent_encephalopathy or inadequate_response_to_lactulose"
        pregnancy_safe: false
    us:
      - drug: "Rifaximin"
        code_rxnorm: "194501"
        dose: "550mg PO BID"
        route: PO
        pregnancy_safe: false

  hepatorenal_syndrome:
    japan:
      - drug: "Terlipressin"
        code_yj: "2414700"
        dose: "1mg IV q4-6h (increase to 2mg if no response)"
        route: IV
        indication: "hepatorenal_syndrome_type_1"
      - drug: "Albumin"
        code_yj: "6343401"
        dose: "20-40g IV daily"
        route: IV
    us:
      - drug: "Midodrine"
        code_rxnorm: "6931"
        dose: "7.5-12.5mg PO TID"
        route: PO
        indication: "hepatorenal_syndrome (with octreotide)"
      - drug: "Octreotide"
        code_rxnorm: "7435"
        dose: "100-200ug SC TID"
        route: SC
      - drug: "Albumin"
        code_rxnorm: "596"
        dose: "25-50g IV daily"
        route: IV

  discharge_oral:
    japan:
      - drug: "Spironolactone"
        code_yj: "2133002"
        dose: "50-100mg PO daily"
        duration_days: 0   # chronic
      - drug: "Furosemide"
        code_yj: "2139002"
        dose: "20-40mg PO daily"
        duration_days: 0
      - drug: "Lactulose"
        code_yj: "2359003"
        dose: "30mL PO TID"
        duration_days: 0
      - drug: "Rifaximin"
        code_yj: "6119001"
        dose: "400mg PO TID"
        duration_days: 0
        probability: 0.50
    us:
      - drug: "Spironolactone"
        code_rxnorm: "9997"
        dose: "100mg PO daily"
        duration_days: 0
      - drug: "Furosemide"
        code_rxnorm: "4603"
        dose: "40mg PO daily"
        duration_days: 0
      - drug: "Lactulose"
        code_rxnorm: "6026"
        dose: "30mL PO TID"
        duration_days: 0
      - drug: "Rifaximin"
        code_rxnorm: "194501"
        dose: "550mg PO BID"
        duration_days: 0
        probability: 0.60

# ============================================================
# DRUG INTERACTIONS
# ============================================================
drug_interactions:
  - drug_a: "Spironolactone"
    drug_b: "ACE_inhibitor"
    severity: "major"
    effect: "Hyperkalemia"
    action: "Monitor K closely; avoid if possible"

  - drug_a: "NSAIDs"
    drug_b: "Spironolactone"
    severity: "contraindicated"
    effect: "Renal failure and resistance to diuretics"
    action: "Absolutely avoid NSAIDs in cirrhosis"

  - drug_a: "Lactulose"
    drug_b: "Antacids"
    severity: "moderate"
    effect: "Alkalinization of colon reduces lactulose efficacy"
    action: "Avoid concurrent use"

  - drug_a: "Midazolam"
    drug_b: "Liver_disease"
    severity: "major"
    effect: "Prolonged sedation due to impaired hepatic metabolism"
    action: "Avoid benzodiazepines in cirrhosis"

