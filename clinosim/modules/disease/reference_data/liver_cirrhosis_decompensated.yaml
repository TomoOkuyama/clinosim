    thirty_day_readmission: 0.35
    paracentesis_rate: 0.80
    sbp_rate: 0.12
    variceal_bleeding_rate: 0.18
    hepatorenal_syndrome_rate: 0.06
    mean_age_admitted: 62
    male_ratio: 0.62

# ============================================================
# CLINICAL COURSE ARCHETYPES
# ============================================================
course_archetypes:
  smooth_recovery:
    probability: 0.35
    description: "Ascites responds to diuretics, encephalopathy resolves with lactulose"
    trajectory:
      inflammation_level: {0: 0.03, 1: -0.02, 2: -0.03, 3: -0.03, 5: -0.03, 7: -0.02, 10: -0.01, 14: -0.01, 21: 0.00}
      volume_status: {0: 0.00, 1: -0.02, 2: -0.03, 3: -0.03, 5: -0.03, 7: -0.02, 10: -0.01, 14: -0.01, 21: 0.00}
      hepatic_function: {0: 0.00, 1: 0.01, 2: 0.02, 3: 0.02, 5: 0.02, 7: 0.01, 10: 0.01, 14: 0.01, 21: 0.00}
      renal_function: {0: 0.01, 1: 0.01, 2: 0.01, 3: 0.01, 5: 0.01, 7: 0.00, 10: 0.00, 14: 0.00, 21: 0.00}
    order_modifications: {}
    treatment_modifications: {}

  dip_then_recovery:
    probability: 0.20
    description: "Initial worsening (SBP or volume overload) then improvement with treatment"
    trajectory:
      inflammation_level: {0: 0.08, 1: 0.05, 2: 0.00, 3: -0.03, 5: -0.05, 7: -0.04, 10: -0.03, 14: -0.02, 21: -0.01}
      volume_status: {0: 0.05, 1: 0.03, 2: 0.00, 3: -0.03, 5: -0.03, 7: -0.02, 10: -0.01, 14: -0.01, 21: 0.00}
      hepatic_function: {0: -0.05, 1: -0.03, 2: 0.00, 3: 0.02, 5: 0.02, 7: 0.02, 10: 0.01, 14: 0.01, 21: 0.00}
      renal_function: {0: -0.03, 1: -0.02, 2: 0.00, 3: 0.01, 5: 0.01, 7: 0.01, 10: 0.01, 14: 0.00, 21: 0.00}
    order_modifications:
      day_2:
        add_labs: ["Blood_culture_x2", "Ascitic_fluid_analysis"]
    treatment_modifications:
      day_2:
        start:
          japan: [{drug: "Cefotaxime", dose: "2g IV q8h"}]
          us: [{drug: "Cefotaxime", dose: "2g IV q8h"}]
        add: [{drug: "Albumin", dose: "1.5g/kg IV"}]

  plateau_then_recovery:
    probability: 0.15
    description: "Diuretic-resistant ascites, requires therapeutic paracentesis, then gradual response"
    trajectory:
      inflammation_level: {0: 0.03, 1: 0.02, 2: 0.01, 3: 0.00, 5: 0.00, 7: -0.02, 10: -0.03, 14: -0.02, 21: -0.01}
      volume_status: {0: 0.03, 1: 0.02, 2: 0.01, 3: 0.00, 5: -0.05, 7: -0.03, 10: -0.02, 14: -0.01, 21: 0.00}
      hepatic_function: {0: 0.00, 1: 0.00, 2: 0.00, 3: 0.00, 5: 0.01, 7: 0.02, 10: 0.01, 14: 0.01, 21: 0.00}
    order_modifications:
      day_5:
        add_procedure: ["large_volume_paracentesis"]
        add_labs: ["Albumin_post_paracentesis"]
    treatment_modifications:
      day_5:
        add: [{drug: "Albumin", dose: "6-8g per liter removed"}]
        adjust: "increase_diuretic_doses"

  treatment_resistant:
    probability: 0.15
    description: "Refractory ascites and/or encephalopathy requiring escalation"
    trajectory:
      inflammation_level: {0: 0.05, 1: 0.03, 2: 0.02, 3: 0.01, 5: 0.00, 7: -0.02, 10: -0.03, 14: -0.03, 21: -0.02}
      volume_status: {0: 0.05, 1: 0.03, 2: 0.02, 3: 0.00, 5: -0.03, 7: -0.03, 10: -0.02, 14: -0.01, 21: 0.00}
      hepatic_function: {0: -0.03, 1: -0.02, 2: 0.00, 3: 0.00, 5: 0.01, 7: 0.02, 10: 0.02, 14: 0.01, 21: 0.01}
      renal_function: {0: -0.05, 1: -0.03, 2: -0.01, 3: 0.00, 5: 0.01, 7: 0.01, 10: 0.01, 14: 0.01, 21: 0.00}
    order_modifications:
      day_3:
        add_labs: ["Urine_Na", "Creatinine"]
        add_procedure: ["large_volume_paracentesis"]
      day_7:
        add_consult: ["hepatology", "transplant_surgery"]
    treatment_modifications:
      day_3:
        adjust: "maximize_diuretics"
        add: [{drug: "Midodrine", dose: "7.5mg PO TID"}]
      day_7:
        evaluate: "consider_TIPS_or_transplant"
    triggers:
      - day: 5
        condition: "refractory_ascites and renal_function < 0.4"
        actions: ["hepatorenal_syndrome_protocol", "transplant_evaluation"]

  gradual_deterioration:
    probability: 0.10
    description: "Progressive multi-organ failure — hepatorenal syndrome, worsening encephalopathy"
    trajectory:
      inflammation_level: {0: 0.08, 1: 0.05, 2: 0.05, 3: 0.03, 5: 0.02, 7: 0.01, 10: 0.00, 14: 0.00, 21: 0.00}
      hepatic_function: {0: -0.05, 1: -0.03, 2: -0.03, 3: -0.02, 5: -0.01, 7: 0.00, 10: 0.01, 14: 0.01, 21: 0.00}
      renal_function: {0: -0.08, 1: -0.05, 2: -0.03, 3: -0.02, 5: -0.01, 7: 0.00, 10: 0.01, 14: 0.01, 21: 0.01}
      perfusion_status: {0: -0.05, 1: -0.03, 2: -0.03, 3: -0.02, 5: -0.01, 7: 0.00, 10: 0.01, 14: 0.01, 21: 0.00}
    order_modifications:
      day_3:
        add_labs: ["Lactate", "ABG", "Ammonia"]
      day_5:
        add_consult: ["icu", "hepatology"]
    treatment_modifications:
      day_3:
        start:
          japan: [{drug: "Terlipressin", dose: "1mg IV q6h"}, {drug: "Albumin", dose: "20g IV daily"}]
          us: [{drug: "Midodrine", dose: "12.5mg PO TID"}, {drug: "Octreotide", dose: "200ug SC TID"}, {drug: "Albumin", dose: "25g IV daily"}]
      day_5:
        action: "icu_transfer"
    triggers:
      - day: 5
        condition: "renal_function < 0.3 or perfusion_status < 0.4"
        actions: ["icu_transfer", "CRRT_consideration"]

  sudden_deterioration:
    probability: 0.05
    description: "Massive variceal hemorrhage or acute-on-chronic liver failure"
    trajectory:
      inflammation_level: {0: 0.05, 1: -0.02, 2: 0.25, 3: 0.10, 5: -0.05, 7: -0.05, 10: -0.03, 14: -0.02, 21: -0.01}
      hepatic_function: {0: -0.02, 1: 0.00, 2: -0.20, 3: -0.05, 5: 0.02, 7: 0.02, 10: 0.02, 14: 0.01, 21: 0.01}
      perfusion_status: {0: -0.05, 1: 0.00, 2: -0.30, 3: 0.05, 5: 0.05, 7: 0.03, 10: 0.02, 14: 0.01, 21: 0.01}
      volume_status: {0: 0.00, 1: 0.00, 2: -0.20, 3: 0.05, 5: 0.05, 7: 0.02, 10: 0.01, 14: 0.00, 21: 0.00}
    order_modifications:
      day_2:
        add_labs: ["Hb_stat", "PT_INR", "Blood_type_crossmatch", "Lactate"]
        add_procedure: ["emergent_EGD"]
    treatment_modifications:
      day_2:
        start:
          japan:
            - {drug: "Octreotide", dose: "50ug IV bolus then 50ug/h"}
            - {drug: "Packed_RBC", dose: "transfuse to Hb 7"}
          us:
            - {drug: "Octreotide", dose: "50ug IV bolus then 50ug/h"}
            - {drug: "Packed_RBC", dose: "transfuse to Hb 7"}
        action: "icu_transfer"
        action_2: "emergent_endoscopy_band_ligation"
    triggers:
      - day: 2
        condition: "Hb_drop > 3 or perfusion_status < 0.3"
        actions: ["icu_transfer", "blood_transfusion", "emergent_EGD"]

archetype_modifiers:
  - condition: "alcohol_dependence_active"
    effect: {treatment_resistant: 0.08, smooth_recovery: -0.08}
  - condition: "hepatocellular_carcinoma"
    effect: {gradual_deterioration: 0.10, smooth_recovery: -0.10}
  - condition: "age >= 75"
    effect: {gradual_deterioration: 0.05, smooth_recovery: -0.05}
  - condition: "CKD"
    effect: {treatment_resistant: 0.05, smooth_recovery: -0.05}

# ============================================================
# COMPLICATIONS
# ============================================================
complications:
  - name: "spontaneous_bacterial_peritonitis"
    description: "Infection of ascitic fluid without obvious surgical source"
    probability_per_day: 0.012
    onset_day_range: [0, 14]
    risk_factors:
      - {condition: "ascitic_protein_below_1", multiplier: 3.0}
      - {condition: "prior_sbp", multiplier: 3.0}
      - {condition: "GI_bleeding", multiplier: 2.0}
    state_impact:
      inflammation_level: 0.20
      renal_function: -0.10
      perfusion_status: -0.05
    detection:
      test: "diagnostic_paracentesis"
      finding: "PMN_above_250"
    actions: ["IV_cefotaxime", "IV_albumin", "repeat_paracentesis_48h"]

  - name: "variceal_hemorrhage"
    description: "Upper GI bleeding from esophageal or gastric varices"
    probability_per_day: 0.010
    onset_day_range: [0, 21]
    risk_factors:
      - {condition: "large_varices", multiplier: 5.0}
      - {condition: "INR_above_2", multiplier: 2.0}
      - {condition: "portal_hypertension_severe", multiplier: 3.0}
    state_impact:
      volume_status: -0.25
      perfusion_status: -0.20
    detection:
      test: "clinical_hematemesis_melena"
      finding: "hematemesis_or_melena_with_Hb_drop"
    actions: ["emergent_EGD", "octreotide", "ceftriaxone", "blood_transfusion"]

  - name: "hepatorenal_syndrome"
    description: "Functional renal failure in advanced cirrhosis"
    probability_per_day: 0.008
    onset_day_range: [3, 21]
    risk_factors:
      - {condition: "severity_severe", multiplier: 3.0}
      - {condition: "SBP", multiplier: 3.0}
      - {condition: "hyponatremia_below_125", multiplier: 2.5}
    state_impact:
      renal_function: -0.25
      perfusion_status: -0.10
    detection:
      test: "creatinine_and_urine_Na"
      finding: "creatinine_rise_with_urine_Na_below_10"
    actions: ["albumin_infusion", "terlipressin_or_midodrine_octreotide", "CRRT_if_needed"]

  - name: "hepatic_encephalopathy_worsening"
    description: "Progression of encephalopathy to Grade 3-4"
    probability_per_day: 0.015
    onset_day_range: [0, 14]
    risk_factors:
      - {condition: "GI_bleeding", multiplier: 3.0}
      - {condition: "infection", multiplier: 2.5}
      - {condition: "constipation", multiplier: 2.0}
      - {condition: "hypokalemia", multiplier: 1.5}
    state_impact: {}
    detection:
      test: "neurological_exam_and_ammonia"
      finding: "west_haven_grade_3_or_4"
    actions: ["increase_lactulose", "add_rifaximin", "identify_precipitant", "consider_intubation_if_grade_4"]

  - name: "acute_kidney_injury"
    description: "AKI from prerenal causes, hepatorenal, or nephrotoxins"
    probability_per_day: 0.012
    onset_day_range: [1, 14]
    risk_factors:
      - {condition: "excessive_diuresis", multiplier: 2.5}
      - {condition: "SBP", multiplier: 2.0}
      - {condition: "GI_bleeding", multiplier: 2.0}
    state_impact:
      renal_function: -0.15
    detection:
      test: "creatinine"
      finding: "rise_above_0.3_from_baseline"
    actions: ["hold_diuretics", "IV_albumin", "assess_cause"]

  - name: "coagulopathy_bleeding"
    description: "Non-variceal bleeding from severe coagulopathy"
    probability_per_day: 0.006
    onset_day_range: [0, 21]
    risk_factors:
      - {condition: "INR_above_2.5", multiplier: 3.0}
      - {condition: "Plt_below_50", multiplier: 2.5}
      - {condition: "procedure_recent", multiplier: 2.0}
    state_impact:
      volume_status: -0.10
      perfusion_status: -0.05
    detection:
      test: "Hb_and_clinical"
      finding: "Hb_drop_or_visible_bleeding"
    actions: ["transfuse_if_needed", "FFP_or_vitamin_K", "platelet_transfusion_if_below_50"]

  - name: "delirium"
    description: "Acute confusion beyond hepatic encephalopathy"
    probability_per_day: 0.010
    onset_day_range: [1, 14]
    risk_factors:
      - {condition: "age_over_75", multiplier: 2.0}
      - {condition: "alcohol_withdrawal", multiplier: 5.0}
    state_impact: {}
    detection:
      test: "CAM_screening"
      finding: "positive"
    actions: ["differentiate_from_encephalopathy", "avoid_benzodiazepines", "thiamine_if_alcohol"]
