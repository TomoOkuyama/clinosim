    actions: ["dobutamine_if_low_CO", "reduce_fluid_rate", "careful_vasopressor_titration"]

  - name: "critical_illness_polyneuropathy"
    description: "ICU-acquired weakness from prolonged critical illness"
    probability_per_day: 0.005
    onset_day_range: [7, 28]
    risk_factors:
