    blood_culture_positivity: 0.35
    vasopressor_use_rate: 0.40
    mechanical_ventilation_rate: 0.30
    rrt_rate: 0.10                      # renal replacement therapy
    mean_time_to_first_abx_hours: 1.5   # target <1h per guidelines
    dic_rate: 0.15
    mean_age_admitted: 74
    male_ratio: 0.58

  us:
    median_los: 12
    los_iqr: [8, 18]
    in_hospital_mortality: 0.20
    icu_admission_rate: 0.55
    thirty_day_readmission: 0.22
    blood_culture_positivity: 0.30
    vasopressor_use_rate: 0.35
    mechanical_ventilation_rate: 0.28
