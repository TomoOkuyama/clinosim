    mean_time_to_first_abx_hours: 1.0
    dic_rate: 0.12
    mean_age_admitted: 70
    male_ratio: 0.55

# ============================================================
# CLINICAL COURSE ARCHETYPES (daily state variable changes)
# Each archetype defines day-by-day deltas for physiological state variables.
# Sepsis has more aggressive trajectories and longer timelines than pneumonia.
# ============================================================
course_archetypes:
  smooth_recovery:
    probability: 0.30
    description: "Source controlled, early appropriate antibiotics, steady improvement from Day 2-3"
    trajectory:
      inflammation_level: {0: 0.05, 1: 0.00, 2: -0.05, 3: -0.08, 5: -0.10, 7: -0.10, 10: -0.08, 14: -0.06, 21: -0.04, 28: -0.02}
      volume_status: {0: 0.05, 1: 0.05, 2: 0.04, 3: 0.03, 5: 0.02, 7: 0.01, 10: 0.01, 14: 0.00, 21: 0.00, 28: 0.00}
      perfusion_status: {0: 0.02, 1: 0.03, 2: 0.04, 3: 0.03, 5: 0.02, 7: 0.01, 10: 0.01, 14: 0.00, 21: 0.00, 28: 0.00}
      renal_function: {0: -0.02, 1: 0.00, 2: 0.01, 3: 0.02, 5: 0.02, 7: 0.02, 10: 0.01, 14: 0.01, 21: 0.01, 28: 0.00}
      hepatic_function: {0: 0.00, 1: 0.00, 2: 0.01, 3: 0.01, 5: 0.01, 7: 0.01, 10: 0.01, 14: 0.00, 21: 0.00, 28: 0.00}
      coagulation_status: {0: 0.00, 1: 0.00, 2: 0.01, 3: 0.01, 5: 0.01, 7: 0.01, 10: 0.00, 14: 0.00, 21: 0.00, 28: 0.00}
    order_modifications: {}
    treatment_modifications: {}

    daily_trajectory:
      day_0:
        subjective: "症状あり"
        objective: "バイタル安定、検査所見あり"
        assessment: "初期診断確定、治療開始"
        plan: "治療継続、経過観察"
      day_1:
        subjective: "症状緩和傾向"
        objective: "バイタル安定、検査所見改善"
        assessment: "治療反応良好"
        plan: "治療継続"

  dip_then_recovery:
    probability: 0.20
    description: "Initial worsening Day 1-4 with organ dysfunction, then gradual recovery"
    trajectory:
      inflammation_level: {0: 0.10, 1: 0.08, 2: 0.05, 3: 0.00, 5: -0.05, 7: -0.08, 10: -0.10, 14: -0.08, 21: -0.05, 28: -0.03}
      volume_status: {0: -0.05, 1: -0.05, 2: -0.02, 3: 0.02, 5: 0.03, 7: 0.02, 10: 0.01, 14: 0.01, 21: 0.00, 28: 0.00}
      perfusion_status: {0: -0.08, 1: -0.05, 2: -0.02, 3: 0.02, 5: 0.03, 7: 0.02, 10: 0.01, 14: 0.01, 21: 0.00, 28: 0.00}
      renal_function: {0: -0.05, 1: -0.03, 2: -0.02, 3: 0.00, 5: 0.01, 7: 0.02, 10: 0.02, 14: 0.01, 21: 0.01, 28: 0.00}
      hepatic_function: {0: -0.03, 1: -0.02, 2: -0.01, 3: 0.00, 5: 0.01, 7: 0.01, 10: 0.01, 14: 0.01, 21: 0.00, 28: 0.00}
      coagulation_status: {0: -0.03, 1: -0.02, 2: -0.01, 3: 0.00, 5: 0.01, 7: 0.01, 10: 0.01, 14: 0.00, 21: 0.00, 28: 0.00}
    order_modifications:
      day_2:
        add_labs: ["Lactate", "Blood_culture_repeat_x2", "ABG"]
        add_imaging: ["Chest_Xray_portable"]
      day_3:
        add_labs: ["DIC_panel"]
    treatment_modifications:
      day_1:
        add_fluid: {detail: "Additional crystalloid 1000mL bolus"}
      day_2:
        start:
          all: [{drug: "Norepinephrine", dose: "0.05-0.1 ug/kg/min"}]
        action: "icu_transfer"

  plateau:
    probability: 0.15
    description: "Stable but not improving for 5-7 days, then slow recovery"
    trajectory:
      inflammation_level: {0: 0.05, 1: 0.03, 2: 0.01, 3: 0.00, 5: 0.00, 7: 0.00, 10: -0.05, 14: -0.08, 21: -0.06, 28: -0.03}
      volume_status: {0: 0.02, 1: 0.02, 2: 0.01, 3: 0.00, 5: 0.00, 7: 0.00, 10: 0.01, 14: 0.01, 21: 0.00, 28: 0.00}
      perfusion_status: {0: 0.01, 1: 0.01, 2: 0.00, 3: 0.00, 5: 0.00, 7: 0.00, 10: 0.01, 14: 0.01, 21: 0.00, 28: 0.00}
      renal_function: {0: -0.02, 1: -0.01, 2: 0.00, 3: 0.00, 5: 0.00, 7: 0.00, 10: 0.01, 14: 0.01, 21: 0.01, 28: 0.00}
    order_modifications:
      day_5:
        add_labs: ["Blood_culture_repeat_x2", "PCT", "Fungal_culture"]
        add_imaging: ["CT_abdomen_pelvis_with_contrast"]
        add_consult: ["infectious_disease"]
      day_7:
        add_labs: ["Beta_D_glucan", "Galactomannan"]
    treatment_modifications:
      day_5:
        action: "reassess_source_control"
      day_7:
        start:
          japan: [{drug: "Micafungin", dose: "100mg IV daily"}]
          us: [{drug: "Micafungin", dose: "100mg IV daily"}]
        note: "Empiric antifungal if no improvement with broad-spectrum ABx"

  treatment_resistant:
    probability: 0.15
    description: "Resistant organism or uncontrolled source; requires major treatment changes"
    trajectory:
      inflammation_level: {0: 0.10, 1: 0.08, 2: 0.08, 3: 0.05, 5: 0.03, 7: -0.02, 10: -0.08, 14: -0.10, 21: -0.06, 28: -0.03}
      volume_status: {0: -0.05, 1: -0.03, 2: -0.02, 3: -0.01, 5: 0.02, 7: 0.03, 10: 0.02, 14: 0.01, 21: 0.00, 28: 0.00}
      perfusion_status: {0: -0.08, 1: -0.05, 2: -0.03, 3: -0.02, 5: 0.00, 7: 0.02, 10: 0.02, 14: 0.01, 21: 0.00, 28: 0.00}
      renal_function: {0: -0.05, 1: -0.03, 2: -0.02, 3: -0.01, 5: 0.00, 7: 0.01, 10: 0.02, 14: 0.01, 21: 0.01, 28: 0.00}
      coagulation_status: {0: -0.03, 1: -0.02, 2: -0.02, 3: -0.01, 5: 0.00, 7: 0.01, 10: 0.01, 14: 0.01, 21: 0.00, 28: 0.00}
    order_modifications:
      day_2:
        add_labs: ["Blood_culture_repeat_x2", "Lactate"]
      day_3:
        add_labs: ["Blood_culture_repeat_x2", "Sputum_culture", "PCT", "DIC_panel"]
        add_imaging: ["CT_abdomen_pelvis_with_contrast"]
        add_consult: ["infectious_disease", "surgery_if_source_control_needed"]
    treatment_modifications:
      day_3:
        stop: ["Piperacillin/Tazobactam"]
        start:
          japan:
            - {drug: "Meropenem", dose: "2g IV q8h"}
            - {drug: "Vancomycin", dose: "15-20mg/kg IV q12h"}
          us:
            - {drug: "Meropenem", dose: "2g IV q8h"}
            - {drug: "Vancomycin", dose: "15-20mg/kg IV q8-12h"}
      day_5:
        action: "interventional_source_control"
        note: "Percutaneous drainage or surgical intervention if abscess identified"
    triggers:
      - day: 3
        condition: "inflammation_level > 0.6"
        actions: ["escalate_antibiotic", "order_ct", "consult_infectious_disease"]
      - day: 5
        condition: "inflammation_level > 0.5"
        actions: ["interventional_source_control", "add_antifungal"]

  gradual_deterioration:
    probability: 0.12
    description: "Progressive multi-organ failure despite treatment -> prolonged ICU stay, possible death"
    trajectory:
      inflammation_level: {0: 0.10, 1: 0.10, 2: 0.08, 3: 0.08, 5: 0.05, 7: 0.05, 10: 0.03, 14: 0.02, 21: 0.00, 28: -0.02}
      perfusion_status: {0: -0.08, 1: -0.08, 2: -0.05, 3: -0.05, 5: -0.03, 7: -0.02, 10: 0.00, 14: 0.01, 21: 0.01, 28: 0.01}
      renal_function: {0: -0.05, 1: -0.05, 2: -0.05, 3: -0.03, 5: -0.03, 7: -0.02, 10: -0.01, 14: 0.00, 21: 0.01, 28: 0.01}
      hepatic_function: {0: -0.03, 1: -0.03, 2: -0.03, 3: -0.02, 5: -0.02, 7: -0.01, 10: 0.00, 14: 0.00, 21: 0.00, 28: 0.00}
      coagulation_status: {0: -0.05, 1: -0.05, 2: -0.05, 3: -0.03, 5: -0.02, 7: -0.01, 10: 0.00, 14: 0.01, 21: 0.01, 28: 0.00}
      ph_status: {0: -0.03, 1: -0.03, 2: -0.02, 3: -0.02, 5: -0.01, 7: 0.00, 10: 0.00, 14: 0.01, 21: 0.01, 28: 0.00}
    order_modifications:
      day_2:
        add_labs: ["ABG", "Lactate", "Blood_culture_repeat_x2", "DIC_panel"]
      day_3:
        add_labs: ["ABG", "Lactate", "DIC_panel"]
        add_imaging: ["CT_abdomen_pelvis_with_contrast"]
      day_5:
        add_labs: ["ABG", "Lactate", "Fungal_culture", "Beta_D_glucan"]
        add_consult: ["infectious_disease", "nephrology"]
      day_7:
        add_labs: ["ABG", "Lactate"]
    treatment_modifications:
      day_1:
        start:
          all: [{drug: "Norepinephrine", dose: "0.1 ug/kg/min IV drip"}]
        action: "icu_transfer"
      day_3:
        stop: ["Piperacillin/Tazobactam"]
        start:
          japan:
            - {drug: "Meropenem", dose: "2g IV q8h"}
            - {drug: "Vancomycin", dose: "15-20mg/kg IV q12h"}
          us:
            - {drug: "Meropenem", dose: "2g IV q8h"}
            - {drug: "Vancomycin", dose: "15-20mg/kg IV q8-12h"}
      day_5:
        start:
          all:
            - {drug: "Vasopressin", dose: "0.03 units/min IV continuous"}
            - {drug: "Hydrocortisone", dose: "50mg IV q6h"}
        action: "consider_rrt"
      day_7:
        start:
          all: [{drug: "Micafungin", dose: "100mg IV daily"}]
        action: "intubation_if_not_already"
    triggers:
      - day: 3
        condition: "perfusion_status < 0.3"
        actions: ["escalate_vasopressor", "consult_infectious_disease"]
      - day: 5
        condition: "renal_function < 0.3"
        actions: ["start_rrt", "consult_nephrology"]
      - day: 7
        condition: "perfusion_status < 0.2"
        actions: ["goals_of_care_discussion"]

  sudden_deterioration:
    probability: 0.08
    description: "Acute decompensation with septic shock on Day 1-2; high mortality"
    trajectory:
      inflammation_level: {0: 0.15, 1: 0.15, 2: 0.10, 3: 0.00, 5: -0.05, 7: -0.08, 10: -0.08, 14: -0.05, 21: -0.03, 28: -0.02}
      perfusion_status: {0: -0.15, 1: -0.20, 2: -0.05, 3: 0.05, 5: 0.05, 7: 0.03, 10: 0.02, 14: 0.01, 21: 0.01, 28: 0.00}
      renal_function: {0: -0.08, 1: -0.10, 2: -0.05, 3: 0.00, 5: 0.02, 7: 0.02, 10: 0.02, 14: 0.01, 21: 0.01, 28: 0.00}
      hepatic_function: {0: -0.05, 1: -0.10, 2: -0.05, 3: 0.00, 5: 0.01, 7: 0.01, 10: 0.01, 14: 0.01, 21: 0.00, 28: 0.00}
      coagulation_status: {0: -0.08, 1: -0.12, 2: -0.05, 3: 0.00, 5: 0.02, 7: 0.02, 10: 0.01, 14: 0.01, 21: 0.00, 28: 0.00}
      ph_status: {0: -0.08, 1: -0.10, 2: -0.05, 3: 0.00, 5: 0.02, 7: 0.02, 10: 0.01, 14: 0.01, 21: 0.00, 28: 0.00}
    order_modifications:
      day_0:
        add_labs: ["ABG", "Lactate", "Blood_culture_x2", "DIC_panel", "Troponin", "Cortisol"]
      day_1:
        add_labs: ["ABG", "Lactate", "DIC_panel"]
        add_imaging: ["CT_abdomen_pelvis_with_contrast", "Echocardiogram"]
    treatment_modifications:
      day_0:
        start:
          all:
            - {drug: "Norepinephrine", dose: "0.2 ug/kg/min IV drip"}
            - {drug: "Hydrocortisone", dose: "50mg IV q6h"}
        action: "icu_transfer"
        action_2: "intubation_evaluation"
      day_1:
        start:
          all:
            - {drug: "Vasopressin", dose: "0.03 units/min IV continuous"}
        action: "consider_rrt"
        note: "Aggressive multi-organ support"
    triggers:
      - day: 0
        condition: "perfusion_status < 0.3"
        actions: ["icu_transfer", "start_vasopressor", "intubation_evaluation"]
      - day: 1
        condition: "perfusion_status < 0.2"
        actions: ["add_second_vasopressor", "goals_of_care_discussion"]

# Archetype selection modifiers (patient profile dependent)
archetype_modifiers:
  - condition: "immune_reactivity < 0.3"
    effect: {treatment_resistant: 0.10, gradual_deterioration: 0.05, smooth_recovery: -0.15}
  - condition: "age >= 80"
    effect: {gradual_deterioration: 0.08, sudden_deterioration: 0.04, smooth_recovery: -0.12}
  - condition: "treatment_sensitivity > 1.2"
    effect: {smooth_recovery: 0.10, treatment_resistant: -0.05, gradual_deterioration: -0.05}
  - condition: "immunosuppressed"
    effect: {treatment_resistant: 0.10, gradual_deterioration: 0.05, smooth_recovery: -0.15}
  - condition: "liver_cirrhosis"
    effect: {sudden_deterioration: 0.05, gradual_deterioration: 0.05, smooth_recovery: -0.10}
  - condition: "malignancy"
    effect: {treatment_resistant: 0.08, gradual_deterioration: 0.05, smooth_recovery: -0.13}

# ============================================================
# COMPLICATIONS (secondary events during hospitalization)
# Sepsis has high complication rates and multi-organ involvement
# ============================================================
complications:
  - name: "disseminated_intravascular_coagulation"
    description: "DIC — consumptive coagulopathy with microvascular thrombosis and bleeding"
    probability_per_day: 0.015
    onset_day_range: [0, 7]
    risk_factors:
      - {condition: "severity_severe", multiplier: 3.0}
      - {condition: "liver_cirrhosis", multiplier: 2.5}
      - {condition: "malignancy", multiplier: 2.0}
      - {condition: "coagulation_status < 0.4", multiplier: 2.0}
    state_impact:
      coagulation_status: -0.20
      perfusion_status: -0.10
      renal_function: -0.05
    detection:
      test: "DIC_panel"
      finding: "ISTH_DIC_score_gte_5"
    actions: ["transfuse_FFP_if_bleeding", "transfuse_platelets_if_below_20k", "heparin_if_thrombotic_dominant", "treat_underlying_cause"]

  - name: "acute_respiratory_distress_syndrome"
    description: "ARDS — diffuse alveolar damage from systemic inflammation"
    probability_per_day: 0.012
    onset_day_range: [1, 7]
    risk_factors:
      - {condition: "severity_severe", multiplier: 2.5}
      - {condition: "pneumonia_as_source", multiplier: 3.0}
      - {condition: "massive_fluid_resuscitation", multiplier: 1.5}
    state_impact:
      perfusion_status: -0.15
      ph_status: -0.10
      inflammation_level: 0.10
    detection:
      test: "chest_xray_and_abg"
      finding: "bilateral_infiltrates_and_pao2_fio2_below_300"
    actions: ["intubation_mechanical_ventilation", "lung_protective_ventilation_6ml_kg", "prone_positioning_if_severe", "conservative_fluid_strategy"]

  - name: "acute_kidney_injury"
    description: "Sepsis-associated AKI — hemodynamic and inflammatory renal injury"
    probability_per_day: 0.020
    onset_day_range: [0, 5]
    risk_factors:
      - {condition: "renal_function < 0.5", multiplier: 2.5}
      - {condition: "volume_status < -0.3", multiplier: 2.0}
      - {condition: "age_over_75", multiplier: 1.5}
      - {condition: "CKD", multiplier: 3.0}
      - {condition: "nephrotoxic_drugs", multiplier: 2.0}
    state_impact:
      renal_function: -0.20
      ph_status: -0.08
      volume_status: 0.10  # fluid overload when kidneys fail
    detection:
      test: "creatinine_and_urine_output"
      finding: "KDIGO_stage_2_or_3"
    actions: ["optimize_volume_status", "hold_nephrotoxic_drugs", "adjust_drug_dosing", "consider_rrt_if_stage_3"]

  - name: "hepatic_dysfunction"
    description: "Sepsis-associated hepatic dysfunction or shock liver"
    probability_per_day: 0.008
    onset_day_range: [1, 7]
    risk_factors:
      - {condition: "liver_cirrhosis", multiplier: 4.0}
      - {condition: "severity_severe", multiplier: 2.0}
      - {condition: "perfusion_status < 0.3", multiplier: 3.0}
    state_impact:
      hepatic_function: -0.20
      coagulation_status: -0.10
    detection:
      test: "liver_function_tests"
      finding: "AST_ALT_above_5x_ULN_or_bilirubin_above_4"
    actions: ["supportive_care", "avoid_hepatotoxic_drugs", "monitor_coagulation", "lactulose_if_encephalopathy"]

  - name: "icu_delirium"
    description: "Acute confusion in ICU setting from sepsis, sedation, and critical illness"
    probability_per_day: 0.025
    onset_day_range: [1, 14]
    risk_factors:
      - {condition: "age_over_75", multiplier: 2.5}
      - {condition: "dementia", multiplier: 3.0}
      - {condition: "icu_stay", multiplier: 2.0}
      - {condition: "mechanical_ventilation", multiplier: 2.5}
      - {condition: "benzodiazepine_use", multiplier: 2.0}
      - {condition: "delirium_susceptibility > 0.3", multiplier: 2.0}
    state_impact: {}  # delirium doesn't directly change physiological state
    detection:
      test: "CAM_ICU_screening"
      finding: "positive"
    actions: ["reorientation", "sleep_hygiene", "minimize_sedation", "avoid_benzodiazepines", "early_mobilization", "consider_haloperidol_or_quetiapine"]

  - name: "central_line_associated_bloodstream_infection"
    description: "CLABSI — secondary bloodstream infection from central venous catheter"
    probability_per_day: 0.005
    onset_day_range: [3, 21]
    risk_factors:
      - {condition: "central_line_present", multiplier: 5.0}
      - {condition: "immunosuppressed", multiplier: 2.0}
      - {condition: "icu_stay_over_7_days", multiplier: 2.0}
    state_impact:
      inflammation_level: 0.15
      perfusion_status: -0.05
    detection:
      test: "blood_culture_differential_time_to_positivity"
      finding: "central_line_culture_positive_2h_before_peripheral"
    actions: ["remove_central_line", "new_blood_cultures", "targeted_antibiotic"]

  - name: "c_diff_colitis"
    description: "Clostridioides difficile infection from prolonged broad-spectrum antibiotic use"
    probability_per_day: 0.008
    onset_day_range: [5, 28]
    risk_factors:
      - {condition: "broad_spectrum_antibiotic_over_7_days", multiplier: 3.0}
      - {condition: "age_over_65", multiplier: 1.5}
      - {condition: "fluoroquinolone_use", multiplier: 2.0}
      - {condition: "PPI_use", multiplier: 1.5}
    state_impact:
      inflammation_level: 0.10
      volume_status: -0.10
    detection:
      test: "c_diff_toxin_pcr"
      finding: "positive"
    actions: ["stop_offending_antibiotic_if_possible", "start_oral_vancomycin_125mg_qid", "contact_precautions"]

  - name: "stress_cardiomyopathy"
    description: "Sepsis-induced myocardial dysfunction (septic cardiomyopathy)"
    probability_per_day: 0.005
    onset_day_range: [1, 5]
    risk_factors:
