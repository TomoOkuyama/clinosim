# Severe Traffic Accident (Major Trauma, Multiple Injuries) — Reference Data
# Sources: Japan Trauma Data Bank, ACS TQIP, Trauma Surgery guidelines

disease_id: traffic_accident_severe
chief_complaint:
  en: "Major trauma, motor vehicle accident, multiple injuries"
  ja: "交通外傷・多発外傷"
department: trauma_surgery
encounter_type: surgical
requires_surgery: true
minimum_severity: moderate
readmission_eligible: false  # Trauma — readmissions are complication-driven



icd_codes:
  primary: "T07"
  variants:
    - {code: "S06.9", name: "Intracranial injury, unspecified", probability: 0.40}
    - {code: "T07", name: "Multiple injuries, unspecified", probability: 0.35}
    - {code: "S27.0", name: "Traumatic pneumothorax", probability: 0.15}
    - {code: "S36.1", name: "Injury of liver", probability: 0.10}

incidence:
  japan:
    "0-44":  {M: 30, F: 15}
    "45-54": {M: 20, F: 10}
    "55-64": {M: 15, F: 8}
    "65-74": {M: 12, F: 8}
    "75-84": {M: 8, F: 5}
    "85+":   {M: 3, F: 2}
  risk_multipliers:
    - {condition: "F10", multiplier: 3.0}     # Alcohol use disorder
    - {condition: "F32", multiplier: 1.5}     # Depression (risk-taking)
  seasonal_curve:
    1: 0.9
    2: 0.9
    3: 1.0
    4: 1.0
    5: 1.1
    6: 1.1
    7: 1.3    # summer driving season
    8: 1.3
    9: 1.1
    10: 1.0
    11: 1.0
    12: 1.2   # holiday travel
  trigger_type: "trauma"
  time_of_day_pattern: "evening_peak"  # evening/night hours

severity:
  distribution:
    mild: 0.0       # severe trauma is never mild — always requires admission
    moderate: 0.55
    severe: 0.45
  modifiers:
    - {condition: "age_over_65", severe_multiplier: 1.8}
    - {condition: "anticoagulant_use", severe_multiplier: 2.0}
    - {condition: "multiple_comorbidities", severe_multiplier: 1.5}

initial_state_impact:
  moderate:
    inflammation_level: 0.40
    anemia_level: 0.25       # hemorrhage
    volume_status: -0.30     # blood loss
    perfusion_status: -0.20
    renal_function: -0.05
    anion_gap_status: 0.3     # AG axis: hemorrhagic shock lactate (AG 13-16)
  severe:
    inflammation_level: 0.60
    anemia_level: 0.40
    volume_status: -0.50
    perfusion_status: -0.35
    renal_function: -0.15
    anion_gap_status: 0.4     # AG axis: severe shock + lactate (AG 16-20)

presenting_symptoms:
  - {name: "multiple_trauma", probability: 1.0, severity_range: [0.7, 1.0]}
  - {name: "pain", probability: 1.0, severity_range: [0.8, 1.0]}
  - {name: "altered_consciousness", probability: 0.40, severity_range: [0.3, 0.9]}
  - {name: "tachycardia", probability: 0.60, severity_range: [0.4, 0.8]}
  - {name: "hypotension", probability: 0.35, severity_range: [0.3, 0.7]}

# ============================================================
# COURSE ARCHETYPES (FP-ARCH-2/3)
# Post-resuscitation / post-op polytrauma course: volume_status, perfusion_status,
# renal_function recover as hemorrhagic shock resolves; inflammation_level and
# anemia_level decline as SIRS settles and transfusion corrects blood loss.
# Deterioration = re-bleed / multi-organ failure / ARDS / PE / fat embolism.
# Recovery trajectories are the reverse of initial_state_impact. Canonical names.
# ============================================================
course_archetypes:
  smooth_recovery:
    probability: 0.35
    description: "Damage-control surgery successful; shock resolves, wounds heal uneventfully"
    trajectory:
      volume_status:      {0: 0.05, 1: 0.10, 2: 0.12, 3: 0.10, 5: 0.06, 7: 0.04, 10: 0.02, 14: 0.01}
      perfusion_status:   {0: 0.04, 1: 0.08, 2: 0.08, 3: 0.06, 5: 0.04, 7: 0.03, 10: 0.02, 14: 0.01}
      inflammation_level: {0: -0.03, 1: -0.06, 2: -0.08, 3: -0.08, 5: -0.06, 7: -0.05, 10: -0.03, 14: -0.02}
      anemia_level:       {0: -0.02, 2: -0.05, 3: -0.05, 5: -0.05, 7: -0.04, 10: -0.02, 14: -0.01}
      renal_function:     {0: 0.01, 2: 0.03, 3: 0.03, 5: 0.02, 7: 0.02, 10: 0.01, 14: 0.01}
    order_modifications: {}
    treatment_modifications: {}

  dip_then_recovery:
    probability: 0.18
    description: "Post-op SIRS / transient hypoperfusion peaks Day 1-2, then resolves"
    trajectory:
      volume_status:      {0: -0.05, 1: -0.05, 2: 0.02, 3: 0.06, 5: 0.08, 7: 0.06, 10: 0.03, 14: 0.02}
      perfusion_status:   {0: -0.05, 1: -0.05, 2: 0.00, 3: 0.05, 5: 0.06, 7: 0.05, 10: 0.03, 14: 0.02}
      inflammation_level: {0: 0.06, 1: 0.06, 2: 0.02, 3: -0.04, 5: -0.07, 7: -0.07, 10: -0.05, 14: -0.03}
      anemia_level:       {0: 0.04, 1: 0.04, 2: 0.00, 3: -0.03, 5: -0.05, 7: -0.04, 10: -0.02, 14: -0.01}
    order_modifications:
      day_2:
        add_labs: ["Hb", "Lactate"]

  plateau_then_recovery:
    probability: 0.13
    description: "Slow recovery in the elderly / high injury burden; plateau then improvement"
    trajectory:
      volume_status:      {0: 0.00, 1: 0.01, 2: 0.02, 3: 0.03, 5: 0.05, 7: 0.06, 10: 0.04, 14: 0.02}
      perfusion_status:   {0: 0.00, 1: 0.00, 2: 0.01, 3: 0.02, 5: 0.04, 7: 0.05, 10: 0.04, 14: 0.02}
      inflammation_level: {0: 0.02, 1: 0.00, 3: -0.02, 5: -0.05, 7: -0.06, 10: -0.05, 14: -0.03}
      anemia_level:       {0: 0.02, 2: 0.00, 3: -0.01, 5: -0.03, 7: -0.03, 10: -0.02, 14: -0.01}

  treatment_resistant:
    probability: 0.14
    description: "Ongoing transfusion need / repeat washout for contaminated wounds; prolonged SIRS"
    trajectory:
      volume_status:      {0: -0.03, 1: -0.03, 3: -0.01, 5: 0.02, 7: 0.03, 10: 0.04, 14: 0.03}
      perfusion_status:   {0: -0.02, 1: -0.02, 3: -0.01, 5: 0.01, 7: 0.02, 10: 0.03, 14: 0.02}
      inflammation_level: {0: 0.04, 1: 0.04, 3: 0.03, 5: 0.01, 7: -0.02, 10: -0.04, 14: -0.03}
      anemia_level:       {0: 0.04, 1: 0.03, 3: 0.02, 5: 0.00, 7: -0.02, 10: -0.02, 14: -0.01}
    order_modifications:
      day_3:
        add_labs: ["Hb", "CRP"]
        add_consult: ["trauma_surgery"]

  gradual_deterioration:
    probability: 0.12
    description: "Progressive multi-organ failure from persistent shock / sepsis"
    trajectory:
      volume_status:      {0: -0.04, 1: -0.04, 2: -0.03, 3: -0.03, 5: -0.02, 7: -0.02}
      perfusion_status:   {0: -0.04, 1: -0.04, 2: -0.03, 3: -0.03, 5: -0.02, 7: -0.02}
      inflammation_level: {0: 0.05, 1: 0.05, 2: 0.04, 3: 0.04, 5: 0.03, 7: 0.03}
      renal_function:     {0: -0.03, 1: -0.03, 2: -0.03, 3: -0.02, 5: -0.02, 7: -0.02}

  sudden_deterioration:
    probability: 0.08
    description: "Re-bleed / pulmonary embolism / fat embolism with abrupt Day 1-4 collapse"
    trajectory:
      volume_status:      {0: 0.00, 1: -0.12, 2: -0.25, 3: -0.10, 5: 0.03, 7: 0.04}
      perfusion_status:   {0: 0.00, 1: -0.12, 2: -0.28, 3: -0.10, 5: 0.03, 7: 0.04}
      anemia_level:       {0: 0.00, 1: 0.08, 2: 0.12, 3: 0.05, 5: 0.00, 7: -0.02}
      inflammation_level: {0: 0.00, 1: 0.08, 2: 0.15, 3: 0.06, 5: -0.03, 7: -0.05}

# ============================================================
# COMPLICATIONS — hemorrhagic shock / VTE / SSI / ARDS / delirium / AKI
# risk_factor conditions restricted to those _evaluate_risk_condition supports.
# ============================================================
complications:
  - name: "hemorrhagic_shock"
    description: "Ongoing hemorrhage / re-bleed with hemodynamic collapse"
    probability_per_day: 0.02
    onset_day_range: [0, 4]
    risk_factors:
      - {condition: "severity_severe", multiplier: 2.5}
      - {condition: "perfusion_status < 0.3", multiplier: 3.0}
    state_impact:
      volume_status: -0.20
      perfusion_status: -0.20
      anemia_level: 0.10
    actions: ["icu_transfer", "massive_transfusion_protocol", "emergent_hemorrhage_control"]

  - name: "acute_respiratory_distress"
    description: "ARDS from chest trauma / massive transfusion / SIRS"
    probability_per_day: 0.012
    onset_day_range: [1, 7]
    risk_factors:
      - {condition: "severity_severe", multiplier: 2.5}
      - {condition: "perfusion_status < 0.3", multiplier: 1.8}
    state_impact:
      perfusion_status: -0.15
      inflammation_level: 0.05
    detection:
      test: "Chest_Xray"
      finding: "bilateral_infiltrates"
    actions: ["icu_transfer", "lung_protective_ventilation"]

  - name: "surgical_site_infection"
    description: "Wound infection of operative / open-fracture site"
    probability_per_day: 0.01
    onset_day_range: [3, 14]
    risk_factors:
      - {condition: "severity_severe", multiplier: 1.8}
      - {condition: "immobility_days > 3", multiplier: 1.3}
    state_impact:
      inflammation_level: 0.06
    detection:
      test: "CRP"
      finding: "wound_infection"
    actions: ["order_wound_culture", "start_antibiotics"]

  - name: "acute_kidney_injury"
    description: "AKI from hypoperfusion / rhabdomyolysis / contrast nephropathy"
    probability_per_day: 0.012
    onset_day_range: [1, 7]
    risk_factors:
      - {condition: "severity_severe", multiplier: 2.0}
      - {condition: "perfusion_status < 0.3", multiplier: 2.0}
    state_impact:
      renal_function: -0.15
      volume_status: -0.05
    detection:
      test: "Creatinine"
      finding: "rising_creatinine"
    actions: ["order_renal_panel", "nephrology_consult"]

  - name: "venous_thromboembolism"
    description: "DVT / PE from immobility after major trauma"
    probability_per_day: 0.008
    onset_day_range: [3, 14]
    risk_factors:
      - {condition: "immobility_days > 3", multiplier: 2.0}
      - {condition: "severity_severe", multiplier: 1.5}
    state_impact:
      perfusion_status: -0.05
    detection:
      test: "lower_extremity_doppler"
      finding: "deep_vein_thrombosis"
    actions: ["order_doppler", "start_anticoagulation"]

  - name: "postoperative_delirium"
    description: "Post-operative / ICU delirium (common in elderly polytrauma)"
    probability_per_day: 0.04
    onset_day_range: [0, 7]
    risk_factors:
      - {condition: "age_over_75", multiplier: 1.6}
      - {condition: "delirium_susceptibility > 0.3", multiplier: 1.5}
    state_impact:
      inflammation_level: 0.02
    detection:
      test: "cam_icu"
      finding: "delirium"
    actions: ["order_delirium_assessment", "nonpharmacologic_measures"]

order_protocols:
  admission_orders:
    labs:
      - {test: "CRP", urgency: "stat"}
      - {test: "WBC", urgency: "stat"}
      - {test: "Hb", urgency: "stat"}
      - {test: "Plt", urgency: "stat"}
      - {test: "Creatinine", urgency: "stat"}
      - {test: "Na", urgency: "stat"}
      - {test: "K", urgency: "stat"}
      - {test: "PT_INR", urgency: "stat"}
      - {test: "Glucose", urgency: "stat"}
      - {test: "Lactate", urgency: "stat"}
      - {test: "Blood_Type_Crossmatch", urgency: "stat"}
      - {test: "Albumin", urgency: "stat"}
      - {test: "AST", urgency: "stat"}
      - {test: "ALT", urgency: "stat"}
      - {test: "Lipase", urgency: "stat"}
    imaging:
      - {test: "FAST_Ultrasound", urgency: "stat"}
      - {test: "CT_Whole_Body", urgency: "stat", note: "pan-scan for polytrauma"}
      - {test: "Chest_Xray", urgency: "stat"}
      - {test: "Pelvis_Xray", urgency: "stat"}
    supportive:
      - {type: "IV_fluid", detail: "NS or LR wide open, titrate to MAP > 65"}
      - {type: "massive_transfusion_protocol", detail: "Activate if hemorrhagic shock"}
      - {type: "pain_management", detail: "Fentanyl 25-50mcg IV PRN, avoid sedation if TBI"}
      - {type: "DVT_prophylaxis", detail: "Enoxaparin when bleeding risk resolved"}
      - {type: "tetanus_prophylaxis", detail: "Td booster if > 5 years"}
      - {type: "urinary_catheter", detail: "Foley catheter, monitor UOP"}
  daily_monitoring:
    labs:
      - {test: "CRP", frequency: "daily"}
      - {test: "Hb", frequency: "q6-8h first 48h then daily"}
      - {test: "Creatinine", frequency: "daily"}
      - {test: "Lactate", frequency: "q6h until normalized"}
    vitals:
      stable: "q2h"
      icu: "continuous"
  discharge_criteria:
    japan:
      - "Hemodynamically stable off pressors"
      - "All surgical wounds healing"
      - "Pain controlled with oral analgesics"
      - "Independent ADLs or rehab plan in place"
      - "Follow-up appointments scheduled"
    us:
      - "Hemodynamically stable"
      - "No ongoing transfusion requirements"
      - "Pain controlled on oral meds"
      - "Safe discharge destination (home, rehab, SNF)"
      - "DVT prophylaxis plan"

drugs:
  first_line:
    japan:
      - {drug: "Fentanyl", dose: "25-50mcg IV q1h PRN", route: "IV"}
      - {drug: "Acetaminophen", dose: "1000mg IV q6h", route: "IV"}
      - {drug: "Cefazolin", dose: "1g IV q8h", note: "surgical prophylaxis"}
      - {drug: "Famotidine", dose: "20mg IV q12h", note: "stress ulcer prophylaxis"}
    us:
      - {drug: "Fentanyl", dose: "25-100mcg IV q1h PRN", route: "IV"}
      - {drug: "Acetaminophen", dose: "1000mg IV q6h", route: "IV"}
      - {drug: "Cefazolin", dose: "2g IV q8h", note: "surgical prophylaxis"}
      - {drug: "Pantoprazole", dose: "40mg IV daily", note: "stress ulcer prophylaxis"}
  post_op:
    japan:
      - {drug: "Acetaminophen", dose: "1000mg PO q6h"}
      - {drug: "Enoxaparin", dose: "2000IU SC daily"}
      - {drug: "Celecoxib", dose: "200mg PO daily"}
    us:
      - {drug: "Oxycodone", dose: "5-10mg PO q4-6h PRN"}
      - {drug: "Acetaminophen", dose: "1000mg PO q6h"}
      - {drug: "Enoxaparin", dose: "40mg SC daily"}

procedure:
  type: "exploratory laparotomy"
  procedure_code_jp: "K636"
  procedure_code_us: "49000"   # CPT: Exploratory laparotomy
  typical_duration_minutes: {mean: 180, sd: 90, min: 60, max: 480}
  anesthesia: "general"
  estimated_blood_loss_ml: {mean: 1500, sd: 800, min: 300, max: 5000}
  approach:
    "exploratory laparotomy": "midline laparotomy for abdominal exploration and damage control"
  time_to_surgery:
    japan: {mean_hours: 6, sd_hours: 4, note: "emergent for life-threatening injuries"}
    us: {mean_hours: 4, sd_hours: 3, note: "emergent damage control"}

target_los:
  japan:
    moderate: {mean: 28, sd: 10, min: 21, max: 40}
    severe: {mean: 40, sd: 15, min: 28, max: 90}
  us:
    moderate: {mean: 10, sd: 4, min: 7, max: 14}
    severe: {mean: 14, sd: 5, min: 10, max: 30}

diagnostic:
  diagnostic_difficulty: 0.30  # multiple injuries may obscure some findings
  differential:
    - {disease: "traffic_accident_severe", icd: "T07", name: "Multiple injuries", prior: 0.70}
    - {disease: "isolated_tbi", icd: "S06.9", name: "Isolated traumatic brain injury", prior: 0.15}
    - {disease: "isolated_abdominal_trauma", icd: "S36.9", name: "Isolated abdominal organ injury", prior: 0.10}
    - {disease: "other", icd: "T14.9", name: "Unspecified injury", prior: 0.05}
  likelihood_ratios:
    ct_multiple_injuries:
      traffic_accident_severe: {pos: 20.0, neg: 0.2}
      isolated_tbi: {pos: 3.0, neg: 0.5}
  confirmation_threshold: 0.90
  diagnosis_progression:
    traffic_accident_severe:
      - [0.0, "T07", "Multiple injuries, unspecified"]
      - [0.5, "T07", "Multiple injuries — specific organ injuries identified"]
      - [0.9, "T07", "Multiple injuries, fully characterized"]

outcome_benchmarks:
  japan:
    median_los: 30
    in_hospital_mortality: 0.05
    thirty_day_readmission: 0.06
    surgical_site_infection_rate: 0.05
    dvt_rate: 0.08
    delirium_rate: 0.20
    mean_age_admitted: 45
    female_ratio: 0.35
  us:
    median_los: 10
    in_hospital_mortality: 0.03
    thirty_day_readmission: 0.10
    surgical_site_infection_rate: 0.04
    dvt_rate: 0.06
    delirium_rate: 0.15
    mean_age_admitted: 40
    female_ratio: 0.35

# ============================================================
# NARRATIVE SPEC (Tier 1 #3 α-min-1)
# Consumed by TemplateNarrativeGenerator (Task 6)
# ============================================================
narrative:
  hpi_template:
    onset_pattern:
      mild: "症状は数日前より緩徐に出現。"
      moderate: "症状は数日前より出現し漸次増悪。"
      severe: "症状急速に増悪、本日受診。"
    trigger_options:
      - "急性発症"
  physical_exam_findings:
    smooth_recovery:
      day_0:
        general:
          all: "意識清明、苦痛様"
        cardiovascular:
          all: "整、心雑音なし"
        respiratory:
          all: "肺音清明"
        abdominal: "平坦、軟、圧痛なし"
        neurological: "麻痺なし、項部硬直なし"
  discharge_instructions:
    follow_up:
      en: "Follow up with PCP in 7-10 days."
      ja: "退院後 1-2 週間以内に外来受診をお願いします。"
    activity:
      en: "Gradual return to normal activity."
      ja: "徐々に通常活動を再開してください。"
    medications:
      en: "Complete prescribed medications as directed."
      ja: "処方された薬を指示通り内服してください。"
    emergency:
      en: "Return to ER if symptoms worsen."
      ja: "症状悪化があれば速やかに救急受診してください。"
    diet_lifestyle:
      en: "Maintain balanced diet and adequate hydration."
      ja: "バランスの良い食事と十分な水分摂取を心がけてください。"
