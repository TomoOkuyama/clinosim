    blood_culture_positivity: 0.22
    urine_culture_positivity: 0.82
    mean_time_to_first_abx_hours: 2.0
    mean_age_admitted: 70
    female_ratio: 0.70

# ============================================================
# CLINICAL COURSE ARCHETYPES (daily state variable changes)
# Each archetype defines day-by-day deltas for physiological state variables.
# Disease authors specify these trajectories — the engine interpolates between days.
# Patient profile (immune_reactivity, treatment_sensitivity) modulates amplitude.
# ============================================================
course_archetypes:
  smooth_recovery:
    probability: 0.60
    description: "Steady improvement from Day 1-2 after treatment initiation"
    trajectory:
      inflammation_level: {0: 0.03, 1: -0.03, 2: -0.08, 3: -0.08, 5: -0.06, 7: -0.05, 10: -0.03, 14: -0.02}
      volume_status: {0: 0.02, 1: 0.03, 2: 0.03, 3: 0.02, 5: 0.01, 7: 0.01, 10: 0.00, 14: 0.00}
      renal_function: {0: 0.00, 1: 0.01, 2: 0.02, 3: 0.02, 5: 0.01, 7: 0.01, 10: 0.00, 14: 0.00}
      perfusion_status: {0: 0.00, 1: 0.00, 2: 0.01, 3: 0.01, 5: 0.00, 7: 0.00, 10: 0.00, 14: 0.00}
    # Smooth recovery: no order/treatment modifications needed
    order_modifications: {}
    treatment_modifications: {}

    daily_trajectory:
      day_0:
        subjective: "症状あり"
        objective: "バイタル安定、検査所見あり"
        assessment: "初期診断確定、治療開始"
        plan: "治療継続、経過観察"
      day_1:
        subjective: "症状緩和傾向"
        objective: "バイタル安定、検査所見改善"
        assessment: "治療反応良好"
        plan: "治療継続"

  dip_then_recovery:
    probability: 0.15
    description: "Worsening Day 1-3 (initial septic response), then gradual improvement"
    trajectory:
      inflammation_level: {0: 0.08, 1: 0.05, 2: 0.02, 3: -0.02, 5: -0.08, 7: -0.08, 10: -0.06, 14: -0.04}
      volume_status: {0: -0.05, 1: -0.03, 2: 0.02, 3: 0.03, 5: 0.02, 7: 0.01, 10: 0.00, 14: 0.00}
      renal_function: {0: -0.03, 1: -0.02, 2: 0.00, 3: 0.01, 5: 0.02, 7: 0.01, 10: 0.01, 14: 0.00}
      perfusion_status: {0: -0.03, 1: -0.02, 2: 0.00, 3: 0.01, 5: 0.01, 7: 0.00, 10: 0.00, 14: 0.00}
    order_modifications:
      day_2:  # temporary worsening triggers additional monitoring
        add_labs: ["Lactate", "Blood_culture_repeat"]
    treatment_modifications:
      day_2:
        add_fluid: {detail: "NS 500mL bolus for volume repletion"}

  plateau_then_recovery:
    probability: 0.10
    description: "No change for 3-5 days, then improvement"
    trajectory:
      inflammation_level: {0: 0.03, 1: 0.02, 2: 0.00, 3: 0.00, 5: 0.00, 7: -0.08, 10: -0.08, 14: -0.04}
      volume_status: {0: 0.01, 1: 0.01, 2: 0.01, 3: 0.00, 5: 0.00, 7: 0.01, 10: 0.01, 14: 0.00}
      renal_function: {0: 0.00, 1: 0.00, 2: 0.00, 3: 0.00, 5: 0.00, 7: 0.01, 10: 0.01, 14: 0.01}
    order_modifications:
      day_5:  # no improvement for 5 days -> more investigation
        add_labs: ["Urine_culture_repeat", "Blood_culture_repeat", "Procalcitonin"]
        add_imaging: ["CT_abdomen_pelvis_with_contrast"]
    treatment_modifications: {}  # continue same antibiotic (patience)

  treatment_resistant:
    probability: 0.08
    description: "No response to first-line; requires antibiotic change at Day 3 (often ESBL organism)"
    trajectory:
      inflammation_level: {0: 0.08, 1: 0.05, 2: 0.05, 3: 0.02, 5: -0.02, 7: -0.06, 10: -0.08, 14: -0.06}
      volume_status: {0: -0.03, 1: -0.02, 2: -0.01, 3: 0.00, 5: 0.02, 7: 0.02, 10: 0.01, 14: 0.00}
      renal_function: {0: -0.03, 1: -0.02, 2: -0.01, 3: 0.00, 5: 0.01, 7: 0.02, 10: 0.01, 14: 0.01}
    order_modifications:
      day_3:
        add_labs: ["Urine_culture_repeat", "Blood_culture_repeat", "Procalcitonin"]
        add_imaging: ["CT_abdomen_pelvis_with_contrast"]
        add_consult: ["infectious_disease", "urology"]
    treatment_modifications:
      day_3:
        stop: ["Ceftriaxone"]
        start:
          japan: [{drug: "Meropenem", dose: "1g IV q8h"}]
          us: [{drug: "Meropenem", dose: "1g IV q8h"}]
    triggers:
      - day: 3
        condition: "inflammation_level > 0.4"
        actions: ["escalate_antibiotic", "order_ct", "consult_infectious_disease"]

  gradual_deterioration:
    probability: 0.05
    description: "Slow worsening despite treatment -> urosepsis -> ICU transfer"
    trajectory:
      inflammation_level: {0: 0.10, 1: 0.08, 2: 0.06, 3: 0.05, 5: 0.03, 7: 0.02, 10: 0.00, 14: -0.02}
      perfusion_status: {0: -0.05, 1: -0.05, 2: -0.03, 3: -0.03, 5: -0.02, 7: 0.00, 10: 0.01, 14: 0.01}
      renal_function: {0: -0.05, 1: -0.04, 2: -0.03, 3: -0.02, 5: -0.01, 7: 0.00, 10: 0.01, 14: 0.01}
      volume_status: {0: -0.05, 1: -0.03, 2: -0.02, 3: -0.01, 5: 0.00, 7: 0.01, 10: 0.01, 14: 0.00}
    order_modifications:
      day_3:
        add_labs: ["ABG", "Lactate", "Blood_culture_repeat"]
      day_5:
        add_labs: ["ABG", "Lactate"]
        add_imaging: ["CT_abdomen_pelvis_with_contrast"]
    treatment_modifications:
      day_3:
        stop: ["Ceftriaxone"]
        start:
          japan: [{drug: "Meropenem", dose: "1g IV q8h"}]
          us: [{drug: "Meropenem", dose: "1g IV q8h"}]
      day_5:
        start:
          japan: [{drug: "Norepinephrine", dose: "0.05ug/kg/min IV drip"}]
        action: "icu_transfer"
    triggers:
      - day: 5
        condition: "perfusion_status < 0.4"
        actions: ["icu_transfer"]

  sudden_deterioration:
    probability: 0.02
    description: "Sudden critical worsening (uroseptic shock) on Day 1-2"
    trajectory:
      inflammation_level: {0: 0.05, 1: -0.02, 2: 0.30, 3: 0.08, 5: -0.05, 7: -0.08, 10: -0.06, 14: -0.03}
      perfusion_status: {0: 0.00, 1: 0.00, 2: -0.25, 3: -0.05, 5: 0.05, 7: 0.05, 10: 0.02, 14: 0.01}
      renal_function: {0: 0.00, 1: 0.00, 2: -0.20, 3: -0.05, 5: 0.02, 7: 0.03, 10: 0.02, 14: 0.01}
      volume_status: {0: 0.00, 1: 0.00, 2: -0.15, 3: -0.03, 5: 0.03, 7: 0.03, 10: 0.01, 14: 0.00}
    order_modifications:
      day_2:
        add_labs: ["ABG", "Lactate", "Blood_culture_x2", "DIC_panel", "Troponin"]
        add_imaging: ["CT_abdomen_pelvis_with_contrast"]
    treatment_modifications:
      day_2:
        stop: ["Ceftriaxone"]
        start:
          japan:
            - {drug: "Meropenem", dose: "1g IV q8h"}
            - {drug: "Norepinephrine", dose: "0.1ug/kg/min IV drip"}
          us:
            - {drug: "Meropenem", dose: "1g IV q8h"}
            - {drug: "Norepinephrine", dose: "0.1ug/kg/min IV drip"}
        action: "icu_transfer"
        action_2: "central_line_placement"
    triggers:
      - day: 2
        condition: "perfusion_status < 0.4"
        actions: ["icu_transfer", "start_vasopressor", "evaluate_source_control"]

# Archetype selection modifiers (patient profile dependent)
archetype_modifiers:
  - condition: "immune_reactivity < 0.3"
    effect: {treatment_resistant: 0.10, smooth_recovery: -0.10}
  - condition: "age >= 80"
    effect: {gradual_deterioration: 0.05, smooth_recovery: -0.05}
  - condition: "treatment_sensitivity > 1.2"
    effect: {smooth_recovery: 0.10, treatment_resistant: -0.05}
  - condition: "urinary_catheter"
    effect: {treatment_resistant: 0.08, smooth_recovery: -0.08}
  - condition: "diabetes"
    effect: {dip_then_recovery: 0.05, smooth_recovery: -0.05}

# ============================================================
# COMPLICATIONS (secondary events during hospitalization)
# Each complication has: trigger conditions, timing, probability,
# physiological impact, and detection/treatment actions.
# Complications can themselves trigger further complications (cascade).
# ============================================================
complications:
  - name: "urosepsis"
    description: "Sepsis secondary to urinary source — systemic inflammatory response"
    probability_per_day: 0.012
    onset_day_range: [1, 5]
    risk_factors:
      - {condition: "severity_severe", multiplier: 3.0}
      - {condition: "urinary_obstruction", multiplier: 3.5}
      - {condition: "age_over_75", multiplier: 2.0}
      - {condition: "immunosuppressed", multiplier: 2.5}
      - {condition: "diabetes", multiplier: 1.5}
    state_impact:
      inflammation_level: 0.25
      perfusion_status: -0.20
      renal_function: -0.10
      ph_status: -0.05
    detection:
      test: "lactate_and_blood_culture"
      finding: "lactate_above_2_or_positive_culture"
    actions: ["iv_fluid_resuscitation", "escalate_antibiotic", "vasopressor_if_refractory", "consider_icu"]
    cascade: ["dic", "multiorgan_failure"]

  - name: "renal_abscess"
    description: "Intrarenal or perinephric abscess complicating pyelonephritis"
    probability_per_day: 0.005
    onset_day_range: [3, 10]
    risk_factors:
      - {condition: "urinary_obstruction", multiplier: 4.0}
      - {condition: "diabetes", multiplier: 3.0}
      - {condition: "treatment_resistant_archetype", multiplier: 2.5}
    state_impact:
      inflammation_level: 0.15
      renal_function: -0.10
    detection:
      test: "ct_abdomen_with_contrast"
      finding: "renal_abscess"
    actions: ["percutaneous_drainage_if_over_3cm", "escalate_antibiotic", "urology_consult"]

  - name: "bacteremia"
    description: "Positive blood cultures from urinary source"
    probability_per_day: 0.015
    onset_day_range: [0, 3]
    risk_factors:
      - {condition: "severity_severe", multiplier: 2.5}
      - {condition: "urinary_obstruction", multiplier: 2.0}
      - {condition: "age_over_75", multiplier: 1.5}
    state_impact:
      inflammation_level: 0.10
      perfusion_status: -0.05
    detection:
      test: "blood_culture"
      finding: "positive_gram_negative_rods"
    actions: ["confirm_antibiotic_sensitivity", "repeat_blood_culture_48h", "evaluate_source_control"]
    cascade: ["urosepsis"]

  - name: "acute_kidney_injury"
    description: "AKI from sepsis, dehydration, or nephrotoxic drugs"
    probability_per_day: 0.012
    onset_day_range: [1, 5]
    risk_factors:
      - {condition: "renal_function < 0.5", multiplier: 3.0}
      - {condition: "volume_status < -0.3", multiplier: 2.5}
      - {condition: "age_over_75", multiplier: 1.5}
      - {condition: "CKD", multiplier: 2.0}
    state_impact:
      renal_function: -0.15
      ph_status: -0.05
    detection:
      test: "creatinine"
      finding: "rise_above_0.3_from_baseline"
    actions: ["iv_fluid_bolus", "hold_nephrotoxic_drugs", "adjust_antibiotic_dose", "monitor_urine_output"]

  - name: "delirium"
    description: "Acute confusion, especially in elderly UTI patients"
    probability_per_day: 0.018
    onset_day_range: [1, 7]
    risk_factors:
      - {condition: "age_over_75", multiplier: 2.5}
      - {condition: "dementia", multiplier: 3.0}
      - {condition: "icu_stay", multiplier: 2.0}
      - {condition: "delirium_susceptibility > 0.3", multiplier: 2.0}
    state_impact: {}              # delirium doesn't change physiological state variables directly
    detection:
      test: "CAM_screening"
      finding: "positive"
    actions: ["reorientation", "sleep_hygiene", "avoid_benzodiazepines", "consider_haloperidol"]

  - name: "c_diff_colitis"
    description: "Clostridioides difficile infection from antibiotic use"
    probability_per_day: 0.005
    onset_day_range: [5, 21]
    risk_factors:
      - {condition: "antibiotic_duration_over_7_days", multiplier: 2.0}
      - {condition: "age_over_65", multiplier: 1.5}
      - {condition: "fluoroquinolone_use", multiplier: 2.5}
    state_impact:
      inflammation_level: 0.10
      volume_status: -0.10        # diarrhea -> dehydration
    detection:
      test: "c_diff_toxin"
      finding: "positive"
    actions: ["stop_offending_antibiotic", "start_oral_vancomycin", "contact_precautions"]

  - name: "dvt"
    description: "Deep vein thrombosis"
    probability_per_day: 0.008
    onset_day_range: [3, 14]
    risk_factors:
      - {condition: "immobility_days > 3", multiplier: 2.0}
      - {condition: "dvt_susceptibility > 0.3", multiplier: 2.0}
      - {condition: "no_dvt_prophylaxis", multiplier: 3.0}
    state_impact:
      coagulation_status: 0.05
    detection:
      test: "d_dimer_then_ultrasound"
      finding: "dvt_confirmed"
    actions: ["start_anticoagulation"]
    cascade: ["pulmonary_embolism"]

  - name: "pulmonary_embolism"
    description: "PE from DVT embolization"
    probability_given_parent: 0.10
    parent_complication: "dvt"
    onset_days_after_parent: [0, 7]
    state_impact:
      perfusion_status: -0.20
      inflammation_level: 0.05
      ph_status: -0.05
    actions: ["ct_angiography", "anticoagulation", "consider_icu"]

