# Urinary Tract Infection / Pyelonephritis — Complete Reference Data
# Sources cited per section. All rates are approximate and should be validated
# against the most current published data before production use.

disease_id: urinary_tract_infection
chief_complaint:
  en: "Fever, dysuria, flank pain"
  ja: "発熱・排尿時痛・側腹部痛"
department: internal_medicine
encounter_type: medical
requires_surgery: false
readmission_eligible: true
icd_codes:
  primary: "N10"  # Acute pyelonephritis
  variants:
    - {code: "N39.0", name: "Urinary tract infection, site not specified", probability: 0.35}
    - {code: "N10", name: "Acute tubulo-interstitial nephritis (pyelonephritis)", probability: 0.35}
    - {code: "N12", name: "Tubulo-interstitial nephritis, not specified as acute or chronic", probability: 0.10}
    - {code: "N30.0", name: "Acute cystitis", probability: 0.15}
    - {code: "N30.9", name: "Cystitis, unspecified", probability: 0.05}

# ============================================================
# INCIDENCE (per 100,000 per year, by age band and sex)
# Source: JP — 患者調査 2020, 日本泌尿器科学会
#         US — NHDS, Foxman et al. Am J Med 2002, Czaja et al. J Gen Intern Med 2007
# Note: UTI is 3-4x more common in women across all age groups
# ============================================================
incidence:
  japan:
    "0-4":   {M: 80, F: 120}
    "5-14":  {M: 20, F: 80}
    "15-24": {M: 15, F: 300}
    "25-34": {M: 20, F: 400}
    "35-44": {M: 25, F: 350}
    "45-54": {M: 40, F: 400}
    "55-64": {M: 80, F: 500}
    "65-74": {M: 200, F: 800}
    "75-84": {M: 400, F: 1500}
    "85+":   {M: 600, F: 2200}
  us:
    "0-4":   {M: 70, F: 100}
    "5-14":  {M: 15, F: 70}
    "15-24": {M: 10, F: 350}
    "25-34": {M: 15, F: 450}
    "35-44": {M: 20, F: 380}
    "45-54": {M: 35, F: 420}
    "55-64": {M: 70, F: 480}
    "65-74": {M: 180, F: 750}
    "75-84": {M: 350, F: 1400}
    "85+":   {M: 550, F: 2000}

  risk_multipliers:
    - {condition: "diabetes", multiplier: 2.5}
    - {condition: "CKD", multiplier: 2.0}
    - {condition: "urinary_catheter", multiplier: 6.0}
    - {condition: "urinary_obstruction", multiplier: 3.5}
    - {condition: "neurogenic_bladder", multiplier: 3.0}
    - {condition: "pregnancy", multiplier: 2.0}
    - {condition: "immunosuppressed", multiplier: 4.0}
    - {condition: "kidney_transplant", multiplier: 3.0}
    - {condition: "BPH", multiplier: 2.5}         # benign prostatic hyperplasia in males
    - {condition: "recurrent_UTI_history", multiplier: 3.0}
    - {condition: "postmenopausal", multiplier: 1.8}

  seasonal_curve:  # monthly multiplier (1.0 = baseline); UTI has mild summer peak
    1: 0.95
    2: 0.90
    3: 0.95
    4: 1.00
    5: 1.05
    6: 1.10
    7: 1.15   # Jul — peak (dehydration)
    8: 1.15   # Aug — peak
    9: 1.10
    10: 1.00
    11: 0.95
    12: 0.90

  vaccine_protection: {}  # No relevant vaccination for UTI

# ============================================================
# SEVERITY DISTRIBUTION
# Source: Clinical severity grading studies, JP DPC data
# ============================================================
severity:
  distribution:
    mild: 0.35        # uncomplicated lower UTI, may be managed outpatient
    moderate: 0.50    # pyelonephritis requiring hospitalization
    severe: 0.15      # urosepsis / complicated pyelonephritis
  modifiers:
    - {condition: "age_over_75", mild_multiplier: 0.5, severe_multiplier: 2.0}
    - {condition: "diabetes", moderate_multiplier: 1.3, severe_multiplier: 1.5}
    - {condition: "CKD", moderate_multiplier: 1.2, severe_multiplier: 1.8}
    - {condition: "urinary_obstruction", severe_multiplier: 2.5, mild_multiplier: 0.4}
    - {condition: "immunosuppressed", severe_multiplier: 2.5, mild_multiplier: 0.3}
    - {condition: "urinary_catheter", severe_multiplier: 1.5}

# ============================================================
# INITIAL PHYSIOLOGICAL STATE IMPACT
# How this disease changes physiological state at onset (added to patient baseline)
# ============================================================
initial_state_impact:
  mild:
    inflammation_level: 0.15
    volume_status: -0.05
  moderate:
    inflammation_level: 0.40
    volume_status: -0.15
    renal_function: -0.10
    perfusion_status: -0.03
  severe:
    inflammation_level: 0.70
    volume_status: -0.25
    renal_function: -0.20
    perfusion_status: -0.15
    ph_status: -0.08

# ============================================================
# ORDER PROTOCOLS (what to order and when)
# All admission orders, daily monitoring, and discharge criteria
# are defined here — the engine reads this, not hardcoded.
# ============================================================
order_protocols:
  admission_orders:
    labs:
      - {test: "Urinalysis", urgency: "stat"}
      - {test: "Urine_culture_sensitivity", urgency: "stat"}
      - {test: "CRP", urgency: "stat"}
      - {test: "WBC", urgency: "stat"}
      - {test: "Creatinine", urgency: "stat"}
      - {test: "BUN", urgency: "stat"}
      - {test: "Na", urgency: "stat"}
      - {test: "K", urgency: "stat"}
      - {test: "Glucose", urgency: "stat"}
      - {test: "Hb", urgency: "stat"}
      - {test: "Plt", urgency: "stat"}
      - {test: "Blood_culture_x2", urgency: "stat"}
      - {test: "PCT", urgency: "stat", probability: 0.60}        # if sepsis concern
      - {test: "Lactate", urgency: "stat", probability: 0.55}    # if sepsis concern
      - {test: "AST", urgency: "stat", probability: 0.70}
      - {test: "ALT", urgency: "stat", probability: 0.70}
    imaging:
      - {test: "Renal_ultrasound", urgency: "routine", probability: 0.40}
      - {test: "CT_abdomen_pelvis", urgency: "stat", probability: 0.30, condition: "complicated or obstructive suspected"}
    supportive:
      - {type: "IV_fluid", detail: "NS or LR 100-150 mL/h"}
      - {type: "antipyretic", detail: "Acetaminophen 500mg PO q6h PRN temp >= 38.5"}
      - {type: "DVT_prophylaxis", detail: "Enoxaparin 2000IU SC daily"}

  daily_monitoring:
    labs:
      - {test: "CRP", frequency: "daily"}
      - {test: "WBC", frequency: "daily"}
      - {test: "Creatinine", frequency: "daily"}
    vitals:
      stable: "q4h"
      unstable: "q1h"
    imaging:
      - {test: "Renal_ultrasound", frequency: "prn", condition: "worsening or persistent fever"}

  trigger_orders:
    no_defervescence_72h:
      condition: "inflammation_level > 0.4 at Day 3"
      actions:
        - {type: "lab", test: "Blood_culture_repeat"}
        - {type: "lab", test: "Urine_culture_repeat"}
        - {type: "imaging", test: "CT_abdomen_pelvis_with_contrast"}
        - {type: "medication_change", action: "escalate_antibiotic"}
        - {type: "consult", target: "urology"}
    renal_deterioration:
      condition: "Creatinine rise > 0.3 from baseline"
      actions:
        - {type: "medication_change", action: "adjust_antibiotic_for_renal"}
        - {type: "fluid", action: "reassess_volume_status"}
        - {type: "evaluate", action: "consider_nephrology_consult"}
    hemodynamic_instability:
      condition: "systolic_bp < 90 or MAP < 65"
      actions:
        - {type: "lab", test: "Lactate"}
        - {type: "lab", test: "ABG"}
        - {type: "fluid", action: "NS_500mL_bolus"}
        - {type: "evaluate", action: "consider_ICU_transfer"}

  discharge_criteria:
    japan:
      - "Afebrile (< 37.0C) for 48 hours"
      - "CRP declining and < 50% of peak"
      - "Oral antibiotic tolerated for 24 hours"
      - "Creatinine stable or improving"
      - "Urine culture sensitivity confirmed, appropriate oral agent selected"
      - "ADL independent or with available support"
    us:
      - "Afebrile (< 37.5C) for 24 hours"
      - "Oral antibiotic tolerated"
      - "Clinically stable (no escalation in 24h)"
      - "Creatinine stable or improving"

# ============================================================
# LIKELIHOOD RATIO TABLE
# Source: Clinical diagnostic studies meta-analyses
#         Bent et al. JAMA 2002, Giesen et al. BMC Urol 2010
#         Johnson & Russo. NEJM 2018
# ============================================================
likelihood_ratios:
  # Finding -> {disease: {positive_LR, negative_LR}}
  urine_nitrite_positive:
    urinary_tract_infection: {positive_LR: 6.0, negative_LR: 0.6}
    nephrolithiasis: {positive_LR: 0.5, negative_LR: 1.1}
    prostatitis: {positive_LR: 3.0, negative_LR: 0.7}

  urine_leukocyte_esterase_positive:
    urinary_tract_infection: {positive_LR: 4.5, negative_LR: 0.2}
    nephrolithiasis: {positive_LR: 1.5, negative_LR: 0.8}
    prostatitis: {positive_LR: 3.5, negative_LR: 0.4}

  urine_wbc_above_10:
    urinary_tract_infection: {positive_LR: 5.0, negative_LR: 0.2}
    nephrolithiasis: {positive_LR: 1.2, negative_LR: 0.9}
    prostatitis: {positive_LR: 4.0, negative_LR: 0.3}

  urine_culture_positive_above_10e5:
    urinary_tract_infection: {positive_LR: 20.0, negative_LR: 0.3}
    prostatitis: {positive_LR: 10.0, negative_LR: 0.5}
    # Sensitivity ~80-90% for pyelonephritis

  blood_culture_positive:
    urinary_tract_infection: {positive_LR: 8.0, negative_LR: 0.85}
    # ~20-30% positive in pyelonephritis, higher in urosepsis

  crp_above_100:
    urinary_tract_infection: {positive_LR: 3.0, negative_LR: 0.4}
    nephrolithiasis: {positive_LR: 0.5, negative_LR: 1.3}
    prostatitis: {positive_LR: 2.5, negative_LR: 0.6}

  procalcitonin_above_0.5:
    urinary_tract_infection: {positive_LR: 5.0, negative_LR: 0.2}
    nephrolithiasis: {positive_LR: 0.3, negative_LR: 1.5}
    prostatitis: {positive_LR: 2.0, negative_LR: 0.6}

  flank_pain_or_cva_tenderness:
    urinary_tract_infection: {positive_LR: 4.0, negative_LR: 0.5}
    nephrolithiasis: {positive_LR: 5.0, negative_LR: 0.4}
    prostatitis: {positive_LR: 0.3, negative_LR: 1.1}

  ct_hydronephrosis:
    urinary_tract_infection: {positive_LR: 2.5, negative_LR: 0.9}
    nephrolithiasis: {positive_LR: 12.0, negative_LR: 0.3}
    # Hydronephrosis in UTI suggests obstruction — complicated

  ct_renal_abscess:
    urinary_tract_infection: {positive_LR: 25.0, negative_LR: 0.95}
    # Highly specific for complicated pyelonephritis

  dysuria_and_frequency:
    urinary_tract_infection: {positive_LR: 2.0, negative_LR: 0.5}
    nephrolithiasis: {positive_LR: 1.2, negative_LR: 0.9}
    prostatitis: {positive_LR: 2.5, negative_LR: 0.6}

# ============================================================
# DIAGNOSTIC — initial differential diagnosis
# Source: Clinical practice guidelines, UpToDate
# ============================================================
diagnostic:
  diagnostic_difficulty: 0.25  # Urinalysis + culture; complicated vs simple takes longer
  presenting_symptoms:
    - "dysuria"
    - "urinary_frequency"
    - "urinary_urgency"
    - "suprapubic_pain"
    - "flank_pain"
    - "fever"
    - "nausea_vomiting"
    - "costovertebral_angle_tenderness"

  initial_differentials:
    - disease: "urinary_tract_infection"
      prior_probability: 0.50
      key_findings: ["positive_urinalysis", "urine_culture_positive", "dysuria", "fever"]
    - disease: "pyelonephritis"
      prior_probability: 0.25
      key_findings: ["flank_pain", "fever", "cva_tenderness", "positive_urine_culture"]
    - disease: "nephrolithiasis"
      prior_probability: 0.10
      key_findings: ["colicky_flank_pain", "hematuria", "ct_stone_detected"]
    - disease: "prostatitis"
      prior_probability: 0.08
      key_findings: ["perineal_pain", "tender_prostate", "male_patient"]
      applies_to: "male_only"
    - disease: "urethritis"
      prior_probability: 0.04
      key_findings: ["urethral_discharge", "sexually_active", "negative_urine_culture"]
    - disease: "vaginitis"
      prior_probability: 0.03
      key_findings: ["vaginal_discharge", "external_dysuria", "negative_urinalysis"]
      applies_to: "female_only"

# ============================================================
# LAB REFERENCE RANGES (admission values for UTI/pyelonephritis patients)
# For benchmarking generated data
# Source: Clinical studies, textbook values
# ============================================================
expected_lab_distributions:
  admission:
    CRP:
      unit: "mg/L"
      median: 60
      iqr: [20, 120]
      range: [3, 350]
    WBC:
      unit: "/uL"
      median: 11000
      iqr: [8000, 15000]
      range: [3000, 25000]
    PCT:
      unit: "ng/mL"
      median: 0.8
      iqr: [0.2, 4.0]
      range: [0.05, 80]
    Creatinine:
      unit: "mg/dL"
      median: 1.1
      iqr: [0.8, 1.6]
      range: [0.4, 6.0]
      note: "higher if pre-existing CKD, obstruction, or dehydration"
    BUN:
      unit: "mg/dL"
      median: 22
      iqr: [15, 35]
      range: [8, 90]
    Glucose:
      unit: "mg/dL"
      median: 125
      iqr: [95, 170]
      range: [70, 400]
      note: "stress hyperglycemia; higher in diabetics"
    Lactate:
      unit: "mmol/L"
      median: 1.3
      iqr: [0.8, 2.2]
      range: [0.5, 8.0]
      note: ">4 suggests urosepsis"
    Urinalysis_WBC:
      unit: "/HPF"
      median: 50
      iqr: [20, 100]
      range: [5, 500]
      note: "many/HPF"
    Urine_bacteria:
      unit: "CFU/mL"
      median: 100000
      iqr: [50000, 500000]
      range: [10000, 10000000]

  discharge:
    CRP:
      unit: "mg/L"
      median: 10
      iqr: [4, 25]
      note: "JP waits for more normalization than US"
    WBC:
      unit: "/uL"
      median: 7000
      iqr: [5500, 9000]
    Creatinine:
      unit: "mg/dL"
      median: 0.9
      iqr: [0.6, 1.2]
      note: "should return near baseline"

# ============================================================
# VITAL SIGN DISTRIBUTIONS
# Source: Clinical studies on acute pyelonephritis
# ============================================================
expected_vital_distributions:
  admission:
    temperature:
      unit: "C"
      mean: 38.8
      sd: 0.9
      range: [36.5, 40.5]
    heart_rate:
      unit: "bpm"
      mean: 95
      sd: 15
      range: [60, 135]
    systolic_bp:
      unit: "mmHg"
      mean: 120
      sd: 20
      range: [75, 175]
    respiratory_rate:
      unit: "/min"
      mean: 18
      sd: 4
      range: [12, 30]
    spo2:
      unit: "%"
      mean: 97
      sd: 1.5
      range: [92, 100]

# ============================================================
# TREATMENT REFERENCE — Drug selection data
# Source: IDSA UTI Guidelines 2010, JP 尿路感染症ガイドライン 2015
#         Gupta et al. Clin Infect Dis 2011
# ============================================================
drugs:
  first_line:
    japan:
      - drug: "Ceftriaxone"
        code_yj: "6132412"
        dose: "1-2g IV daily"
        route: IV
        renal_adjustment:
          eGFR_below_30: "1g IV daily"
        pregnancy_safe: true

    us:
      - drug: "Ceftriaxone"
        code_rxnorm: "309090"
        dose: "1g IV daily"
        route: IV
        pregnancy_safe: true
      - drug: "Ciprofloxacin"
        code_rxnorm: "309308"
        dose: "400mg IV q12h"
        route: IV
        note: "Alternative first-line if local susceptibility permits"
        pregnancy_safe: false

  alternative_penicillin_allergy:
    japan:
      - drug: "Levofloxacin"
        code_yj: "6241017"
        dose: "500mg IV daily"
        renal_adjustment:
          eGFR_below_50: "250mg IV daily"
        pregnancy_safe: false
    us:
      - drug: "Levofloxacin"
        code_rxnorm: "82122"
        dose: "750mg IV daily"
        renal_adjustment:
          eGFR_below_50: "500mg IV daily"
        pregnancy_safe: false

  escalation:  # when first-line fails (Day 3 no improvement)
    japan:
      - drug: "Meropenem"
        code_yj: "6139401"
        dose: "1g IV q8h"
        indication: "no_defervescence_72h or culture_ESBL_producing_organism"
        renal_adjustment:
          eGFR_below_30: "0.5g IV q12h"
    us:
      - drug: "Meropenem"
        code_rxnorm: "106892"
        dose: "1g IV q8h"
        indication: "same"
        renal_adjustment:
          eGFR_below_30: "0.5g IV q12h"
      - drug: "Piperacillin/Tazobactam"
        code_rxnorm: "240984"
        dose: "4.5g IV q6h"
        indication: "alternative escalation"

  discharge_oral:
    japan:
      - drug: "Levofloxacin"
        code_yj: "6241017"
        dose: "500mg PO daily"
        duration_days: 7
      - drug: "Cefcapene pivoxil"
        code_yj: "6132420"
        dose: "100mg PO TID"
        duration_days: 7
        note: "If fluoroquinolone not preferred"
    us:
      - drug: "Ciprofloxacin"
        code_rxnorm: "309308"
        dose: "500mg PO BID"
        duration_days: 7
      - drug: "Trimethoprim/Sulfamethoxazole"
        code_rxnorm: "198335"
        dose: "160/800mg PO BID"
        duration_days: 14
        note: "If susceptible on culture"

# ============================================================
# DRUG INTERACTIONS relevant to UTI treatment
# ============================================================
drug_interactions:
  - drug_a: "Levofloxacin"
    drug_b: "Warfarin"
    severity: "major"
    effect: "Increased INR, bleeding risk"
    action: "Monitor INR closely"

  - drug_a: "Ciprofloxacin"
    drug_b: "Theophylline"
    severity: "major"
    effect: "Increased theophylline levels, seizure risk"
    action: "Monitor theophylline levels, dose reduction"

  - drug_a: "Trimethoprim/Sulfamethoxazole"
    drug_b: "Warfarin"
    severity: "major"
    effect: "Markedly increased INR"
    action: "Reduce warfarin dose, monitor INR closely"

  - drug_a: "Trimethoprim/Sulfamethoxazole"
    drug_b: "Methotrexate"
    severity: "contraindicated"
    effect: "Increased methotrexate toxicity"
    action: "Avoid combination"

  - drug_a: "Meropenem"
    drug_b: "Valproic acid"
    severity: "contraindicated"
    effect: "Dramatically reduces valproate levels"
    action: "Do not use together"

  - drug_a: "Ciprofloxacin"
    drug_b: "Tizanidine"
    severity: "contraindicated"
    effect: "Marked increase in tizanidine levels"
    action: "Avoid combination"

