# DocumentTypeSpec registry source (α-min-2 scope = 9 doc types)
# LOINC codes: 34117-2 / 11506-3 / 18842-5 (verified in clinosim/codes/data/loinc.yaml)
# α-min-1 specs now carry explicit encounter_types_supported to prevent
# leaking into outpatient / emergency encounters (Task 10 data-quality fix).
#
# F-8 adv-1 (PR #131): display_en / display_ja removed. Display text is
# resolved at output time via clinosim.codes.lookup("loinc", loinc_code,
# language) — see clinosim/codes/data/loinc.yaml (authoritative source).

specs:
  admission_hp:
    loinc_code: "34117-2"
    format_type: composition
    countries_supported: [us, jp]
    encounter_types_supported: [inpatient, icu, rehab_inpatient]
    generation_frequency: admission_once
    composition_sections:
      - chief_complaint
      - hpi
      - past_medical_history
      - medications_at_home
      - allergies
      - social_history
      - family_history
      - physical_examination
      - assessment_and_plan
    stage2_strategy: template_seed
    llm_enabled_sections: [hpi, assessment_and_plan]

  progress_note:
    loinc_code: "11506-3"
    format_type: free_text
    countries_supported: [us, jp]
    encounter_types_supported: [inpatient, icu, rehab_inpatient]
    generation_frequency: daily
    stage2_strategy: template_only
    llm_enabled_sections: []

  discharge_summary:
    loinc_code: "18842-5"
    format_type: composition
    countries_supported: [us, jp]
    encounter_types_supported: [inpatient, icu, rehab_inpatient]
    generation_frequency: discharge_once
    composition_sections:
      - admission_summary
      - hospital_course
      - discharge_diagnoses
      - discharge_medications
      - discharge_instructions
      - follow_up
    # JP-CLINS v1.12.0 準拠の必須 10 セクション(300 構造情報の下に nest)。
    # session 58 Chain #9(#267)で eDS spec の min=10 制約に合わせ 5→10 に拡張
    # (312/322/342/352/360 admission + 333/324/344/444/424 discharge)。
    # session 59 #286 で narrative content 側も同時に 10 に拡張し txt-2
    # (`text.div SHALL have non-whitespace content`)違反 630 件を解消。
    # DocumentTypeSpec.composition_sections_for("JP") が読取り、Composition
    # builder(`_JP_DS_SECTION_CODE`)が section キーを番号 code に変換する。
    composition_sections_jp:
      # Admission side (5)
      - admission_reason
      - admission_details
      - admission_diagnoses
      - chief_complaint
      - present_illness
      # Discharge side (5, session 59 #286)
      - hospital_course
      - discharge_details
      - discharge_diagnoses
      - discharge_medications
      - discharge_instructions
    stage2_strategy: template_seed
    llm_enabled_sections: [hospital_course, discharge_instructions]
    # β-JP-1 seam:JP-CLINS の 5 section 中、現病歴(present_illness / 360)
    # のみ narrative 量が大きく LLM 差替の意義がある。他 4 section
    # (admission_reason / admission_details / admission_diagnoses /
    # chief_complaint)は code + datetime + 定型文で narrative variance が
    # 少ないため template のみで運用する。
    llm_enabled_sections_jp: [present_illness]

  # === α-min-2 additions (Task 9 — NLM-verified LOINC codes from Task 8) ===

  admission_nursing_assessment:
    loinc_code: "78390-2"
    format_type: composition
    countries_supported: [us, jp]
    encounter_types_supported: [inpatient, icu, rehab_inpatient]
    generation_frequency: admission_once
    composition_sections:
      - nursing_history
      - adl_assessment
      - risk_assessments
      - nursing_diagnosis
      - care_plan
    stage2_strategy: template_only
    llm_enabled_sections: []

  nursing_shift_note:
    loinc_code: "34746-8"
    format_type: free_text
    countries_supported: [us, jp]
    encounter_types_supported: [inpatient, icu, rehab_inpatient]
    # α-min-3: realistic acute-care cadence = 3 notes per LOS day
    # (night 00:00 / day 08:00 / evening 16:00). Dispatch + shift schedule
    # live in engine.py (SHIFT_SCHEDULE); neutral shift key is stored on the
    # stub and translated at Stage 2 render time (en day/evening/night,
    # ja 日勤/準夜/深夜).
    generation_frequency: daily_3shift
    stage2_strategy: template_only
    llm_enabled_sections: []

  nursing_discharge_summary:
    loinc_code: "34745-0"
    format_type: composition
    countries_supported: [us, jp]
    encounter_types_supported: [inpatient, icu, rehab_inpatient]
    generation_frequency: discharge_once
    composition_sections:
      - admission_status
      - nursing_interventions_provided
      - patient_education
      - discharge_readiness
    stage2_strategy: template_only
    llm_enabled_sections: []

  outpatient_soap:
    loinc_code: "34131-3"
    format_type: composition
    countries_supported: [us, jp]
    encounter_types_supported: [outpatient]
    generation_frequency: encounter_once
    composition_sections:
      - subjective
      - objective
      - assessment
      - plan
    stage2_strategy: template_only
    llm_enabled_sections: []

  ed_note:
    loinc_code: "34878-9"
    format_type: composition
    countries_supported: [us, jp]
    encounter_types_supported: [emergency]
    generation_frequency: encounter_once
    composition_sections:
      - chief_complaint
      - hpi
      - triage_details
      - physical_exam
      - ed_workup
      - assessment
      - disposition
    stage2_strategy: template_only
    llm_enabled_sections: []

  ed_triage_note:
    loinc_code: "54094-8"
    format_type: free_text
    countries_supported: [us, jp]
    encounter_types_supported: [emergency]
    generation_frequency: encounter_once
    stage2_strategy: template_only
    llm_enabled_sections: []

  # === chain 2 (厚労省4帳票, first sub-project, 2026-07-03) ===
  # LOINC 18776-5 verified via web search (loinc.org / findacode.com) —
  # "Plan of care note" is the correct generic match; MHLW form 別紙２
  # (https://www.mhlw.go.jp/bunya/iryouhoken/iryouhoken15/dl/h24_02-07-40.pdf)
  # confirmed the 10 core sections below (design spec §2). JP-only — the
  # first jp-only entry in this registry. rehab_inpatient uses a different
  # MHLW form (別紙２の２) and is intentionally excluded.
  admission_care_plan:
    loinc_code: "18776-5"
    format_type: composition
    countries_supported: [jp]
    encounter_types_supported: [inpatient, icu]
    generation_frequency: admission_once
    composition_sections:
      - ward_and_room
      - other_staff
      - diagnosis
      - symptoms
      - treatment_plan
      - test_schedule
      - surgery_schedule
      - estimated_los
      - special_nutrition_management
      - other_plans
    stage2_strategy: template_only
    llm_enabled_sections: []

  # === chain 2 (厚労省4帳票, second sub-project, 2026-07-03) ===
  # LOINC 80791-7 verified via web search (loinc.org) — "Nutrition and
  # dietetics Plan of care note" is a specific, strong match. MHLW form
  # 別紙23 (https://www.dietitian.or.jp/assets/data/medical-fee/0000196315_292.pdf)
  # confirmed the fields below (design spec §2). JP-only, inpatient/icu only.
  # generation_frequency=admission_once_los_gt_7: MHLW mandates this document
  # only for admissions > 7 days (design spec §3a) — see document/engine.py
  # dispatch branch. MVP: only ward_and_physician / nutrition_risk /
  # nutrition_supply are data-driven (PatientProfile.bmi / weight_kg); the
  # other 9 sections are fixed fallback strings pending future subsystems
  # (dietitian staff role, real nutrition assessment data) — see TODO.md.
  nutrition_care_plan:
    loinc_code: "80791-7"
    format_type: composition
    countries_supported: [jp]
    encounter_types_supported: [inpatient, icu]
    generation_frequency: admission_once_los_gt_7
    composition_sections:
      - ward_and_physician
      - dietitian
      - nutrition_risk
      - nutrition_assessment
      - nutrition_goals
      - nutrition_supply
      - dysphagia_diet
      - dietary_content
      - nutrition_counseling
      - other_issues
      - reassessment_timing
      - discharge_evaluation
    stage2_strategy: template_only
    llm_enabled_sections: []

  # === chain 2 (厚労省4帳票, third and final sub-project, 2026-07-04) ===
  # LOINC 34823-5 verified via loinc.org — "Physical medicine and rehab Note" is a
  # generic PM&R clinical-note code (design spec §2; NOT 18776-5, which already
  # owns the admission_care_plan display — reusing it would be an AD-30-class
  # code/display integrity violation). MHLW form 別紙様式21
  # (https://www.mhlw.go.jp/bunya/iryouhoken/iryouhoken15/dl/h24_02-07-32.pdf)
  # base form (page 1 of 6; variants 21の2〜21の5 excluded, design spec §2).
  # generation_frequency=admission_once_if_rehab_sessions: emitted only when the
  # encounter has ≥1 RehabSession record (design spec §1 — reuses the existing
  # post-surgical RehabSession data rather than the never-fired rehab_inpatient/icu
  # ward-transfer scaffold). encounter_types_supported=[inpatient] only for the
  # same reason. 6 of 9 sections are data-driven (design spec §3e).
  rehabilitation_plan:
    loinc_code: "34823-5"
    format_type: composition
    countries_supported: [jp]
    encounter_types_supported: [inpatient]
    generation_frequency: admission_once_if_rehab_sessions
    composition_sections:
      - patient_and_diagnosis
      - rehab_team
      - functional_status
      - basic_movement
      - session_frequency
      - goals
      - policy
      - discharge_estimate
      - explanation_consent
    stage2_strategy: template_only
    llm_enabled_sections: []

  # === P2-13 PR2b(session 47)JP-CLINS 診療情報提供書(JP-only)===
  # LOINC 57133-1 を jpfhir.jp v1.12.0(2026-02-16)で照合済。JP-CLINS
  # eReferral profile(JP_Composition_eReferral)の必須 section 構造:
  #   920 紹介元 / 910 紹介先 / 300 構造情報
  #     └ 950 紹介目的 / 340 傷病名・主訴 / 360 現病歴
  # US path は非対応(診療情報提供書は医療機関間情報連携用の JP 特有
  # 文書種別。US では通常の紹介状で運用される)。
  # generation_frequency=discharge_fraction_20pct:急性期病院の実務比率
  # に合わせ inpatient 退院の約 20% を発行対象とする。発行判定は
  # (encounter_id, patient_id) の SHA-256 hash による決定的サブセット
  # 選択(新規 RNG allocation 不要)。
  referral_note:
    loinc_code: "57133-1"
    format_type: composition
    countries_supported: [jp]
    encounter_types_supported: [inpatient, icu, rehab_inpatient]
    generation_frequency: discharge_fraction_20pct
    composition_sections:
      - referring_institution
      - referral_destination
      - referral_purpose
      - diagnoses_and_complaint
      - present_illness_ref
    stage2_strategy: template_only
    llm_enabled_sections: []

  # === P2-13 PR3(session 47)JP-eCheckup 健診結果報告書(JP-only、opt-in) ===
  # LOINC 53576-5 を jpfhir.jp JP-eCheckup General v1.7.0(2026-02-16)で照合済。
  # https://jpfhir.jp/fhir/eCheckup/igv1/StructureDefinition-JP-Composition-eCheckupGeneral.html
  # 対応 Composition profile:JP_Composition_eCheckupGeneral(section-code は
  # JP-CLINS の 3 桁 code 系とは別で 5 桁数値、URL も /fhir/eCheckup/ 配下)。
  #
  # opt-in 制御:SimulatorConfig.modules["health_checkup"]=True かつ
  # country=JP のとき、健康診断 encounter(encounter_type="checkup")に
  # 対して 1 通発行する。急性期病院想定を維持するため default off。
  # 対象健診種別は労安衛法定健診(事業者健診)= section 01031 検査結果 +
  # 01032 問診結果 を必須 emit。
  health_checkup_report:
    loinc_code: "53576-5"
    format_type: composition
    countries_supported: [jp]
    encounter_types_supported: [checkup]
    generation_frequency: checkup_once
    composition_sections:
      - checkup_lab_results
      - checkup_questionnaire
    stage2_strategy: template_only
    llm_enabled_sections: []
