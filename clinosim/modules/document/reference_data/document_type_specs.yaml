# DocumentTypeSpec registry source (α-min-2 scope = 9 doc types)
# LOINC codes: 34117-2 / 11506-3 / 18842-5 (verified in clinosim/codes/data/loinc.yaml)
# α-min-1 specs now carry explicit encounter_types_supported to prevent
# leaking into outpatient / emergency encounters (Task 10 data-quality fix).

specs:
  admission_hp:
    loinc_code: "34117-2"
    display_en: "History and physical note"
    display_ja: "入院時記録"
    format_type: composition
    countries_supported: [us, jp]
    encounter_types_supported: [inpatient, icu, rehab_inpatient]
    generation_frequency: admission_once
    composition_sections:
      - chief_complaint
      - hpi
      - past_medical_history
      - medications_at_home
      - allergies
      - social_history
      - family_history
      - physical_examination
      - assessment_and_plan
    stage2_strategy: template_seed
    llm_enabled_sections: [hpi, assessment_and_plan]

  progress_note:
    loinc_code: "11506-3"
    display_en: "Progress note"
    display_ja: "経過記録"
    format_type: free_text
    countries_supported: [us, jp]
    encounter_types_supported: [inpatient, icu, rehab_inpatient]
    generation_frequency: daily
    stage2_strategy: template_only
    llm_enabled_sections: []

  discharge_summary:
    loinc_code: "18842-5"
    display_en: "Discharge summary"
    display_ja: "退院サマリ"
    format_type: composition
    countries_supported: [us, jp]
    encounter_types_supported: [inpatient, icu, rehab_inpatient]
    generation_frequency: discharge_once
    composition_sections:
      - admission_summary
      - hospital_course
      - discharge_diagnoses
      - discharge_medications
      - discharge_instructions
      - follow_up
    stage2_strategy: template_seed
    llm_enabled_sections: [hospital_course, discharge_instructions]

  # === α-min-2 additions (Task 9 — NLM-verified LOINC codes from Task 8) ===

  admission_nursing_assessment:
    loinc_code: "78390-2"
    display_en: "Nurse admission history and physical note"
    display_ja: "入院時看護アセスメント"
    format_type: composition
    countries_supported: [us, jp]
    encounter_types_supported: [inpatient, icu, rehab_inpatient]
    generation_frequency: admission_once
    composition_sections:
      - nursing_history
      - adl_assessment
      - risk_assessments
      - nursing_diagnosis
      - care_plan
    stage2_strategy: template_only
    llm_enabled_sections: []

  nursing_shift_note:
    loinc_code: "34746-8"
    display_en: "Nurse note"
    display_ja: "看護経過記録"
    format_type: free_text
    countries_supported: [us, jp]
    encounter_types_supported: [inpatient, icu, rehab_inpatient]
    generation_frequency: daily
    stage2_strategy: template_only
    llm_enabled_sections: []

  nursing_discharge_summary:
    loinc_code: "34745-0"
    display_en: "Nurse discharge summary"
    display_ja: "退院時看護サマリ"
    format_type: composition
    countries_supported: [us, jp]
    encounter_types_supported: [inpatient, icu, rehab_inpatient]
    generation_frequency: discharge_once
    composition_sections:
      - admission_status
      - nursing_interventions_provided
      - patient_education
      - discharge_readiness
    stage2_strategy: template_only
    llm_enabled_sections: []

  outpatient_soap:
    loinc_code: "34131-3"
    display_en: "Outpatient note"
    display_ja: "外来 SOAP 記録"
    format_type: composition
    countries_supported: [us, jp]
    encounter_types_supported: [outpatient]
    generation_frequency: encounter_once
    composition_sections:
      - subjective
      - objective
      - assessment
      - plan
    stage2_strategy: template_only
    llm_enabled_sections: []

  ed_note:
    loinc_code: "34878-9"
    display_en: "Emergency department note"
    display_ja: "救急記録"
    format_type: composition
    countries_supported: [us, jp]
    encounter_types_supported: [emergency]
    generation_frequency: encounter_once
    composition_sections:
      - chief_complaint
      - hpi
      - triage_details
      - physical_exam
      - ed_workup
      - assessment
      - disposition
    stage2_strategy: template_only
    llm_enabled_sections: []

  ed_triage_note:
    loinc_code: "54094-8"
    display_en: "Triage note"
    display_ja: "トリアージ記録"
    format_type: free_text
    countries_supported: [us, jp]
    encounter_types_supported: [emergency]
    generation_frequency: encounter_once
    stage2_strategy: template_only
    llm_enabled_sections: []
