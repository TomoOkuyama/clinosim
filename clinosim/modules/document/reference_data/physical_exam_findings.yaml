          severe: "両肺に水泡音、補助呼吸筋使用"
        cardiovascular:
          all: "整、心雑音なし"
        abdominal: "平坦、軟、圧痛なし"
        neurological: "麻痺なし、項部硬直なし"
      day_3:
        general:
          all: "改善傾向、解熱"
        respiratory:
          all: "右下肺野水泡音残存するも減少"
        cardiovascular:
          all: "整、心雑音なし"
        abdominal: "平坦、軟、圧痛なし"
        neurological: "麻痺なし"
      day_7:
        general:
          all: "全身状態良好、解熱"
        respiratory:
          all: "呼吸音ほぼ清明"
        cardiovascular:
          all: "整、心雑音なし"
        abdominal: "平坦、軟"
        neurological: "神経学的異常なし"
    complicated_deterioration:
      day_0:
        general:
          mild: "意識清明、倦怠感"
          moderate: "JCS I-1、苦痛様"
