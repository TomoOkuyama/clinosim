# Mild Allergic Reaction — ED visit protocol
# Urticaria/mild angioedema. Antihistamines, observation, discharge.

condition_id: allergic_reaction_mild
icd10_code: "T78.40"
icd10_display: "Allergy, unspecified"
chief_complaint:
  en: "Urticaria, mild angioedema, itching"
  ja: "蕁麻疹・軽度血管浮腫・掻痒"
encounter_type: emergency
department: emergency_medicine
disposition: discharge_home

severity_distribution:
  mild: 0.55     # localized urticaria, quick response to antihistamine
  moderate: 0.35  # widespread urticaria, mild angioedema
  severe: 0.10    # significant angioedema, borderline anaphylaxis concern

ed_stay_hours:
  mild: {mean: 2, sd: 0.5}
  moderate: {mean: 3, sd: 1}
  severe: {mean: 4.5, sd: 1.5}

workup:
  vitals: true
  labs: []  # labs rarely needed for mild allergic reactions
  imaging: []

treatment:
  - {name: "Diphenhydramine 50mg", probability: 0.8, route: "IV", intent: "antihistamine"}
  - {name: "Famotidine 20mg", probability: 0.4, route: "IV", intent: "H2 blocker adjunct"}
  - {name: "Methylprednisolone 125mg", probability: 0.3, route: "IV", intent: "anti-inflammatory"}
  - {name: "Epinephrine 0.3mg", probability: 0.10, route: "IM", intent: "anaphylaxis concern"}
  - {name: "IV normal saline", probability: 0.2, route: "IV"}

discharge_instructions:
  - "Allergic reaction treated, symptoms improved"
  - "Avoid identified or suspected trigger"
  - "Continue antihistamines for 3-5 days as rebound urticaria may occur"
  - "Return immediately if throat swelling, difficulty breathing, or lightheadedness"
  - "Follow up with allergist if recurrent episodes"

discharge_prescriptions:
  - {drug: "Cetirizine 10mg", route: "PO", frequency: "daily", duration_days: 7, probability: 0.7}
  - {drug: "Prednisone 40mg", route: "PO", frequency: "daily", duration_days: 5, probability: 0.3}
  - {drug: "Epinephrine auto-injector", route: "IM", frequency: "PRN emergency", duration_days: 365, probability: 0.2}

scenarios:
  urticaria_only:
    probability: 0.60
    description: "Localized hives, no airway involvement, single antihistamine sufficient"
    additional_labs: []
    additional_imaging: []
    additional_treatment: []
    duration_modifier: 0.6
    discharge_note: "Urticaria resolved, avoid allergen"
  moderate_angioedema:
    probability: 0.30
    description: "Lip or face swelling requiring steroid treatment"
    additional_labs: []
    additional_imaging: []
    additional_treatment: [Methylprednisolone 40mg IV]
    duration_modifier: 1.5
    discharge_note: "Angioedema resolved with steroids"
  anaphylaxis_concern:
    probability: 0.10
    description: "Borderline anaphylaxis with systemic symptoms"
    additional_labs: []
    additional_imaging: []
    additional_treatment: [Epinephrine 0.3mg IM, IV fluid]
    duration_modifier: 2.0
    discharge_note: "Epinephrine given, 4h observation, EpiPen prescribed"

incidence_modifier: 1.0
probability: 0.07  # relative frequency among ED visits
age_distribution: all
sex_ratio_female: 1.2
seasonal: {1: 0.8, 2: 0.8, 3: 1.1, 4: 1.3, 5: 1.3, 6: 1.2, 7: 1.1, 8: 1.0, 9: 1.0, 10: 0.9, 11: 0.8, 12: 0.8}
