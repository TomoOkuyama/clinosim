# Animal Bite — ED visit protocol
# Wound management, infection prevention, tetanus assessment.

condition_id: animal_bite
icd10_code: "W54.0XXA"
icd10_display: "Bitten by dog, initial encounter"
chief_complaint:
  en: "Dog bite to hand/leg, wound requiring treatment"
  ja: "犬咬傷（手/下肢）"
encounter_type: emergency
department: emergency_medicine
disposition: discharge_home

severity_distribution:
  mild: 0.40
  moderate: 0.45
  severe: 0.15    # deep puncture, tendon/nerve concern

ed_stay_hours:
  mild: {mean: 1.5, sd: 0.5}
  moderate: {mean: 2.5, sd: 1}
  severe: {mean: 4, sd: 1.5}

workup:
  vitals: true
  labs:
    - {test: "WBC", probability: 0.2}

treatment:
  - {name: "Wound irrigation with normal saline", probability: 0.95, route: "topical", intent: "infection prevention"}
  - {name: "Tetanus toxoid 0.5mL", probability: 0.5, route: "IM", intent: "tetanus prophylaxis"}
  - {name: "Amoxicillin/clavulanate 875/125mg", probability: 0.7, route: "PO", intent: "prophylactic antibiotic"}
  - {name: "Lidocaine 1% local", probability: 0.6, route: "local", intent: "local anesthesia for wound care"}

discharge_instructions:
  - "Wound irrigated and cleaned; no signs of deep structure injury"
  - "Complete antibiotic course as prescribed"
  - "Return if increasing redness, swelling, warmth, drainage, or fever"
  - "Keep wound clean and dry; change dressing daily"
  - "Report bite to local animal control"

discharge_prescriptions:
  - {drug: "Amoxicillin/clavulanate 875/125mg", route: "PO", frequency: "BID", duration_days: 7, probability: 0.7}
  - {drug: "Ibuprofen 400mg", route: "PO", frequency: "Q6H PRN", duration_days: 5, probability: 0.5}

incidence_modifier: 1.0
probability: 0.03
age_distribution: all_ages
sex_ratio_female: 0.45
seasonal: {1: 0.8, 2: 0.8, 3: 0.9, 4: 1.0, 5: 1.1, 6: 1.2, 7: 1.3, 8: 1.3, 9: 1.1, 10: 1.0, 11: 0.9, 12: 0.8}
