# Ankle Sprain — ED visit protocol
# Common injury. X-ray to rule out fracture, RICE, discharge.

condition_id: ankle_sprain
icd10_code: "S93.40"
icd10_display: "Sprain of unspecified ligament of ankle"
chief_complaint:
  en: "Ankle injury after fall, pain, swelling"
  ja: "足関節捻挫（転倒後）"
encounter_type: emergency
department: emergency_medicine
disposition: discharge_home

severity_distribution:
  mild: 0.50    # Grade I, no imaging needed
  moderate: 0.40 # Grade II, X-ray, short splint
  severe: 0.10   # Grade III, X-ray, posterior splint, orthopedic follow-up

ed_stay_hours:
  mild: {mean: 1.5, sd: 0.5}
  moderate: {mean: 2.5, sd: 0.8}
  severe: {mean: 3.5, sd: 1}

workup:
  vitals: true
  labs: []  # no labs for isolated ankle sprain
  imaging:
    - {test: "Ankle_Xray", probability: 0.7}  # Ottawa ankle rules

treatment:
  - {name: "Ice pack application", probability: 0.9, route: "topical"}
  - {name: "Elastic bandage wrap", probability: 0.8, route: "topical"}
  - {name: "Posterior splint", probability: 0.15, route: "topical", intent: "immobilization for severe"}
  - {name: "Acetaminophen 500mg", probability: 0.5, route: "PO"}
  - {name: "Ibuprofen 400mg", probability: 0.6, route: "PO", intent: "anti-inflammatory"}

discharge_instructions:
  - "RICE: Rest, Ice, Compression, Elevation"
  - "Weight bearing as tolerated with crutches if needed"
  - "Follow up with orthopedics if not improving in 5-7 days"
  - "Return if unable to bear weight or significant swelling increase"

discharge_prescriptions:
  - {drug: "Ibuprofen 400mg", route: "PO", frequency: "tid", duration_days: 7, probability: 0.7}
  - {drug: "Acetaminophen 500mg", route: "PO", frequency: "tid PRN", duration_days: 7, probability: 0.5}

incidence_modifier: 1.0
probability: 0.10  # relative frequency among ED visits
age_distribution: all
sex_ratio_female: 1.1
seasonal: {1: 1.1, 2: 1.0, 3: 0.9, 4: 1.0, 5: 1.1, 6: 1.2, 7: 1.2, 8: 1.1, 9: 1.1, 10: 1.0, 11: 1.0, 12: 1.1}

narrative:
  ed_note_template:
    chief_complaint_ja: 足関節捻挫（転倒後）
    hpi_ja: '{injury_time_ja}に{mechanism_ja}にて足関節を捻挫。直後より疼痛・腫脹出現、荷重不能〜可能。Ottawa足関節ルール：{ottawa_result_ja}。開放創・神経症状なし。'
    physical_exam_ja:
      general: 意識清明、軽度疼痛様
      cardiovascular: 心拍数正常
      respiratory: 呼吸数正常
      abdominal: 腹部：評価不要
      musculoskeletal: 右/左足関節：腫脹（+）、皮下出血（{ecchymosis_ja}）、前距腓靭帯部圧痛（+）、踵骨・内外くるぶし圧痛（{bone_pain_ja}）。ROM制限あり。神経血管正常。
      neurological: 遠位神経・血管正常
    ed_workup_summary_ja: 足関節X線（{xray_views_ja}）：{xray_result_ja}。骨折なし/骨折確認。
    disposition_ja: '{disposition_display_ja}。RICE療法指導・{support_ja}固定。整形外科外来1週間後受診。'
  ed_triage_template:
    common_triage_levels:
    - '4'
    - '5'
