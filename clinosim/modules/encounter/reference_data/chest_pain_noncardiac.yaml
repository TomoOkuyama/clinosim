# Non-cardiac Chest Pain — ED visit protocol
# Rule-out ACS. Serial troponins, ECG, then discharge if negative.

condition_id: chest_pain_noncardiac
icd10_code: "R07.89"
icd10_display: "Other chest pain"
chief_complaint:
  en: "Chest pain, rule out acute coronary syndrome"
  ja: "胸痛（急性冠症候群除外目的）"
encounter_type: emergency
department: emergency_medicine
disposition: discharge_home

severity_distribution:
  mild: 0.30
  moderate: 0.60  # needs serial troponins (4-6h observation)
  severe: 0.10    # prolonged observation, stress test consideration

ed_stay_hours:
  mild: {mean: 3, sd: 1}
  moderate: {mean: 5, sd: 1.5}
  severe: {mean: 8, sd: 2}

workup:
  vitals: true
  labs:
    - {test: "Troponin", probability: 0.95, serial: true, interval_hours: 3}
    - {test: "CRP", probability: 0.3}
    - {test: "Creatinine", probability: 0.5}
    - {test: "Glucose", probability: 0.4}
    - {test: "WBC", probability: 0.4}
    - {test: "BNP", probability: 0.3}
  imaging:
    - {test: "Chest_Xray", probability: 0.7}
    - {test: "ECG", probability: 0.95}

treatment:
  - {name: "Aspirin 325mg", probability: 0.6, route: "PO", intent: "empiric ACS protocol"}
  - {name: "Nitroglycerin 0.4mg SL", probability: 0.3, route: "SL", intent: "chest pain relief"}
  - {name: "IV normal saline", probability: 0.3, route: "IV"}

discharge_instructions:
  - "Troponin negative x2, ECG unchanged — ACS ruled out"
  - "Follow up with PCP within 1 week"
  - "Return immediately if chest pain recurs, worsens, or associated with dyspnea"
  - "Consider outpatient stress test if risk factors present"

discharge_prescriptions:
  - {drug: "Omeprazole 20mg", route: "PO", frequency: "daily", duration_days: 14, probability: 0.4}

scenarios:
  quick_ruleout:
    probability: 0.40
    description: "Single troponin negative with normal ECG, rapid ACS rule-out"
    additional_labs: []
    additional_imaging: []
    additional_treatment: []
    duration_modifier: 0.6
    discharge_note: "ACS ruled out, likely musculoskeletal"
  serial_observation:
    probability: 0.40
    description: "Serial troponins x2 (3h apart), extended observation period"
    additional_labs: [Troponin_repeat]
    additional_imaging: []
    additional_treatment: []
    duration_modifier: 1.5
    discharge_note: "Serial troponins negative, low-risk"
  extended_cardiac:
    probability: 0.20
    description: "Borderline troponin or ECG changes requiring cardiology involvement"
    additional_labs: [BNP, Troponin_repeat]
    additional_imaging: [Echocardiography]
    additional_treatment: [Cardiology consult]
    duration_modifier: 2.0
    discharge_note: "Cardiology cleared, outpatient stress test"

incidence_modifier: 1.0
probability: 0.15  # relative frequency among ED visits
age_distribution: adults  # predominantly 40+
sex_ratio_female: 0.6  # more men
seasonal: {1: 1.1, 2: 1.0, 3: 1.0, 4: 1.0, 5: 1.0, 6: 1.0, 7: 1.0, 8: 1.0, 9: 1.0, 10: 1.0, 11: 1.0, 12: 1.1}

narrative:
  ed_note_template:
    chief_complaint_ja: 胸痛（急性冠症候群除外目的）
    hpi_ja: '{onset_ja}より胸痛出現。性状：{pain_quality_ja}、部位：胸骨後部〜前胸部、放散痛：{radiation_ja}。随伴症状：息切れ・冷汗・嘔気の有無を確認。心疾患既往・危険因子（高血圧・糖尿病・喫煙・脂質異常症）を聴取。'
    physical_exam_ja:
      general: 意識清明、苦痛様
      cardiovascular: 血圧{sbp}/{dbp}mmHg、心拍数{hr}/分、心音整、雑音なし、頸静脈怒張なし
      respiratory: 呼吸数正常、肺野清明、胸膜摩擦音なし
      abdominal: 平坦、軟、圧痛なし
      neurological: 麻痺なし
    ed_workup_summary_ja: ECG：{ecg_result_ja}。心筋トロポニン：{troponin_result_ja}（3時間後再検）。胸部X線：{cxr_result_ja}。ACS除外基準を評価。
    disposition_ja: 連続トロポニン陰性・ECG変化なしにてACS除外。{disposition_display_ja}。2週間以内に内科外来受診。
    chief_complaint_en: Chest pain (rule out acute coronary syndrome)
    hpi_en: 'Chest pain onset {onset_ja}. Character: {pain_quality_en}, location: retrosternal to anterior chest, radiation: {radiation_en}. Associated symptoms: dyspnea, diaphoresis, and nausea assessed. Cardiac history and risk factors (hypertension, diabetes, smoking, dyslipidemia) reviewed.'
    physical_exam_en:
      general: Alert and oriented, in distress
      cardiovascular: 'BP {sbp}/{dbp} mmHg, HR {hr}/min, regular heart sounds, no murmurs, no jugular venous distension'
      respiratory: Respiratory rate normal, lungs clear, no pleural friction rub
      abdominal: Flat, soft, non-tender
      neurological: No paralysis
    ed_workup_summary_en: 'ECG: {ecg_result_en}. Cardiac troponin: {troponin_result_en} (repeat at 3 hours). Chest X-ray: {cxr_result_en}. ACS rule-out criteria assessed.'
    disposition_en: 'ACS ruled out with serial negative troponins and no ECG changes. {disposition_display_en}. Internal medicine follow-up within 2 weeks.'
  ed_triage_template:
    common_triage_levels:
    - '2'
    - '3'
