# Influenza Vaccination — Outpatient visit protocol
# Seasonal influenza vaccine administration visit.

condition_id: flu_vaccination
icd10_code: "Z23"
icd10_display: "Encounter for immunization"
chief_complaint:
  en: "Influenza vaccination"
  ja: "インフルエンザ予防接種"
encounter_type: outpatient
department: primary_care
disposition: discharge_home

severity_distribution:
  mild: 1.0

ed_stay_hours:
  mild: {mean: 0.25, sd: 0.1}  # 15 min visit

workup:
  vitals: false
  labs: []
  imaging: []

treatment:
  - {name: "influenza vaccine IM", probability: 1.0}

discharge_instructions:
  - "Mild soreness at injection site is normal for 1-2 days"
  - "Fever, fatigue, and body aches may occur and resolve in 1-2 days"
  - "Seek medical attention if severe allergic reaction (difficulty breathing, swelling)"

discharge_prescriptions: []

incidence_modifier: 1.0
age_distribution: adults_all
sex_ratio_female: 1.1
seasonal: {1: 0.1, 2: 0.05, 3: 0.02, 4: 0.01, 5: 0.01, 6: 0.01, 7: 0.01, 8: 0.05, 9: 0.5, 10: 1.5, 11: 1.5, 12: 1.0}

narrative:
  outpatient_soap_template:
    subjective_ja: '{chief_complaint_ja}の訴え、{onset_days}日前より'
    objective_ja: バイタル安定、身体所見特記事項なし
    assessment_ja: '{primary_dx_display_ja}'
    plan_ja: '{workup_summary_ja}、{follow_up_ja}'
    subjective_en: '{chief_complaint_en} complaint, onset {onset_days} day(s) ago'
    objective_en: Vital signs stable; physical exam unremarkable
    assessment_en: '{primary_dx_display_en}'
    plan_en: '{workup_summary_en}, {follow_up_en}'
