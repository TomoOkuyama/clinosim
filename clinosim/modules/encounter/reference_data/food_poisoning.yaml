# Food Poisoning — ED visit protocol
# Acute gastroenteritis from contaminated food. IV fluids, antiemetics, discharge.

condition_id: food_poisoning
icd10_code: "A05.9"
icd10_display: "Bacterial foodborne intoxication, unspecified"
chief_complaint:
  en: "Abdominal pain, vomiting, diarrhea after meal"
  ja: "食後の腹痛・嘔吐・下痢"
encounter_type: emergency
department: emergency_medicine
disposition: discharge_home

severity_distribution:
  mild: 0.45     # mild nausea, observation, oral fluids
  moderate: 0.40  # significant vomiting, IV fluids needed
  severe: 0.15    # dehydration, prolonged observation

ed_stay_hours:
  mild: {mean: 2, sd: 0.5}
  moderate: {mean: 3.5, sd: 1}
  severe: {mean: 5.5, sd: 1.5}

# Acute physiological signature (AD-57): vomiting/diarrhea → dehydration (volume↓ →
# BUN↑, BP↓/HR↑) plus mild inflammation; severe loss adds mild metabolic acidosis.
initial_state_impact:
  # AG axis: mixed diarrhea / vomiting — diarrhea-driven non-AG
  # hyperchloremic acidosis dominates on average, slightly less negative
  # than pure viral gastroenteritis.
  mild:     {inflammation_level: 0.06, volume_status: -0.10, anion_gap_status: -0.2}
  moderate: {inflammation_level: 0.12, volume_status: -0.22, anion_gap_status: -0.4}
  severe:   {inflammation_level: 0.16, volume_status: -0.38, ph_status: -0.05, anion_gap_status: -0.5}

workup:
  vitals: true
  labs:
    - {test: "WBC", probability: 0.3}
    - {test: "Na", probability: 0.4}
    - {test: "K", probability: 0.4}
    - {test: "Creatinine", probability: 0.3}
    - {test: "Glucose", probability: 0.2}
  imaging:
    - {test: "Abdominal_Xray", probability: 0.1}  # if obstruction concern

treatment:
  - {name: "IV normal saline 1000mL", probability: 0.7, route: "IV", intent: "rehydration"}
  - {name: "Ondansetron 4mg", probability: 0.6, route: "IV", intent: "antiemetic"}
  - {name: "Metoclopramide 10mg", probability: 0.2, route: "IV", intent: "antiemetic"}
  - {name: "Acetaminophen 500mg", probability: 0.3, route: "PO", intent: "antipyretic"}

discharge_instructions:
  - "Clear liquids for 24 hours, advance to bland diet (BRAT) as tolerated"
  - "Avoid dairy, caffeine, and fatty foods for 48 hours"
  - "Oral rehydration solution or sports drinks to maintain hydration"
  - "Return if bloody stool, fever >39C, unable to keep fluids down >12 hours"
  - "Return if symptoms not improving after 48 hours"

discharge_prescriptions:
  - {drug: "Ondansetron 4mg", route: "PO", frequency: "q8h PRN", duration_days: 3, probability: 0.5}
  - {drug: "Loperamide 2mg", route: "PO", frequency: "PRN after each loose stool (max 8mg/day)", duration_days: 3, probability: 0.2}

scenarios:
  mild_dehydration:
    probability: 0.50
    description: "Oral rehydration sufficient, quick improvement"
    additional_labs: []
    additional_imaging: []
    additional_treatment: []
    duration_modifier: 0.6
    discharge_note: "Tolerated PO, hydration improved"
  moderate:
    probability: 0.35
    description: "IV fluids needed, electrolyte check"
    additional_labs: [Na, K]
    additional_imaging: []
    additional_treatment: []
    duration_modifier: 1.2
    discharge_note: "IV hydration, electrolytes normal"
  severe_dehydration:
    probability: 0.15
    description: "Multiple IV bags required, persistent vomiting, antiemetics"
    additional_labs: [Na, K, Creatinine, WBC]
    additional_imaging: []
    additional_treatment: []
    duration_modifier: 2.0
    discharge_note: "Significant dehydration, consider observation"

incidence_modifier: 1.0
probability: 0.05  # relative frequency among ED visits
age_distribution: all
sex_ratio_female: 1.0
seasonal: {1: 0.8, 2: 0.8, 3: 0.9, 4: 1.0, 5: 1.1, 6: 1.3, 7: 1.4, 8: 1.4, 9: 1.2, 10: 1.0, 11: 0.9, 12: 0.8}

narrative:
  ed_note_template:
    chief_complaint_ja: '{chief_complaint_ja}の訴え'
    hpi_ja: '{onset_days}日前より{chief_complaint_ja}が出現・増悪'
    physical_exam_ja:
      general: 意識清明、苦痛様
    ed_workup_summary_ja: '{lab_summary_ja}、{imaging_summary_ja}'
    disposition_ja: '{disposition_display_ja}'
    chief_complaint_en: '{chief_complaint_en} complaint'
    hpi_en: 'Onset {onset_days} day(s) ago: {chief_complaint_en}, progressively worsening.'
    physical_exam_en:
      general: Alert and oriented, in visible distress
    ed_workup_summary_en: '{lab_summary_en}, {imaging_summary_en}'
    disposition_en: '{disposition_display_en}'
  ed_triage_template:
    common_triage_levels:
    - '3'
    - '4'
