# Lab Result Consultation — Outpatient visit protocol
# Brief visit to review and explain previous lab/test results with the patient.

condition_id: lab_result_consultation
icd10_code: "Z71.89"
icd10_display: "Other specified counseling"
chief_complaint:
  en: "Lab result review, test result explanation"
  ja: "検査結果説明・結果確認"
encounter_type: outpatient
department: primary_care
disposition: discharge_home

severity_distribution:
  mild: 1.0

ed_stay_hours:
  mild: {mean: 0.25, sd: 0.1}  # 15 min visit

workup:
  vitals: false
  labs: []
  imaging: []

treatment: []

discharge_instructions:
  - "Review provided result summary sheet"
  - "Follow dietary and lifestyle recommendations as discussed"
  - "Schedule follow-up labs if indicated"
  - "Contact clinic with any questions about results"

discharge_prescriptions: []

incidence_modifier: 1.0
age_distribution: adults_all
sex_ratio_female: 1.1
seasonal: {1: 1.0, 2: 1.0, 3: 1.0, 4: 1.0, 5: 1.0, 6: 1.0, 7: 1.0, 8: 1.0, 9: 1.0, 10: 1.0, 11: 1.0, 12: 1.0}

narrative:
  outpatient_soap_template:
    subjective_ja: '{chief_complaint_ja}の訴え、{onset_days}日前より'
    objective_ja: バイタル安定、身体所見特記事項なし
    assessment_ja: '{primary_dx_display_ja}'
    plan_ja: '{workup_summary_ja}、{follow_up_ja}'
    subjective_en: '{chief_complaint_en} complaint, onset {onset_days} day(s) ago'
    objective_en: Vital signs stable; physical exam unremarkable
    assessment_en: '{primary_dx_display_en}'
    plan_en: '{workup_summary_en}, {follow_up_en}'
