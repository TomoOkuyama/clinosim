# Mammography Screening — Outpatient visit protocol
# Routine breast cancer screening mammography for women aged 40+.

condition_id: mammography_screening
icd10_code: "Z12.31"
icd10_display: "Encounter for screening mammogram for malignant neoplasm of breast"
chief_complaint:
  en: "Breast cancer screening mammography"
  ja: "乳癌スクリーニング・マンモグラフィ"
encounter_type: outpatient
department: radiology
disposition: discharge_home

severity_distribution:
  mild: 1.0

ed_stay_hours:
  mild: {mean: 0.5, sd: 0.15}  # 30 min visit

workup:
  vitals: false
  labs: []
  imaging:
    - {test: "Bilateral_Mammography", probability: 1.0}

treatment: []

discharge_instructions:
  - "Results will be sent within 1-2 weeks"
  - "If callback for additional imaging, this is common and usually benign"
  - "Continue monthly breast self-examinations"
  - "Schedule next screening mammogram in 1-2 years as recommended"

discharge_prescriptions: []

incidence_modifier: 1.0
age_distribution: women_40plus
sex_ratio_female: 1.0
seasonal: {1: 0.9, 2: 0.9, 3: 1.0, 4: 1.0, 5: 1.0, 6: 1.0, 7: 0.9, 8: 0.9, 9: 1.0, 10: 1.3, 11: 1.1, 12: 0.9}

narrative:
  outpatient_soap_template:
    subjective_ja: '{chief_complaint_ja}の訴え、{onset_days}日前より'
    objective_ja: バイタル安定、身体所見特記事項なし
    assessment_ja: '{primary_dx_display_ja}'
    plan_ja: '{workup_summary_ja}、{follow_up_ja}'
    subjective_en: '{chief_complaint_en} complaint, onset {onset_days} day(s) ago'
    objective_en: Vital signs stable; physical exam unremarkable
    assessment_en: '{primary_dx_display_en}'
    plan_en: '{workup_summary_en}, {follow_up_en}'
