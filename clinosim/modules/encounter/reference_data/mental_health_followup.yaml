# Mental Health Follow-up — Outpatient visit protocol
# Depression/anxiety management and medication review.

condition_id: mental_health_followup
chief_complaint: "Depression/anxiety management, medication review"
encounter_type: outpatient
department: psychiatry
disposition: discharge_home

visit_duration_minutes:
  mean: 30
  sd: 10

workup:
  vitals: true
  labs:
    - {test: "TSH", probability: 0.3}

treatment:
  - {name: "Medication review and adjustment", probability: 0.9, route: "N/A", intent: "optimize psychotropic regimen"}
  - {name: "PHQ-9 / GAD-7 screening", probability: 0.8, route: "N/A", intent: "symptom severity assessment"}

followup_instructions:
  - "Continue current medications as prescribed"
  - "Follow up in 4-6 weeks or sooner if symptoms worsen"
  - "Contact crisis line (988) if suicidal ideation"
  - "Maintain sleep hygiene and regular exercise"

prescriptions:
  - {drug: "Sertraline 50mg", route: "PO", frequency: "daily", duration_days: 90, probability: 0.3}
  - {drug: "Escitalopram 10mg", route: "PO", frequency: "daily", duration_days: 90, probability: 0.2}

incidence_modifier: 1.0
probability: 0.08
age_distribution: adults
sex_ratio_female: 0.6
seasonal: {1: 1.1, 2: 1.1, 3: 1.0, 4: 1.0, 5: 1.0, 6: 0.9, 7: 0.9, 8: 0.9, 9: 1.0, 10: 1.0, 11: 1.1, 12: 1.1}
