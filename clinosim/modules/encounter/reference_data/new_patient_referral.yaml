# New Patient Referral — Outpatient visit protocol
# Initial evaluation for patients referred by primary care for specialist consultation.

condition_id: new_patient_referral
chief_complaint: "New patient evaluation, referred by primary care"
encounter_type: outpatient
department: internal_medicine
disposition: discharge_home

severity_distribution:
  mild: 1.0

ed_stay_hours:
  mild: {mean: 0.75, sd: 0.25}  # 45 min visit

workup:
  vitals: true
  labs:
    - {test: "WBC", probability: 0.7}
    - {test: "Hb", probability: 0.7}
    - {test: "Plt", probability: 0.7}
    - {test: "CRP", probability: 0.7}
    - {test: "Creatinine", probability: 0.7}
    - {test: "Glucose", probability: 0.7}
    - {test: "AST", probability: 0.5}
    - {test: "ALT", probability: 0.5}
    - {test: "Na", probability: 0.5}
    - {test: "K", probability: 0.5}
  imaging:
    - {test: "Chest_Xray", probability: 0.3}
    - {test: "ECG", probability: 0.3}

treatment: []

discharge_instructions:
  - "Follow-up appointment will be scheduled based on evaluation results"
  - "Bring all current medications to next visit"
  - "Lab results will be reviewed at follow-up appointment"

discharge_prescriptions: []

incidence_modifier: 1.0
age_distribution: adults_all
sex_ratio_female: 1.1
seasonal: {1: 1.0, 2: 1.0, 3: 1.0, 4: 1.0, 5: 1.0, 6: 1.0, 7: 0.9, 8: 0.9, 9: 1.0, 10: 1.0, 11: 1.0, 12: 0.9}
