# Prescription Renewal — Outpatient visit protocol
# Brief visit for medication refill and prescription renewal. Minimal workup.

condition_id: prescription_renewal
icd10_code: "Z76.0"
icd10_display: "Encounter for issue of repeat prescription"
chief_complaint:
  en: "Medication refill, prescription renewal only"
  ja: "処方更新・定期処方"
encounter_type: outpatient
department: primary_care
disposition: discharge_home

severity_distribution:
  mild: 1.0

ed_stay_hours:
  mild: {mean: 0.17, sd: 0.05}  # 10 min visit

workup:
  vitals: true  # BP check only
  labs: []
  imaging: []

treatment: []

discharge_instructions:
  - "Continue medications as prescribed"
  - "Schedule follow-up for comprehensive review if not seen in >6 months"
  - "Report any new symptoms or side effects at next visit"

discharge_prescriptions: []
prescriptions_renewed: true

incidence_modifier: 1.0
age_distribution: adults_all
sex_ratio_female: 1.1
seasonal: {1: 1.1, 2: 1.0, 3: 1.0, 4: 1.0, 5: 1.0, 6: 1.0, 7: 1.0, 8: 1.0, 9: 1.0, 10: 1.0, 11: 1.0, 12: 1.1}

narrative:
  outpatient_soap_template:
    subjective_ja: 処方更新目的の定期受診。現在服用中の薬剤：{current_medications_ja}。副作用・困困感なし。コントロール状態は良好とのこと。
    objective_ja: バイタル安定（BP {sbp}/{dbp}、HR {hr}、BW {weight}kg）。全身状態良好、特記事項なし。前回検査結果（{last_lab_date}）：{lab_summary_ja}。
    assessment_ja: '{primary_dx_display_ja}にて内服加療中。現処方継続が妥当と判断。'
    plan_ja: 現行処方を{duration_days}日分処方継続。次回受診：{next_visit_ja}。異常・自覚症状出現時は早期受診。
    subjective_en: 'Routine visit for prescription renewal. Current medications: {current_medications_en}. No side effects or concerns reported. Patient states control is good.'
    objective_en: 'Vital signs stable (BP {sbp}/{dbp}, HR {hr}, BW {weight}kg). Overall condition good, no acute findings. Prior lab results ({last_lab_date}): {lab_summary_en}.'
    assessment_en: '{primary_dx_display_en}, on ongoing oral therapy. Continuation of current prescription judged appropriate.'
    plan_en: 'Continue current prescription for {duration_days} days. Next visit: {next_visit_en}. Return sooner if new symptoms or abnormalities develop.'
