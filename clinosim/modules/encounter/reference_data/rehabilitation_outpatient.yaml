# Rehabilitation Outpatient — Outpatient visit protocol
# Physical/occupational therapy session.

condition_id: rehabilitation_outpatient
icd10_code: "Z51.89"
icd10_display: "Encounter for other specified aftercare"
chief_complaint:
  en: "Physical/occupational therapy session"
  ja: "外来リハビリテーション（理学療法/作業療法）"
encounter_type: outpatient
department: rehabilitation
disposition: discharge_home

visit_duration_minutes:
  mean: 60
  sd: 15

workup:
  vitals: true
  labs: []

treatment:
  - {name: "Supervised therapeutic exercises", probability: 0.9, route: "N/A", intent: "strength and mobility"}
  - {name: "Gait training", probability: 0.6, route: "N/A", intent: "ambulation improvement"}
  - {name: "Range of motion exercises", probability: 0.7, route: "N/A", intent: "joint flexibility"}
  - {name: "Modalities (heat/cold/TENS)", probability: 0.4, route: "topical", intent: "pain management"}

followup_instructions:
  - "Continue home exercise program as instructed"
  - "Next session per regular schedule (typically 2-3x/week)"
  - "Report increased pain or new symptoms to therapist"
  - "Progress to next phase when goals are met"

prescriptions: []

incidence_modifier: 1.0
probability: 0.06
age_distribution: adults
sex_ratio_female: 0.55
seasonal: {1: 1.0, 2: 1.0, 3: 1.0, 4: 1.0, 5: 1.0, 6: 1.0, 7: 1.0, 8: 1.0, 9: 1.0, 10: 1.0, 11: 1.0, 12: 1.0}

narrative:
  outpatient_soap_template:
    subjective_ja: '{chief_complaint_ja}の訴え、{onset_days}日前より'
    objective_ja: バイタル安定、身体所見特記事項なし
    assessment_ja: '{primary_dx_display_ja}'
    plan_ja: '{workup_summary_ja}、{follow_up_ja}'
    subjective_en: '{chief_complaint_en} complaint, onset {onset_days} day(s) ago'
    objective_en: Vital signs stable; physical exam unremarkable
    assessment_en: '{primary_dx_display_en}'
    plan_en: '{workup_summary_en}, {follow_up_en}'
