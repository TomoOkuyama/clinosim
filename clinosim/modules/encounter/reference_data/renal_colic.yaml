# Renal Colic (Kidney Stone) — ED visit protocol
# Severe flank pain, often described as worst pain of life.

condition_id: renal_colic
icd10_code: "N23"
icd10_display: "Unspecified renal colic"
chief_complaint:
  en: "Severe flank pain radiating to groin, nausea, hematuria"
  ja: "激しい側腹部痛（鼠径部放散）・嘔気・血尿"
encounter_type: emergency
department: emergency_medicine
disposition: discharge_home

severity_distribution:
  mild: 0.30
  moderate: 0.50
  severe: 0.20

ed_stay_hours:
  mild: {mean: 2, sd: 0.5}
  moderate: {mean: 4, sd: 1}
  severe: {mean: 6, sd: 1.5}

workup:
  vitals: true
  labs:
    - {test: "Creatinine", probability: 0.8}
    - {test: "WBC", probability: 0.6}
    - {test: "Urinalysis", probability: 0.95}
    - {test: "Ca", probability: 0.3}
  imaging:
    - {test: "CT_abdomen_pelvis_noncontrast", probability: 0.7}
    - {test: "Renal_ultrasound", probability: 0.3}

treatment:
  - {name: "Ketorolac 30mg IV", probability: 0.8, route: "IV", intent: "NSAID analgesia (first-line)"}
  - {name: "Morphine 4mg IV", probability: 0.3, route: "IV", intent: "opioid if NSAID insufficient"}
  - {name: "Ondansetron 4mg IV", probability: 0.5, route: "IV", intent: "antiemetic"}
  - {name: "IV normal saline 1000mL", probability: 0.7, route: "IV", intent: "hydration"}

scenarios:
  small_stone_passes:
    probability: 0.50
    description: "Small stone (<5mm), pain controlled, likely to pass spontaneously"
    additional_labs: []
    additional_imaging: []
    duration_modifier: 0.7
    discharge_note: "Small ureteral stone, medical expulsive therapy. Strain urine."
  moderate_obstruction:
    probability: 0.35
    description: "Moderate stone (5-10mm), hydronephrosis on CT"
    additional_labs: [{test: "Creatinine", probability: 0.5}]
    additional_imaging: [{test: "CT_abdomen_pelvis_noncontrast", probability: 0.9}]
    duration_modifier: 1.3
    discharge_note: "Moderate stone with mild hydronephrosis. Urology referral for possible lithotripsy."
  complicated:
    probability: 0.15
    description: "Large stone, infection, or renal impairment"
    additional_labs: [{test: "WBC", probability: 0.9}, {test: "CRP", probability: 0.7}, {test: "Creatinine", probability: 0.9}]
    additional_imaging: [{test: "CT_abdomen_pelvis_noncontrast", probability: 0.95}]
    additional_treatment: [{name: "Urology consult", probability: 0.9}, {name: "Ceftriaxone 1g IV", probability: 0.4}]
    duration_modifier: 2.0
    discharge_note: "Infected stone or significant obstruction. Urology admission may be needed."

discharge_instructions:
  - "Strain all urine to catch stone for analysis"
  - "Increase fluid intake to 2-3L daily"
  - "Return if fever, inability to urinate, or uncontrolled pain"
  - "Urology follow-up within 1-2 weeks"

discharge_prescriptions:
  - {drug: "Tamsulosin 0.4mg", route: "PO", frequency: "daily", duration_days: 14, probability: 0.7}
  - {drug: "Ibuprofen 600mg", route: "PO", frequency: "tid PRN", duration_days: 7, probability: 0.8}
  - {drug: "Oxycodone 5mg", route: "PO", frequency: "q6h PRN", duration_days: 3, probability: 0.3}

incidence_modifier: 1.0
probability: 0.04
age_distribution: adults
sex_ratio_female: 0.5  # more common in men
seasonal: {1: 0.9, 2: 0.9, 3: 1.0, 4: 1.0, 5: 1.0, 6: 1.2, 7: 1.3, 8: 1.3, 9: 1.1, 10: 1.0, 11: 0.9, 12: 0.9}

narrative:
  ed_note_template:
    chief_complaint_ja: '{chief_complaint_ja}の訴え'
    hpi_ja: '{onset_days}日前より{chief_complaint_ja}が出現・増悪'
    physical_exam_ja:
      general: 意識清明、苦痛様
    ed_workup_summary_ja: '{lab_summary_ja}、{imaging_summary_ja}'
    disposition_ja: '{disposition_display_ja}'
  ed_triage_template:
    common_triage_levels:
    - '3'
    - '4'
