# Syncope — ED visit protocol
# Loss of consciousness evaluation. ECG, troponin, glucose workup.

condition_id: syncope
icd10_code: "R55"
icd10_display: "Syncope and collapse"
chief_complaint:
  en: "Loss of consciousness, fainting episode"
  ja: "意識消失・失神エピソード"
encounter_type: emergency
department: emergency_medicine
disposition: discharge_home

severity_distribution:
  mild: 0.40
  moderate: 0.45
  severe: 0.15    # cardiac syncope concern, prolonged monitoring

ed_stay_hours:
  mild: {mean: 3, sd: 1}
  moderate: {mean: 5, sd: 1.5}
  severe: {mean: 8, sd: 2}

workup:
  vitals: true
  labs:
    - {test: "ECG", probability: 0.95}
    - {test: "Troponin", probability: 0.5}
    - {test: "Glucose", probability: 0.6}
    - {test: "Hb", probability: 0.4}
  imaging:
    - {test: "CT_Head", probability: 0.3}

treatment:
  - {name: "IV normal saline 1L", probability: 0.6, route: "IV", intent: "volume resuscitation"}
  - {name: "Cardiac monitoring", probability: 0.5, route: "N/A", intent: "arrhythmia detection"}

discharge_instructions:
  - "Cardiac and neurological workup negative"
  - "Follow up with PCP or cardiologist within 1 week"
  - "Return immediately if recurrent syncope, chest pain, or palpitations"
  - "Avoid driving until cleared by physician"

discharge_prescriptions: []

scenarios:
  vasovagal:
    probability: 0.50
    description: "Young patient with clear trigger, quick recovery, benign episode"
    additional_labs: []
    additional_imaging: []
    additional_treatment: []
    duration_modifier: 0.5
    discharge_note: "Vasovagal syncope, benign"
  cardiac_concern:
    probability: 0.30
    description: "Elderly patient or abnormal ECG requiring cardiac workup"
    additional_labs: [Troponin, BNP]
    additional_imaging: [Echocardiography]
    additional_treatment: []
    duration_modifier: 1.5
    discharge_note: "Cardiac workup negative, Holter ordered"
  unexplained:
    probability: 0.20
    description: "No clear cause identified, extensive workup needed"
    additional_labs: [Troponin, BNP, Cortisol, TSH]
    additional_imaging: [CT_head, Echocardiography]
    additional_treatment: []
    duration_modifier: 2.0
    discharge_note: "Neurology/cardiology follow-up recommended"

incidence_modifier: 1.0
probability: 0.06
age_distribution: adults
sex_ratio_female: 0.5
seasonal: {1: 1.0, 2: 1.0, 3: 1.0, 4: 1.0, 5: 1.0, 6: 1.1, 7: 1.1, 8: 1.1, 9: 1.0, 10: 1.0, 11: 1.0, 12: 1.0}

narrative:
  ed_note_template:
    chief_complaint_ja: '{chief_complaint_ja}の訴え'
    hpi_ja: '{onset_days}日前より{chief_complaint_ja}が出現・増悪'
    physical_exam_ja:
      general: 意識清明、苦痛様
    ed_workup_summary_ja: '{lab_summary_ja}、{imaging_summary_ja}'
    disposition_ja: '{disposition_display_ja}'
    chief_complaint_en: '{chief_complaint_en} complaint'
    hpi_en: 'Onset {onset_days} day(s) ago: {chief_complaint_en}, progressively worsening.'
    physical_exam_en:
      general: Alert and oriented, in visible distress
    ed_workup_summary_en: '{lab_summary_en}, {imaging_summary_en}'
    disposition_en: '{disposition_display_en}'
  ed_triage_template:
    common_triage_levels:
    - '3'
    - '4'
