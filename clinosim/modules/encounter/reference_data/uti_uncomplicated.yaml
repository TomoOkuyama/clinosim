# Uncomplicated UTI — ED visit protocol
# Lower urinary tract infection. Urinalysis, antibiotics, discharge.

condition_id: uti_uncomplicated
chief_complaint: "Dysuria, urinary frequency, suprapubic discomfort"
encounter_type: emergency  # also outpatient_urgent
department: internal_medicine
disposition: discharge_home

severity_distribution:
  mild: 0.50     # classic symptoms, minimal workup
  moderate: 0.40  # labs, brief observation
  severe: 0.10    # concern for early pyelonephritis, IV fluids

ed_stay_hours:
  mild: {mean: 2, sd: 0.5}
  moderate: {mean: 3, sd: 1}
  severe: {mean: 4.5, sd: 1.5}

workup:
  vitals: true
  labs:
    - {test: "Urinalysis", probability: 0.9}
    - {test: "Urine_culture", probability: 0.5}
    - {test: "WBC", probability: 0.3}
    - {test: "Creatinine", probability: 0.2}
  imaging:
    - {test: "CT_Abdomen_Pelvis", probability: 0.05}  # only if complicated UTI suspected

treatment:
  - {name: "Trimethoprim-sulfamethoxazole 160/800mg", probability: 0.4, route: "PO", intent: "antibiotic"}
  - {name: "Nitrofurantoin 100mg", probability: 0.35, route: "PO", intent: "antibiotic"}
  - {name: "Ciprofloxacin 500mg", probability: 0.15, route: "PO", intent: "antibiotic (if resistance concern)"}
  - {name: "Phenazopyridine 200mg", probability: 0.3, route: "PO", intent: "urinary analgesic"}
  - {name: "IV normal saline 500mL", probability: 0.15, route: "IV", intent: "hydration"}

discharge_instructions:
  - "Complete full course of prescribed antibiotics"
  - "Increase fluid intake"
  - "Symptoms should improve within 24-48 hours of starting antibiotics"
  - "Return if fever, flank pain, vomiting, or symptoms not improving after 48 hours"

discharge_prescriptions:
  - {drug: "Trimethoprim-sulfamethoxazole 160/800mg", route: "PO", frequency: "bid", duration_days: 3, probability: 0.4}
  - {drug: "Nitrofurantoin 100mg", route: "PO", frequency: "bid", duration_days: 5, probability: 0.35}
  - {drug: "Ciprofloxacin 500mg", route: "PO", frequency: "bid", duration_days: 3, probability: 0.15}
  - {drug: "Phenazopyridine 200mg", route: "PO", frequency: "tid", duration_days: 2, probability: 0.3}

incidence_modifier: 0.9
age_distribution: adults  # predominantly women 18-65
sex_ratio_female: 4.0  # much more common in women
seasonal: {1: 1.0, 2: 1.0, 3: 1.0, 4: 1.0, 5: 1.0, 6: 1.1, 7: 1.2, 8: 1.2, 9: 1.1, 10: 1.0, 11: 1.0, 12: 1.0}
