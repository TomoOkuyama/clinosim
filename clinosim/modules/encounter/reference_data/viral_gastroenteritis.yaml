# Viral Gastroenteritis — ED visit protocol
# Most common ED visit condition. Usually discharged after IV fluid + antiemetics.

condition_id: viral_gastroenteritis
icd10_code: "A08.4"
icd10_display: "Viral intestinal infection, unspecified"
chief_complaint:
  en: "Nausea, vomiting, diarrhea, abdominal cramps"
  ja: "嘔気・嘔吐・下痢・腹部痙攣"
encounter_type: emergency  # emergency | outpatient_urgent
department: emergency_medicine
disposition: discharge_home  # discharge_home | observation | admit (criteria-based)

severity_distribution:
  mild: 0.50     # oral rehydration, go home quickly
  moderate: 0.40  # IV fluids, observation 2-4h
  severe: 0.10    # prolonged observation, consider admission

ed_stay_hours:
  mild: {mean: 2, sd: 0.5}
  moderate: {mean: 4, sd: 1}
  severe: {mean: 6, sd: 1.5}

# Acute physiological signature (AD-57): dehydration (volume↓ → BUN↑, BP↓/HR↑) with mild
# viral inflammation; severe volume loss tips into mild metabolic acidosis.
initial_state_impact:
  # AG axis: HCO3 stool loss → non-AG hyperchloremic acidosis (textbook
  # presentation). Severity scales with stool volume.
  mild:     {inflammation_level: 0.05, volume_status: -0.10, anion_gap_status: -0.3}
  moderate: {inflammation_level: 0.08, volume_status: -0.22, anion_gap_status: -0.5}
  severe:   {inflammation_level: 0.10, volume_status: -0.38, ph_status: -0.05, anion_gap_status: -0.6}

# What gets done in the ED
workup:
  vitals: true  # always
  labs:
    - {test: "WBC", probability: 0.4}
    - {test: "CRP", probability: 0.3}
    - {test: "Na", probability: 0.5}
    - {test: "K", probability: 0.5}
    - {test: "Creatinine", probability: 0.5}
    - {test: "Glucose", probability: 0.3}
  imaging: []  # rarely imaging for gastroenteritis

treatment:
  - {name: "IV normal saline 1000mL", probability: 0.7, route: "IV"}
  - {name: "Ondansetron 4mg", probability: 0.6, route: "IV", intent: "antiemetic"}
  - {name: "Acetaminophen 500mg", probability: 0.3, route: "PO", intent: "antipyretic"}

discharge_instructions:
  - "Clear liquids for 24 hours, advance diet as tolerated"
  - "Return if unable to keep fluids down for >12h"
  - "Return if bloody stool or fever >39C"

discharge_prescriptions:
  - {drug: "Ondansetron 4mg", route: "PO", frequency: "q8h PRN", duration_days: 3, probability: 0.5}

# Demographics
incidence_modifier: 1.0
probability: 0.20  # relative frequency among ED visits
age_distribution: all  # affects all ages
sex_ratio_female: 1.0
seasonal: {1: 1.3, 2: 1.2, 3: 1.1, 4: 0.9, 5: 0.8, 6: 0.8, 7: 0.9, 8: 0.9, 9: 1.0, 10: 1.0, 11: 1.1, 12: 1.3}

narrative:
  ed_note_template:
    chief_complaint_ja: '{chief_complaint_ja}の訴え'
    hpi_ja: '{onset_days}日前より{chief_complaint_ja}が出現・増悪'
    physical_exam_ja:
      general: 意識清明、苦痛様
    ed_workup_summary_ja: '{lab_summary_ja}、{imaging_summary_ja}'
    disposition_ja: '{disposition_display_ja}'
    chief_complaint_en: '{chief_complaint_en} complaint'
    hpi_en: 'Onset {onset_days} day(s) ago: {chief_complaint_en}, progressively worsening.'
    physical_exam_en:
      general: Alert and oriented, in visible distress
    ed_workup_summary_en: '{lab_summary_en}, {imaging_summary_en}'
    disposition_en: '{disposition_display_en}'
  ed_triage_template:
    common_triage_levels:
    - '3'
    - '4'
