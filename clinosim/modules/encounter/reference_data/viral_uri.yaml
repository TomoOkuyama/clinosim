# Viral Upper Respiratory Infection — ED visit protocol
# Very common, self-limiting. Supportive care and discharge.

condition_id: viral_uri
icd10_code: "J06.9"
icd10_display: "Acute upper respiratory infection, unspecified"
chief_complaint:
  en: "Fever, sore throat, cough, nasal congestion"
  ja: "発熱・咽頭痛・咳嗽・鼻汁"
encounter_type: emergency  # also outpatient_urgent
department: emergency_medicine
disposition: discharge_home

severity_distribution:
  mild: 0.60     # minimal workup, quick discharge
  moderate: 0.30  # some labs, observation
  severe: 0.10    # high fever, dehydration concern

ed_stay_hours:
  mild: {mean: 1.5, sd: 0.5}
  moderate: {mean: 2.5, sd: 0.8}
  severe: {mean: 4, sd: 1}

# Acute physiological signature (AD-57): mild viral inflammation (low-grade fever, modest
# WBC/CRP); severe = high fever / early dehydration concern.
initial_state_impact:
  mild:     {inflammation_level: 0.05}
  moderate: {inflammation_level: 0.10}
  severe:   {inflammation_level: 0.15}

workup:
  vitals: true
  labs:
    - {test: "Rapid_Strep", probability: 0.5}
    - {test: "WBC", probability: 0.3}
    - {test: "CRP", probability: 0.2}
  imaging:
    - {test: "Chest_Xray", probability: 0.15}  # rule out pneumonia if cough prominent

treatment:
  - {name: "Acetaminophen 500mg", probability: 0.6, route: "PO", intent: "antipyretic/analgesic"}
  - {name: "Ibuprofen 400mg", probability: 0.4, route: "PO", intent: "antipyretic/analgesic"}
  - {name: "IV normal saline 500mL", probability: 0.2, route: "IV", intent: "rehydration"}
  - {name: "Oral fluids encouraged", probability: 0.8, route: "PO", intent: "hydration"}

discharge_instructions:
  - "Rest and increase fluid intake"
  - "Symptomatic care: warm fluids, honey for cough, saline nasal spray"
  - "Expected duration 5-10 days"
  - "Return if fever >39C persisting >3 days, difficulty breathing, or worsening symptoms"

discharge_prescriptions:
  - {drug: "Acetaminophen 500mg", route: "PO", frequency: "q6h PRN", duration_days: 5, probability: 0.5}
  - {drug: "Dextromethorphan/Guaifenesin", route: "PO", frequency: "q6h PRN", duration_days: 5, probability: 0.3}

scenarios:
  simple_viral:
    probability: 0.60
    description: "Straightforward viral illness, no testing needed"
    additional_labs: []
    additional_imaging: []
    additional_treatment: []
    duration_modifier: 0.6
    discharge_note: "Viral illness, supportive care"
  strep_positive:
    probability: 0.25
    description: "Rapid strep test positive, antibiotics indicated"
    additional_labs: []
    additional_imaging: []
    additional_treatment: [Amoxicillin 500mg PO]
    duration_modifier: 1.0
    discharge_note: "Group A strep, antibiotics started"
  pneumonia_concern:
    probability: 0.15
    description: "Persistent cough with fever, need to rule out pneumonia"
    additional_labs: [CRP, WBC]
    additional_imaging: [Chest_Xray]
    additional_treatment: []
    duration_modifier: 1.5
    discharge_note: "CXR clear, viral URI confirmed"

incidence_modifier: 1.0
probability: 0.10  # relative frequency among ED visits
age_distribution: all
sex_ratio_female: 1.0
seasonal: {1: 1.4, 2: 1.3, 3: 1.2, 4: 0.8, 5: 0.7, 6: 0.6, 7: 0.6, 8: 0.6, 9: 0.8, 10: 1.0, 11: 1.2, 12: 1.4}

narrative:
  ed_note_template:
    chief_complaint_ja: 発熱・咽頭痛・咳嗽・鼻汁
    hpi_ja: '{onset_days}日前より発熱・咽頭痛・咳嗽・鼻汁が出現。最高体温：{max_temp_ja}℃。接触歴：{contact_history_ja}。インフルエンザ予防接種歴：{flu_vax_ja}。呼吸困難・胸痛・意識変容なし。'
    physical_exam_ja:
      general: 意識清明、{severity_desc_ja}、体温{temp}℃
      cardiovascular: 心拍数正常〜軽度頻脈、心音整
      respiratory: 呼吸数正常、肺野清明（肺炎所見なし）
      abdominal: 平坦、軟、圧痛なし
      neurological: 麻痺なし、髄膜刺激徴候なし
    ed_workup_summary_ja: 迅速溶連菌検査：{strep_result_ja}。{lab_summary_ja}。胸部X線（咳嗽強い場合）：{cxr_result_ja}。
    disposition_ja: ウイルス性上気道炎の診断にて帰宅。解熱・対症療法処方。3日以上の高熱持続・呼吸困難出現時は再診指示。
    chief_complaint_en: Fever, sore throat, cough, rhinorrhea
    hpi_en: 'Fever, sore throat, cough, and rhinorrhea began {onset_days} day(s) ago. Peak temperature: {max_temp_en}C. Contact history: {contact_history_en}. Influenza vaccination history: {flu_vax_en}. No dyspnea, chest pain, or altered mentation.'
    physical_exam_en:
      general: 'Alert and oriented, {severity_desc_en}, temperature {temp}C'
      cardiovascular: Normal to mildly tachycardic, regular heart sounds
      respiratory: Respiratory rate normal, lungs clear (no findings of pneumonia)
      abdominal: Flat, soft, non-tender
      neurological: No paralysis, no meningeal signs
    ed_workup_summary_en: 'Rapid strep test: {strep_result_en}. {lab_summary_en}. Chest X-ray (if cough prominent): {cxr_result_en}.'
    disposition_en: Discharged home with diagnosis of viral upper respiratory infection. Antipyretic and symptomatic treatment prescribed. Return if high fever persists beyond 3 days or dyspnea develops.
  ed_triage_template:
    common_triage_levels:
    - '4'
    - '5'
