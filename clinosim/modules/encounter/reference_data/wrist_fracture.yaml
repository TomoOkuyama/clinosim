# Wrist Fracture (Distal Radius) — ED visit protocol
# FOOSH injury. X-ray confirms. Splint/cast if non-displaced, refer ortho if displaced.

condition_id: wrist_fracture
icd10_code: "S62.90XA"
icd10_display: "Unspecified fracture of unspecified wrist, initial encounter for closed fracture"
chief_complaint:
  en: "Fall on outstretched hand, wrist pain and swelling"
  ja: "転倒後の手関節痛・腫脹"
encounter_type: emergency
department: orthopedics
disposition: discharge_home

severity_distribution:
  mild: 0.40    # Non-displaced, buddy splint or short arm cast
  moderate: 0.40 # Minimally displaced, closed reduction + cast
  severe: 0.20   # Displaced/comminuted, needs surgical referral

ed_stay_hours:
  mild: {mean: 2.0, sd: 0.5}
  moderate: {mean: 3.0, sd: 0.8}
  severe: {mean: 3.5, sd: 1.0}

workup:
  vitals: true
  labs: []  # no labs for isolated wrist fracture
  imaging:
    - {test: "Wrist_Xray_AP_Lateral", probability: 0.95}

treatment:
  - {name: "Ice pack application", probability: 0.9, route: "topical"}
  - {name: "Short arm splint", probability: 0.6, route: "topical", intent: "immobilization non-displaced"}
  - {name: "Short arm cast", probability: 0.3, route: "topical", intent: "immobilization after reduction"}
  - {name: "Closed reduction", probability: 0.25, route: "other", intent: "realign displaced fracture"}
  - {name: "Acetaminophen 500mg", probability: 0.5, route: "PO"}
  - {name: "Ibuprofen 400mg", probability: 0.6, route: "PO", intent: "anti-inflammatory"}
  - {name: "Morphine 4mg IV", probability: 0.2, route: "IV", intent: "severe pain or pre-reduction"}

discharge_instructions:
  - "Keep splint/cast dry and elevated above heart level"
  - "Wiggle fingers frequently to maintain circulation"
  - "Follow up with orthopedics in 5-7 days for repeat X-ray"
  - "Return if fingers become numb, blue, or very swollen"
  - "Ice over splint for 20 min every 2-3 hours for first 48 hours"

discharge_prescriptions:
  - {drug: "Ibuprofen 400mg", route: "PO", frequency: "tid", duration_days: 7, probability: 0.7}
  - {drug: "Acetaminophen 500mg", route: "PO", frequency: "tid PRN", duration_days: 7, probability: 0.5}
  - {drug: "Oxycodone 5mg", route: "PO", frequency: "q6h PRN", duration_days: 3, probability: 0.2}

# Severe cases may be referred for ORIF → see wrist_fracture_surgical.yaml (inpatient)
surgical_referral:
  probability: 0.20
  criteria: "Displaced, intra-articular, or comminuted fracture"
  referral_to: "wrist_fracture_surgical"

incidence_modifier: 1.0
probability: 0.04  # relative frequency among ED visits
age_distribution: all
sex_ratio_female: 1.3  # higher in postmenopausal women (osteoporosis)
seasonal: {1: 1.3, 2: 1.2, 3: 1.0, 4: 0.9, 5: 0.9, 6: 1.0, 7: 1.1, 8: 1.1, 9: 1.0, 10: 1.0, 11: 1.1, 12: 1.3}
