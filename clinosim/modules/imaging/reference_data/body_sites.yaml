# Body site reference + procedure code lookup.
# procedure_codes keyed by "{modality_dicom_code}_{variant}" — e.g. CR_PA_Lateral,
# CT_non_contrast — and carry LOINC + CPT + JP K-code for billing/interop.
#
# SNOMED body site concepts verified via SNOMED CT International browser.
# LOINC procedure codes verified via NLM Clinical Table Search Service
# (clinicaltables.nlm.nih.gov/api/loinc_items/v3/search) — see CO-1 continuation
# session 43 for the individual query URLs.
# CPT codes from AMA CPT 2024. JP K-code from 診療報酬点数表 令和6年.

body_sites:
  chest:
    snomed: "51185008"
    display_en: "Thoracic structure"
    display_ja: "胸部"
    procedure_codes:
      CR_PA_Lateral:                             # 2-view chest X-ray
        loinc: "36572-6"                         # NLM clinicaltables verified
        cpt: "71046"                             # AMA verified
        jp_k_code: "E001"                        # MHLW 単純撮影
        display_en: "Chest X-ray PA and Lateral"
        display_ja: "胸部単純X線撮影 正面・側面"
      CR_PA:                                     # 1-view chest X-ray (portable / bed-side)
        loinc: "36572-6"
        cpt: "71045"
        jp_k_code: "E001"
        display_en: "Chest X-ray PA"
        display_ja: "胸部単純X線撮影 正面"
      CT_non_contrast:
        # session 58 Issue #264: 30794-3 was retired from LOINC. Real active
        # LOINCs for chest CT are 29252-4 (WO contrast) + 24628-0 (W contrast IV).
        loinc: "29252-4"                         # CT Chest WO contrast (LOINC 2.82 ACTIVE)
        cpt: "71250"
        jp_k_code: "E200"                        # MHLW CT 単純
        display_en: "CT Chest without contrast"
        display_ja: "胸部CT 単純"
      CT_contrast:
        loinc: "24628-0"                         # CT Chest W contrast IV (LOINC 2.82 ACTIVE)
        cpt: "71260"
        jp_k_code: "E200"
        display_en: "CT Chest with contrast"
        display_ja: "胸部CT 造影"

