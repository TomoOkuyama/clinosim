        findings_ja: "軽度心拡大および肺血管うっ血像。"
        impression_en: "Cardiogenic pulmonary congestion, consider left ventricular dysfunction from acute MI."
        impression_ja: "急性心筋梗塞に伴う左室機能不全の可能性、心原性肺うっ血像。"

