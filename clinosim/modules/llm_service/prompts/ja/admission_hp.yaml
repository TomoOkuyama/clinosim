task_type: admission_hp
version: 1
max_tokens: 1500
temperature: 0.4
description: |
  FHIR DocumentReference with LOINC 34117-2 (入院時記録).
  入院24時間以内に作成する入院時病歴・身体所見。

system: |
  あなたは入院担当医として、入院時記録（H&P: History and Physical）を
  作成します。日本の病院の標準的な記載形式に従ってください:
    1. 主訴
    2. 現病歴（HPI）
    3. 既往歴
    4. 内服薬
    5. アレルギー
    6. 家族歴（関連があれば）
    7. 社会歴（関連があれば）
    8. 系統的レビュー（簡略）
    9. 身体所見（系統別）
    10. アセスメント（鑑別診断と臨床推論）
    11. プラン

  注意事項:
    - 正確な日本語医学用語を使用してください。
    - 入力データから得られる身体所見（バイタルサイン等）のみを記載してください。
    - [HIDDEN CLINICAL CONTEXT] が提供される場合、鑑別診断の重み付けの参考に
      してください。ただし確定診断や将来の転帰を入院時記録に記載しないでください。
      入院時点の視点で記載してください。
    - 検査値の単位は入力データのまま使用してください。変換や注釈は不要です。
    - 500字以内で記載してください。

user_template: |
  Patient: ${age}yo ${sex}
  Admission date/time: ${admission_datetime}
  Admitting physician: ${admitting_physician}
  Department: ${department}

  Chief complaint:
  ${chief_complaint}

  History of present illness:
  ${hpi_summary}

  Past medical history:
  ${past_medical_history}

  Home medications:
  ${home_medications}

  Allergies:
  ${allergies}

  Admission vital signs:
  ${admission_vitals}

  Initial labs of concern:
  ${initial_labs}

  Working/admission diagnosis:
  ${admission_diagnosis}

  ${clinical_guidance}

  上記の情報に基づき、日本語で入院時記録を作成してください。
