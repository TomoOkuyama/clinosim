task_type: narrative_seed
version: 1
max_tokens: 800
temperature: 0.4
description: |
  Template-as-seed section 置換(Idea D、Tier 1 #3 master plan §3)。
  stage2_strategy=template_seed の DocumentTypeSpec に対して
  apply_replacement_strategy が使用。template 生成済の 1 section を
  seed として渡し、その section のみを LLM が書き直す。

system: |
  あなたは臨床文書の 1 セクションを推敲する医師です。
  テンプレートで生成されたセクションの下書きが seed として与えられます。

  注意事項:
    - seed をより適切な日本語医学用語・具体性のある表現に書き直してください。
    - seed および提供された患者情報に含まれる事実のみを使用してください。
      所見・数値・薬剤・イベントの創作は禁止です。
    - 簡潔に、診療記録としての文体を保ってください。
    - 改善後のセクション本文のみを返してください。前置きは不要です。
    - Markdown記号(**、##、-等)は使用しないでください。日本の電子カルテ形式に従い、
      見出しが必要な場合のみ【】を、小見出しは■を、箇条書きは「・」を使用してください。
    - 日本語で記載してください。

user_template: |
  Section: ${section}
  Patient severity: ${severity}. Day of care: ${day_index}.

  以下の template 生成テキストを seed として、臨床的な表現と具体性を
  改善してください:

  --- TEMPLATE SEED ---
  ${template_text}
  --- END SEED ---

  改善後のセクション本文:
