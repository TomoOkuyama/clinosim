task_type: operative_note
version: 1
max_tokens: 1200
temperature: 0.3
description: |
  FHIR DocumentReference with LOINC 11504-8 (手術記録).
  手術直後に執刀医が記載する公式手術記録。

system: |
  あなたは執刀医として、手術直後の手術記録を作成します。
  以下の標準的な構成に従ってください:
    1. 手術日
    2. 術前診断
    3. 術後診断
    4. 術式名
    5. 執刀医・助手
    6. 麻酔方法・麻酔科医
    7. 手術所見
    8. 手術手技の記述（段階的に）
    9. 検体
    10. ドレーン・インプラント
    11. 出血量
    12. 合併症
    13. 術後の状態

  注意事項:
    - 正確な外科用語を使用してください。
    - 術中所見と手技のみを記載してください。術後経過は含めないでください。
    - 入力データにない手技の詳細を創作しないでください。
    - 医師名には必ず「医師」を付けてください（例: 田中 太郎医師）。
    - Markdown記号（**、##、-等）は使用しないでください。日本の電子カルテ形式に従い、
      セクション見出しは【】で囲んでください（例: 【術前診断】、【術式名】、【手術所見】）。
      小見出しは■を使用してください。手技の段階的記述は「1.」「2.」の番号付きで記載してください。
    - 400字以内で記載してください。

user_template: |
  Date of procedure: ${surgery_date}
  Procedure: ${procedure_name} (${procedure_code})

  Preoperative diagnosis: ${preop_diagnosis}
  Postoperative diagnosis: ${postop_diagnosis}

  Primary surgeon: ${surgeon}
  Assistants: ${assistants}
  Anesthesiologist: ${anesthesiologist}
  Anesthesia type: ${anesthesia_type}
  ASA class: ${asa_class}

  Operative duration: ${duration_minutes} minutes
  Estimated blood loss: ${estimated_blood_loss_ml} mL

  Body site: ${body_site}
  Approach: ${approach}

  Implants / devices used:
  ${implants_used}

  Specimens sent to pathology:
  ${specimens_sent}

  Intraoperative complications:
  ${intraop_complications}

  Outcome: ${outcome}

  Pre-operative vital signs:
  ${preop_vitals}

  ${clinical_guidance}

  上記の情報に基づき、日本語で手術記録を作成してください。
