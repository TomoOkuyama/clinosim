# Lab panel groupings for FHIR DiagnosticReport.result[] assembly.
# Authoritative panel codes: LOINC (verified against Regenstrief, NLM
# clinicaltables.nlm.nih.gov). Components are the *canonical* clinosim
# analyte names (the same names that appear as lab_results.lab_name and as
# the keys in derive_lab_values output).
#
# Grouping priority order (high to low; resolves analyte dual-membership):
#   ABG > CBC > BMP > LFT > Lipid > Coag > UA

panels:
  ABG:
    loinc: "24338-6"
    display: "Gas panel - Arterial blood"
    components: [pH, pCO2, pO2, HCO3]
    min_components: 3

  CBC:
    loinc: "58410-2"
    display: "Complete blood count (hemogram) panel - Blood by Automated count"
    components: [WBC, Hb, Hct, Plt]
    # min_components is pinned to the pre-PR1 emission profile, where most CBCs
    # were assembled post-hoc from individual {test: "WBC"}/"Hb"/"Plt" orders in
    # protocols that lacked a CBC panel-expansion registry entry. After PR1 the
    # four canonical components are emitted together from {test: "CBC"};
    # a follow-up audit-driven PR will measure the new distribution and
    # raise this threshold (likely to 3) to suppress accidental 2-component
    # groupings from BMP/other co-occurrences.
    min_components: 2

  BMP:
    loinc: "51990-0"
    display: "Basic metabolic 2000 panel - Serum or Plasma"
    components: [Na, K, Cl, HCO3, BUN, Creatinine, Glucose, Ca]
    # min_components stays at 3 for PR1: derive_lab_values() does not yet
    # produce Cl or Ca, so PR1's BMP panel emits at most 6 of 8 components
    # ({Na, K, HCO3, BUN, Creatinine, Glucose}). Once Cl/Ca are added to
    # the physiology engine (separate backlog), an audit-driven PR will
    # likely raise this to 6 to suppress accidental groupings from
    # individual {test: "Na"}/"K"/"Creatinine"/"Glucose"/"BUN"
    # co-occurrences in non-DKA protocols.
    min_components: 3

  LFT:
    loinc: "24325-3"
    display: "Hepatic function 2000 panel - Serum or Plasma"
    components: [AST, ALT, ALP, T_Bil, Albumin, TP, GGT, LDH]
    # AST + ALT pair is the standard "liver check" — threshold 2 matches both
    # full and mini-LFT orders.
    min_components: 2

  Lipid:
    loinc: "57698-3"
    display: "Lipid panel with direct LDL - Serum or Plasma"
    components: [TC, LDL, HDL, TG]
    min_components: 2

  Coag:
    loinc: "24373-3"
    display: "Activated partial thromboplastin time (aPTT) and Prothrombin time (PT)/INR panel - Platelet poor plasma"
    components: [PT, PT_INR, APTT]
    min_components: 2

  UA:
    loinc: "24356-8"
    display: "Urinalysis complete panel - Urine"
    components: [Urine_pH, Urine_specific_gravity, Urine_protein, Urine_glucose, Urine_ketones, Urine_blood, Urine_nitrite, Urine_leukocyte_esterase]
    min_components: 3
    skip_if_no_components_present: true
