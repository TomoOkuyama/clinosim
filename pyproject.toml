[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "clinosim"
version = "0.1.0"
description = "Clinically Realistic Hospital Data Simulator"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [
    { name = "clinosim contributors" },
]

dependencies = [
    "numpy>=1.26",
    "scipy>=1.12",
    "pydantic>=2.6",
    "pyyaml>=6.0",
    "httpx>=0.27",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5.0",
    "ruff>=0.3",
    "mypy>=1.8",
]
llm = [
    "httpx>=0.27",
]
parquet = [
    "pyarrow>=15.0",
    "pandas>=2.2",
]
all = ["clinosim[dev,llm,parquet]"]

[project.scripts]
clinosim = "clinosim.simulator:main"

[tool.hatch.build.targets.wheel]
packages = ["clinosim"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "unit: Unit tests (per module, fast)",
    "integration: Integration tests (module chains)",
    "e2e: End-to-end tests (full simulation, slow)",
]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]

[tool.mypy]
python_version = "3.11"
strict = true
